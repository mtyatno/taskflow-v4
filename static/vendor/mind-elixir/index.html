<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindmap</title>
  <link rel="stylesheet" href="MindElixir.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100%; }
    #map { flex: 1; min-height: 0; overflow: hidden; }

    #link-panel {
      display: none;
      flex-shrink: 0;
      border-top: 2px solid #6c7ae0;
      background: #12122a;
      padding: 8px 12px;
      max-height: 160px;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      color: #ccc;
    }
    #link-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 700;
      color: #ddd;
    }
    #link-panel-close {
      cursor: pointer;
      color: #666;
      font-size: 14px;
      line-height: 1;
      padding: 0 4px;
    }
    #link-panel-close:hover { color: #aaa; }
    #link-panel-items {
      display: flex;
      gap: 8px;
      align-items: stretch;
      overflow-x: auto;
    }
    .lp-card {
      background: #1e1e38;
      border: 1px solid #3a3a6a;
      border-radius: 7px;
      padding: 7px 10px;
      min-width: 160px;
      max-width: 220px;
      cursor: default;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .lp-card:hover { border-color: #6c7ae0; }
    .lp-card-row { display: flex; align-items: center; gap: 5px; }
    .lp-badge {
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 9px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .lp-badge-note { background: #6c7ae0; }
    .lp-badge-task { background: #e0a06c; }
    .lp-title { font-weight: 600; font-size: 11px; color: #ddd; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .lp-open { color: #6c7ae0; font-size: 14px; cursor: pointer; flex-shrink: 0; }
    .lp-open:hover { color: #9aa7f0; }
    .lp-remove { color: #e06c6c; font-size: 11px; cursor: pointer; flex-shrink: 0; }
    .lp-remove:hover { color: #ff9a9a; }
    .lp-preview { font-size: 10px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lp-add-btn {
      background: transparent;
      border: 1.5px dashed #3a3a6a;
      border-radius: 7px;
      padding: 7px 14px;
      color: #6c7ae0;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      align-self: stretch;
      display: flex;
      align-items: center;
    }
    .lp-add-btn:hover { border-color: #6c7ae0; }

    #lp-picker-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; font-family: system-ui, sans-serif;
    }
    #lp-picker-box {
      background: #1a1a2e; border: 1px solid #3a3a6a; border-radius: 12px;
      padding: 20px; width: 420px; max-width: 95vw; max-height: 70vh;
      display: flex; flex-direction: column; gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #lp-picker-header { display: flex; justify-content: space-between; align-items: center; }
    #lp-picker-title { font-weight: 700; font-size: 15px; color: #ddd; }
    #lp-picker-close { cursor: pointer; color: #666; font-size: 20px; line-height: 1; padding: 0 4px; }
    #lp-picker-close:hover { color: #aaa; }
    #lp-picker-input {
      width: 100%; padding: 9px 13px; border-radius: 8px;
      border: 1px solid #3a3a6a; background: #12122a;
      color: #ddd; font-size: 13px; outline: none; box-sizing: border-box;
    }
    #lp-picker-input:focus { border-color: #6c7ae0; }
    #lp-picker-tabs { display: flex; gap: 6px; }
    .lp-tab {
      padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid #3a3a6a; color: #aaa; background: transparent;
    }
    .lp-tab.active { background: #6c7ae0; color: white; border-color: #6c7ae0; }
    #lp-picker-results { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
    .lp-result-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      border-radius: 8px; border: 1px solid #3a3a6a; cursor: pointer;
    }
    .lp-result-item:hover { border-color: #6c7ae0; background: #1e1e38; }
    .lp-result-badge {
      border-radius: 3px; padding: 1px 6px; font-size: 10px; font-weight: 700;
      color: white; flex-shrink: 0;
    }
    .lp-result-title { font-size: 13px; font-weight: 600; color: #ddd; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .lp-result-meta { font-size: 10px; color: #666; flex-shrink: 0; }
    .lp-picker-hint { color: #555; font-size: 13px; text-align: center; padding: 20px; }

    .node-link-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #e0a06c;
      color: white;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      font-size: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      pointer-events: none;
      z-index: 10;
    }

    /* Floating node action toolbar — visible on touch / tablet */
    #node-toolbar {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: #1a1a2e;
      border: 1px solid #3a3a6a;
      border-radius: 40px;
      padding: 6px 10px;
      gap: 4px;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #node-toolbar.visible { display: flex; }
    .ntb-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 28px;
      padding: 8px 14px;
      color: #ccc;
      font-size: 18px;
      line-height: 1;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      min-width: 56px;
    }
    .ntb-btn span.label {
      font-size: 9px;
      color: #888;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .ntb-btn:hover, .ntb-btn:active { background: rgba(108,122,224,0.18); }
    .ntb-btn.danger:hover, .ntb-btn.danger:active { background: rgba(224,108,108,0.18); }
    .ntb-btn.danger { color: #e06c6c; }
    .ntb-sep { width: 1px; height: 32px; background: #3a3a6a; margin: 0 2px; }
  </style>
</head>
<body>
  <!-- Floating action toolbar: appears when a node is selected -->
  <div id="node-toolbar">
    <button class="ntb-btn" id="ntb-child" title="Tambah Child (Tab)">
      ↳<span class="label">Child</span>
    </button>
    <button class="ntb-btn" id="ntb-sibling" title="Tambah Sibling (Enter)">
      ↵<span class="label">Sibling</span>
    </button>
    <button class="ntb-btn" id="ntb-promote" title="Naikkan level — jadikan sibling dari parent">
      ↑<span class="label">Promote</span>
    </button>
    <div class="ntb-sep"></div>
    <button class="ntb-btn" id="ntb-edit" title="Edit node (F2)">
      ✏️<span class="label">Edit</span>
    </button>
    <div class="ntb-sep"></div>
    <button class="ntb-btn danger" id="ntb-delete" title="Hapus node (Delete)">
      🗑️<span class="label">Hapus</span>
    </button>
  </div>

  <div id="app">
    <div id="map"></div>
    <div id="link-panel">
      <div id="link-panel-header">
        <span id="link-panel-title">🔗 Links</span>
        <span id="link-panel-close" title="Tutup">✕</span>
      </div>
      <div id="link-panel-items"></div>
    </div>
  </div>
  <script src="MindElixir.iife.js"></script>
  <script>
    let mind = null;

    let currentNodeId = null;
    let currentNodeData = null;
    let unselectTimer = null;

    function findNode(node, id) {
      if (node.id === id) return node;
      for (const c of (node.children || [])) {
        const found = findNode(c, id);
        if (found) return found;
      }
      return null;
    }

    function showPanel() { document.getElementById('link-panel').style.display = 'block'; }
    function hidePanel() { document.getElementById('link-panel').style.display = 'none'; }

    function renderPanel(topic, links) {
      document.getElementById('link-panel-title').textContent = '🔗 Links — ' + topic;
      const container = document.getElementById('link-panel-items');
      container.innerHTML = '';

      links.forEach((link, idx) => {
        const card = document.createElement('div');
        card.className = 'lp-card';

        const row = document.createElement('div');
        row.className = 'lp-card-row';

        const badge = document.createElement('span');
        badge.className = 'lp-badge ' + (link.type === 'note' ? 'lp-badge-note' : 'lp-badge-task');
        badge.textContent = link.type === 'note' ? 'NOTE' : 'TASK';

        const title = document.createElement('span');
        title.className = 'lp-title';
        title.textContent = link.title;

        const openBtn = document.createElement('span');
        openBtn.className = 'lp-open';
        openBtn.textContent = '↗';
        openBtn.title = 'Buka';
        openBtn.onclick = () => {
          const msgType = link.type === 'note' ? 'openNote' : 'openTask';
          const send = () => window.parent.postMessage({ type: msgType, id: link.id }, window.location.origin);
          if (document.fullscreenElement) {
            document.exitFullscreen().finally(send);
          } else {
            send();
          }
        };

        const removeBtn = document.createElement('span');
        removeBtn.className = 'lp-remove';
        removeBtn.textContent = '✕';
        removeBtn.title = 'Hapus link';
        removeBtn.onclick = () => removeLinkAtIndex(idx);

        row.append(badge, title, openBtn, removeBtn);

        const preview = document.createElement('div');
        preview.className = 'lp-preview';
        if (link.type === 'task') {
          const parts = [];
          if (link.priority) parts.push(link.priority);
          if (link.deadline) parts.push('Due ' + link.deadline.slice(0, 10));
          if (link.status) parts.push(link.status);
          preview.textContent = parts.join(' · ') || '—';
        } else {
          preview.textContent = link.preview || '';
        }

        card.append(row, preview);
        container.appendChild(card);
      });

      // Add link button
      const addBtn = document.createElement('button');
      addBtn.className = 'lp-add-btn';
      addBtn.textContent = '+ Tambah link';
      addBtn.onclick = () => showLinkPicker();
      container.appendChild(addBtn);

      showPanel();
    }

    function removeLinkAtIndex(idx) {
      if (!currentNodeId || !currentNodeData) return;
      currentNodeData.links = (currentNodeData.links || []).filter((_, i) => i !== idx);
      renderPanel(currentNodeData.topic, currentNodeData.links);
      updateBadges();
      window.parent.postMessage({ type: 'change', data: mind.getData() }, window.location.origin);
    }

    function showLinkPicker() {
      if (!currentNodeId || !currentNodeData) return;
      if (document.getElementById('lp-picker-overlay')) return;

      const token = localStorage.getItem('tf_token');
      let activeTab = 'all';
      let searchResults = null;
      let debounceTimer = null;
      const existingSet = new Set((currentNodeData.links || []).map(l => `${l.type}-${l.id}`));

      const overlay = document.createElement('div');
      overlay.id = 'lp-picker-overlay';
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

      overlay.innerHTML = `
        <div id="lp-picker-box">
          <div id="lp-picker-header">
            <span id="lp-picker-title">🔗 Tambah Link</span>
            <span id="lp-picker-close">✕</span>
          </div>
          <input id="lp-picker-input" placeholder="Cari note atau task..." autocomplete="off" />
          <div id="lp-picker-tabs">
            <button class="lp-tab active" data-tab="all">Semua</button>
            <button class="lp-tab" data-tab="notes">Notes</button>
            <button class="lp-tab" data-tab="tasks">Tasks</button>
          </div>
          <div id="lp-picker-results"><p class="lp-picker-hint">Ketik untuk mencari...</p></div>
        </div>`;

      document.getElementById('app').appendChild(overlay);

      const input = overlay.querySelector('#lp-picker-input');
      const resultsEl = overlay.querySelector('#lp-picker-results');
      input.focus();

      overlay.querySelector('#lp-picker-close').onclick = () => overlay.remove();

      overlay.querySelectorAll('.lp-tab').forEach(btn => {
        btn.onclick = () => {
          activeTab = btn.dataset.tab;
          overlay.querySelectorAll('.lp-tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderResults();
        };
      });

      function renderResults() {
        if (!searchResults) { resultsEl.innerHTML = '<p class="lp-picker-hint">Ketik untuk mencari...</p>'; return; }
        const notes = (searchResults.notes || []).filter(n => !existingSet.has(`note-${n.id}`));
        const tasks = (searchResults.tasks || []).filter(t => !existingSet.has(`task-${t.id}`));
        const items = activeTab === 'notes' ? notes.map(n => ({...n, _type:'note'}))
                    : activeTab === 'tasks' ? tasks.map(t => ({...t, _type:'task'}))
                    : [...notes.map(n => ({...n, _type:'note'})), ...tasks.map(t => ({...t, _type:'task'}))];
        if (items.length === 0) { resultsEl.innerHTML = '<p class="lp-picker-hint">Tidak ada hasil</p>'; return; }
        resultsEl.innerHTML = '';
        items.forEach(item => {
          const el = document.createElement('div');
          el.className = 'lp-result-item';
          const color = item._type === 'note' ? '#6c7ae0' : '#e0a06c';
          const label = item._type === 'note' ? 'NOTE' : 'TASK';
          const meta = item._type === 'task' && item.priority ? item.priority : '';
          el.innerHTML = `<span class="lp-result-badge" style="background:${color}">${label}</span>
            <span class="lp-result-title">${item.title}</span>
            ${meta ? `<span class="lp-result-meta">${meta}</span>` : ''}`;
          el.onclick = () => {
            const link = item._type === 'note'
              ? { type: 'note', id: item.id, title: item.title, preview: (item.content || '').slice(0, 60) }
              : { type: 'task', id: item.id, title: item.title, priority: item.priority, deadline: item.deadline, status: item.gtd_status };
            if (!currentNodeData.links) currentNodeData.links = [];
            if (!currentNodeData.links.some(l => l.type === link.type && l.id === link.id)) {
              currentNodeData.links.push(link);
              renderPanel(currentNodeData.topic, currentNodeData.links);
              updateBadges();
              window.parent.postMessage({ type: 'change', data: mind.getData() }, window.location.origin);
            }
            overlay.remove();
          };
          resultsEl.appendChild(el);
        });
      }

      input.oninput = () => {
        clearTimeout(debounceTimer);
        const q = input.value.trim();
        if (!q) { searchResults = null; renderResults(); return; }
        resultsEl.innerHTML = '<p class="lp-picker-hint">Mencari...</p>';
        debounceTimer = setTimeout(() => {
          fetch(`/api/search?q=${encodeURIComponent(q)}`, {
            headers: token ? { 'Authorization': 'Bearer ' + token } : {}
          })
            .then(r => r.json())
            .then(data => { searchResults = data; renderResults(); })
            .catch(() => { resultsEl.innerHTML = '<p class="lp-picker-hint">Gagal mencari</p>'; });
        }, 300);
      };
    }

    function updateBadges() {
      document.querySelectorAll('.node-link-badge').forEach(el => el.remove());
      function addBadge(nodeData) {
        const count = (nodeData.links || []).length;
        if (count > 0) {
          const allTopics = document.querySelectorAll('me-tpc');
          allTopics.forEach(el => {
            if (el.nodeObj && el.nodeObj.id === nodeData.id) {
              el.style.position = 'relative';
              const badge = document.createElement('span');
              badge.className = 'node-link-badge';
              badge.textContent = count;
              el.appendChild(badge);
            }
          });
        }
        (nodeData.children || []).forEach(addBadge);
      }
      addBadge(mind.getData().nodeData);
    }

    function initMind(data) {
      if (mind) {
        mind.init(data);
        return;
      }
      const ME = MindElixir.default || MindElixir;
      mind = new ME({
        el: '#map',
        direction: MindElixir.SIDE,
        draggable: true,
        editable: true,
        contextMenu: true,
        toolBar: true,
        keypress: true,
      });
      // Redirect fullscreen from #map to #app so #link-panel stays visible
      const mapEl = document.getElementById('map');
      mapEl.requestFullscreen = () => document.getElementById('app').requestFullscreen();

      mind.init(data);
      setTimeout(updateBadges, 300);
      mind.bus.addListener('selectNodes', (nodes) => {
        clearTimeout(unselectTimer);
        if (!nodes || nodes.length === 0) return;
        const node = nodes[0];
        currentNodeId = node.id;
        currentNodeData = node; // live reference to internal nodeObj — not a getData() copy
        renderPanel(node.topic, node.links || []);
        document.getElementById('node-toolbar').classList.add('visible');
        window.parent.postMessage(
          { type: 'nodeSelected', nodeId: node.id, topic: node.topic, links: node.links || [] },
          window.location.origin
        );
      });

      mind.bus.addListener('unselectNodes', () => {
        unselectTimer = setTimeout(() => {
          currentNodeId = null;
          currentNodeData = null;
          hidePanel();
          document.getElementById('node-toolbar').classList.remove('visible');
          window.parent.postMessage({ type: 'nodeDeselected' }, window.location.origin);
        }, 50);
      });

      // Node toolbar button handlers
      document.getElementById('ntb-child').onclick = () => { if (mind.currentNodes) mind.addChild(); };
      document.getElementById('ntb-sibling').onclick = () => { if (mind.currentNodes) mind.insertSibling('after'); };
      document.getElementById('ntb-promote').onclick = () => {
        if (!mind.currentNodes || mind.currentNodes.length === 0) return;
        const nodeEl = mind.currentNodes[0];
        const nodeObj = nodeEl.nodeObj;
        // Need grandparent to exist — direct children of root cannot be promoted
        if (!nodeObj.parent || !nodeObj.parent.parent) return;
        const parentEl = mind.findEle(nodeObj.parent.id);
        mind.moveNodeAfter(nodeEl, parentEl);
      };
      document.getElementById('ntb-edit').onclick = () => { if (mind.currentNodes) mind.beginEdit(); };
      document.getElementById('ntb-delete').onclick = () => {
        if (!mind.currentNodes) return;
        const isRoot = mind.currentNodes.some(n => !n.parent);
        if (isRoot) return; // cannot delete root
        if (confirm('Hapus node ini?')) mind.removeNodes(mind.currentNodes);
      };

      document.getElementById('link-panel-close').onclick = () => {
        hidePanel();
        currentNodeId = null;
        currentNodeData = null;
        window.parent.postMessage({ type: 'nodeDeselected' }, window.location.origin);
      };

      mind.bus.addListener('operation', () => {
        window.parent.postMessage({ type: 'change', data: mind.getData() }, window.location.origin);
      });

      // Re-render panel after fullscreen exits so links stay visible
      document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && currentNodeId && currentNodeData) {
          setTimeout(() => renderPanel(currentNodeData.topic, currentNodeData.links || []), 100);
        }
      });
    }

    window.addEventListener('message', (e) => {
      if (e.origin !== window.location.origin) return;
      if (e.data && e.data.type === 'load') {
        hidePanel();
        currentNodeId = null;
        currentNodeData = null;
        clearTimeout(unselectTimer);
        initMind(e.data.data);
        setTimeout(updateBadges, 300);
      }
      if (e.data && e.data.type === 'clearPanel') {
        currentNodeId = null;
        currentNodeData = null;
        clearTimeout(unselectTimer);
        hidePanel();
      }
      if (e.data && e.data.type === 'addLink') {
        if (!currentNodeId || e.data.nodeId !== currentNodeId || !currentNodeData) return;
        if (!currentNodeData.links) currentNodeData.links = [];
        const alreadyLinked = currentNodeData.links.some(
          l => l.type === e.data.link.type && l.id === e.data.link.id
        );
        if (alreadyLinked) return;
        currentNodeData.links.push(e.data.link);
        renderPanel(currentNodeData.topic, currentNodeData.links);
        updateBadges();
        window.parent.postMessage({ type: 'change', data: mind.getData() }, window.location.origin);
      }
    });

    window.parent.postMessage({ type: 'ready' }, window.location.origin);
  </script>
</body>
</html>
