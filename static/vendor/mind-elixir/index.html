<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindmap</title>
  <link rel="stylesheet" href="MindElixir.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100%; }
    #map { flex: 1; min-height: 0; overflow: hidden; }

    #link-panel {
      display: none;
      flex-shrink: 0;
      border-top: 2px solid #6c7ae0;
      background: #12122a;
      padding: 8px 12px;
      max-height: 160px;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      color: #ccc;
    }
    #link-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 700;
      color: #ddd;
    }
    #link-panel-close {
      cursor: pointer;
      color: #666;
      font-size: 14px;
      line-height: 1;
      padding: 0 4px;
    }
    #link-panel-close:hover { color: #aaa; }
    #link-panel-items {
      display: flex;
      gap: 8px;
      align-items: stretch;
      overflow-x: auto;
    }
    .lp-card {
      background: #1e1e38;
      border: 1px solid #3a3a6a;
      border-radius: 7px;
      padding: 7px 10px;
      min-width: 160px;
      max-width: 220px;
      cursor: default;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .lp-card:hover { border-color: #6c7ae0; }
    .lp-card-row { display: flex; align-items: center; gap: 5px; }
    .lp-badge {
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 9px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .lp-badge-note { background: #6c7ae0; }
    .lp-badge-task { background: #e0a06c; }
    .lp-title { font-weight: 600; font-size: 11px; color: #ddd; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .lp-open { color: #6c7ae0; font-size: 14px; cursor: pointer; flex-shrink: 0; }
    .lp-open:hover { color: #9aa7f0; }
    .lp-remove { color: #e06c6c; font-size: 11px; cursor: pointer; flex-shrink: 0; }
    .lp-remove:hover { color: #ff9a9a; }
    .lp-preview { font-size: 10px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lp-add-btn {
      background: transparent;
      border: 1.5px dashed #3a3a6a;
      border-radius: 7px;
      padding: 7px 14px;
      color: #6c7ae0;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      align-self: stretch;
      display: flex;
      align-items: center;
    }
    .lp-add-btn:hover { border-color: #6c7ae0; }

    .node-link-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #e0a06c;
      color: white;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      font-size: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>
    <div id="link-panel">
      <div id="link-panel-header">
        <span id="link-panel-title">🔗 Links</span>
        <span id="link-panel-close" title="Tutup">✕</span>
      </div>
      <div id="link-panel-items"></div>
    </div>
  </div>
  <script src="MindElixir.iife.js"></script>
  <script>
    let mind = null;

    function initMind(data) {
      if (mind) {
        mind.init(data);
        return;
      }
      const ME = MindElixir.default || MindElixir;
      mind = new ME({
        el: '#map',
        direction: MindElixir.SIDE,
        draggable: true,
        editable: true,
        contextMenu: true,
        toolBar: true,
        keypress: true,
      });
      mind.init(data);
      mind.bus.addListener('operation', () => {
        window.parent.postMessage({ type: 'change', data: mind.getData() }, window.location.origin);
      });
    }

    window.addEventListener('message', (e) => {
      if (e.origin !== window.location.origin) return;
      if (e.data && e.data.type === 'load') {
        initMind(e.data.data);
      }
    });

    window.parent.postMessage({ type: 'ready' }, window.location.origin);
  </script>
</body>
</html>
