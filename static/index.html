</head>
<body>
  <div id="root"></div>

  <script>
    (function() {
      var t = localStorage.getItem('tf_theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo, createContext, useContext } = React;

    // ── Token storage (simple variable + localStorage) ────────
    let __token = localStorage.getItem("tf_token") || null;
    const tokenStore = {
      get: () => __token,
      set: (t) => { __token = t; try { localStorage.setItem("tf_token", t); } catch(e) {} },
      clear: () => { __token = null; try { localStorage.removeItem("tf_token"); } catch(e) {} },
    };

    // ── Offline — IndexedDB ─────────────────────────────────────
    const OfflineDB = (() => {
      const NAME = "taskflow-offline", VER = 1;
      let _db = null;
      const open = () => new Promise((res, rej) => {
        if (_db) return res(_db);
        const req = indexedDB.open(NAME, VER);
        req.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains("cache")) db.createObjectStore("cache");
          if (!db.objectStoreNames.contains("queue")) db.createObjectStore("queue", { keyPath: "qid", autoIncrement: true });
        };
        req.onsuccess = e => { _db = e.target.result; res(_db); };
        req.onerror = rej;
      });
      const tr = (store, mode, fn) => open().then(db => new Promise((res, rej) => {
        const r = fn(db.transaction(store, mode).objectStore(store));
        r.onsuccess = () => res(r.result);
        r.onerror = rej;
      })).catch(() => null);
      return {
        cacheGet:  (k)    => tr("cache", "readonly",  s => s.get(k)),
        cacheSet:  (k, v) => tr("cache", "readwrite", s => s.put(v, k)),
        queueAdd:  (v)    => tr("queue", "readwrite", s => s.add({ ...v, createdAt: Date.now() })),
        queueGetAll: ()   => open().then(db => new Promise((res, rej) => { const r = db.transaction("queue","readonly").objectStore("queue").getAll(); r.onsuccess = () => res(r.result||[]); r.onerror = rej; })).catch(() => []),
        queueDel:  (id)   => tr("queue", "readwrite", s => s.delete(id)),
        queueClear: ()    => tr("queue", "readwrite", s => s.clear()),
      };
    })();

    // ── API helper ──────────────────────────────────────────────
    const genId = () => (typeof crypto !== "undefined" && crypto.randomUUID)
      ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now().toString(36);

    const api = {
      async fetch(url, opts = {}) {
        const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
        if (__token) headers["Authorization"] = "Bearer " + __token;
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 15000);
        try {
          const res = await fetch(url, { ...opts, headers, signal: controller.signal });
          clearTimeout(timer);
          if (res.status === 401 && !url.includes("/api/auth/")) {
            tokenStore.clear();
            window.__logout?.();
            throw new Error("Unauthorized");
          }
          const text = await res.text();
          let data;
          try { data = JSON.parse(text); } catch { data = { detail: text || `Server error ${res.status}` }; }
          if (!res.ok) {
            let msg;
            if (typeof data.detail === "string") msg = data.detail;
            else if (Array.isArray(data.detail)) msg = data.detail.map(e => e.msg || JSON.stringify(e)).join(", ");
            else msg = `Request failed (${res.status})`;
            throw new Error(msg);
          }
          return data;
        } catch (err) {
          clearTimeout(timer);
          if (err.name === "AbortError") throw new Error("Request timeout — coba lagi");
          throw err;
        }
      },
      get: (url) => api.fetch(url),
      post: (url, body) => api.fetch(url, { method: "POST", body: JSON.stringify(body) }),
      put: (url, body) => api.fetch(url, { method: "PUT", body: JSON.stringify(body) }),
      patch: (url, body) => api.fetch(url, { method: "PATCH", body: JSON.stringify(body) }),
      del: (url) => api.fetch(url, { method: "DELETE" }),
    };
    const isOfflineErr = (err) =>
      !navigator.onLine ||
      err?.message === "OFFLINE" ||
      err instanceof TypeError ||
      /failed to fetch|networkerror|name_not_resolved/i.test(err?.message || "");

    // ── Context ─────────────────────────────────────────────────
    const AppContext = createContext();

    // ── Toast component ─────────────────────────────────────────
    function Toast({ message, type, onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
      return <div className={`toast toast-${type}`}>{message}</div>;
    }

    // ── Theme Toggle ────────────────────────────────────────────
    function ThemeToggle({ theme, onToggle }) {
      const isDark = theme === 'dark';
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer' }} onClick={onToggle} title={isDark ? 'Switch to Light' : 'Switch to Dark'}>
          <span style={{ fontSize: 14, lineHeight: 1 }}>☀️</span>
          <div style={{
            width: 36, height: 20, borderRadius: 10, position: 'relative', transition: 'background 0.2s',
            background: isDark ? 'var(--accent)' : '#d1d5db',
          }}>
            <div style={{
              position: 'absolute', top: 2, width: 16, height: 16, borderRadius: '50%',
              background: 'white', boxShadow: '0 1px 3px rgba(0,0,0,0.3)',
              transition: 'left 0.2s',
              left: isDark ? 18 : 2,
            }} />
          </div>
          <span style={{ fontSize: 14, lineHeight: 1 }}>🌙</span>
        </div>
      );
    }

    // ── Priority / Quadrant / Status helpers ────────────────────
    const PRI_LABELS = { P1: "Critical", P2: "High", P3: "Medium", P4: "Low" };
    const PRI_EMOJI = { P1: "🔴", P2: "🟠", P3: "🟡", P4: "🟢" };
    const QUAD_LABELS = { Q1: "Lakukan", Q2: "Rencanakan", Q3: "Delegasikan", Q4: "Singkirkan" };
    const QUAD_EMOJI = { Q1: "🔥", Q2: "📅", Q3: "👋", Q4: "🗑️" };
    const GTD_LABELS = { inbox: "Inbox", next: "Next", waiting: "Waiting", someday: "Someday", project: "Project", done: "Done" };
    const GTD_EMOJI = { inbox: "📥", next: "▶️", waiting: "⏳", someday: "💭", project: "📁", done: "✅" };

    const PRI_DOT = { P1: "#ef4444", P2: "#f97316", P3: "#eab308", P4: "#94a3b8" };
    function PriBadge({ p }) {
      return (
        <span className={`badge badge-${p.toLowerCase()}`} style={{ gap: 4 }}>
          <span style={{ width: 6, height: 6, borderRadius: "50%", background: PRI_DOT[p], display: "inline-block", flexShrink: 0 }} />
          {p}
        </span>
      );
    }
    function QuadBadge({ q }) { if (!q) return null; return <span className={`badge badge-${q.toLowerCase()}`}>{QUAD_EMOJI[q]} {q}</span>; }
    function StatusBadge({ s }) { return <span className={`badge badge-${s}`}>{GTD_EMOJI[s]} {GTD_LABELS[s]}</span>; }

    function formatDate(d) {
      if (!d) return "";
      const parts = d.split("-");
      if (parts.length === 3 && parts[0].length === 4) return `${parts[2]}-${parts[1]}-${parts[0]}`;
      return d;
    }

    // ── Sound & Notification helpers ─────────────────────────────
    function playNotificationSound(type = "work") {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      if (type === "work") {
        // Work done - cheerful ascending tones
        oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
        oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.15); // E5
        oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.3); // G5
      } else {
        // Break done - gentle descending tones
        oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime); // G5
        oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.15); // E5
        oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime + 0.3); // C5
      }
      
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.5);
    }

    function sendBrowserNotification(title, body) {
      if (!("Notification" in window)) return;
      
      if (Notification.permission === "granted") {
        new Notification(title, { body, icon: "🍅" });
      } else if (Notification.permission !== "denied") {
        Notification.requestPermission().then(permission => {
          if (permission === "granted") {
            new Notification(title, { body, icon: "🍅" });
          }
        });
      }
    }

    // ── Login Page ──────────────────────────────────────────────
    function LoginPage({ onLogin, onSwitch }) {
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true); setError("");
        try {
          const data = await api.post("/api/auth/login", { username, password });
          onLogin(data);
        } catch (err) { setError(err.message); }
        setLoading(false);
      };

      return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)" }}>
          <div className="card scale-in" style={{ width: 400, padding: 36 }}>
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <div style={{ fontSize: 32, fontWeight: 700, color: "var(--bg-primary)" }}>⚡ TaskFlow</div>
              <div style={{ fontSize: 14, color: "var(--text-secondary)", marginTop: 4 }}>V4 — Login</div>
            </div>
            <form onSubmit={handleSubmit}>
              <label className="input-label">Username</label>
              <input className="input" value={username} onChange={e => setUsername(e.target.value)} required autoFocus style={{ marginBottom: 14 }} />
              <label className="input-label">Password</label>
              <input className="input" type="password" value={password} onChange={e => setPassword(e.target.value)} required style={{ marginBottom: 6 }} />
              {error && <div style={{ color: "#ef4444", fontSize: 13, marginTop: 8 }}>{error}</div>}
              <button className="btn btn-primary" type="submit" disabled={loading} style={{ width: "100%", justifyContent: "center", marginTop: 18, padding: "12px 0" }}>
                {loading ? "Loading..." : "Login"}
              </button>
            </form>
            <div style={{ textAlign: "center", marginTop: 18, fontSize: 14, color: "var(--text-secondary)" }}>
              Belum punya akun? <span onClick={onSwitch} style={{ color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>Register</span>
            </div>
          </div>
        </div>
      );
    }

    // ── Register Page ───────────────────────────────────────────
    function RegisterPage({ onLogin, onSwitch }) {
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [displayName, setDisplayName] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true); setError("");
        try {
          const data = await api.post("/api/auth/register", { username, password, display_name: displayName });
          onLogin(data);
        } catch (err) { setError(err.message); }
        setLoading(false);
      };

      return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)" }}>
          <div className="card scale-in" style={{ width: 400, padding: 36 }}>
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <div style={{ fontSize: 32, fontWeight: 700, color: "var(--bg-primary)" }}>⚡ TaskFlow</div>
              <div style={{ fontSize: 14, color: "var(--text-secondary)", marginTop: 4 }}>V4 — Register</div>
            </div>
            <form onSubmit={handleSubmit}>
              <label className="input-label">Display Name</label>
              <input className="input" value={displayName} onChange={e => setDisplayName(e.target.value)} placeholder="Nama tampilan" style={{ marginBottom: 14 }} />
              <label className="input-label">Username</label>
              <input className="input" value={username} onChange={e => setUsername(e.target.value)} required style={{ marginBottom: 14 }} />
              <label className="input-label">Password</label>
              <input className="input" type="password" value={password} onChange={e => setPassword(e.target.value)} required minLength={4} style={{ marginBottom: 6 }} />
              {error && <div style={{ color: "#ef4444", fontSize: 13, marginTop: 8 }}>{error}</div>}
              <button className="btn btn-primary" type="submit" disabled={loading} style={{ width: "100%", justifyContent: "center", marginTop: 18, padding: "12px 0" }}>
                {loading ? "Loading..." : "Register"}
              </button>
            </form>
            <div style={{ textAlign: "center", marginTop: 18, fontSize: 14, color: "var(--text-secondary)" }}>
              Sudah punya akun? <span onClick={onSwitch} style={{ color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>Login</span>
            </div>
          </div>
        </div>
      );
    }

    // ── Sidebar ─────────────────────────────────────────────────
    // ── MentionInput ──────────────────────────────────────────────────────────
    // Drop-in replacement for <input> or <textarea> with @mention autocomplete.
    // Props: value, onChange(e), collaborators, as ("input"|"textarea"), ...rest
    function MentionInput({ value, onChange, collaborators = [], as: Tag = "input", style, ...rest }) {
      const [mentionState, setMentionState] = useState(null); // { atPos, query }
      const [filtered, setFiltered] = useState([]);
      const [highlighted, setHighlighted] = useState(0);
      const inputRef = useRef();
      const dropRef = useRef();

      const handleChange = (e) => {
        onChange(e);
        const val = e.target.value;
        const cursor = e.target.selectionStart;
        const before = val.slice(0, cursor);
        const atMatch = before.match(/@([\w]*)$/);
        if (atMatch && collaborators.length > 0) {
          const q = atMatch[1].toLowerCase();
          const atPos = cursor - atMatch[0].length;
          const results = collaborators.filter(u =>
            u.username.toLowerCase().startsWith(q) ||
            (u.display_name || "").toLowerCase().startsWith(q) ||
            (q.length >= 2 && (
              u.username.toLowerCase().includes(q) ||
              (u.display_name || "").toLowerCase().includes(q)
            ))
          ).slice(0, 6);
          if (results.length > 0) {
            setMentionState({ atPos, query: q });
            setFiltered(results);
            setHighlighted(0);
            return;
          }
        }
        setMentionState(null);
        setFiltered([]);
      };

      const applyMention = (user) => {
        if (!mentionState || !inputRef.current) return;
        const cursor = inputRef.current.selectionStart;
        const val = inputRef.current.value;
        const before = val.slice(0, mentionState.atPos);
        const after = val.slice(cursor);
        const inserted = `@${user.username} `;
        const newVal = before + inserted + after;
        // Synthesize a change event so controlled input updates correctly
        const nativeInput = inputRef.current;
        const nativeSetter = Object.getOwnPropertyDescriptor(
          Tag === "textarea" ? window.HTMLTextAreaElement.prototype : window.HTMLInputElement.prototype,
          "value"
        )?.set;
        if (nativeSetter) nativeSetter.call(nativeInput, newVal);
        nativeInput.dispatchEvent(new Event("input", { bubbles: true }));
        const newCursor = before.length + inserted.length;
        requestAnimationFrame(() => {
          nativeInput.focus();
          nativeInput.setSelectionRange(newCursor, newCursor);
        });
        setMentionState(null);
        setFiltered([]);
      };

      const handleKeyDown = (e) => {
        if (filtered.length === 0) { rest.onKeyDown?.(e); return; }
        if (e.key === "ArrowDown") {
          e.preventDefault();
          setHighlighted(h => (h + 1) % filtered.length);
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          setHighlighted(h => (h - 1 + filtered.length) % filtered.length);
        } else if (e.key === "Enter" || e.key === "Tab") {
          if (filtered[highlighted]) { e.preventDefault(); applyMention(filtered[highlighted]); }
          else rest.onKeyDown?.(e);
        } else if (e.key === "Escape") {
          setMentionState(null); setFiltered([]);
        } else {
          rest.onKeyDown?.(e);
        }
      };

      const handleBlur = (e) => {
        // Delay to allow mousedown on dropdown to fire first
        setTimeout(() => { setMentionState(null); setFiltered([]); }, 150);
        rest.onBlur?.(e);
      };

      return (
        <div style={{ position: "relative", ...( Tag === "textarea" ? {} : { display: "block" }) }}>
          <Tag
            ref={inputRef}
            value={value}
            onChange={handleChange}
            onKeyDown={handleKeyDown}
            onBlur={handleBlur}
            style={style}
            {...Object.fromEntries(Object.entries(rest).filter(([k]) => !["onKeyDown","onBlur"].includes(k)))}
          />
          {filtered.length > 0 && (
            <div ref={dropRef} style={{
              position: "absolute", top: "100%", left: 0, zIndex: 400,
              background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 8,
              boxShadow: "0 4px 16px rgba(0,0,0,0.13)", overflow: "hidden", minWidth: 200, maxWidth: 280,
            }}>
              {filtered.map((u, i) => (
                <div
                  key={u.id}
                  onMouseDown={(e) => { e.preventDefault(); applyMention(u); }}
                  style={{
                    padding: "8px 14px", cursor: "pointer", fontSize: 13,
                    background: i === highlighted ? "#f0fdf4" : "var(--bg-card)",
                    borderBottom: i < filtered.length - 1 ? "1px solid #f1f5f9" : "none",
                    display: "flex", alignItems: "center", gap: 8,
                  }}
                >
                  <span style={{ fontWeight: 600, color: "var(--accent)" }}>@{u.username}</span>
                  {u.display_name && u.display_name !== u.username && (
                    <span style={{ color: "var(--text-light)", fontSize: 12 }}>{u.display_name}</span>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── JoinListModal ──────────────────────────────────────────────────────────
    function JoinListModal({ code, onClose, onJoined }) {
      const [preview, setPreview] = useState(null);
      const [error, setError] = useState("");
      const [joining, setJoining] = useState(false);
      const [manualCode, setManualCode] = useState(code || "");

      // Auto-preview if code was passed via URL
      useEffect(() => {
        if (code) loadPreview(code);
      }, []);

      const loadPreview = async (c) => {
        setError("");
        setPreview(null);
        if (!c.trim()) return;
        try {
          const data = await api.get(`/api/lists/preview/${c.trim()}`);
          setPreview(data);
        } catch (err) {
          setError(err.message || "Kode tidak valid atau kadaluarsa.");
        }
      };

      const handleJoin = async () => {
        const c = (preview ? manualCode || code : manualCode).trim();
        if (!c) return;
        setJoining(true);
        try {
          const data = await api.post("/api/lists/join", { code: c });
          onJoined(data.list_name);
        } catch (err) {
          setError(err.message || "Gagal bergabung.");
          setJoining(false);
        }
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content scale-in" style={{ maxWidth: 420 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h2 style={{ fontSize: 18, fontWeight: 700 }}>👥 Bergabung ke Shared List</h2>
              <span onClick={onClose} style={{ cursor: "pointer", fontSize: 20, color: "var(--text-light)" }}>✕</span>
            </div>

            {preview ? (
              <div>
                <div style={{ background: "var(--bg-primary)", borderRadius: 10, padding: 16, marginBottom: 16, textAlign: "center" }}>
                  <div style={{ fontSize: 24, marginBottom: 6 }}>📋</div>
                  <div style={{ fontWeight: 700, fontSize: 16 }}>{preview.list_name}</div>
                  <div style={{ fontSize: 12, color: "var(--text-light)", marginTop: 4 }}>
                    Link berlaku hingga {new Date(preview.expires_at).toLocaleString("id-ID")}
                  </div>
                </div>
                <button className="btn btn-primary" style={{ width: "100%", padding: "10px" }} onClick={handleJoin} disabled={joining}>
                  {joining ? "Bergabung..." : "✅ Gabung ke List Ini"}
                </button>
              </div>
            ) : (
              <div>
                <label className="input-label">Masukkan kode invite</label>
                <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                  <input
                    className="input"
                    value={manualCode}
                    onChange={e => setManualCode(e.target.value)}
                    placeholder="Paste kode invite di sini..."
                    style={{ flex: 1 }}
                    onKeyDown={e => { if (e.key === "Enter") loadPreview(manualCode); }}
                    autoFocus
                  />
                  <button className="btn btn-primary" onClick={() => loadPreview(manualCode)}>Cek</button>
                </div>
                {error && <div style={{ color: "#ef4444", fontSize: 13, marginBottom: 8 }}>❌ {error}</div>}
                <div style={{ fontSize: 12, color: "var(--text-light)" }}>Minta link invite dari owner shared list.</div>
              </div>
            )}

            {error && preview && <div style={{ color: "#ef4444", fontSize: 13, marginTop: 8 }}>❌ {error}</div>}
          </div>
        </div>
      );
    }

    // ── SharedListsManager ─────────────────────────────────────────────────────
    function SharedListsManager({ sharedLists, onRefresh, showToast }) {
      const [newName, setNewName] = useState("");
      const [creating, setCreating] = useState(false);
      const [inviteUsername, setInviteUsername] = useState("");
      const [invitingListId, setInvitingListId] = useState(null);
      const [expandedList, setExpandedList] = useState(null);
      const [members, setMembers] = useState({});
      const [generatedLinks, setGeneratedLinks] = useState({});
      const [generatingFor, setGeneratingFor] = useState(null);
      const [showJoinForm, setShowJoinForm] = useState(false);
      const [joinCode, setJoinCode] = useState("");
      const [joinPreview, setJoinPreview] = useState(null);
      const [joinError, setJoinError] = useState("");
      const [joining, setJoining] = useState(false);

      const loadMembers = async (listId) => {
        if (members[listId]) return;
        try {
          const data = await api.get(`/api/lists/${listId}`);
          setMembers(m => ({ ...m, [listId]: data.members || [] }));
        } catch (e) {}
      };

      const toggleExpand = (listId) => {
        if (expandedList === listId) { setExpandedList(null); return; }
        setExpandedList(listId);
        loadMembers(listId);
      };

      const handleGenerateLink = async (listId) => {
        setGeneratingFor(listId);
        try {
          const data = await api.post(`/api/lists/${listId}/generate-link`, {});
          setGeneratedLinks(prev => ({ ...prev, [listId]: data.join_url }));
        } catch (err) { showToast(err.message, "error"); }
        setGeneratingFor(null);
      };

      const copyLink = (url) => {
        navigator.clipboard.writeText(url).then(() => showToast("Link disalin ✅")).catch(() => showToast("Gagal menyalin", "error"));
      };

      const handleCheckCode = async () => {
        setJoinError("");
        setJoinPreview(null);
        if (!joinCode.trim()) return;
        try {
          const data = await api.get(`/api/lists/preview/${joinCode.trim()}`);
          setJoinPreview(data);
        } catch (err) { setJoinError(err.message || "Kode tidak valid."); }
      };

      const handleJoinByCode = async () => {
        if (!joinPreview) return;
        setJoining(true);
        try {
          await api.post("/api/lists/join", { code: joinCode.trim() });
          showToast(`Berhasil bergabung ke "${joinPreview.list_name}" ✅`);
          setShowJoinForm(false);
          setJoinCode("");
          setJoinPreview(null);
          onRefresh();
        } catch (err) { setJoinError(err.message || "Gagal bergabung."); }
        setJoining(false);
      };

      const handleCreate = async (e) => {
        e.preventDefault();
        if (!newName.trim()) return;
        setCreating(true);
        try {
          await api.post("/api/lists", { name: newName.trim() });
          setNewName("");
          showToast("Shared list dibuat ✅");
          onRefresh();
        } catch (err) { showToast(err.message, "error"); }
        setCreating(false);
      };

      const handleInvite = async (listId) => {
        const username = inviteUsername.replace("@", "").trim();
        if (!username) return;
        try {
          await api.post(`/api/lists/${listId}/invite`, { username });
          showToast(`${username} ditambahkan ke list ✅`);
          setInviteUsername("");
          setInvitingListId(null);
          setMembers(m => { const n = {...m}; delete n[listId]; return n; });
          loadMembers(listId);
          onRefresh();
        } catch (err) { showToast(err.message, "error"); }
      };

      const handleRemoveMember = async (listId, memberId, memberName) => {
        if (!confirm(`Hapus ${memberName} dari list ini?`)) return;
        try {
          await api.del(`/api/lists/${listId}/members/${memberId}`);
          showToast("Member dihapus");
          setMembers(m => { const n = {...m}; delete n[listId]; return n; });
          loadMembers(listId);
          onRefresh();
        } catch (err) { showToast(err.message, "error"); }
      };

      const handleLeave = async (listId, listName) => {
        if (!confirm(`Keluar dari list "${listName}"?`)) return;
        try {
          await api.del(`/api/lists/${listId}/leave`);
          showToast("Berhasil keluar dari list");
          onRefresh();
        } catch (err) { showToast(err.message, "error"); }
      };

      const handleDelete = async (listId, listName) => {
        if (!confirm(`Hapus shared list "${listName}"? Semua task di list ini akan ikut terhapus.`)) return;
        try {
          await api.del(`/api/lists/${listId}`);
          showToast("List dihapus 🗑️");
          onRefresh();
        } catch (err) { showToast(err.message, "error"); }
      };

      return (
        <div style={{ maxWidth: 600, margin: "0 auto", padding: "0 0 40px" }}>
          <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 20 }}>⚙️ Kelola Shared List</h2>

          {/* Join via code */}
          <div style={{ background: "var(--bg-primary)", borderRadius: 12, padding: 16, marginBottom: 16, border: "1px solid var(--border)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontSize: 14, fontWeight: 600 }}>🔗 Gabung ke List Orang Lain</div>
              <button className="btn btn-secondary btn-sm" onClick={() => { setShowJoinForm(!showJoinForm); setJoinPreview(null); setJoinError(""); }}>
                {showJoinForm ? "Tutup" : "Masukkan Kode"}
              </button>
            </div>
            {showJoinForm && (
              <div style={{ marginTop: 12 }}>
                {!joinPreview ? (
                  <>
                    <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                      <input className="input" value={joinCode} onChange={e => setJoinCode(e.target.value)} placeholder="Paste kode invite..." style={{ flex: 1 }}
                        onKeyDown={e => { if (e.key === "Enter") handleCheckCode(); }} autoFocus />
                      <button className="btn btn-primary" onClick={handleCheckCode}>Cek</button>
                    </div>
                    {joinError && <div style={{ color: "#ef4444", fontSize: 13 }}>❌ {joinError}</div>}
                  </>
                ) : (
                  <div>
                    <div style={{ background: "var(--bg-card)", borderRadius: 8, padding: 12, marginBottom: 10, border: "1px solid var(--border)" }}>
                      <div style={{ fontWeight: 600 }}>📋 {joinPreview.list_name}</div>
                      <div style={{ fontSize: 12, color: "var(--text-light)", marginTop: 2 }}>
                        Berlaku hingga {new Date(joinPreview.expires_at).toLocaleString("id-ID")}
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button className="btn btn-primary btn-sm" onClick={handleJoinByCode} disabled={joining}>
                        {joining ? "..." : "✅ Gabung"}
                      </button>
                      <button className="btn btn-secondary btn-sm" onClick={() => { setJoinPreview(null); setJoinCode(""); }}>Batal</button>
                    </div>
                    {joinError && <div style={{ color: "#ef4444", fontSize: 13, marginTop: 6 }}>❌ {joinError}</div>}
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Create new list */}
          <div style={{ background: "var(--bg-primary)", borderRadius: 12, padding: 16, marginBottom: 24, border: "1px solid var(--border)" }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 10 }}>Buat List Baru</div>
            <form onSubmit={handleCreate} style={{ display: "flex", gap: 8 }}>
              <input className="input" value={newName} onChange={e => setNewName(e.target.value)} placeholder="Nama list..." style={{ flex: 1 }} />
              <button type="submit" className="btn btn-primary" disabled={creating || !newName.trim()}>
                {creating ? "..." : "＋ Buat"}
              </button>
            </form>
          </div>

          {/* Existing lists */}
          {sharedLists.length === 0 ? (
            <div style={{ textAlign: "center", color: "var(--text-light)", padding: "40px 0", fontSize: 15 }}>
              Belum ada shared list. Buat yang pertama di atas!
            </div>
          ) : sharedLists.map(l => (
            <div key={l.id} style={{ background: "var(--bg-primary)", borderRadius: 12, padding: 16, marginBottom: 12, border: "1px solid var(--border)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 20 }}>{l.role === "owner" ? "📋" : "👥"}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600 }}>{l.name}</div>
                  <div style={{ fontSize: 12, color: "var(--text-light)" }}>
                    {l.role === "owner" ? "Owner" : "Member"} · {l.member_count} anggota
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <button className="btn btn-secondary btn-sm" onClick={() => toggleExpand(l.id)}>
                    {expandedList === l.id ? "Tutup" : "Kelola"}
                  </button>
                  {l.role === "owner"
                    ? <button className="btn btn-sm" style={{ background: "#fee2e2", color: "#dc2626", border: "none", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 12 }} onClick={() => handleDelete(l.id, l.name)}>Hapus</button>
                    : <button className="btn btn-sm" style={{ background: "#fef3c7", color: "#92400e", border: "none", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 12 }} onClick={() => handleLeave(l.id, l.name)}>Keluar</button>
                  }
                </div>
              </div>

              {expandedList === l.id && (
                <div style={{ marginTop: 14, borderTop: "1px solid var(--border)", paddingTop: 12 }}>
                  {/* Members list */}
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Anggota:</div>
                  {(members[l.id] || []).length === 0
                    ? <div style={{ fontSize: 13, color: "var(--text-light)", marginBottom: 8 }}>Belum ada anggota.</div>
                    : (members[l.id] || []).map(m => (
                      <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0" }}>
                        <span style={{ fontSize: 14 }}>👤</span>
                        <span style={{ flex: 1, fontSize: 13 }}>{m.display_name || m.username} <span style={{ color: "var(--text-light)" }}>@{m.username}</span></span>
                        {l.role === "owner" && (
                          <button onClick={() => handleRemoveMember(l.id, m.id, m.display_name || m.username)} style={{ background: "none", border: "none", cursor: "pointer", color: "#ef4444", fontSize: 12 }}>Hapus</button>
                        )}
                      </div>
                    ))
                  }

                  {/* Invite section (owner only) */}
                  {l.role === "owner" && (
                    <div style={{ marginTop: 12 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Undang anggota baru:</div>
                      {invitingListId === l.id ? (
                        <div style={{ display: "flex", gap: 8 }}>
                          <input
                            className="input"
                            value={inviteUsername}
                            onChange={e => setInviteUsername(e.target.value)}
                            placeholder="@username"
                            style={{ flex: 1, padding: "6px 10px", fontSize: 13 }}
                            onKeyDown={e => { if (e.key === "Enter") handleInvite(l.id); if (e.key === "Escape") setInvitingListId(null); }}
                            autoFocus
                          />
                          <button className="btn btn-primary btn-sm" onClick={() => handleInvite(l.id)}>Undang</button>
                          <button className="btn btn-secondary btn-sm" onClick={() => setInvitingListId(null)}>Batal</button>
                        </div>
                      ) : (
                        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                          <button className="btn btn-secondary btn-sm" onClick={() => { setInvitingListId(l.id); setInviteUsername(""); }}>
                            ＋ Undang via Username
                          </button>
                          <button className="btn btn-secondary btn-sm" onClick={() => handleGenerateLink(l.id)} disabled={generatingFor === l.id}>
                            {generatingFor === l.id ? "..." : "🔗 Generate Invite Link"}
                          </button>
                        </div>
                      )}

                      {/* Show generated link */}
                      {generatedLinks[l.id] && (
                        <div style={{ marginTop: 10, background: "var(--bg-card)", borderRadius: 8, padding: 10, border: "1px solid var(--border)" }}>
                          <div style={{ fontSize: 12, color: "var(--text-light)", marginBottom: 6 }}>Link berlaku 48 jam, sekali pakai:</div>
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            <input readOnly value={generatedLinks[l.id]} style={{ flex: 1, fontSize: 11, padding: "4px 8px", border: "1px solid var(--border)", borderRadius: 6, background: "#f8f8f8", color: "var(--text-secondary)" }} onClick={e => e.target.select()} />
                            <button className="btn btn-primary btn-sm" onClick={() => copyLink(generatedLinks[l.id])}>Salin</button>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    function Sidebar({ page, setPage, summary, user, onLogout, isOpen, onClose, projects, tasks, collapsed, onToggleCollapse, sharedLists }) {
      const [hiddenSections, setHiddenSections] = useState({});
      const toggleSection = (name) => setHiddenSections(s => ({ ...s, [name]: !s[name] }));

      // Count tasks per project
      const projCounts = {};
      (projects || []).forEach(p => {
        projCounts[p] = (tasks || []).filter(t => t.project === p && t.gtd_status !== "done" && t.gtd_status !== "archived").length;
      });

      // Count today's focus tasks
      const todayCount = (tasks || []).filter(t => (t.quadrant === "Q1" || t.is_overdue || t.is_focused) && t.gtd_status !== "done" && t.gtd_status !== "archived").length;

      // Pending offline tasks — merge ke sidebar counts
      const pendingByStatus = React.useMemo(() =>
        (tasks || []).filter(t => t._pending).reduce((acc, t) => {
          const s = t.gtd_status || "inbox";
          acc[s] = (acc[s] || 0) + 1;
          return acc;
        }, {}),
        [tasks]
      );
      const pendingByQuadrant = React.useMemo(() =>
        (tasks || []).filter(t => t._pending).reduce((acc, t) => {
          const q = t.quadrant || "Q4";
          acc[q] = (acc[q] || 0) + 1;
          return acc;
        }, {}),
        [tasks]
      );
      const sc = (status) => (summary?.by_status?.[status] || 0) + (pendingByStatus[status] || 0);
      const qc = (q) => (summary?.by_quadrant?.[q] || 0) + (pendingByQuadrant[q] || 0);

      const links = [
        { id: "dashboard", icon: "📊", label: "Dashboard" },
        { id: "calendar", icon: "🗓️", label: "Kalender" },
        { id: "today", icon: "🍅", label: "Fokus Hari Ini", count: todayCount },
        { id: "habit", icon: "🔁", label: "Habit Tracker" },
        { id: "notes", icon: "📝", label: "Notes" },
        { id: "chat", icon: "💬", label: "Diskusi" },
        { section: "GTD" },
        { id: "inbox", icon: "📥", label: "Inbox", count: sc("inbox") },
        { id: "next", icon: "▶️", label: "Next Actions", count: sc("next") },
        { id: "waiting", icon: "⏳", label: "Waiting For", count: sc("waiting") },
        { id: "someday", icon: "💭", label: "Someday", count: sc("someday") },
        { section: "EISENHOWER" },
        { id: "q1", icon: "🔥", label: "Q1 Lakukan", count: qc("Q1") },
        { id: "q2", icon: "📅", label: "Q2 Rencanakan", count: qc("Q2") },
        { id: "q3", icon: "👋", label: "Q3 Delegasikan", count: qc("Q3") },
        { id: "q4", icon: "🗑️", label: "Q4 Singkirkan", count: qc("Q4") },
      ];

      // Dynamic project links
      if (projects && projects.length > 0) {
        links.push({ section: "PROJECTS" });
        projects.forEach(p => {
          links.push({ id: `proj_${p}`, icon: "📂", label: p, count: projCounts[p] });
        });
      }

      // Shared lists section
      if (sharedLists && sharedLists.length > 0) {
        links.push({ section: "SHARED LISTS" });
        sharedLists.forEach(l => {
          const listTaskCount = (tasks || []).filter(t => t.list_id === l.id && t.gtd_status !== "done" && t.gtd_status !== "archived").length;
          links.push({
            id: `slist_${l.id}`,
            icon: l.role === "owner" ? "📋" : "👥",
            label: l.name,
            count: listTaskCount || undefined,
            badge: l.role === "member" ? "shared" : null,
          });
        });
      }
      links.push({ id: "manage_lists", icon: "⚙️", label: "Kelola Shared List" });

      links.push({ section: "LAINNYA" });
      links.push({ id: "all", icon: "📋", label: "Semua Task" });
      links.push({ id: "overdue", icon: "⚠️", label: "Overdue", count: summary?.overdue });
      links.push({ id: "done", icon: "✅", label: "Done", count: summary?.by_status?.done });

      links.push({ section: "AKUN" });
      links.push({ id: "settings", icon: "⚙️", label: "Pengaturan" });

      // Render: track current section to know which links to hide
      let currentSection = null;
      const items = [];
      links.forEach((l, i) => {
        if (l.section) {
          const sName = l.section;
          currentSection = sName;
          const isHidden = hiddenSections[sName];
          items.push(
            <div key={`sec-${i}`} className="sidebar-section" onClick={() => toggleSection(sName)}
              style={{ cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", userSelect: "none" }}>
              <span>{sName}</span>
              <span style={{ fontSize: 10, opacity: 0.6, marginRight: 4 }}>{isHidden ? "▶" : "▼"}</span>
            </div>
          );
        } else if (!hiddenSections[currentSection]) {
          items.push(
            <div key={l.id} className={`sidebar-link ${page === l.id ? "active" : ""}`} onClick={() => { setPage(l.id); onClose?.(); }}>
              <span>{l.icon}</span>
              <span style={{ flex: 1 }}>{l.label}</span>
              {l.badge === "shared" && <span style={{ fontSize: 10, background: "var(--accent)", color: "white", padding: "1px 5px", borderRadius: 3, marginRight: 4 }}>shared</span>}
              {l.count > 0 && <span style={{ background: "rgba(0,0,0,0.08)", padding: "2px 8px", borderRadius: 4, fontSize: 12 }}>{l.count}</span>}
            </div>
          );
        }
      });

      return (
        <div className={`sidebar ${isOpen ? "open" : ""} ${collapsed ? "collapsed" : ""}`}>
          <div style={{ padding: "16px 20px 8px", borderBottom: "1px solid rgba(0,0,0,0.08)", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 20, fontWeight: 700, color: "var(--text-primary)" }}>⚡ TaskFlow</div>
              <div style={{ fontSize: 12, color: "#888880", marginTop: 2 }}>v4 — {user?.display_name || user?.username}</div>
            </div>
            <button onClick={onToggleCollapse} title="Sembunyikan menu" style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, padding: "4px 6px", borderRadius: 6, color: "#888880", lineHeight: 1 }}>✕</button>
          </div>
          <div className="sidebar-scroll">
            {items}
          </div>
          <div style={{ padding: "12px 16px", borderTop: "1px solid rgba(0,0,0,0.08)", flexShrink: 0 }}>
            <div className="sidebar-link" onClick={onLogout} style={{ color: "#ef4444" }}>
              <span>🚪</span> <span>Logout</span>
            </div>
          </div>
        </div>
      );
    }

    // ── ComboSelect (dropdown + add new) ───────────────────────
    function ComboSelect({ value, onChange, options, placeholder, icon }) {
      const [isNew, setIsNew] = useState(false);
      const inputRef = useRef(null);

      // If current value is not in options and not empty, show as custom
      const isCustom = value && !options.includes(value);

      const handleSelect = (e) => {
        const v = e.target.value;
        if (v === "__new__") {
          setIsNew(true);
          onChange("");
          setTimeout(() => inputRef.current?.focus(), 50);
        } else {
          setIsNew(false);
          onChange(v);
        }
      };

      const handleInputChange = (e) => {
        onChange(e.target.value);
      };

      const handleBack = () => {
        setIsNew(false);
        onChange("");
      };

      if (isNew || isCustom) {
        return (
          <div style={{ position: "relative" }}>
            <input
              ref={inputRef}
              className="input"
              value={value}
              onChange={handleInputChange}
              placeholder={placeholder}
              style={{ paddingRight: 36 }}
            />
            <span
              onClick={handleBack}
              title="Kembali ke daftar"
              style={{
                position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)",
                cursor: "pointer", fontSize: 16, color: "var(--text-light)",
              }}
            >✕</span>
          </div>
        );
      }

      return (
        <select className="input" value={value} onChange={handleSelect}>
          <option value="">{placeholder || "— Pilih —"}</option>
          {options.map(o => (
            <option key={o} value={o}>{icon ? `${icon} ` : ""}{o}</option>
          ))}
          <option value="__new__">＋ Tambah baru...</option>
        </select>
      );
    }

    // ── Task Form Modal ─────────────────────────────────────────
    function computeOfflineQuadrant(priority, deadline_date) {
      const isImportant = priority === "P1" || priority === "P2";
      const isUrgent = deadline_date
        ? (new Date(deadline_date) - new Date()) / 86400000 <= 3
        : false;
      if (isImportant && isUrgent)  return "Q1";
      if (isImportant && !isUrgent) return "Q2";
      if (!isImportant && isUrgent) return "Q3";
      return "Q4";
    }

    function TaskFormModal({ task, onSave, onOfflineSave, onClose, projects, contexts, sharedLists, collaborators = [] }) {
      const isEdit = !!task?.id;
      const [form, setForm] = useState({
        title: task?.title || "",
        description: task?.description || "",
        priority: task?.priority || "P3",
        gtd_status: task?.gtd_status || "inbox",
        project: task?.project || "",
        context: task?.context || "",
        deadline: task?.deadline || "",
        waiting_for: task?.waiting_for || "",
        list_id: task?.list_id || null,
        assigned_to: task?.assigned_to || null,
        progress: task?.progress || 0,
      });
      const titleInputRef = React.useRef(null);
      const [titleTagDropdown, setTitleTagDropdown] = useState(null);
      const [titleExistingTags, setTitleExistingTags] = useState([]);
      const habitTitleInputRef = React.useRef(null);
      const [habitTitleTagDropdown, setHabitTitleTagDropdown] = useState(null);
      const [habitExistingTags, setHabitExistingTags] = useState([]);
      const noteContentRef = React.useRef(null);
      const [noteTagDropdown, setNoteTagDropdown] = useState(null);
      const [noteExistingTags, setNoteExistingTags] = useState([]);
      const [loading, setLoading] = useState(false);
      const [pendingSubtasks, setPendingSubtasks] = useState([]);
      const [pendingSubTitle, setPendingSubTitle] = useState("");
      const [pendingSubGtd, setPendingSubGtd] = useState("inbox");
      const [noteForm, setNoteForm] = useState({ title: "", content: "", tags: [] });
      const setNote = (k, v) => setNoteForm(f => ({ ...f, [k]: v }));

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const [listMembers, setListMembers] = useState([]);
      const [mode, setMode] = useState("task");
      const [habitForm, setHabitForm] = useState({
        title: "", phase: "pagi", micro_target: "",
        frequency: ["mon","tue","wed","thu","fri","sat","sun"],
        identity_pillar: "",
      });
      const setHabit = (k, v) => setHabitForm(f => ({ ...f, [k]: v }));
      const DAYS = [
        { key: "mon", label: "Sen" }, { key: "tue", label: "Sel" },
        { key: "wed", label: "Rab" }, { key: "thu", label: "Kam" },
        { key: "fri", label: "Jum" }, { key: "sat", label: "Sab" },
        { key: "sun", label: "Min" },
      ];
      const toggleDay = (key) => setHabitForm(f => ({
        ...f,
        frequency: f.frequency.includes(key) ? f.frequency.filter(d => d !== key) : [...f.frequency, key]
      }));

      const handleTitleChange = (val) => {
        set("title", val);
        const el = titleInputRef.current;
        const tagMatch = val.match(/#([a-zA-Z0-9_À-ɏ]*)$/);
        if (tagMatch) {
          const query = tagMatch[1].toLowerCase();
          const items = titleExistingTags.filter(t => t.name.startsWith(query)).slice(0, 6);
          if (items.length > 0 && el) {
            const rect = el.getBoundingClientRect();
            setTitleTagDropdown({ items, top: rect.bottom + 4, left: rect.left });
          } else {
            setTitleTagDropdown(null);
          }
        } else {
          setTitleTagDropdown(null);
        }
      };

      const insertTitleTag = (tagName) => {
        const el = titleInputRef.current;
        if (!el) return;
        const pos = el.selectionStart;
        const before = form.title.slice(0, pos);
        const after = form.title.slice(pos);
        const newBefore = before.replace(/#([a-zA-Z0-9_À-ɏ]*)$/, `#${tagName} `);
        const newVal = newBefore + after;
        set("title", newVal);
        setTitleTagDropdown(null);
        setTimeout(() => { el.selectionStart = el.selectionEnd = newBefore.length; el.focus(); }, 0);
      };

      useEffect(() => {
        if (form.list_id) {
          api.get(`/api/lists/${form.list_id}/members`)
            .then(setListMembers)
            .catch(() => setListMembers([]));
        } else {
          setListMembers([]);
        }
      }, [form.list_id]);

      useEffect(() => {
        api.get("/api/tags").then(data => setTitleExistingTags(data || [])).catch(() => {});
        return () => setTitleTagDropdown(null);
      }, []);

      useEffect(() => {
        if (mode === "habit") {
          api.get("/api/tags").then(data => setHabitExistingTags(data || [])).catch(() => {});
        }
        return () => setHabitTitleTagDropdown(null);
      }, [mode]);

      useEffect(() => {
        if (mode === "note") {
          api.get("/api/tags?entity_type=note").then(data => setNoteExistingTags(data || [])).catch(() => {});
        }
        return () => setNoteTagDropdown(null);
      }, [mode]);

      const handleHabitTitleChange = (val) => {
        setHabit("title", val);
        const el = habitTitleInputRef.current;
        const tagMatch = val.match(/#([a-zA-Z0-9_À-ɏ]*)$/);
        if (tagMatch) {
          const query = tagMatch[1].toLowerCase();
          const items = habitExistingTags.filter(t => t.name.startsWith(query)).slice(0, 6);
          if (items.length > 0 && el) {
            const rect = el.getBoundingClientRect();
            setHabitTitleTagDropdown({ items, top: rect.bottom + 4, left: rect.left });
          } else { setHabitTitleTagDropdown(null); }
        } else { setHabitTitleTagDropdown(null); }
      };

      const insertHabitTitleTag = (tagName) => {
        const el = habitTitleInputRef.current;
        if (!el) return;
        const pos = el.selectionStart;
        const before = habitForm.title.slice(0, pos);
        const after = habitForm.title.slice(pos);
        const newBefore = before.replace(/#([a-zA-Z0-9_À-ɏ]*)$/, `#${tagName} `);
        setHabit("title", newBefore + after);
        setHabitTitleTagDropdown(null);
        setTimeout(() => { el.selectionStart = el.selectionEnd = newBefore.length; el.focus(); }, 0);
      };

      const handleNoteContentChange = (val) => {
        setNote("content", val);
        const el = noteContentRef.current;
        const pos = el?.selectionStart ?? val.length;
        const before = val.slice(0, pos);
        const tagMatch = before.match(/#([a-zA-Z0-9_À-ɏ]*)$/);
        if (tagMatch) {
          const query = tagMatch[1].toLowerCase();
          const currentTags = [...new Set((val.match(/#([a-zA-Z0-9_À-ɏ]+)/g) || []).map(t => t.slice(1).toLowerCase()))];
          const items = noteExistingTags.filter(t => t.name.startsWith(query) && !currentTags.includes(t.name)).slice(0, 6);
          if (items.length > 0 && el) {
            const rect = el.getBoundingClientRect();
            setNoteTagDropdown({ items, top: rect.top + 20, left: rect.left + 8 });
          } else { setNoteTagDropdown(null); }
        } else { setNoteTagDropdown(null); }
      };

      const insertNoteTag = (tagName) => {
        const el = noteContentRef.current;
        if (!el) return;
        const pos = el.selectionStart;
        const before = noteForm.content.slice(0, pos);
        const after = noteForm.content.slice(pos);
        const newBefore = before.replace(/#([a-zA-Z0-9_À-ɏ]*)$/, `#${tagName} `);
        const newVal = newBefore + after;
        setNote("content", newVal);
        setNoteTagDropdown(null);
        setTimeout(() => { el.selectionStart = el.selectionEnd = newBefore.length; el.focus(); }, 0);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        // ── Note mode ────────────────────────────────────────────
        if (mode === "note") {
          if (!noteForm.content.trim() && !noteForm.title.trim()) { alert("Isi catatan tidak boleh kosong"); setLoading(false); return; }
          try {
            const autoTags = [...new Set((noteForm.content.match(/#([a-zA-Z0-9_À-ɏ]+)/g) || []).map(t => t.slice(1).toLowerCase().trim()))].filter(Boolean);
            await api.post("/api/scratchpad", { title: noteForm.title, content: noteForm.content, tags: autoTags, linked_task_ids: [], linked_task_id: null });
            window.dispatchEvent(new CustomEvent("noteSaved"));
            onSave();
          } catch (err) { alert(err.message); }
          setLoading(false);
          return;
        }
        // ── Habit mode ────────────────────────────────────────────
        if (mode === "habit") {
          if (!habitForm.title.trim()) { alert("Nama habit wajib diisi"); setLoading(false); return; }
          try {
            await api.post("/api/habits", habitForm);
            window.dispatchEvent(new CustomEvent("habitSaved"));
            onSave();
          } catch (err) {
            if (isOfflineErr(err) && onOfflineSave) {
              const tempId = `tmp_habit_${Date.now()}`;
              await OfflineDB.queueAdd({ method: "POST", url: "/api/habits", body: habitForm, tempId, createdAt: Date.now() });
              onOfflineSave({ ...habitForm, id: tempId, _pending: true, _type: "habit" });
              window.dispatchEvent(new CustomEvent("habitSaved"));
            } else {
              alert(err.message);
            }
          }
          setLoading(false);
          return;
        }
        // ── Task mode ─────────────────────────────────────────────
        try {
          if (isEdit) {
            await api.put(`/api/tasks/${task.id}`, form);
            onSave();
          } else {
            const newTask = await api.post("/api/tasks", form);
            for (const sub of pendingSubtasks) {
              await api.post("/api/tasks", { title: sub.title, gtd_status: sub.gtd, parent_id: newTask.id });
            }
            onSave(newTask);
          }
        } catch (err) {
          if (isOfflineErr(err) && isEdit && onOfflineSave) {
            await OfflineDB.queueAdd({ method: "PUT", url: `/api/tasks/${task.id}`, body: form });
            onOfflineSave({ ...task, ...form, _pending: true });
          } else if (isOfflineErr(err) && !isEdit && onOfflineSave) {
            const tempId = `tmp_${Date.now()}`;
            await OfflineDB.queueAdd({ method: "POST", url: "/api/tasks", body: form, tempId, createdAt: Date.now() });
            for (const sub of pendingSubtasks) {
              await OfflineDB.queueAdd({ method: "POST", url: "/api/tasks", body: { title: sub.title, gtd_status: sub.gtd, parent_id: tempId }, tempId: null, createdAt: Date.now() });
            }
            const tempTask = {
              ...form, id: tempId, _pending: true,
              quadrant: computeOfflineQuadrant(form.priority, form.deadline_date),
              is_overdue: false, is_focused: false, days_until_deadline: null,
              assigned_to_name: null, parent_title: null,
              created_at: new Date().toISOString(),
            };
            onOfflineSave(tempTask);
          } else {
            alert(err.message);
          }
        }
        setLoading(false);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content scale-in" onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h2 style={{ fontSize: 20, fontWeight: 700 }}>{isEdit ? "Edit Task" : "＋ Buat Baru"}</h2>
              <span onClick={onClose} style={{ cursor: "pointer", fontSize: 20, color: "var(--text-light)" }}>✕</span>
            </div>
            <form onSubmit={handleSubmit}>
              {/* Mode toggle — hanya saat tambah baru */}
              {!isEdit && (
                <div style={{ display: "flex", background: "var(--bg-primary)", borderRadius: 8, padding: 3, marginBottom: 18, gap: 3 }}>
                  {[["task","✓ Task"],["habit","🔁 Habit"],["note","📝 Note"]].map(([m, label]) => (
                    <button key={m} type="button" onClick={() => setMode(m)} style={{
                      flex: 1, padding: "7px 0", borderRadius: 6, border: "none", cursor: "pointer", fontWeight: 600, fontSize: 13,
                      background: mode === m ? "var(--accent)" : "transparent",
                      color: mode === m ? "#fff" : "var(--text-secondary)",
                      transition: "all 0.15s",
                    }}>{label}</button>
                  ))}
                </div>
              )}

              {/* ── Habit Form ── */}
              {mode === "habit" && (
                <div>
                  <label className="input-label">Nama Habit *</label>
                  <div style={{ position: "relative", marginBottom: 14 }}>
                    <input
                      ref={habitTitleInputRef}
                      className="input"
                      value={habitForm.title}
                      onChange={e => handleHabitTitleChange(e.target.value)}
                      onKeyDown={e => {
                        if (habitTitleTagDropdown) {
                          if (e.key === "Escape") { setHabitTitleTagDropdown(null); return; }
                          if (e.key === "Enter" || e.key === "Tab") {
                            e.preventDefault();
                            if (habitTitleTagDropdown.items[0]) insertHabitTitleTag(habitTitleTagDropdown.items[0].name);
                            return;
                          }
                        }
                      }}
                      required
                      style={{ width: "100%" }}
                      placeholder="Meditasi, Olahraga, Baca... atau tambahkan #tag"
                    />
                    {habitTitleTagDropdown && habitTitleTagDropdown.items.length > 0 && (
                      <div className="wiki-autocomplete" style={{ position: "absolute", top: "100%", left: 0, right: 0, zIndex: 1050 }}>
                        {habitTitleTagDropdown.items.map((t, i) => (
                          <div key={t.id} className={`wiki-autocomplete-item${i === 0 ? " active" : ""}`}
                            onMouseDown={e => { e.preventDefault(); insertHabitTitleTag(t.name); }}>
                            <span style={{ color: "var(--accent)", fontWeight: 700 }}>#</span>{t.name}
                            <span style={{ fontSize: 10, color: "var(--text-light)", marginLeft: 6 }}>{t.count}×</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <label className="input-label">Fase</label>
                  <select className="input" value={habitForm.phase} onChange={e => setHabit("phase", e.target.value)} style={{ marginBottom: 14 }}>
                    <option value="pagi">☀️ Pagi (04:00–09:00)</option>
                    <option value="siang">🌤️ Siang (09:00–17:00)</option>
                    <option value="malam">🌙 Malam (17:00–22:00)</option>
                  </select>

                  <label className="input-label">Micro Target <span style={{ color: "var(--text-light)", fontWeight: 400 }}>(opsional)</span></label>
                  <input className="input" value={habitForm.micro_target} onChange={e => setHabit("micro_target", e.target.value)} style={{ marginBottom: 14 }} placeholder="5 menit, 2 halaman, 10 push-up..." />

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                    <label className="input-label" style={{ margin: 0 }}>Frekuensi</label>
                    <button type="button"
                      style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11, fontWeight: 600, color: "var(--accent)", padding: "2px 4px" }}
                      onClick={() => setHabitForm(f => ({ ...f, frequency: f.frequency.length === DAYS.length ? [] : DAYS.map(d => d.key) }))}>
                      {habitForm.frequency.length === DAYS.length ? "Hapus Semua" : "Pilih Semua"}
                    </button>
                  </div>
                  <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
                    {DAYS.map(d => (
                      <button key={d.key} type="button" onClick={() => toggleDay(d.key)} style={{
                        padding: "4px 10px", borderRadius: 6, border: "1px solid var(--border)", cursor: "pointer", fontSize: 12,
                        background: habitForm.frequency.includes(d.key) ? "var(--accent)" : "var(--bg-primary)",
                        color: habitForm.frequency.includes(d.key) ? "#fff" : "var(--text-secondary)",
                        fontWeight: habitForm.frequency.includes(d.key) ? 600 : 400,
                      }}>{d.label}</button>
                    ))}
                  </div>

                  <label className="input-label">Identity Pillar <span style={{ color: "var(--text-light)", fontWeight: 400 }}>(opsional)</span></label>
                  <input className="input" value={habitForm.identity_pillar} onChange={e => setHabit("identity_pillar", e.target.value)} style={{ marginBottom: 14 }} placeholder="Saya adalah orang yang..." />

                  <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 8 }}>
                    <button type="button" className="btn" onClick={onClose}>Batal</button>
                    <button type="submit" className="btn btn-primary" disabled={loading}>{loading ? "..." : "Tambah Habit"}</button>
                  </div>
                </div>
              )}

              {/* ── Note Form ── */}
              {mode === "note" && (() => {
                const detectedTags = [...new Set((noteForm.content.match(/#([a-zA-Z0-9_À-ɏ]+)/g) || []).map(t => t.slice(1).toLowerCase().trim()))].filter(Boolean);
                return (
                  <div>
                    <label className="input-label">Judul <span style={{ color: "var(--text-light)", fontWeight: 400 }}>(opsional)</span></label>
                    <input className="input" value={noteForm.title} onChange={e => setNote("title", e.target.value)} placeholder="Judul catatan..." style={{ marginBottom: 14 }} />
                    <label className="input-label">Isi Catatan *</label>
                    <div style={{ position: "relative" }}>
                      <textarea
                        ref={noteContentRef}
                        className="input"
                        value={noteForm.content}
                        onChange={e => handleNoteContentChange(e.target.value)}
                        onKeyDown={e => {
                          if (noteTagDropdown) {
                            if (e.key === "Escape") { setNoteTagDropdown(null); return; }
                            if (e.key === "Enter" || e.key === "Tab") {
                              e.preventDefault();
                              if (noteTagDropdown.items[0]) insertNoteTag(noteTagDropdown.items[0].name);
                              return;
                            }
                          }
                        }}
                        rows={6}
                        placeholder={"Tulis catatan...\n\nGunakan #tag untuk menambahkan tag otomatis\n# Heading  - bullet  - [ ] checklist"}
                        style={{ marginBottom: 6, resize: "vertical", fontFamily: "inherit", lineHeight: 1.6, width: "100%" }}
                      />
                      {noteTagDropdown && noteTagDropdown.items.length > 0 && (
                        <div className="wiki-autocomplete" style={{ position: "fixed", top: noteTagDropdown.top, left: noteTagDropdown.left, zIndex: 1050 }}>
                          {noteTagDropdown.items.map((t, i) => (
                            <div key={t.id} className={`wiki-autocomplete-item${i === 0 ? " active" : ""}`}
                              onMouseDown={e => { e.preventDefault(); insertNoteTag(t.name); }}>
                              <span style={{ color: "var(--accent)", fontWeight: 700 }}>#</span>{t.name}
                              <span style={{ fontSize: 10, color: "var(--text-light)", marginLeft: 6 }}>{t.count}×</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                    {detectedTags.length > 0 && (
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 14, alignItems: "center" }}>
                        <span style={{ fontSize: 11, color: "var(--text-light)" }}>Tag terdeteksi:</span>
                        {detectedTags.map(t => (
                          <span key={t} style={{ fontSize: 11, fontWeight: 600, background: "rgba(168,197,0,0.15)", color: "var(--accent)", borderRadius: 6, padding: "2px 8px" }}>#{t}</span>
                        ))}
                      </div>
                    )}
                    <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
                      <button type="button" className="btn btn-secondary" onClick={onClose}>Batal</button>
                      <button type="submit" className="btn btn-primary" disabled={loading}>{loading ? "Menyimpan..." : "Simpan Note"}</button>
                    </div>
                  </div>
                );
              })()}

              {/* ── Task Form ── */}
              {mode === "task" && <div>
              <label className="input-label">Judul *</label>
              <div style={{ position: "relative", marginBottom: 14 }}>
                <input
                  ref={titleInputRef}
                  className="input"
                  value={form.title}
                  onChange={e => handleTitleChange(e.target.value)}
                  onKeyDown={e => {
                    if (titleTagDropdown) {
                      if (e.key === "Escape") { setTitleTagDropdown(null); return; }
                      if (e.key === "Enter" || e.key === "Tab") {
                        e.preventDefault();
                        if (titleTagDropdown.items[0]) insertTitleTag(titleTagDropdown.items[0].name);
                        return;
                      }
                    }
                  }}
                  required
                  style={{ width: "100%" }}
                  placeholder="Judul task... atau tambahkan #tag"
                />
                {titleTagDropdown && titleTagDropdown.items.length > 0 && (
                  <div className="wiki-autocomplete" style={{ position: "absolute", top: "100%", left: 0, right: 0, zIndex: 1050 }}>
                    {titleTagDropdown.items.map((t, i) => (
                      <div key={t.id} className={`wiki-autocomplete-item${i === 0 ? " active" : ""}`}

    // ── Modal Attachments Section ──────────────────────────────
    function ModalAttachments({ taskId }) {
      const [attachments, setAttachments] = useState([]);
      const [uploading, setUploading] = useState(false);
      const fileInputRef = useRef(null);

      useEffect(() => {
        api.get(`/api/tasks/${taskId}/attachments`)
          .then(data => setAttachments(data))
          .catch(() => {});
      }, [taskId]);

      const handleUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) {
          alert("File terlalu besar. Maks 10MB.");
          return;
        }
        setUploading(true);
        try {
          const formData = new FormData();
          formData.append("file", file);
          const token = __token;
          const res = await fetch(`/api/tasks/${taskId}/attachments`, {
            method: "POST",
            headers: token ? { "Authorization": "Bearer " + token } : {},
            body: formData,
          });
          if (!res.ok) throw new Error("Upload failed");
          const result = await res.json();
          setAttachments(prev => [result, ...prev]);
        } catch (err) { alert("Upload gagal: " + err.message); }
        setUploading(false);
        if (fileInputRef.current) fileInputRef.current.value = "";
      };

      const handleDelete = async (attId) => {
        try {
          await api.del(`/api/attachments/${attId}`);
          setAttachments(prev => prev.filter(a => a.id !== attId));
        } catch (err) { console.error(err); }
      };

      const fmtSize = (b) => {
        if (b < 1024) return b + "B";
        if (b < 1024 * 1024) return Math.round(b / 1024) + "KB";
        return (b / (1024 * 1024)).toFixed(1) + "MB";
      };

      const isImage = (mime) => mime && mime.startsWith("image/");

      return (
        <div style={{ borderTop: "1px solid var(--border)", paddingTop: 14, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>
              📎 Lampiran {attachments.length > 0 && <span style={{ fontWeight: 400, color: "var(--text-light)" }}>({attachments.length})</span>}
            </div>
            <label className="btn btn-sm btn-secondary" style={{ fontSize: 12, cursor: "pointer" }}>
              {uploading ? "Uploading..." : "＋ Upload"}
              <input ref={fileInputRef} type="file" onChange={handleUpload} style={{ display: "none" }} disabled={uploading} />
            </label>
          </div>

          {attachments.map(a => (
            <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #f1f5f9" }}>
              <span style={{ fontSize: 20 }}>{isImage(a.mime_type) ? "🖼️" : "📄"}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <a href={`/api/attachments/${a.id}/download`} target="_blank" rel="noopener"
                  style={{ fontSize: 13, fontWeight: 500, color: "var(--accent)", textDecoration: "none", display: "block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {a.original_name}
                </a>
                <div style={{ fontSize: 11, color: "var(--text-light)" }}>{fmtSize(a.file_size)}</div>
              </div>
              <span onClick={() => handleDelete(a.id)} style={{ cursor: "pointer", fontSize: 14, color: "var(--text-light)" }} title="Hapus">✕</span>
            </div>
          ))}

          {attachments.length === 0 && !uploading && (
            <div style={{ fontSize: 13, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada lampiran</div>
          )}
        </div>
      );
    }

    // ── Modal Notes Section ─────────────────────────────────────
    function ModalNotes({ taskId, collaborators = [] }) {
      const [notes, setNotes] = useState([]);
      const [newNote, setNewNote] = useState("");
      const [expanded, setExpanded] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const noteClientId = useRef(genId());

      useEffect(() => {
        api.get(`/api/tasks/${taskId}/notes`)
          .then(data => setNotes(data))
          .catch(() => {});
      }, [taskId]);

      const handleAdd = async () => {
        if (!newNote.trim() || submitting) return;
        setSubmitting(true);
        try {
          const result = await api.post(`/api/tasks/${taskId}/notes`, { content: newNote.trim(), client_id: noteClientId.current });
          setNotes(prev => [result, ...prev]);
          setNewNote("");
          noteClientId.current = genId(); // reset hanya saat berhasil
        } catch (err) { console.error(err); }
        finally { setSubmitting(false); }
      };

      const handleDelete = async (noteId) => {
        try {
          await api.del(`/api/notes/${noteId}`);
          setNotes(prev => prev.filter(n => n.id !== noteId));
        } catch (err) { console.error(err); }
      };

      const formatTime = (dt) => {
        if (!dt) return "";
        const parts = dt.split("T");
        if (parts.length < 2) return "";
        const d = parts[0].split("-").reverse().join("/");
        const t = parts[1].substring(0, 5);
        return `${d} ${t}`;
      };

      const shown = expanded ? notes : notes.slice(0, 3);

      return (
        <div style={{ borderTop: "1px solid var(--border)", paddingTop: 14, marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10 }}>
            📓 Catatan {notes.length > 0 && <span style={{ fontWeight: 400, color: "var(--text-light)" }}>({notes.length})</span>}
          </div>

          <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
            <MentionInput
              collaborators={collaborators}
              className="input"
              value={newNote}
              onChange={e => setNewNote(e.target.value)}
              placeholder="Tulis catatan..."
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleAdd(); } }}
              style={{ flex: 1, padding: "8px 10px", fontSize: 13 }}
            />
            <button className="btn btn-primary btn-sm" onClick={handleAdd} disabled={!newNote.trim() || submitting}>{submitting ? "..." : "Simpan"}</button>
          </div>

          {shown.map(n => (
            <div key={n.id} style={{ padding: "8px 0", borderBottom: "1px solid #f1f5f9", display: "flex", gap: 8, alignItems: "flex-start" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: "var(--text-light)", marginBottom: 2, display: "flex", gap: 8 }}>
                  <span>{formatTime(n.created_at)}</span>
                  {n.author_name && <span style={{ fontWeight: 600, color: "var(--accent)" }}>@{n.author_name}</span>}
                </div>
                <div style={{ fontSize: 13, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{n.content}</div>
              </div>
              <span onClick={() => handleDelete(n.id)} style={{ cursor: "pointer", fontSize: 14, color: "var(--text-light)", padding: "0 4px" }} title="Hapus">✕</span>
            </div>
          ))}

          {notes.length > 3 && !expanded && (
            <div onClick={() => setExpanded(true)} style={{ fontSize: 13, color: "var(--accent)", cursor: "pointer", marginTop: 6, fontWeight: 500 }}>
              Lihat {notes.length - 3} catatan lagi...
            </div>
          )}
          {expanded && notes.length > 3 && (
            <div onClick={() => setExpanded(false)} style={{ fontSize: 13, color: "var(--accent)", cursor: "pointer", marginTop: 6, fontWeight: 500 }}>
              Sembunyikan
            </div>
          )}

          {notes.length === 0 && (
            <div style={{ fontSize: 13, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada catatan</div>
          )}
        </div>
      );
    }

    // ── Task Detail Modal ───────────────────────────────────────
    function TaskDetailModal({ task, onClose, onEdit, onDone, onDelete, onRefresh, onOfflineEdit, onToggleFocus, onOpenTask, projects = [], contexts = [], collaborators = [] }) {
      if (!task) return null;
      const [isEditing, setIsEditing] = useState(false);
      const [listMembers, setListMembers] = useState([]);
      const [form, setForm] = useState({
        title: task.title || "",
        description: task.description || "",
        priority: task.priority || "P3",
        gtd_status: task.gtd_status || "inbox",
        project: task.project || "",
        context: task.context || "",
        deadline: task.deadline || "",
        waiting_for: task.waiting_for || "",
        assigned_to: task.assigned_to || null,
        progress: task.progress || 0,
      });
      const [saving, setSaving] = useState(false);
      const setF = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const resetForm = () => setForm({ title: task.title || "", description: task.description || "", priority: task.priority || "P3", gtd_status: task.gtd_status || "inbox", project: task.project || "", context: task.context || "", deadline: task.deadline || "", waiting_for: task.waiting_for || "", assigned_to: task.assigned_to || null, progress: task.progress || 0 });
      const [subtasks, setSubtasks] = useState([]);
      const [newSub, setNewSub] = useState("");
      const [adding, setAdding] = useState(false);
      const [addingSub, setAddingSub] = useState(false);
      const [loadingSubs, setLoadingSubs] = useState(true);
      const subClientId = useRef(genId());
      // Child tasks (subtasks as full tasks)
      const [childTasks, setChildTasks] = useState([]);
      const [newChildTitle, setNewChildTitle] = useState("");
      const [newChildGtd, setNewChildGtd] = useState("inbox");
      const [addingChild, setAddingChild] = useState(false);
      const [taskTags, setTaskTags] = useState([]);
      const [tagsExpanded, setTagsExpanded] = useState(false);
      const [tagTasksModal, setTagTasksModal] = useState(null); // { tagName, tasks }

      // Fetch list members for assignee dropdown when entering edit mode
      useEffect(() => {
        if (isEditing && task?.list_id) {
          api.get(`/api/lists/${task.list_id}/members`)
            .then(setListMembers)
            .catch(() => setListMembers([]));
        }
      }, [isEditing, task?.list_id]);

      // Fetch subtasks (checklist)
      useEffect(() => {
        if (task?.id) {
