              {habitTags.length > 0 && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 4, alignItems: "center" }} onClick={e => e.stopPropagation()}>
                  {(tagsExpanded ? habitTags : habitTags.slice(0, 3)).map(tag => (
                    <span
                      key={tag.id}
                      title="Klik untuk lihat semua habit dengan tag ini"
                      onClick={() => onTagClick && onTagClick(tag.name)}
                      style={{
                        display: "inline-flex", alignItems: "center", gap: 3,
                        background: "rgba(168,197,0,0.10)", color: "var(--accent)",
                        border: "1px solid rgba(168,197,0,0.25)", borderRadius: 999,
                        fontSize: 10, fontWeight: 600, padding: "1px 7px 1px 5px",
                        cursor: "pointer", userSelect: "none"
                      }}
                      onMouseEnter={e => e.currentTarget.style.background = "rgba(168,197,0,0.22)"}
                      onMouseLeave={e => e.currentTarget.style.background = "rgba(168,197,0,0.10)"}
                    >
                      <span style={{ opacity: 0.7 }}>#</span>{tag.name}
                      <span
                        onClick={e => { e.stopPropagation(); if (onTagRemove) { onTagRemove(h.id, tag.name); setHabitTags(prev => prev.filter(t => t.name !== tag.name)); }}}
                        style={{ marginLeft: 2, opacity: 0.5, fontWeight: 400, fontSize: 12, lineHeight: 1, cursor: "pointer" }}
                        onMouseEnter={e => { e.stopPropagation(); e.currentTarget.style.opacity = "1"; }}
                        onMouseLeave={e => { e.stopPropagation(); e.currentTarget.style.opacity = "0.5"; }}
                      >×</span>
                    </span>
                  ))}
                  {habitTags.length > 3 && (
                    <span
                      onClick={() => setTagsExpanded(e => !e)}
                      style={{ fontSize: 10, color: "var(--text-light)", cursor: "pointer", padding: "1px 5px", borderRadius: 999, border: "1px solid var(--border)" }}
                    >{tagsExpanded ? "‹" : `+${habitTags.length - 3}`}</span>
                  )}
                </div>
              )}
            </div>

            {/* Weekly grid */}
            <div className="habit-card-grid">
              {DAY_LABELS.map((d, i) => {
                const s = (h.week_log || [])[i];
                const isToday = i === todayDow;
                const cls = s === "done" ? "done" : s === "skipped" ? "skipped" : s === "missed" ? "missed" : "";
                return (
                  <div key={i} className="habit-week-col">
                    <div className={`habit-week-label${isToday ? " today" : ""}`}>{d}</div>
                    <div className={`habit-week-box${cls ? " " + cls : ""}`}
                      style={isToday && !cls ? { borderColor: "#818cf8", borderWidth: 2 } : {}}>
                      {s === "done" ? "✓" : ""}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Streak */}
            <div className="habit-streak">
              <span style={{ fontSize: 16 }}>🔥</span>
              <span style={{ fontSize: 13, fontWeight: 700, color: h.streak > 0 ? "var(--accent)" : "var(--text-light)" }}>
                {h.streak || 0}
              </span>
            </div>

            {/* ⋮ Menu */}
            {!h._pending && (
              <div className="habit-card-menu" style={{ position: "relative", zIndex: 10, marginLeft: 6 }} onClick={e => e.stopPropagation()}>
                <button
                  style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-secondary)", fontSize: 18, padding: "2px 6px", borderRadius: 6, lineHeight: 1 }}
                  onClick={() => setMenuOpen(p => !p)}>⋮</button>
                {menuOpen && (
                  <div style={{ position: "absolute", right: 0, top: "calc(100% + 4px)", background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 10, boxShadow: "0 8px 24px rgba(0,0,0,0.2)", zIndex: 20, minWidth: 130, overflow: "hidden" }}>
                    <button style={{ display: "block", width: "100%", padding: "10px 16px", background: "none", border: "none", textAlign: "left", cursor: "pointer", fontSize: 13, color: "var(--text-primary)" }}
                      onClick={() => { closeMenu(); onEdit(h); }}>✏️ Edit</button>
                    <button style={{ display: "block", width: "100%", padding: "10px 16px", background: "none", border: "none", textAlign: "left", cursor: "pointer", fontSize: 13, color: "#ef4444" }}
                      onClick={() => { closeMenu(); onDelete(h.id); }}>🗑️ Hapus</button>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    function HabitEditModal({ habit, onClose, onSave }) {
      const DAYS = ["mon","tue","wed","thu","fri","sat","sun"];
      const DAY_ID = ["Sen","Sel","Rab","Kam","Jum","Sab","Min"];
      const parseFreq = (f) => { try { return Array.isArray(f) ? f : JSON.parse(f); } catch { return DAYS; } };
      const [form, setForm] = useState({
        title: habit.title || "",
        phase: habit.phase || "pagi",
        micro_target: habit.micro_target || "",
        identity_pillar: habit.identity_pillar || "",
        frequency: parseFreq(habit.frequency),
      });
      const [loading, setLoading] = useState(false);
      const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
      const toggleDay = (d) => set("frequency", form.frequency.includes(d) ? form.frequency.filter(x => x !== d) : [...form.frequency, d]);

      const habitEditInputRef = React.useRef(null);
      const [editTagDropdown, setEditTagDropdown] = useState(null);
      const [editExistingTags, setEditExistingTags] = useState([]);

      useEffect(() => {
        api.get("/api/tags").then(data => setEditExistingTags(data || [])).catch(() => {});
        return () => setEditTagDropdown(null);
      }, []);

      const handleEditTitleChange = (val) => {
        set("title", val);
        const el = habitEditInputRef.current;
        const tagMatch = val.match(/#([a-zA-Z0-9_À-ɏ]*)$/);
        if (tagMatch) {
          const query = tagMatch[1].toLowerCase();
          const items = editExistingTags.filter(t => t.name.startsWith(query)).slice(0, 6);
          if (items.length > 0 && el) {
            const rect = el.getBoundingClientRect();
            setEditTagDropdown({ items, top: rect.bottom + 4, left: rect.left });
          } else { setEditTagDropdown(null); }
        } else { setEditTagDropdown(null); }
      };

      const insertEditTag = (tagName) => {
        const el = habitEditInputRef.current;
        if (!el) return;
        const pos = el.selectionStart;
        const before = form.title.slice(0, pos);
        const after = form.title.slice(pos);
        const newBefore = before.replace(/#([a-zA-Z0-9_À-ɏ]*)$/, `#${tagName} `);
        set("title", newBefore + after);
        setEditTagDropdown(null);
        setTimeout(() => { el.selectionStart = el.selectionEnd = newBefore.length; el.focus(); }, 0);
      };

      const handleSave = async () => {
        if (!form.title.trim()) return;
        setLoading(true);
        await onSave(habit.id, { ...form, title: form.title.trim(), frequency: form.frequency.length ? form.frequency : DAYS });
        setLoading(false);
        onClose();
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content scale-in" style={{ maxWidth: 440 }} onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">Edit Habit</div>
              <button className="modal-close" onClick={onClose}>✕</button>
            </div>
            <div className="modal-body">
              <label className="input-label">Nama Habit</label>
              <div style={{ position: "relative", marginBottom: 14 }}>
                <input
                  ref={habitEditInputRef}
                  className="input"
                  value={form.title}
                  onChange={e => handleEditTitleChange(e.target.value)}
                  onKeyDown={e => {
                    if (editTagDropdown) {
                      if (e.key === "Escape") { setEditTagDropdown(null); return; }
                      if (e.key === "Enter" || e.key === "Tab") {
                        e.preventDefault();
                        if (editTagDropdown.items[0]) insertEditTag(editTagDropdown.items[0].name);
                        return;
                      }
                    }
                  }}
                  style={{ width: "100%" }}
                  autoFocus
                />
                {editTagDropdown && editTagDropdown.items.length > 0 && (
                  <div className="wiki-autocomplete" style={{ position: "absolute", top: "100%", left: 0, right: 0, zIndex: 1050 }}>
                    {editTagDropdown.items.map((t, i) => (
                      <div key={t.id} className={`wiki-autocomplete-item${i === 0 ? " active" : ""}`}
                        onMouseDown={e => { e.preventDefault(); insertEditTag(t.name); }}>
                        <span style={{ color: "var(--accent)", fontWeight: 700 }}>#</span>{t.name}
                        <span style={{ fontSize: 10, color: "var(--text-light)", marginLeft: 6 }}>{t.count}×</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <label className="input-label">Fase</label>
              <select className="input" value={form.phase} onChange={e => set("phase", e.target.value)} style={{ marginBottom: 14 }}>
                <option value="pagi">Pagi (04:00–09:00)</option>
                <option value="siang">Siang (09:00–17:00)</option>
                <option value="malam">Malam (17:00–22:00)</option>
              </select>
              <label className="input-label">Micro Target <span style={{ fontWeight: 400, color: "var(--text-light)" }}>(opsional)</span></label>
              <input className="input" value={form.micro_target} onChange={e => set("micro_target", e.target.value)} placeholder="5 menit, 2 halaman..." style={{ marginBottom: 14 }} />
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <label className="input-label" style={{ margin: 0 }}>Frekuensi</label>
                <button type="button"
                  style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11, fontWeight: 600, color: "var(--accent)", padding: "2px 4px" }}
                  onClick={() => set("frequency", form.frequency.length === DAYS.length ? [] : [...DAYS])}>
                  {form.frequency.length === DAYS.length ? "Hapus Semua" : "Pilih Semua"}
                </button>
              </div>
              <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
                {DAYS.map((d, i) => (
                  <button key={d} type="button"
                    style={{ padding: "4px 10px", borderRadius: 6, border: "1.5px solid", fontSize: 12, fontWeight: 600, cursor: "pointer", transition: "all 0.15s",
                      borderColor: form.frequency.includes(d) ? "var(--accent)" : "var(--border)",
                      background: form.frequency.includes(d) ? "rgba(168,197,0,0.12)" : "transparent",
                      color: form.frequency.includes(d) ? "var(--accent)" : "var(--text-secondary)" }}
                    onClick={() => toggleDay(d)}>{DAY_ID[i]}</button>
                ))}
              </div>
              <label className="input-label">Identity Pillar <span style={{ fontWeight: 400, color: "var(--text-light)" }}>(opsional)</span></label>
              <input className="input" value={form.identity_pillar} onChange={e => set("identity_pillar", e.target.value)} placeholder="Saya adalah orang yang..." style={{ marginBottom: 20 }} />
              <div style={{ display: "flex", gap: 10 }}>
                <button className="btn" style={{ flex: 1 }} onClick={onClose}>Batal</button>
                <button className="btn btn-primary" style={{ flex: 2 }} disabled={loading || !form.title.trim()} onClick={handleSave}>
                  {loading ? "Menyimpan..." : "Simpan"}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function HabitPage({ user, showToast }) {
      const [habits, setHabits] = useState([]);
      const [loading, setLoading] = useState(true);
      const [checkinTarget, setCheckinTarget] = useState(null);
      const [editTarget, setEditTarget] = useState(null);
      const [monthlyData, setMonthlyData] = useState(null);
      const chartRef = useRef(null);
      const chartInstanceRef = useRef(null);

      const DAY_LABELS = ["Sen","Sel","Rab","Kam","Jum","Sab","Min"];
      const todayDow = (new Date().getDay() + 6) % 7;
      const PHASE_LABEL = { pagi: "☀️ PAGI (04:00 – 09:00)", siang: "🌤️ SIANG (09:00 – 17:00)", malam: "🌙 MALAM (17:00 – 22:00)" };
      const PHASE_COLOR = { pagi: "var(--accent)", siang: "#facc15", malam: "#818cf8" };
      const phases = ["pagi","siang","malam"];

      const fetchHabits = async () => {
        try {
          const data = await api.get("/api/habits/today");
          setHabits(data);
          OfflineDB.cacheSet("habits_today", data);
        } catch (err) {
          const cached = await OfflineDB.cacheGet("habits_today");
          if (cached) {
            const q = await OfflineDB.queueGetAll();
            let list = [...cached];
            for (const item of q) {
              const checkinMatch = item.method === "POST" && item.url.match(/^\/api\/habits\/(\d+)\/checkin$/);
              if (checkinMatch) {
                const hid = parseInt(checkinMatch[1]);
                list = list.map(h => h.id === hid ? { ...h, today_status: item.body.status, skip_reason: item.body.skip_reason || "" } : h);
              }
              if (item.method === "POST" && item.url === "/api/habits" && item.tempId) {
                const exists = list.some(h => String(h.id) === item.tempId);
                if (!exists) list.push({
                  ...item.body, id: item.tempId, _pending: true,
                  today_status: null, skip_reason: "", streak: 0,
                  week_log: [null,null,null,null,null,null,null],
                });
              }
            }
            setHabits(list);
          }
        }
        setLoading(false);
      };

      const fetchMonthly = async () => {
        try {
          const data = await api.get("/api/habits/monthly");
          setMonthlyData(data);
        } catch (e) { /* offline — skip chart */ }
      };

      useEffect(() => {
        fetchHabits();
        fetchMonthly();
        const handler = () => { fetchHabits(); fetchMonthly(); };
        window.addEventListener("habitSaved", handler);
        return () => window.removeEventListener("habitSaved", handler);
      }, []);

      useEffect(() => {
        if (!monthlyData || !chartRef.current) return;
        if (chartInstanceRef.current) chartInstanceRef.current.destroy();
        const today = monthlyData.today_day;
        const labels = monthlyData.days.map(d => d.day);
        const dataPoints = monthlyData.days.map(d => d.day <= today ? d.done : null);
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        const gridColor = isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.05)";
        const textColor = isDark ? "#a3a3a3" : "#94a3b8";
        const accentRgb = "168,197,0";
        const ctx = chartRef.current.getContext("2d");
        const grad = ctx.createLinearGradient(0, 0, 0, 160);
        grad.addColorStop(0, `rgba(${accentRgb},0.25)`);
        grad.addColorStop(1, `rgba(${accentRgb},0)`);
        chartInstanceRef.current = new Chart(ctx, {
          type: "line",
          data: {
            labels,
            datasets: [{
              data: dataPoints,
              borderColor: `rgba(${accentRgb},1)`,
              backgroundColor: grad,
              borderWidth: 2,
              pointRadius: dataPoints.map((v, i) => i === today - 1 ? 5 : 2),
              pointBackgroundColor: `rgba(${accentRgb},1)`,
              fill: true,
              tension: 0.35,
              spanGaps: false,
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  title: (items) => {
                    const day = items[0].label;
                    const d = new Date(new Date().getFullYear(), new Date().getMonth(), parseInt(day));
                    return d.toLocaleDateString("id-ID", { weekday: "short", day: "numeric", month: "short" });
                  },
                  label: (item) => `${item.raw ?? 0} kebiasaan selesai`
                },
                backgroundColor: isDark ? "#262626" : "#fff",
                titleColor: isDark ? "#e5e5e5" : "#0f172a",
                bodyColor: isDark ? "#a3a3a3" : "#64748b",
                borderColor: isDark ? "#404040" : "#E8E8E0",
                borderWidth: 1,
              }
            },
            scales: {
              x: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 }, maxTicksLimit: 15 } },
              y: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 }, stepSize: 1, beginAtZero: true } }
            }
          }
        });
        return () => { if (chartInstanceRef.current) chartInstanceRef.current.destroy(); };
      }, [monthlyData]);

      const handleCheckin = async (habitId, status, skipReason) => {
        const _d = new Date();
        const today = `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,"0")}-${String(_d.getDate()).padStart(2,"0")}`;
        try {
          await api.post(`/api/habits/${habitId}/checkin`, { status, skip_reason: skipReason, date: today });
        } catch (err) {
          if (isOfflineErr(err)) {
            await OfflineDB.queueAdd({ method: "POST", url: `/api/habits/${habitId}/checkin`, body: { status, skip_reason: skipReason, date: today } });
            showToast("Tersimpan offline, akan sync saat online 📶");
          } else {
            showToast(err.message, "error");
            return;
          }
        }
        setHabits(prev => prev.map(h => {
          if (h.id !== habitId) return h;
          const newWeekLog = [...(h.week_log || [null,null,null,null,null,null,null])];
          newWeekLog[todayDow] = status;
          return { ...h, today_status: status, skip_reason: skipReason, week_log: newWeekLog };
        }));
        if (status === "done") showToast("✅ Habit selesai!");
        else showToast("⏭️ Di-skip");
        fetchMonthly();
      };

      const handleEdit = async (habitId, data) => {
        try {
          await api.post(`/api/habits/${habitId}/update`, data);
          showToast("Habit diperbarui");
          fetchHabits(); // refresh dari server agar fase & data lain akurat
        } catch (err) {
          showToast(err.message, "error");
        }
      };

      const handleDelete = async (habitId) => {
        if (!window.confirm("Hapus habit ini? Semua log akan ikut terhapus.")) return;
        try {
          await api.del(`/api/habits/${habitId}`);
          setHabits(prev => prev.filter(h => h.id !== habitId));
          showToast("Habit dihapus");
        } catch (err) {
          showToast(err.message, "error");
        }
      };

      const currentHour = new Date().getHours();
      const currentPhase = currentHour < 9 ? "pagi" : currentHour < 17 ? "siang" : "malam";
      const quoteHabit = habits.find(h => h.phase === currentPhase && h.identity_pillar)
        || habits.find(h => h.identity_pillar);
      const quote = quoteHabit?.identity_pillar || "Jadikan hari ini lebih baik dari kemarin.";

      const grouped = phases.reduce((acc, p) => { acc[p] = habits.filter(h => h.phase === p); return acc; }, {});

      const [habitTagModal, setHabitTagModal] = useState(null);

      const handleTagClick = async (tagName) => {
        try {
          const filtered = await api.get(`/api/habits?tag=${encodeURIComponent(tagName)}`);
          setHabitTagModal({ tagName, habits: filtered || [] });
        } catch { setHabitTagModal({ tagName, habits: [] }); }
      };

      const handleTagRemove = async (habitId, tagName) => {
        try { await api.del(`/api/habits/${habitId}/tags/${encodeURIComponent(tagName)}`); }
        catch (err) { console.error(err); }
      };

      // HabitCard dipanggil dengan props eksplisit agar stable component identity
      const habitCardProps = { DAY_LABELS, todayDow, onCheckin: setCheckinTarget, onEdit: setEditTarget, onDelete: handleDelete, onTagClick: handleTagClick, onTagRemove: handleTagRemove };

      if (loading) return <div style={{ padding: 40, textAlign: "center", color: "var(--text-secondary)" }}>Memuat habits...</div>;

      return (
        <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 16px" }}>
          {/* Header */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
              <div style={{ fontSize: 22, fontWeight: 700 }}>
                {new Date().toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
              </div>
              {monthlyData && (
                <div style={{ fontSize: 13, color: "var(--text-secondary)" }}>
                  Rata-rata: <strong>{monthlyData.avg}</strong> / hari
                </div>
              )}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 12, padding: "12px 16px" }}>
              <span style={{ fontSize: 18 }}>✨</span>
              <div style={{ fontSize: 14, color: "var(--text-secondary)", fontStyle: "italic" }}>"{quote}"</div>
            </div>
          </div>

          {/* Monthly Chart */}
          {monthlyData && (
            <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 14, padding: "16px 18px", marginBottom: 24 }}>
              <div style={{ height: 160, position: "relative" }}>
                <canvas ref={chartRef} />
              </div>
            </div>
          )}

          {habits.length === 0 ? (
            <div style={{ textAlign: "center", padding: "60px 0", color: "var(--text-secondary)" }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>🌱</div>
              <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 8 }}>Belum ada habit</div>
              <div style={{ fontSize: 13 }}>Klik "+ Buat Baru" lalu pilih tab Habit untuk mulai.</div>
            </div>
          ) : (
            phases.map(phase => {
              const phaseHabits = grouped[phase];
              if (!phaseHabits.length) return null;
              // Phase weekly progress
              const totalPossible = phaseHabits.length * 7;
              const totalDone = phaseHabits.reduce((sum, h) => sum + (h.week_log || []).filter(s => s === "done").length, 0);
              const pct = totalPossible > 0 ? Math.round((totalDone / totalPossible) * 100) : 0;
              return (
                <div key={phase} style={{ marginBottom: 28 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: PHASE_COLOR[phase], letterSpacing: "0.5px" }}>
                      {PHASE_LABEL[phase]}
                    </span>
                    <div style={{ flex: 1, height: 1, background: `${PHASE_COLOR[phase]}30` }} />
                  </div>
                  {/* Weekly progress bar */}
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "var(--text-secondary)", marginBottom: 4 }}>
                      <span>Progress Minggu Ini</span>
                      <span style={{ fontWeight: 600 }}>{pct}%</span>
                    </div>
                    <div style={{ height: 4, borderRadius: 4, background: "var(--bg-primary)", overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, borderRadius: 4, background: PHASE_COLOR[phase], transition: "width 0.4s ease" }} />
                    </div>
                  </div>
                  {phaseHabits.map(h => <HabitCard key={h.id} h={h} {...habitCardProps} />)}
                </div>
              );
            })
          )}

          {checkinTarget && (
            <HabitCheckinModal
              habit={checkinTarget}
              onClose={() => setCheckinTarget(null)}
              onCheckin={handleCheckin}
            />
          )}
          {editTarget && (
            <HabitEditModal
              habit={editTarget}
              onClose={() => setEditTarget(null)}
              onSave={handleEdit}
            />
          )}
          {habitTagModal && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center" }}
              onClick={() => setHabitTagModal(null)}>
              <div style={{ background: "var(--bg-card)", borderRadius: 16, padding: 24, minWidth: 280, maxWidth: 400, maxHeight: "70vh", overflowY: "auto" }}
                onClick={e => e.stopPropagation()}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <span style={{ fontWeight: 700, fontSize: 15 }}>
                    Habit dengan tag <span style={{ color: "var(--accent)" }}>#{habitTagModal.tagName}</span>
                  </span>
                  <button onClick={() => setHabitTagModal(null)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "var(--text-light)" }}>×</button>
                </div>
                {habitTagModal.habits.length === 0
                  ? <div style={{ color: "var(--text-light)", fontSize: 13 }}>Tidak ada habit dengan tag ini.</div>
                  : habitTagModal.habits.map(h => (
                    <div key={h.id} style={{ background: "var(--bg-primary)", borderRadius: 8, padding: "10px 12px", marginBottom: 8, fontSize: 13 }}>
                      <div style={{ fontWeight: 600 }}>{h.title}</div>
                      {h.micro_target && <div style={{ fontSize: 11, color: "var(--text-light)", marginTop: 2 }}>🎯 {h.micro_target}</div>}
                    </div>
                  ))
                }
              </div>
            </div>
          )}
        </div>
      );
    }

    function SearchModal({ onClose, onTaskClick, onNoteClick }) {
      const [query, setQuery] = useState("");
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const inputRef = React.useRef(null);
      const debounceRef = React.useRef(null);
      const generationRef = React.useRef(0);

      useEffect(() => {
        inputRef.current?.focus();
        const onKey = (e) => { if (e.key === "Escape") onClose(); };
        document.addEventListener("keydown", onKey);
        return () => document.removeEventListener("keydown", onKey);
      }, [onClose]);

      const search = (val) => {
        setQuery(val);
        clearTimeout(debounceRef.current);
        if (val.trim().length < 2) { setResults(null); return; }
        debounceRef.current = setTimeout(() => {
          setLoading(true);
          const gen = ++generationRef.current;
          api.get(`/api/search?q=${encodeURIComponent(val.trim())}`)
            .then(data => { if (gen === generationRef.current) { setResults(data); setLoading(false); } })
            .catch(() => { if (gen === generationRef.current) { setResults(null); setLoading(false); } });
        }, 300);
      };

      const PRI_COLOR = { P1: "#ef4444", P2: "#f97316", P3: "#eab308", P4: "#22c55e" };
      const hasResults = results && (results.tags.length > 0 || results.tasks.length > 0 || results.notes.length > 0);

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{
            background: "var(--bg-card)", borderRadius: 16, width: "90%", maxWidth: 580,
            boxShadow: "0 20px 60px rgba(0,0,0,0.25)", overflow: "hidden",
            marginTop: "8vh", alignSelf: "flex-start",
          }}>
            {/* Search input */}
            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "14px 16px", borderBottom: "1px solid var(--border)" }}>
              <span style={{ fontSize: 18, color: "var(--text-light)" }}>🔍</span>
              <input
                ref={inputRef}
                value={query}
                onChange={e => search(e.target.value)}
                placeholder="Cari task, catatan, atau tag…"
                style={{
                  flex: 1, border: "none", outline: "none", fontSize: 15,
                  background: "transparent", color: "var(--text-primary)", fontFamily: "inherit",
                }}
              />
              {loading && <span style={{ fontSize: 12, color: "var(--text-light)" }}>…</span>}
              <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "var(--text-light)", padding: 0, lineHeight: 1 }}>✕</button>
            </div>

            {/* Results */}
            <div style={{ maxHeight: "60vh", overflowY: "auto", padding: query.trim().length >= 2 ? "8px 0" : "20px 16px" }}>
              {query.trim().length < 2 && (
                <div style={{ color: "var(--text-light)", fontSize: 13, textAlign: "center" }}>
                  Ketik minimal 2 karakter untuk mulai mencari
                </div>
              )}

              {query.trim().length >= 2 && !loading && results && !hasResults && (
                <div style={{ color: "var(--text-light)", fontSize: 13, textAlign: "center", padding: "20px 16px" }}>
                  Tidak ditemukan hasil untuk "<b>{query}</b>"
                </div>
              )}

              {/* Tags */}
              {results && results.tags && results.tags.length > 0 && (
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-light)", textTransform: "uppercase", letterSpacing: 1, padding: "6px 16px 4px" }}>
                    🏷️ Tags
                  </div>
                  {results.tags.map(tag => (
                    <div key={tag.id}
                      onClick={() => { window.dispatchEvent(new CustomEvent("searchTag", { detail: tag.name })); onClose(); }}
                      style={{ padding: "8px 16px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}
                      onMouseEnter={e => e.currentTarget.style.background = "var(--bg-primary)"}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                    >
                      <span style={{ color: "var(--accent)", fontWeight: 700, fontSize: 14 }}>#{tag.name}</span>
                      <span style={{ fontSize: 11, color: "var(--text-light)", marginLeft: "auto" }}>{tag.count} item</span>
                    </div>
                  ))}
                </div>
              )}

              {/* Tasks */}
              {results && results.tasks && results.tasks.length > 0 && (
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-light)", textTransform: "uppercase", letterSpacing: 1, padding: "6px 16px 4px" }}>
                    📋 Tasks
                  </div>
                  {results.tasks.map(task => (
                    <div key={task.id}
                      onClick={() => { onClose(); onTaskClick(task); }}
                      style={{ padding: "8px 16px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}
                      onMouseEnter={e => e.currentTarget.style.background = "var(--bg-primary)"}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                    >
                      <span style={{ fontSize: 11, fontWeight: 700, color: PRI_COLOR[task.priority] || "var(--text-light)", background: "var(--bg-primary)", borderRadius: 4, padding: "1px 5px", flexShrink: 0 }}>{task.priority || "—"}</span>
                      <span style={{ fontSize: 14, color: "var(--text-primary)", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{task.title}</span>
                      {task.deadline && <span style={{ fontSize: 11, color: "var(--text-light)", flexShrink: 0 }}>{task.deadline}</span>}
                    </div>
                  ))}
                </div>
              )}

              {/* Notes */}
              {results && results.notes && results.notes.length > 0 && (
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-light)", textTransform: "uppercase", letterSpacing: 1, padding: "6px 16px 4px" }}>
                    📝 Notes
                  </div>
                  {results.notes.map(note => (
                    <div key={note.id}
                      onClick={() => { onClose(); onNoteClick(note); }}
                      style={{ padding: "8px 16px", cursor: "pointer" }}
                      onMouseEnter={e => e.currentTarget.style.background = "var(--bg-primary)"}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                    >
                      <div style={{ fontSize: 14, color: "var(--text-primary)", fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {note.title || "(tanpa judul)"}
                      </div>
                      {note.content && (
                        <div style={{ fontSize: 12, color: "var(--text-light)", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {note.content}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════
    //  MAIN APP
    // ══════════════════════════════════════════════════════════════
    function App() {
      const [user, setUser] = useState(null);
      const [theme, setTheme] = useState(
        () => localStorage.getItem('tf_theme') || 'light'
      );
      const toggleTheme = useCallback(() => {
        setTheme(prev => {
          const next = prev === 'light' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('tf_theme', next);
          return next;
        });
      }, []);
      const [authPage, setAuthPage] = useState("login");
      const [page, setPage] = useState("dashboard");
      const [tasks, setTasks] = useState([]);
      const [summary, setSummary] = useState({ by_status: {}, by_quadrant: {}, overdue: 0, total_active: 0, total_done: 0 });
      const [projects, setProjects] = useState([]);
      const [contexts, setContexts] = useState([]);
      const [sharedLists, setSharedLists] = useState([]);
      const [collaborators, setCollaborators] = useState([]);
      const [selectedTask, setSelectedTask] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [editTask, setEditTask] = useState(null);
      const [toast, setToast] = useState(null);
      const [loading, setLoading] = useState(false);
      const [doneConfirm, setDoneConfirm] = useState(null); // { taskId, count, children }
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [showSearch, setShowSearch] = useState(false);
      const [queueSize, setQueueSize] = useState(0);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      const [unreadCount, setUnreadCount] = useState(0);
      const [notifications, setNotifications] = useState([]);
      const [showNotifPanel, setShowNotifPanel] = useState(false);

      const showToast = (message, type = "success") => setToast({ message, type });

      const logout = useCallback(async () => {
        if (!tokenStore.get()) return;
        try { await api.post("/api/auth/logout", {}); } catch (e) {}
        tokenStore.clear();
        setUser(null);
        setTasks([]);
        setSharedLists([]);
        setProjects([]);
        setContexts([]);
        setCollaborators([]);
        setNotifications([]);
        setUnreadCount(0);
        setSummary({ by_status: {}, by_quadrant: {}, overdue: 0, total_active: 0, total_done: 0 });
        setPage("dashboard");
      }, []);

      window.__logout = logout;

      // Check existing session on mount
      const [authChecked, setAuthChecked] = useState(!tokenStore.get());
      useEffect(() => {
        if (tokenStore.get()) {
          api.get("/api/auth/me")
            .then(u => { setUser(u); setAuthChecked(true); })
            .catch(err => {
              // Offline: jangan hapus token, pakai username dari token payload
              if (isOfflineErr(err) || err?.message === "OFFLINE") {
                try {
                  const payload = JSON.parse(atob(tokenStore.get().split(".")[1]));
                  setUser({ id: payload.sub, username: payload.username || payload.sub, display_name: payload.display_name || payload.username || payload.sub });
                } catch (_) {}
                setAuthChecked(true);
              } else {
                tokenStore.clear();
                setAuthChecked(true);
              }
            });
        }
      }, []);

      // Handle ?join=<code> invite link from URL
      const [pendingJoinCode, setPendingJoinCode] = useState(() => {
        const params = new URLSearchParams(window.location.search);
        return params.get("join") || "";
      });
      const [joinModal, setJoinModal] = useState(false);

      useEffect(() => {
        if (user && pendingJoinCode) {
          setJoinModal(true);
          // Clean URL
          window.history.replaceState({}, "", "/");
        }
      }, [user, pendingJoinCode]);

      // Fetch data
      const initialLoad = useRef(true);
      const isSyncing = useRef(false);
      const fetchAll = useCallback(async () => {
        if (!user) return;
        const cacheEntries = [
          [setTasks,       "tasks"],
          [setSummary,     "summary"],
          [setProjects,    "projects"],
          [setContexts,    "contexts"],
          [setSharedLists, "lists"],
        ];
        if (initialLoad.current) {
          // Tampilkan cache dulu agar tidak blank saat reload
          let hasCache = false;
          for (const [setter, key] of cacheEntries) {
            const cached = await OfflineDB.cacheGet(key);
            if (cached) { setter(cached); hasCache = true; }
          }
          if (hasCache) { setLoading(false); initialLoad.current = false; }
          else setLoading(true);
        }
        const calls = [
          ["/api/tasks?include_done=true", setTasks,        "tasks"],
          ["/api/summary",                 setSummary,       "summary"],
          ["/api/projects",                setProjects,      "projects"],
          ["/api/contexts",                setContexts,      "contexts"],
          ["/api/lists",                   setSharedLists,   "lists"],
          ["/api/collaborators",           setCollaborators, null],
        ];
        const results = await Promise.allSettled(calls.map(([url]) => api.get(url)));
        for (let i = 0; i < calls.length; i++) {
          const [, setter, cacheKey] = calls[i];
          const r = results[i];
          if (r.status === "fulfilled") {
            setter(r.value);
            if (cacheKey) OfflineDB.cacheSet(cacheKey, r.value);
          } else if (cacheKey) {
            const cached = await OfflineDB.cacheGet(cacheKey);
            if (cached) setter(cached);
          }
        }
        // Deteksi online berdasarkan navigator.onLine — lebih reliable dari API call result
        // karena SW bisa serve cached API response (HTTP 200) walaupun sebenarnya offline
        setIsOnline(navigator.onLine);

        // Saat offline: apply pending queue mutations di atas data cache
        // Cek navigator.onLine (bukan results[0].status) agar tidak ter-bypass oleh SW cache
        if (!navigator.onLine) {
          const q = await OfflineDB.queueGetAll();
          if (q.length) {
            setTasks(prev => {
              let tasks = [...prev];
              for (const item of q) {
                // PUT /api/tasks/:id — edit task
                const putMatch = item.method === "PUT" && item.url.match(/^\/api\/tasks\/(\d+)$/);
                if (putMatch) {
                  const id = parseInt(putMatch[1]);
                  tasks = tasks.map(t => t.id === id ? { ...t, ...item.body, _pending: true } : t);
                }
                // POST /api/tasks/:id/done
                const doneMatch = item.method === "POST" && item.url.match(/^\/api\/tasks\/(\d+)\/done$/);
                if (doneMatch) {
                  const id = parseInt(doneMatch[1]);
                  tasks = tasks.map(t => t.id === id ? { ...t, gtd_status: "done", _pending: true } : t);
                }
                // POST /api/tasks (new task)
                if (item.method === "POST" && item.url === "/api/tasks" && item.tempId) {
                  const exists = tasks.some(t => String(t.id) === item.tempId);
                  if (!exists) tasks.push({
                    ...item.body, id: item.tempId, _pending: true,
                    quadrant: computeOfflineQuadrant(item.body.priority, item.body.deadline_date),
                    is_overdue: false, is_focused: false, days_until_deadline: null,
                    assigned_to_name: null, parent_title: null,
                    created_at: new Date(item.createdAt || Date.now()).toISOString(),
                  });
                }
              }
              return tasks;
            });
          }
        }
        if (initialLoad.current) { setLoading(false); initialLoad.current = false; }
      }, [user]);

      useEffect(() => { fetchAll(); }, [fetchAll]);

      // Auto-refresh every 30 seconds (skip saat sedang sync queue)
      useEffect(() => {
        if (!user) return;
        const interval = setInterval(() => {
          if (!isSyncing.current) fetchAll();
        }, 30000);
        return () => clearInterval(interval);
      }, [user, fetchAll]);

      // ── Offline helpers ───────────────────────────────────────────
      const updateQueueSize = useCallback(async () => {
        const q = await OfflineDB.queueGetAll();
        setQueueSize(q.length);
      }, []);

      const processQueue = useCallback(async () => {
        if (!navigator.onLine || isSyncing.current) return;
        const q = await OfflineDB.queueGetAll();
        if (!q.length) return;
        isSyncing.current = true;
        const tempIdMap = {};
        for (const item of q) {
          try {
            let url = item.url;
            let body = item.body ? { ...item.body } : undefined;
            if (body?.parent_id && tempIdMap[String(body.parent_id)]) {
              body.parent_id = tempIdMap[String(body.parent_id)];
            }
            let result;
            if (item.method === "POST")   result = await api.post(url, body);
            else if (item.method === "PUT")    result = await api.put(url, body);
            else if (item.method === "DELETE") result = await api.del(url);
            if (item.tempId && result?.id) tempIdMap[item.tempId] = result.id;
            await OfflineDB.queueDel(item.qid);
          } catch (err) {
            break; // stop on error, retry next online event
          }
        }
        isSyncing.current = false;
        setQueueSize(0);
        fetchAll();
      }, [fetchAll]);

      const handleOfflineSave = useCallback(async (tempTask) => {
        const isEdit = !String(tempTask.id).startsWith("tmp_");
        setTasks(prev => isEdit
          ? prev.map(t => t.id === tempTask.id ? tempTask : t)
          : [...prev, tempTask]
        );
        await updateQueueSize();
        showToast("Tersimpan offline, akan sync saat online 📶");
        setShowForm(false);
        setEditTask(null);
      }, [updateQueueSize]);

      const handleOfflineEdit = useCallback(async (taskId, updatedFields) => {
        setTasks(prev => prev.map(t => t.id === taskId ? { ...t, ...updatedFields, _pending: true } : t));
        await updateQueueSize();
        showToast("Edit tersimpan offline, akan sync saat online 📶");
      }, [updateQueueSize]);

      // Online / offline events
      useEffect(() => {
        const onOnline  = () => { setIsOnline(true);  processQueue(); };
        const onOffline = () => setIsOnline(false);
        window.addEventListener("online",  onOnline);
        window.addEventListener("offline", onOffline);
        updateQueueSize();
        if (navigator.onLine) processQueue();
        return () => {
          window.removeEventListener("online",  onOnline);
          window.removeEventListener("offline", onOffline);
        };
      }, [processQueue, updateQueueSize]);

      // Background refresh saat kembali ke foreground (tanpa loading spinner)
      useEffect(() => {
        const onVisible = () => {
          if (document.visibilityState === "visible" && navigator.onLine) fetchAll();
        };
        document.addEventListener("visibilitychange", onVisible);
        return () => document.removeEventListener("visibilitychange", onVisible);
      }, [fetchAll]);

      useEffect(() => {
        const handler = (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === "k") {
            e.preventDefault();
            setShowSearch(s => !s);
          }
        };
        document.addEventListener("keydown", handler);
        return () => document.removeEventListener("keydown", handler);
      }, []);

      // Trigger processQueue saat isOnline berubah false → true
      // (cover kasus DNS putus: window.online tidak fire, tapi fetchAll mendeteksi kembali online)
      const prevIsOnline = useRef(isOnline);
      useEffect(() => {
        if (!prevIsOnline.current && isOnline) {
          processQueue();
        }
        prevIsOnline.current = isOnline;
      }, [isOnline, processQueue]);

      // Notification polling every 15 seconds
      const fetchUnread = useCallback(async () => {
        if (!user) return;
        try {
          const data = await api.get("/api/notifications/count");
          setUnreadCount(data.unread || 0);
        } catch (e) {}
      }, [user]);

      useEffect(() => {
        if (!user) return;
        fetchUnread();
        const interval = setInterval(fetchUnread, 15000);
        return () => clearInterval(interval);
      }, [user, fetchUnread]);

      const handleOpenNotif = async () => {
        const willOpen = !showNotifPanel;
        setShowNotifPanel(willOpen);
        if (willOpen) {
          try {
            const data = await api.get("/api/notifications");
            setNotifications(data);
            await api.post("/api/notifications/read", {});
            setUnreadCount(0);
          } catch (e) {}
        }
      };

      const handleSearchNoteClick = (note) => {
        setPage("notes");
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            window.dispatchEvent(new CustomEvent("openNote", { detail: note.id }));
          });
        });
      };

      const openTaskById = async (taskId) => {
        setShowNotifPanel(false);
        try {
          const task = await api.get(`/api/tasks/${taskId}`);
          setSelectedTask(task);
        } catch (e) { showToast("Task tidak ditemukan", "error"); }
      };

      // Close notif panel on outside click
      useEffect(() => {
        if (!showNotifPanel) return;
        const handler = (e) => {
          if (!e.target.closest("[data-notif-panel]")) setShowNotifPanel(false);
        };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, [showNotifPanel]);

      // Auth handlers
      const handleLogin = (data) => {
        tokenStore.set(data.token);
        setUser({ id: data.user_id, username: data.username, display_name: data.display_name || data.username });
        setAuthChecked(true);
      };

      if (!authChecked) {
        return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)", color: "white", fontSize: 18 }}>Loading...</div>;
      }

      if (!user) {
        return authPage === "login"
          ? <LoginPage onLogin={handleLogin} onSwitch={() => setAuthPage("register")} />
          : <RegisterPage onLogin={handleLogin} onSwitch={() => setAuthPage("login")} />;
      }

      // Task actions
      const handleDone = async (taskId) => {
        try {
          // Check for pending child tasks
          let children = [];
          try { children = await api.get(`/api/tasks/${taskId}/child-tasks`); } catch (_) {}
          const pending = children.filter(c => c.gtd_status !== "done" && c.gtd_status !== "archived");
          if (pending.length > 0) {
            setDoneConfirm({ taskId, count: pending.length, children: pending });
            return;
          }
          await api.post(`/api/tasks/${taskId}/done`);
          showToast("Task selesai! ✅");
          fetchAll();
          window.dispatchEvent(new CustomEvent("taskUpdated", { detail: { taskId } }));
          setSelectedTask(null);
        } catch (err) {
          if (isOfflineErr(err)) {
            await OfflineDB.queueAdd({ method: "POST", url: `/api/tasks/${taskId}/done`, body: {} });
            setTasks(prev => prev.map(t => t.id === taskId ? { ...t, gtd_status: "done", _pending: true } : t));
            await updateQueueSize();
            showToast("Offline — akan sync saat online 📶");
            setSelectedTask(null);
          } else { showToast(err.message, "error"); }
        }
      };

      const handleDoneAll = async ({ taskId, children }) => {
        setDoneConfirm(null);
        try {
          for (const c of children) { await api.post(`/api/tasks/${c.id}/done`); }
          await api.post(`/api/tasks/${taskId}/done`);
          showToast("Task & semua subtask selesai! ✅");
          fetchAll();
          setSelectedTask(null);
        } catch (err) {
          if (isOfflineErr(err)) {
            const allIds = [...children.map(c => c.id), taskId];
            for (const id of allIds) await OfflineDB.queueAdd({ method: "POST", url: `/api/tasks/${id}/done`, body: {} });
            setTasks(prev => prev.map(t => allIds.includes(t.id) ? { ...t, gtd_status: "done", _pending: true } : t));
            await updateQueueSize();
            showToast("Offline — akan sync saat online 📶");
            setSelectedTask(null);
          } else { showToast(err.message, "error"); }
        }
      };

      const handleDoneParentOnly = async (taskId) => {
        setDoneConfirm(null);
        try {
          await api.post(`/api/tasks/${taskId}/done`);
          showToast("Task selesai! ✅");
          fetchAll();
          setSelectedTask(null);
        } catch (err) {
          if (isOfflineErr(err)) {
            await OfflineDB.queueAdd({ method: "POST", url: `/api/tasks/${taskId}/done`, body: {} });
            setTasks(prev => prev.map(t => t.id === taskId ? { ...t, gtd_status: "done", _pending: true } : t));
            await updateQueueSize();
            showToast("Offline — akan sync saat online 📶");
            setSelectedTask(null);
          } else { showToast(err.message, "error"); }
        }
      };

      const handleDelete = async (taskId) => {
        if (!confirm("Hapus task ini?")) return;
        try {
          await api.del(`/api/tasks/${taskId}`);
          showToast("Task dihapus 🗑️");
          fetchAll();
          setSelectedTask(null);
        } catch (err) { showToast(err.message, "error"); }
      };

      const handleToggleFocus = async (taskId) => {
        try {
          const result = await api.post(`/api/tasks/${taskId}/focus`);
          showToast(result.is_focused ? "⭐ Ditambahkan ke Fokus" : "☆ Dihapus dari Fokus");
          fetchAll();
        } catch (err) { showToast(err.message, "error"); }
      };

      const handleSaved = () => {
        setShowForm(false);
        setEditTask(null);
        showToast(editTask ? "Task diupdate ✅" : "Task ditambahkan ✅");
        fetchAll();
      };

      const handleEdit = (task) => {
        setSelectedTask(null);
        setEditTask(task);
        setShowForm(true);
      };

      // Determine which tasks to show
      const getFilteredTasks = () => {
        if (page.startsWith("proj_")) {
          const projName = page.slice(5);
          return tasks.filter(t => t.project === projName && t.gtd_status !== "done" && t.gtd_status !== "archived");
        }
        if (page.startsWith("slist_")) {
          const listId = parseInt(page.slice(6));
          return tasks.filter(t => t.list_id === listId && t.gtd_status !== "done" && t.gtd_status !== "archived");
        }
        switch (page) {
          case "inbox": return tasks.filter(t => t.gtd_status === "inbox");
          case "next": return tasks.filter(t => t.gtd_status === "next");
          case "waiting": return tasks.filter(t => t.gtd_status === "waiting");
          case "someday": return tasks.filter(t => t.gtd_status === "someday");
          case "q1": return tasks.filter(t => t.quadrant === "Q1" && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "q2": return tasks.filter(t => t.quadrant === "Q2" && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "q3": return tasks.filter(t => t.quadrant === "Q3" && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "q4": return tasks.filter(t => t.quadrant === "Q4" && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "overdue": return tasks.filter(t => t.is_overdue);
          case "done": return tasks.filter(t => t.gtd_status === "done");
          case "today": return tasks.filter(t => (t.quadrant === "Q1" || t.is_overdue || t.is_focused) && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "all": return tasks.filter(t => t.gtd_status !== "done" && t.gtd_status !== "archived");
          default: return tasks.filter(t => t.gtd_status !== "done" && t.gtd_status !== "archived");
        }
      };

      const getPageTitle = () => {
        if (page.startsWith("proj_")) return page.slice(5);
        if (page.startsWith("slist_")) {
          const listId = parseInt(page.slice(6));
          const lst = sharedLists.find(l => l.id === listId);
          return lst ? `${lst.role === "owner" ? "📋" : "👥"} ${lst.name}` : "Shared List";
        }
        const titles = {
          dashboard: "Dashboard", inbox: "Inbox", next: "Next Actions", waiting: "Waiting For",
          someday: "Someday / Maybe", q1: "Q1 — Do", q2: "Q2 — Schedule", q3: "Q3 — Delegate",
          q4: "Q4 — Eliminate", overdue: "Overdue", done: "Done", today: "Fokus Hari Ini", all: "Semua Task",
          settings: "Pengaturan",
          habit: "Habit Tracker"
        };
        return titles[page] || "Tasks";
      };
      const getPageIcon = () => {
        if (page.startsWith("proj_")) return "📂";
        if (page.startsWith("slist_")) return "👥";
        const icons = {
          dashboard: "📊", inbox: "📥", next: "▶️", waiting: "⏳", someday: "💭",
          q1: "🔥", q2: "📅", q3: "👋", q4: "🗑️", overdue: "⚠️", done: "✅", today: "🍅", all: "📋",
          settings: "⚙️",
          habit: "🔁"
        };
        return icons[page] || "📋";
      };

      // Render content based on page
      const renderContent = () => {
        if (page === "habit") {
          return <HabitPage user={user} showToast={showToast} />;
        }

        if (page === "notes") {
          return <NotesPage tasks={tasks} showToast={showToast} onTaskClick={setSelectedTask} user={user} sharedLists={sharedLists} />;
        }

        if (page === "settings") {
          return <SettingsPage user={user} onUsernameChange={(u) => setUser(u)} showToast={showToast} />;
        }

        if (page === "dashboard") {
          return <Dashboard summary={summary} tasks={tasks} onTaskClick={setSelectedTask} onDone={handleDone} onNav={setPage} showToast={showToast} />;
        }
        
        if (page === "today") {
          return <TodayFocusView tasks={tasks} onTaskClick={setSelectedTask} onDone={handleDone} loading={loading} />;
        }
        if (page === "chat") {
          return <ChatPage user={user} sharedLists={sharedLists} onTaskClick={setSelectedTask} showToast={showToast} />;
        }

        if (page === "manage_lists") {
          return <SharedListsManager sharedLists={sharedLists} onRefresh={fetchAll} showToast={showToast} />;
        }

        if (page === "calendar") {
          return <CalendarView tasks={tasks} onTaskClick={setSelectedTask} />;
        }

        return (
          <TaskListView
            tasks={getFilteredTasks()}
            allTasks={tasks}
            title={getPageTitle()}
            icon={getPageIcon()}
            onTaskClick={setSelectedTask}
            onDone={handleDone}
            onToggleFocus={handleToggleFocus}
            loading={loading}
            projects={projects}
            contexts={contexts}
            showFilters={page !== "dashboard" && page !== "today"}
            showQuadrant={!["q1","q2","q3","q4"].includes(page)}
            collaborators={page.startsWith("slist_") ? collaborators : []}
          />
        );
      };

      return (
        <div>
          <Sidebar page={page} setPage={setPage} summary={summary} user={user} onLogout={logout} isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} projects={projects} tasks={tasks} collapsed={sidebarCollapsed} onToggleCollapse={() => setSidebarCollapsed(!sidebarCollapsed)} sharedLists={sharedLists} />

          <div className={`main-content ${sidebarCollapsed ? "" : "sidebar-visible"}${page === "chat" ? " no-padding" : ""}`}>
            {/* Offline banner */}
            {!isOnline && (
              <div style={{ background: "#fef3c7", borderBottom: "1px solid #fcd34d", padding: "6px 16px", fontSize: 13, color: "#92400e", display: "flex", alignItems: "center", gap: 8 }}>
                <span>📡</span>
                <span style={{ flex: 1 }}>Mode offline — data dari cache. {queueSize > 0 ? `${queueSize} perubahan menunggu sync.` : ""}</span>
              </div>
            )}
            {isOnline && queueSize > 0 && (
              <div style={{ background: "#ecfdf5", borderBottom: "1px solid #6ee7b7", padding: "6px 16px", fontSize: 13, color: "#065f46", display: "flex", alignItems: "center", gap: 8 }}>
                <span>🔄</span>
                <span>Menyinkronkan {queueSize} perubahan...</span>
              </div>
            )}

            {/* Mobile top bar */}
            <div className="mobile-topbar">
              <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", padding: 0, lineHeight: 1 }}>☰</button>
              <div style={{ flex: 1 }}></div>
              <button onClick={() => setShowSearch(true)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", padding: "0 4px", lineHeight: 1, color: "var(--text-secondary)" }} title="Cari (Ctrl+K)">🔍</button>
              <button onClick={handleOpenNotif} style={{ position: "relative", background: "none", border: "none", fontSize: 20, cursor: "pointer", padding: "0 8px 0 0", lineHeight: 1 }}>
                🔔
                {unreadCount > 0 && <span style={{ position: "absolute", top: -2, right: 4, background: "#ef4444", color: "white", borderRadius: "50%", fontSize: 9, fontWeight: 700, minWidth: 14, height: 14, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 2px" }}>{unreadCount > 9 ? "9+" : unreadCount}</span>}
              </button>
              <ThemeToggle theme={theme} onToggle={toggleTheme} />
            </div>

            {/* Desktop top bar */}
            <div className="desktop-topbar" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <button onClick={() => setSidebarCollapsed(!sidebarCollapsed)} title="Toggle menu" style={{ background: "none", border: "1px solid var(--border)", borderRadius: 8, cursor: "pointer", fontSize: 16, padding: "6px 10px", color: "var(--text-secondary)", lineHeight: 1 }}>☰</button>
                <div style={{ fontSize: 13, color: "var(--text-light)" }}>
                  {new Date().toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
                </div>
              </div>
              <div onClick={() => setShowSearch(true)} title="Cari (Ctrl+K)" style={{ display: "flex", alignItems: "center", gap: 7, border: "1px solid var(--border)", borderRadius: 8, cursor: "text", padding: "6px 12px", color: "var(--text-light)", fontSize: 13, background: "var(--bg-primary)", minWidth: 180, userSelect: "none" }}>
                <span style={{ fontSize: 14, lineHeight: 1 }}>🔍</span>
                <span>Cari ...</span>
                <span style={{ marginLeft: "auto", fontSize: 11, background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 4, padding: "1px 5px", color: "var(--text-light)" }}>Ctrl K</span>
              </div>
              <div data-notif-panel style={{ display: "flex", alignItems: "center", gap: 10, position: "relative" }}>
                {/* Notification Bell */}
                <button onClick={handleOpenNotif} title="Notifikasi" data-notif-panel style={{ position: "relative", background: "none", border: "1px solid var(--border)", borderRadius: 8, cursor: "pointer", fontSize: 18, padding: "5px 10px", color: "var(--text-secondary)", lineHeight: 1 }}>
                  🔔
                  {unreadCount > 0 && (
                    <span style={{ position: "absolute", top: -4, right: -4, background: "#ef4444", color: "white", borderRadius: "50%", fontSize: 10, fontWeight: 700, minWidth: 16, height: 16, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 3px" }}>
                      {unreadCount > 9 ? "9+" : unreadCount}
                    </span>
                  )}
                </button>

                {/* Notification Panel */}
                {showNotifPanel && (
                  <div data-notif-panel style={{ position: "absolute", top: 44, right: 0, width: 340, background: "var(--bg-card)", borderRadius: 12, boxShadow: "0 8px 32px rgba(0,0,0,0.15)", border: "1px solid var(--border)", zIndex: 200, overflow: "hidden" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 16px", borderBottom: "1px solid var(--border)" }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>🔔 Notifikasi</div>
                      <span onClick={() => setShowNotifPanel(false)} style={{ cursor: "pointer", color: "var(--text-light)", fontSize: 16 }}>✕</span>
                    </div>
                    <div style={{ maxHeight: 360, overflowY: "auto" }}>
                      {notifications.length === 0 ? (
                        <div style={{ padding: 20, textAlign: "center", color: "var(--text-light)", fontSize: 13 }}>Belum ada notifikasi</div>
                      ) : notifications.map(n => (
                        <div key={n.id}
                          onClick={n.task_id ? () => openTaskById(n.task_id) : undefined}
                          style={{
                            padding: "10px 16px", borderBottom: "1px solid #f1f5f9",
                            background: n.is_read ? "var(--bg-card)" : "#f0fdf4",
                            cursor: n.task_id ? "pointer" : "default",
                          }}
                          onMouseEnter={n.task_id ? e => e.currentTarget.style.background = "#e0f2fe" : undefined}
                          onMouseLeave={n.task_id ? e => e.currentTarget.style.background = n.is_read ? "var(--bg-card)" : "#f0fdf4" : undefined}
                        >
                          <div style={{ fontSize: 13, lineHeight: 1.5 }} dangerouslySetInnerHTML={{ __html: n.message }} />
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 3 }}>
                            <span style={{ fontSize: 11, color: "var(--text-light)" }}>
                              {new Date(n.created_at).toLocaleString("id-ID", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })}
                            </span>
                            {n.task_id && <span style={{ fontSize: 10, color: "#3b82f6", fontWeight: 600 }}>Buka task →</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <ThemeToggle theme={theme} onToggle={toggleTheme} />
                <button className="btn btn-primary" onClick={() => { setEditTask(null); setShowForm(true); }}>
                  ＋ Buat Baru
                </button>
              </div>
            </div>

            {/* Content */}
            {renderContent()}
          </div>

          {/* Modals */}
          {selectedTask && (
            <TaskDetailModal
              task={selectedTask}
              onClose={() => setSelectedTask(null)}
              onEdit={() => handleEdit(selectedTask)}
              onOpenTask={(t) => { setSelectedTask(null); setTimeout(() => setSelectedTask(t), 20); }}
              onDone={() => handleDone(selectedTask.id)}
              onDelete={() => handleDelete(selectedTask.id)}
              onToggleFocus={handleToggleFocus}
              projects={projects}
              contexts={contexts}
              onRefresh={fetchAll}
              onOfflineEdit={handleOfflineEdit}
              collaborators={collaborators}
            />
          )}

          {showForm && (
            <TaskFormModal
              task={editTask}
              onSave={handleSaved}
              onOfflineSave={handleOfflineSave}
              onClose={() => { setShowForm(false); setEditTask(null); }}
              projects={projects}
              contexts={contexts}
              sharedLists={sharedLists}
              collaborators={collaborators}
            />
          )}

          {/* Done confirm dialog */}
          {doneConfirm && (
            <div className="modal-overlay" onClick={() => setDoneConfirm(null)}>
              <div className="modal-content scale-in" style={{ maxWidth: 360 }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 10 }}>⚠️ Ada subtask belum selesai</div>
                <div style={{ fontSize: 14, color: "var(--text-secondary)", marginBottom: 16 }}>
                  Ada <b>{doneConfirm.count}</b> subtask yang belum done. Tandai semua subtask sekaligus?
                </div>
                <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                  <button className="btn btn-secondary btn-sm" onClick={() => setDoneConfirm(null)}>Batal</button>
                  <button className="btn btn-secondary btn-sm" onClick={() => handleDoneParentOnly(doneConfirm.taskId)}>Parent saja</button>
                  <button className="btn btn-success btn-sm" onClick={() => handleDoneAll(doneConfirm)}>✅ Done semua</button>
                </div>
              </div>
            </div>
          )}

          {showSearch && (
            <SearchModal
              onClose={() => setShowSearch(false)}
              onTaskClick={(task) => { setShowSearch(false); openTaskById(task.id); }}
              onNoteClick={handleSearchNoteClick}
            />
          )}

          {/* Toast */}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

          {/* Join invite modal */}
          {joinModal && (
            <JoinListModal
              code={pendingJoinCode}
              onClose={() => { setJoinModal(false); setPendingJoinCode(""); }}
              onJoined={(listName) => {
                setJoinModal(false);
                setPendingJoinCode("");
                showToast(`Berhasil bergabung ke "${listName}" ✅`);
                fetchAll();
                setPage("manage_lists");
              }}
            />
          )}

          {/* FAB — mobile floating add button (hidden on chat page) */}
          {page !== "chat" && (
            <button className="fab" onClick={() => { setEditTask(null); setShowForm(true); }} title="Buat Baru">＋</button>
          )}

          {/* Mobile overlay */}
          {sidebarOpen && <div onClick={() => setSidebarOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", zIndex: 30 }} />}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
  <script>
    // Service Worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js", { scope: "/" })
          .catch(err => console.warn("SW register failed:", err));
      });
    }

    // PWA Install Prompt
    let _deferredPrompt = null;
    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      _deferredPrompt = e;
      const banner = document.getElementById("pwa-install-banner");
      if (banner) banner.style.display = "flex";
    });
    window.addEventListener("appinstalled", () => {
      _deferredPrompt = null;
      const banner = document.getElementById("pwa-install-banner");
      if (banner) banner.style.display = "none";
    });
    function pwaInstall() {
      if (!_deferredPrompt) return;
      _deferredPrompt.prompt();
      _deferredPrompt.userChoice.then(() => {
        _deferredPrompt = null;
        const banner = document.getElementById("pwa-install-banner");
        if (banner) banner.style.display = "none";
      });
    }
    function pwaDismiss() {
      const banner = document.getElementById("pwa-install-banner");
      if (banner) banner.style.display = "none";
    }
  </script>

  <!-- PWA Install Banner -->
  <div id="pwa-install-banner" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;background:#0f172a;color:white;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.35);padding:14px 18px;gap:14px;align-items:center;min-width:280px;max-width:360px;width:calc(100vw - 48px);">
    <div style="font-size:26px;line-height:1;">📲</div>
    <div style="flex:1;">
      <div style="font-weight:700;font-size:14px;margin-bottom:2px;">Install TaskFlow</div>
      <div style="font-size:12px;opacity:0.7;">Akses offline, lebih cepat dari browser</div>
    </div>
    <button onclick="pwaInstall()" style="background:#22c55e;color:white;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;">Install</button>
    <button onclick="pwaDismiss()" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;">✕</button>
  </div>
</body>
</html>
