          <div key={t.id} onClick={() => onSelect(t)}
            style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 10, marginBottom: 7, cursor: "pointer",
              background: "var(--bg-card)", border: "1px solid var(--border)", borderLeft: `3px solid ${c.dot}`, transition: "opacity 0.15s",
              opacity: t.gtd_status === "done" ? 0.65 : 1 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text-primary)",
                textDecoration: t.gtd_status === "done" ? "line-through" : "none",
                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 3 }}>{t.title}</div>
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: c.color, background: c.bg, padding: "1px 6px", borderRadius: 4 }}>{t.priority}</span>
                {t.quadrant && <span style={{ fontSize: 11, color: "var(--text-light)", background: "var(--bg-primary)", padding: "1px 6px", borderRadius: 4 }}>{t.quadrant}</span>}
                {t.gtd_status === "done" && <span style={{ fontSize: 11, color: "#15803d", background: "#dcfce7", padding: "1px 6px", borderRadius: 4, fontWeight: 700 }}>✓ Done</span>}
                {t.project && <span style={{ fontSize: 11, color: "var(--text-light)" }}>📁 {t.project}</span>}
              </div>
            </div>
            <span style={{ fontSize: 16, color: "var(--text-light)", flexShrink: 0 }}>›</span>
          </div>
        );
      });

      return (
        <div className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h1 style={{ fontSize: 24, fontWeight: 700 }}>🗓️ Kalender</h1>
            <span style={{ fontSize: 13, color: "var(--text-light)" }}>{totalWithDeadline} task deadline</span>
          </div>

          {/* Month navigation */}
          <div className="card" style={{ padding: "10px 16px", marginBottom: 12, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <button className="btn btn-secondary btn-sm" onClick={prevMonth}>‹ Prev</button>
            <span style={{ fontWeight: 700, fontSize: 16 }}>{monthName}</span>
            <button className="btn btn-secondary btn-sm" onClick={nextMonth}>Next ›</button>
          </div>

          {/* Calendar grid */}
          <div className="card" style={{ padding: isMobile ? 8 : 12 }}>
            {/* Day name headers */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: isMobile ? 2 : 4, marginBottom: 4 }}>
              {dayNames.map(d => (
                <div key={d} style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: "var(--text-light)", padding: "3px 0" }}>{d}</div>
              ))}
            </div>

            {/* Weeks */}
            {Array.from({ length: cells.length / 7 }, (_, wi) => (
              <div key={wi} style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: isMobile ? 2 : 4, marginBottom: isMobile ? 2 : 4 }}>
                {cells.slice(wi * 7, wi * 7 + 7).map((day, di) => {
                  const isToday = day === todayDay;
                  const isSelected = day === selectedDay;
                  const dayTasks = day ? (byDay[day] || []) : [];
                  const hasMore = dayTasks.length > 2;
                  const dateStr = day ? `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}` : null;
                  const holidayName = dateStr ? holidays[dateStr] : null;
                  const isWeekend = day ? [0,6].includes(new Date(year, month, day).getDay()) : false;
                  const isWorkdayHoliday = !!holidayName && !isWeekend;

                  if (isMobile) {
                    // ── Mobile: compact dot view ──
                    const dots = dayTasks.slice(0, 5);
                    return (
                      <div key={di}
                        onClick={() => day && setSelectedDay(isSelected ? null : day)}
                        style={{
                          borderRadius: 8, padding: "5px 2px 4px",
                          display: "flex", flexDirection: "column", alignItems: "center",
                          cursor: day ? "pointer" : "default",
                          background: isSelected ? "rgba(168,197,0,0.15)" : isWorkdayHoliday ? "rgba(239,68,68,0.08)" : day ? "var(--bg-primary)" : "transparent",
                          border: isSelected ? "1.5px solid var(--accent)" : isToday ? "1.5px solid var(--accent)" : isWorkdayHoliday ? "1.5px solid rgba(239,68,68,0.35)" : "1.5px solid transparent",
                          transition: "background 0.15s", position: "relative", minHeight: 44,
                        }}>
                        {day && (
                          <>
                            <span style={{ fontSize: 12, fontWeight: isToday ? 800 : 500, lineHeight: 1,
                              color: isToday || isSelected ? "var(--accent)" : isWorkdayHoliday ? "#ef4444" : "var(--text-secondary)", marginBottom: 4 }}>{day}</span>
                            {holidayName && <span style={{ fontSize: 7, lineHeight: 1, color: "#ef4444", fontWeight: 700, textAlign: "center", maxWidth: "100%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", padding: "0 2px" }}>🔴</span>}
                            {dayTasks.length > 0 && (
                              <>
                                <div style={{ display: "flex", gap: 2, flexWrap: "wrap", justifyContent: "center" }}>
                                  {dots.map((t, i) => (
                                    <span key={i} style={{ width: 5, height: 5, borderRadius: "50%", background: chipColor(t).dot, flexShrink: 0 }} />
                                  ))}
                                </div>
                                {dayTasks.length > 0 && (
                                  <span style={{ position: "absolute", top: 2, right: 3, fontSize: 9, fontWeight: 700,
                                    background: isSelected ? "var(--accent)" : "var(--accent)", color: "#111",
                                    borderRadius: 5, padding: "0 3px", lineHeight: "14px" }}>{dayTasks.length}</span>
                                )}
                              </>
                            )}
                          </>
                        )}
                      </div>
                    );
                  }

                  // ── Desktop: chip text view ──
                  return (
                    <div key={di}
                      onClick={() => day && setSelectedDay(isSelected ? null : day)}
                      style={{
                        height: 80, overflow: "hidden", borderRadius: 6, padding: "4px 6px",
                        cursor: day ? "pointer" : "default",
                        background: isSelected ? "rgba(168,197,0,0.12)" : isWorkdayHoliday ? "rgba(239,68,68,0.06)" : isToday ? "rgba(168,197,0,0.06)" : day ? "var(--surface)" : "transparent",
                        border: isSelected ? "2px solid var(--accent)" : isWorkdayHoliday ? "1.5px solid rgba(239,68,68,0.4)" : isToday ? "2px solid var(--accent)" : "1px solid var(--border)",
                        borderColor: day ? undefined : "transparent",
                        transition: "background 0.15s",
                      }}>
                      {day && (
                        <>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 3 }}>
                            <span style={{ fontSize: 12, fontWeight: isToday ? 800 : 500, color: isSelected || isToday ? "var(--accent)" : isWorkdayHoliday ? "#ef4444" : "var(--text-secondary)" }}>{day}</span>
                            <div style={{ display: "flex", gap: 3, alignItems: "center" }}>
                              {holidayName && <span style={{ fontSize: 9, color: "#ef4444" }}>🔴</span>}
                              {dayTasks.length > 0 && (
                                <span style={{ fontSize: 10, fontWeight: 700, background: "var(--accent)", color: "#111", borderRadius: 8, padding: "1px 5px", minWidth: 16, textAlign: "center" }}>
                                  {dayTasks.length}
                                </span>
                              )}
                            </div>
                          </div>
                          {dayTasks.slice(0, 2).map(t => {
                            const c = chipColor(t);
                            return (
                              <div key={t.id}
                                style={{ fontSize: 10, lineHeight: 1.3, padding: "1px 4px", borderRadius: 3, marginBottom: 2,
                                  background: c.bg, color: c.color, fontWeight: 500,
                                  whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                                  textDecoration: t.gtd_status === "done" ? "line-through" : "none" }}
                                title={t.title}>{t.title}</div>
                            );
                          })}
                          {hasMore && <div style={{ fontSize: 10, color: "var(--accent)", fontWeight: 600, marginTop: 1 }}>+{dayTasks.length - 2} lagi</div>}
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>

          {/* Legend */}
          <div style={{ display: "flex", gap: 10, marginTop: 10, flexWrap: "wrap", fontSize: 11, color: "var(--text-light)" }}>
            {[
              { dot: "#ef4444", label: "P1 / Overdue" },
              { dot: "#f97316", label: "P2" },
              { dot: "#eab308", label: "P3" },
              { dot: "#22c55e", label: "Done" },
            ].map(l => (
              <span key={l.label} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: l.dot, display: "inline-block", flexShrink: 0 }} />
                {l.label}
              </span>
            ))}
            <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#ef4444", display: "inline-block", flexShrink: 0 }} />
              Hari Libur Nasional
            </span>
          </div>

          {/* Holiday list bulan ini */}
          {(() => {
            const monthHolidays = Object.entries(holidays)
              .filter(([d]) => { const [y,m] = d.split("-").map(Number); return y === year && m === month+1; })
              .sort(([a],[b]) => a.localeCompare(b));
            if (!monthHolidays.length) return null;
            return (
              <div style={{ marginTop: 10, padding: "10px 14px", background: "var(--bg-card)", border: "1px solid rgba(239,68,68,0.25)", borderRadius: 10 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#ef4444", marginBottom: 6 }}>🔴 Hari Libur Nasional — {new Date(year, month, 1).toLocaleDateString("id-ID", { month: "long", year: "numeric" })}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {monthHolidays.map(([date, name]) => {
                    const d = new Date(date);
                    const dayLabel = d.toLocaleDateString("id-ID", { weekday: "short", day: "numeric" });
                    const isWd = ![0,6].includes(d.getDay());
                    return (
                      <div key={date} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
                        <span style={{ color: isWd ? "#ef4444" : "var(--text-light)", fontWeight: 600, minWidth: 56 }}>{dayLabel}</span>
                        <span style={{ color: "var(--text-primary)" }}>{name}</span>
                        {isWd && <span style={{ fontSize: 10, background: "rgba(239,68,68,0.1)", color: "#ef4444", borderRadius: 4, padding: "1px 5px", fontWeight: 600 }}>Hari Kerja</span>}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* Mobile: inline day panel */}
          {isMobile && selectedDay && (
            <div className="fade-in" style={{ marginTop: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "var(--text-primary)" }}>📅 {selectedDateLabel}</div>
                  {selectedHoliday && <div style={{ fontSize: 11, color: "#ef4444", fontWeight: 600, marginTop: 2 }}>🔴 {selectedHoliday}</div>}
                  <div style={{ fontSize: 11, color: "var(--text-light)", marginTop: 1 }}>{selectedTasks.length} task</div>
                </div>
                <button onClick={() => setSelectedDay(null)} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", color: "var(--text-light)", padding: 4 }}>✕</button>
              </div>
              {selectedTasks.length === 0
                ? <div style={{ textAlign: "center", padding: "20px 0", color: "var(--text-light)", fontSize: 13 }}>Tidak ada task</div>
                : <TaskListItems items={selectedTasks} onSelect={t => { setSelectedDay(null); onTaskClick(t); }} />
              }
            </div>
          )}

          {/* Desktop: modal popup */}
          {!isMobile && selectedDay && (
            <div className="modal-overlay" onClick={() => setSelectedDay(null)}>
              <div className="modal-content scale-in" style={{ maxWidth: 480, width: "90%", maxHeight: "80vh", overflowY: "hidden", display: "flex", flexDirection: "column" }}
                onClick={e => e.stopPropagation()}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 16 }}>📅 {selectedDateLabel}</div>
                    {selectedHoliday && <div style={{ fontSize: 12, color: "#ef4444", fontWeight: 600, marginTop: 3 }}>🔴 {selectedHoliday}</div>}
                    <div style={{ fontSize: 13, color: "var(--text-light)", marginTop: 2 }}>{selectedTasks.length} task</div>
                  </div>
                  <button className="btn btn-secondary btn-sm" onClick={() => setSelectedDay(null)}>✕</button>
                </div>
                <div style={{ overflowY: "auto", flex: 1 }}>
                  <TaskListItems items={selectedTasks} onSelect={t => { setSelectedDay(null); onTaskClick(t); }} />
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Dashboard ───────────────────────────────────────────────
    const SORT_PRI = (a, b) => ({ P1:0,P2:1,P3:2,P4:3 }[a.priority]??9) - ({ P1:0,P2:1,P3:2,P4:3 }[b.priority]??9);
    function Dashboard({ summary, tasks, onTaskClick, onDone, onNav, showToast }) {
      const q1Tasks = tasks.filter(t => t.quadrant === "Q1" && t.gtd_status !== "done").sort(SORT_PRI);
      const q2Tasks = tasks.filter(t => t.quadrant === "Q2" && t.gtd_status !== "done").sort(SORT_PRI);
      const q3Tasks = tasks.filter(t => t.quadrant === "Q3" && t.gtd_status !== "done").sort(SORT_PRI);
      const q4Tasks = tasks.filter(t => t.quadrant === "Q4" && t.gtd_status !== "done").sort(SORT_PRI);
      const [dashModal, setDashModal] = useState(null);
      const [scratchInput, setScratchInput] = useState("");
      const [recentNotes, setRecentNotes] = useState([]);

      useEffect(() => {
        api.get("/api/scratchpad/recent").then(setRecentNotes).catch(() => {});
        const handler = () => api.get("/api/scratchpad/recent").then(setRecentNotes).catch(() => {});
        window.addEventListener("noteSaved", handler);
        return () => window.removeEventListener("noteSaved", handler);
      }, []);

      const handleScratch = async (e) => {
        if (e.key !== "Enter" || !scratchInput.trim()) return;
        const text = scratchInput.trim();
        const body = { title: text.slice(0, 80), content: text, tags: [] };
        try {
          await api.post("/api/scratchpad", body);
          setScratchInput("");
          const data = await api.get("/api/scratchpad/recent");
          setRecentNotes(data);
          await OfflineDB.cacheSet("scratchpad_notes", data);
          window.dispatchEvent(new CustomEvent("noteSaved"));
          showToast("📝 Catatan disimpan");
        } catch (err) {
          if (isOfflineErr(err)) {
            const now = new Date().toISOString();
            const tempId = `tmp_note_${Date.now()}`;
            const newNote = { id: tempId, ...body, created_at: now, updated_at: now, _pending: true };
            const cached = await OfflineDB.cacheGet("scratchpad_notes") || [];
            const updated = [newNote, ...cached];
            await OfflineDB.cacheSet("scratchpad_notes", updated);
            await OfflineDB.queueAdd({ method: "POST", url: "/api/scratchpad", body, tempId });
            setScratchInput("");
            setRecentNotes(updated.slice(0, 5));
            showToast("📶 Tersimpan offline, akan sync saat online");
          } else { showToast(err.message || "Gagal menyimpan catatan", "error"); }
        }
      };

      const openModal = (title, cellTasks) => setDashModal({ title, tasks: cellTasks });

      const eisenTooltip = {
        Lakukan:     "Q1 – Mendesak & Penting. Kerjakan sekarang juga. Deadline ketat, krisis, atau task kritis (P1/P2, deadline ≤ 7 hari).",
        Rencanakan:  "Q2 – Penting tapi belum mendesak. Tentukan kapan akan dikerjakan. Berisi task P1/P2 dengan deadline jauh atau tanpa deadline.",
        Delegasikan: "Q3 – Mendesak tapi tidak terlalu penting. Serahkan ke orang lain jika bisa (P3/P4, deadline dekat).",
        Singkirkan:  "Q4 – Tidak mendesak, tidak penting. Hapus atau abaikan. Jangan habiskan energi di sini.",
      };

      const EisenCell = ({ tasks: cellTasks, label, emoji, cls }) => (
        <div className={`eisenhower-cell ${cls}`}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div title={eisenTooltip[label]} style={{ fontWeight: 700, fontSize: 14, cursor: "help" }}>{emoji} {label} ({cellTasks.length})</div>
            {cellTasks.length > 5 && (
              <span onClick={() => openModal(`${emoji} ${label}`, cellTasks)}
                style={{ fontSize: 11, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>Lihat semua →</span>
            )}
          </div>
          {cellTasks.length === 0 && (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "20px 0", opacity: 0.35 }}>
              <div style={{ fontSize: 22, marginBottom: 6 }}>🎉</div>
              <div style={{ fontSize: 12, color: "var(--text-light)", textAlign: "center" }}>Belum ada task</div>
            </div>
          )}
          {cellTasks.slice(0, 5).map((t, i) => (
            <div key={t.id} onClick={() => onTaskClick(t)} style={{ fontSize: 13, padding: "6px 0", cursor: "pointer", display: "flex", gap: 6, alignItems: "center", minWidth: 0, borderTop: i > 0 ? "1px solid var(--border)" : "none" }}>
              <PriBadge p={t.priority} />
              <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1, minWidth: 0 }}>{t.title}</span>
            </div>
          ))}
          {cellTasks.length > 5 && (
            <div onClick={() => openModal(`${emoji} ${label}`, cellTasks)}
              style={{ fontSize: 12, color: "var(--accent)", marginTop: 6, cursor: "pointer", fontWeight: 600 }}>
              +{cellTasks.length - 5} lagi →
            </div>
          )}
        </div>
      );

      return (
        <div className="fade-in">
          <h1 style={{ fontSize: 24, fontWeight: 700, marginBottom: 16 }}>📊 Dashboard</h1>

          {/* Scratchpad bar */}
          <div className="scratchpad-bar">
            <span style={{ fontSize: 16 }}>⚡</span>
            <input
              value={scratchInput}
              onChange={e => setScratchInput(e.target.value)}
              onKeyDown={handleScratch}
              placeholder="Tulis apa saja... (tekan Enter untuk simpan)"
            />
          </div>

          {/* Priority Hari Ini */}
          {(() => {
            const todayStr = new Date().toISOString().split("T")[0];
            const fmtDate = (d) => {
              if (!d) return null;
              const [, m, day] = d.split("-");
              const mn = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"][parseInt(m)-1];
              return `${parseInt(day)} ${mn}`;
            };
            const allToday = tasks.filter(t =>
              (t.quadrant === "Q1" || t.is_overdue || t.is_focused || t.deadline === todayStr) &&
              t.gtd_status !== "archived"
            );
            if (allToday.length === 0) return null;
            const doneToday    = allToday.filter(t => t.gtd_status === "done");
            const pendingToday = allToday.filter(t => t.gtd_status !== "done").sort((a, b) => {
              if (a.is_overdue && !b.is_overdue) return -1;
              if (!a.is_overdue && b.is_overdue) return 1;
              return SORT_PRI(a, b);
            });
            // Show done tasks on top (max 2), then pending (max 5 total visible)
            const visibleDone    = doneToday.slice(0, 2);
            const maxPending     = Math.max(0, 5 - visibleDone.length);
            const visiblePending = pendingToday.slice(0, maxPending);
            const shown          = visibleDone.length + visiblePending.length;
            const total          = allToday.length;
            const doneN          = doneToday.length;
            const pct            = total > 0 ? Math.round(doneN / total * 100) : 0;
            const allDone        = doneN === total;

            const TaskRow = ({ t, isDone }) => (
              <div style={{ display: "flex", alignItems: "center", gap: 9, padding: "7px 0", borderBottom: "1px solid var(--border)" }}>
                {/* Priority badge */}
                <PriBadge p={t.priority} />
                {/* Title */}
                <span onClick={() => onTaskClick(t)}
                  style={{ flex: 1, fontSize: 13, fontWeight: 500, cursor: "pointer",
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                    color: isDone ? "var(--text-light)" : t.is_overdue ? "#dc2626" : "var(--text-primary)",
                    textDecoration: isDone ? "line-through" : "none" }}>
                  {t.title}
                </span>
                {/* Date tag */}
                {t.deadline && !isDone && (
                  <span style={{ fontSize: 11, flexShrink: 0,
                    color: t.is_overdue ? "#dc2626" : "var(--text-light)",
                    background: t.is_overdue ? "#fef2f2" : "#f1f5f9",
                    padding: "2px 6px", borderRadius: 4, fontWeight: t.is_overdue ? 600 : 400 }}>
                    {fmtDate(t.deadline)}
                  </span>
                )}
                {/* Checkbox / done indicator */}
                {isDone ? (
                  <span style={{ width: 20, height: 20, borderRadius: "50%", background: "#22c55e", flexShrink: 0,
                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "white", fontWeight: 700 }}>✓</span>
                ) : (
                  <span
                    onClick={e => { e.stopPropagation(); onDone(t.id); }}
                    title="Tandai selesai"
                    style={{ width: 20, height: 20, borderRadius: "50%", border: "2px solid #cbd5e1", flexShrink: 0,
                      cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                      background: "var(--bg-card)", transition: "all 0.15s" }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = "#22c55e"; e.currentTarget.style.background = "#f0fdf4"; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = "#cbd5e1"; e.currentTarget.style.background = "var(--bg-card)"; }}
                  />
                )}
              </div>
            );

            return (
              <div className="card" style={{ marginBottom: 28, padding: "18px 22px" }}>
                {/* Header row */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, display: "flex", alignItems: "center", gap: 7 }}>
                      🔴 Prioritas Hari Ini
                    </div>
                    <span onClick={() => onNav("today")} style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", fontWeight: 600, flexShrink: 0 }}>Lihat semua →</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 12, color: "var(--text-secondary)" }}>
                      <b style={{ color: allDone ? "#16a34a" : "var(--text-primary)" }}>{doneN} / {total}</b> selesai
                    </span>
                    <span style={{ fontSize: 12, fontWeight: 700, color: allDone ? "#16a34a" : "var(--accent)",
                      background: allDone ? "#f0fdf4" : "#F4FAD6",
                      padding: "2px 8px", borderRadius: 20 }}>{pct}%</span>
                  </div>
                </div>

                {/* Progress bar — full width */}
                <div style={{ height: 8, borderRadius: 99, background: "var(--border)", overflow: "hidden", marginBottom: 12 }}>
                  <div style={{ height: "100%", borderRadius: 99, background: allDone ? "#22c55e" : "var(--accent)", width: `${pct}%`, transition: "width 0.5s ease" }} />
                </div>

                {/* All done state */}
                {pendingToday.length === 0 && (
                  <div style={{ textAlign: "center", padding: "12px 0", color: "#16a34a", fontSize: 14, fontWeight: 600 }}>
                    🎉 Semua task hari ini sudah selesai!
                  </div>
                )}

                {/* Task rows */}
                {visibleDone.map(t => <TaskRow key={t.id} t={t} isDone={true} />)}
                {visiblePending.map(t => <TaskRow key={t.id} t={t} isDone={false} />)}

                {total > shown && (
                  <div onClick={() => onNav("today")}
                    style={{ fontSize: 12, color: "var(--accent)", marginTop: 8, cursor: "pointer", fontWeight: 600, textAlign: "right" }}>
                    +{total - shown} task lagi →
                  </div>
                )}
              </div>
            );
          })()}

          {/* Stat cards — hitung dari tasks array agar include shared list tasks */}
          {(() => {
            const active = tasks.filter(t => t.gtd_status !== "done" && t.gtd_status !== "archived");
            const inboxCount   = active.filter(t => t.gtd_status === "inbox").length;
            const q1Count      = active.filter(t => t.quadrant === "Q1").length;
            const overdueCount = active.filter(t => t.is_overdue).length;
            const kpis = [
              { value: active.length,              label: "Active",      sub: "Task aktif saat ini",     color: "var(--accent)",  icon: "⚡", bg: null },
              { value: summary.done_last_7_days??0, label: "Done 7 hari", sub: "Selesai dalam 7 hari",    color: "#16a34a",        icon: "✅", bg: null },
              { value: q1Count,                    label: "Q1 Lakukan",  sub: "Mendesak & Penting",      color: "var(--q1)",      icon: "🔥", bg: null },
              { value: overdueCount,               label: "Overdue",     sub: overdueCount > 0 ? `${overdueCount} task terlambat` : "Tidak ada overdue", color: overdueCount > 0 ? "#dc2626" : "var(--text-light)", icon: "⚠️", bg: overdueCount > 0 ? "#fef2f2" : null },
              { value: inboxCount,                 label: "Inbox",       sub: "Task baru masuk",         color: "#2563eb",         icon: "📥", bg: null },
            ];
            return (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12, marginBottom: 32 }}>
                {kpis.map(k => (
                  <div key={k.label} className="stat-card" style={k.bg ? { background: k.bg } : {}}>
                    <div style={{ position: "absolute", right: 14, top: 12, fontSize: 28, opacity: 0.07, lineHeight: 1 }}>{k.icon}</div>
                    <div className="stat-number" style={{ color: k.color }}>{k.value}</div>
                    <div className="stat-label">{k.label}</div>
                    <div style={{ fontSize: 11, color: "var(--text-light)", marginTop: 3 }}>{k.sub}</div>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* Analytics Charts */}
          <h2 className="section-title">📊 Analytics</h2>
          <div className="charts-grid" style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 16, marginBottom: 32 }}>
            {/* A. Productivity Trend - Line Chart */}
            <div className="card card-hover" style={{ padding: 18 }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 14, display: "flex", alignItems: "baseline", gap: 8 }}>📈 Productivity Trend <span style={{ fontWeight: 400, color: "var(--text-light)", fontSize: 11 }}>4 minggu terakhir</span></div>
              <ProductivityChart tasks={tasks} />
            </div>

            {/* B. Completion Ratio - Donut */}
            <div className="card card-hover" style={{ padding: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>🎯 Completion</div>
              <CompletionDonut summary={summary} />
            </div>

            {/* C. Task by Status - Bar */}
            <div className="card card-hover" style={{ padding: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>📋 GTD Status</div>
              <StatusBarChart summary={summary} />
            </div>
          </div>

          {/* Eisenhower Matrix */}
          <h2 className="section-title" style={{ marginTop: 8 }}>🎯 Eisenhower Matrix</h2>

                {projNames.map(proj => {

                      </div>
                      {projTasks.slice(0, 5).map(t => (

                          <PriBadge p={t.priority} />
                          <StatusBadge s={t.gtd_status} />
                          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1, minWidth: 0 }}>{t.title}</span>

                      {projTasks.length > 5 && (
                        <div onClick={() => openModal(`📂 ${proj}`, projTasks)}
                          style={{ fontSize: 12, color: "var(--accent)", marginTop: 6, cursor: "pointer", fontWeight: 600 }}>

          {/* Notes Terbaru */}
          {recentNotes.length > 0 && (

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <h2 style={{ fontSize: 16, fontWeight: 700 }}>📝 Notes Terbaru</h2>
                <span onClick={() => onNav("notes")} style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>Lihat semua →</span>
              </div>
              {recentNotes.map(n => (
                <div key={n.id} className="note-card" onClick={() => onNav("notes")}>
                  <div className="note-card-title">{n.title || n.content.slice(0, 60)}</div>
                  {n.title && <div className="note-card-preview" dangerouslySetInnerHTML={{ __html: n.content.slice(0,200) }} />}
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 6 }}>
                    {(n.tags || []).map(tag => <span key={tag} className="note-tag">#{tag}</span>)}
                    <span style={{ fontSize: 11, color: "var(--text-light)", marginLeft: "auto" }}>

                  </div>

            </div>

    // ── Chat Page ────────────────────────────────────────────────
    function avatarColor(str) {
      const palette = ["#6366f1","#8b5cf6","#ec4899","#f59e0b","#10b981","#3b82f6","#f43f5e","#14b8a6","#f97316","#06b6d4"];
      let hash = 0;
      for (let i = 0; i < (str || "?").length; i++) hash = (str.charCodeAt(i) + ((hash << 5) - hash)) | 0;
      return palette[Math.abs(hash) % palette.length];
    }

    function ChatListPanel({ lists, selectedId, onSelect, collapsed, onToggle }) {
      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          {/* Header with toggle button */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: collapsed ? "12px 10px" : "10px 14px", borderBottom: "1px solid var(--border)", flexShrink: 0 }}>
            {!collapsed && (
              <span style={{ fontSize: 11, fontWeight: 700, color: "var(--text-light)", letterSpacing: "0.05em", textTransform: "uppercase" }}>Shared Lists</span>
            )}
            <button onClick={onToggle} title={collapsed ? "Perluas panel" : "Perkecil panel"}
              style={{ background: "none", border: "1px solid var(--border)", cursor: "pointer", color: "var(--text-secondary)", fontSize: 12, padding: "4px 7px", borderRadius: 7, lineHeight: 1, marginLeft: collapsed ? "auto" : 0, transition: "all 0.15s" }}>
              {collapsed ? "▶" : "◀"}
            </button>
          </div>

          {/* List items */}
          {lists.length === 0 && !collapsed && (
            <div style={{ padding: 20, color: "var(--text-light)", fontSize: 13, textAlign: "center" }}>
              <div style={{ fontSize: 28, marginBottom: 8 }}>📋</div>
              Belum ada shared list.<br />Buat atau bergabung dulu.
            </div>
          )}
          {lists.map(l => (
            <div key={l.id}
              className={`chat-list-item${selectedId === l.id ? " active" : ""}`}
              onClick={() => onSelect(l)}
              title={collapsed ? l.name : undefined}
              style={{ justifyContent: collapsed ? "center" : undefined, padding: collapsed ? "10px" : undefined }}
            >
              <div className="chat-list-avatar" style={{ background: avatarColor(l.name), flexShrink: 0 }}>
                {l.name[0].toUpperCase()}
              </div>
              {!collapsed && (
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 14, color: "var(--text-primary)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{l.name}</div>
                  <div style={{ fontSize: 11, color: "var(--text-light)" }}>{l.role === "owner" ? "Owner" : "Member"}</div>
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    function ChatPage({ user, sharedLists, onTaskClick, showToast }) {
      const [selectedList, setSelectedList] = useState(null);
      const [panelCollapsed, setPanelCollapsed] = useState(false);

      return (
        <div className={`chat-layout${selectedList ? " has-selection" : ""}`}>
          <div className={`chat-list-panel${panelCollapsed ? " collapsed" : ""}`}>
            <ChatListPanel lists={sharedLists} selectedId={selectedList?.id} onSelect={setSelectedList}
              collapsed={panelCollapsed} onToggle={() => setPanelCollapsed(p => !p)} />
          </div>
          <div className="chat-room">
            {selectedList ? (
              <ChatRoom key={selectedList.id} list={selectedList} user={user} onTaskClick={onTaskClick} showToast={showToast}
                onBack={() => setSelectedList(null)} />
            ) : (
              <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "var(--text-light)", flexDirection: "column", gap: 8 }}>
                <div style={{ fontSize: 40 }}>💬</div>
                <div>Pilih list untuk mulai berdiskusi</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function renderMessageContent(content, currentUsername) {
      if (!content) return null;
      const parts = content.split(/(@\w+)/g);
      return parts.map((part, i) => {
        if (/^@\w+$/.test(part)) {
          const isMe = part === `@${currentUsername}`;
          return (
            <span key={i} style={{
              color: "var(--accent)", fontWeight: 600,
              background: isMe ? "rgba(168,197,0,0.2)" : "transparent",
              borderRadius: 3, padding: isMe ? "0 2px" : 0,
            }}>{part}</span>
          );
        }
        return <span key={i}>{part}</span>;
      });
    }

    function TaskMiniCard({ task, onClick }) {
      if (!task?.task_title) return null;
      const isDone = task.task_status === "done";
      return (
        <div className="chat-task-card" onClick={() => onClick && onClick(task)}
          style={ isDone ? { opacity: 0.75 } : undefined }>
          <div style={{ fontSize: 11, fontWeight: 700, color: "var(--accent)", marginBottom: 3, display: "flex", alignItems: "center", gap: 6 }}>
            📌 TASK
            {isDone && <span style={{ background: "#22c55e", color: "#fff", borderRadius: 4, padding: "1px 6px", fontWeight: 700 }}>✓ DONE</span>}
          </div>
          <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text-primary)", marginBottom: 4, textDecoration: isDone ? "line-through" : "none" }}>{task.task_title}</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {task.task_priority && <span style={{ fontSize: 11, background: "var(--bg-primary)", color: "var(--text-secondary)", padding: "1px 6px", borderRadius: 4, fontWeight: 600 }}>{task.task_priority}</span>}
            {task.task_quadrant && <span style={{ fontSize: 11, color: "var(--text-light)" }}>{task.task_quadrant}</span>}
            {task.task_deadline && <span style={{ fontSize: 11, color: "var(--text-light)" }}>📅 {task.task_deadline}</span>}
          </div>
        </div>
      );
    }

    function ChatRoom({ list, user, onTaskClick, showToast, onBack }) {
      const [messages, setMessages] = useState([]);
      const [loading, setLoading] = useState(true);
      const [hasMore, setHasMore] = useState(false);
      const [loadingMore, setLoadingMore] = useState(false);
      const [replyTo, setReplyTo] = useState(null);
      // replyTo shape: { id, content, username, display_name } | null
      const messagesEndRef = useRef(null);
      const esRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      };

      // Load initial messages
      useEffect(() => {
        setLoading(true);
        setMessages([]);
        api.get(`/api/lists/${list.id}/messages?limit=50`)
          .then(msgs => {
            setMessages(msgs);
            setHasMore(msgs.length === 50);
            setLoading(false);
            setTimeout(scrollToBottom, 50);
          })
          .catch(err => { showToast(err.message, "error"); setLoading(false); });
      }, [list.id]);

      // SSE subscription
      useEffect(() => {
        const es = new EventSource(`/api/lists/${list.id}/messages/stream`);
        esRef.current = es;
        es.onmessage = (e) => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.type === "ping") return;
            setMessages(prev => prev.some(m => m.id === msg.id) ? prev : [...prev, msg]);
            setTimeout(scrollToBottom, 30);
          } catch (_) {}
        };
        es.onerror = () => {};
        return () => { es.close(); };
      }, [list.id]);

      // Load older messages
      const loadMore = async () => {
        if (!messages.length || loadingMore) return;
        setLoadingMore(true);
        try {
          const older = await api.get(`/api/lists/${list.id}/messages?limit=50&before_id=${messages[0].id}`);
          setMessages(prev => [...older, ...prev]);
          setHasMore(older.length === 50);
        } catch (err) { showToast(err.message, "error"); }
        finally { setLoadingMore(false); }
      };

      const formatTime = (iso) => {
        const d = new Date(iso);
        return d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
      };
      const formatDate = (iso) => {
        const d = new Date(iso);
        return d.toLocaleDateString("id-ID", { day: "numeric", month: "short" });
      };

      // Group messages by date
      let lastDate = null;

      return (
        <div className="chat-room" style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          {/* Header */}
          <div className="chat-room-header">
            {onBack && (
              <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-secondary)", fontSize: 22, padding: "0 4px 0 0", lineHeight: 1 }} title="Kembali">‹</button>
            )}
            <div className="chat-room-header-avatar" style={{ background: avatarColor(list.name) }}>{list.name[0].toUpperCase()}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div className="header-name">{list.name}</div>
              <div className="header-meta">{list.role === "owner" ? "Owner" : "Member"}</div>
            </div>
            <button style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-secondary)", fontSize: 20, padding: "4px 6px", borderRadius: 8, lineHeight: 1 }} title="Opsi">⋯</button>
          </div>

          {/* Messages */}
          <div className="chat-messages">
            {hasMore && (
              <div style={{ textAlign: "center", marginBottom: 8 }}>
                <button className="btn btn-secondary btn-sm" onClick={loadMore} disabled={loadingMore}>
                  {loadingMore ? "Memuat..." : "⬆ Load lebih lama"}
                </button>
              </div>
            )}
            {loading && <div style={{ textAlign: "center", color: "var(--text-light)", padding: 20 }}>Memuat pesan...</div>}
            {!loading && messages.length === 0 && (
              <div style={{ textAlign: "center", color: "var(--text-light)", padding: 40 }}>
                <div style={{ fontSize: 36, marginBottom: 8 }}>💬</div>
                Belum ada pesan. Mulai diskusi!
              </div>
            )}
            {messages.map((msg) => {
              const isSelf = msg.user_id === user.id;
              const msgDate = msg.created_at?.split("T")[0];
              const showDate = msgDate !== lastDate;
              lastDate = msgDate;
              const isMentioned = msg.content?.includes(`@${user.username}`);
              return (
                <React.Fragment key={msg.id}>
                  {showDate && (
                    <div style={{ textAlign: "center", fontSize: 11, color: "var(--text-light)", margin: "8px 0" }}>
                      {formatDate(msg.created_at)}
                    </div>
                  )}
                  <div id={`msg-${msg.id}`} className={`chat-bubble-wrap${isSelf ? " self" : ""}`}>
                    {!isSelf && (
                      <div className="chat-avatar" style={{ background: avatarColor(msg.username || "?") }}>
                        {(msg.display_name || msg.username || "?")[0].toUpperCase()}
                      </div>
                    )}
                    <div>
                      {!isSelf && <div className="chat-sender">{msg.display_name || msg.username}</div>}
                      <div className={`chat-bubble${isSelf ? " self" : ""}${isMentioned && !isSelf ? " mentioned" : ""}`} style={{ position: "relative", paddingBottom: 20 }}>
                        {msg.reply_to_id && msg.reply_to_content && (
                          <div className="chat-quote-block" onClick={() => {
                            const el = document.getElementById(`msg-${msg.reply_to_id}`);
                            if (el) {
                              el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                              el.style.transition = 'background 0.4s';
                              el.style.background = 'rgba(168,197,0,0.18)';
                              setTimeout(() => { el.style.background = ''; }, 1400);
                            } else {
                              showToast('Pesan asli tidak ada di layar — scroll ke atas untuk memuatnya', 'error');
                            }
                          }}>
                            <div className="quote-sender">{msg.reply_to_display_name || msg.reply_to_username}</div>
                            <div className="quote-text">{msg.reply_to_content}</div>
                          </div>
                        )}
                        {renderMessageContent(msg.content, user.username)}
                        {msg.task_id && (
                          <TaskMiniCard task={msg} onClick={() => onTaskClick && onTaskClick({ id: msg.task_id, title: msg.task_title, priority: msg.task_priority, deadline: msg.task_deadline, quadrant: msg.task_quadrant, gtd_status: msg.task_status })} />
                        )}
                        <button
                          className="chat-reply-btn"
                          onClick={e => { e.stopPropagation(); setReplyTo({ id: msg.id, content: msg.content, username: msg.username, display_name: msg.display_name }); }}
                          title="Reply"
                        >↩</button>
                      </div>
                      <div className="chat-time" style={{ textAlign: isSelf ? "right" : "left" }}>
                        {formatTime(msg.created_at)}
                      </div>
                    </div>
                  </div>
                </React.Fragment>
              );
            })}
            <div ref={messagesEndRef} />
          </div>

          {/* Input bar — Task 9 will replace this stub */}
          <ChatInputBar
            list={list}
            user={user}
            onSent={(msg) => { setMessages(prev => prev.some(m => m.id === msg.id) ? prev : [...prev, msg]); setTimeout(scrollToBottom, 30); }}
            showToast={showToast}
            onTaskClick={onTaskClick}
            replyTo={replyTo}
            onClearReply={() => setReplyTo(null)}
          />
        </div>
      );
    }

    function TaskAttachPopup({ list, onSelect, onCreateNew, onClose }) {
      const [listTasks, setListTasks] = useState([]);
      const [query, setQuery] = useState("");
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        api.get(`/api/lists/${list.id}/tasks`)
          .then(tasks => { setListTasks(tasks); setLoading(false); })
          .catch(() => setLoading(false));
      }, [list.id]);

      const filtered = listTasks.filter(t =>
        !query || t.title.toLowerCase().includes(query.toLowerCase())
      );

      return (

    function ChatInputBar({ list, user, onSent, showToast, onTaskClick, replyTo, onClearReply }) {
      const [text, setText] = useState("");
      const [sending, setSending] = useState(false);
      const [showAttach, setShowAttach] = useState(false);
      const [attachedTask, setAttachedTask] = useState(null);
      const [showTaskForm, setShowTaskForm] = useState(false);
      const [members, setMembers] = useState([]);
      const [mentionQuery, setMentionQuery] = useState(null); // null = off, string = query
      const textareaRef = useRef(null);

      // Load members for @mention autocomplete once
      useEffect(() => {
        api.get(`/api/lists/${list.id}/members/usernames`)
          .then(setMembers)
          .catch(() => {});
      }, [list.id]);

      const mentionSuggestions = mentionQuery !== null
        ? members.filter(m =>
            m.username !== user.username &&
            m.username.toLowerCase().startsWith(mentionQuery.toLowerCase())
          )
        : [];

      const handleTextChange = (e) => {
        const val = e.target.value;
        setText(val);
        // Detect @mention trigger
        const match = val.match(/@(\w*)$/);
        if (match) {
          setMentionQuery(match[1]);
        } else {
          setMentionQuery(null);
        }
      };

      const insertMention = (username) => {
        const newVal = text.replace(/@(\w*)$/, `@${username} `);
        setText(newVal);
        setMentionQuery(null);
        textareaRef.current?.focus();
      };

      const handleSend = async () => {
        if (!text.trim() && !attachedTask) return;
        setSending(true);
        try {
          const payload = {
            content: text.trim() || (attachedTask ? `📌 ${attachedTask.title}` : ""),
            task_id: attachedTask?.id || null,
            msg_type: attachedTask ? "task_attach" : "text",
            reply_to_id: replyTo?.id || null,
          };
          const msg = await api.post(`/api/lists/${list.id}/messages`, payload);
          setText("");
          setAttachedTask(null);
          setMentionQuery(null);
          onClearReply();
          onSent(msg);
        } catch (err) { showToast(err.message, "error"); }
        finally { setSending(false); }
      };

      const handleKeyDown = (e) => {
        if (mentionSuggestions.length > 0 && e.key === "Escape") {
          setMentionQuery(null);
          return;
        }
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      };

      return (
        <div className="chat-input-bar">
          {replyTo && (
            <div className="chat-reply-preview">
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="preview-sender">↩ {replyTo.display_name || replyTo.username}</div>
                <div className="preview-text">{replyTo.content}</div>
              </div>
              <button className="preview-close" onClick={onClearReply} title="Batal reply">✕</button>
            </div>
          )}
          {/* @mention dropdown */}
          {mentionSuggestions.length > 0 && (
            <div className="chat-mention-dropdown">
              {mentionSuggestions.map(m => (
                <div key={m.username} className="chat-mention-item" onClick={() => insertMention(m.username)}>
                  <span style={{ fontWeight: 600 }}>@{m.username}</span>
                  {m.display_name && m.display_name !== m.username && (
                    <span style={{ color: "var(--text-light)", marginLeft: 6, fontSize: 12 }}>{m.display_name}</span>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* Task attach popup */}
          {showAttach && (
            <TaskAttachPopup
              list={list}
              onSelect={(task) => { setAttachedTask(task); setShowAttach(false); }}
              onCreateNew={() => { setShowAttach(false); setShowTaskForm(true); }}
              onClose={() => setShowAttach(false)}
            />
          )}

          {/* Task form modal for creating new task */}
          {showTaskForm && (
            <TaskFormModal
              task={null}
              onSave={(newTask) => {
                if (newTask) setAttachedTask(newTask);
                setShowTaskForm(false);
              }}
              onOfflineSave={() => setShowTaskForm(false)}
              onClose={() => setShowTaskForm(false)}
              sharedLists={[list]}
              collaborators={[]}
              projects={[]}
              contexts={[]}
            />
          )}

          {/* Attached task preview */}
          {attachedTask && (
            <div style={{ position: "absolute", bottom: 64, left: 12, background: "var(--bg-card)", border: "1px solid var(--accent)", borderRadius: 8, padding: "6px 10px", display: "flex", alignItems: "center", gap: 8, fontSize: 13 }}>
              <span style={{ color: "var(--accent)" }}>📌</span>
              <span style={{ fontWeight: 600, color: "var(--text-primary)" }}>{attachedTask.title}</span>
              <button onClick={() => setAttachedTask(null)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-light)", fontSize: 14, padding: "0 2px" }}>✕</button>
            </div>
          )}

          <textarea
            ref={textareaRef}
            className="chat-input"
            rows={1}
            placeholder="Ketik pesan... (Shift+Enter untuk baris baru, @ untuk mention)"
            value={text}
            onChange={handleTextChange}
            onKeyDown={handleKeyDown}
            style={{ marginBottom: attachedTask ? 36 : 0 }}
          />
          <button
            title="Attach atau buat task"
            onClick={() => setShowAttach(v => !v)}
            style={{ background: showAttach ? "var(--accent)" : "var(--bg-primary)", color: showAttach ? "white" : "var(--text-secondary)", border: "1px solid var(--border)", borderRadius: 8, padding: "8px 10px", cursor: "pointer", fontSize: 16, flexShrink: 0 }}>
            📌
          </button>
          <button className="chat-send-btn" onClick={handleSend} disabled={sending || (!text.trim() && !attachedTask)} title="Kirim">
            {sending ? "·" : "➤"}
          </button>
        </div>
      );
    }

    function renderMarkdown(text, noteTitles = []) {
      if (!text) return "";
      const lines = text.split("\n");
      let html = "";
      let hIdx = 0;
      let inUl = false;
      const closeUl = () => { if (inUl) { html += "</ul>"; inUl = false; } };
      const escape = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const titleSet = new Set(noteTitles.map(t => t.toLowerCase()));
      const inline = (s) => escape(s)
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.+?)\*/g, "<em>$1</em>")
        .replace(/`(.+?)`/g, "<code style='background:var(--bg-primary);border-radius:3px;padding:1px 5px;font-size:0.9em'>$1</code>")
        .replace(/\[\[([^\[\]]+)\]\]/g, (_, title) => {
          const rawTitle = title.replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">");
          const exists = titleSet.has(rawTitle.toLowerCase());
          return exists
            ? `<span class="wikilink" data-wiki-title="${title}">${title}</span>`
            : `<span class="wikilink-broken" title="Note tidak ditemukan">[[${title}]]</span>`;
        });

      for (let raw of lines) {
        const line = raw;
        // Checklist
        if (/^- \[x\] /i.test(line)) {
          closeUl();
          html += `<div class="check-item done"><input type="checkbox" checked disabled/><span>${inline(line.replace(/^- \[x\] /i,""))}</span></div>`;
        } else if (/^- \[ \] /.test(line)) {
          closeUl();
          html += `<div class="check-item"><input type="checkbox" disabled/><span>${inline(line.replace(/^- \[ \] /,""))}</span></div>`;
        // Bullet
        } else if (/^- /.test(line)) {
          if (!inUl) { html += "<ul>"; inUl = true; }
          html += `<li>${inline(line.replace(/^- /,""))}</li>`;
        // H1-H6 with scroll IDs — ORDER IS LOAD-BEARING: longer patterns must precede shorter ones
        } else if (/^###### /.test(line)) {
          closeUl(); html += `<h6 id="note-h-${hIdx++}">${inline(line.replace(/^###### /,""))}</h6>`;
        } else if (/^##### /.test(line)) {
          closeUl(); html += `<h5 id="note-h-${hIdx++}">${inline(line.replace(/^##### /,""))}</h5>`;
        } else if (/^#### /.test(line)) {
          closeUl(); html += `<h4 id="note-h-${hIdx++}">${inline(line.replace(/^#### /,""))}</h4>`;
        } else if (/^### /.test(line)) {
          closeUl(); html += `<h3 id="note-h-${hIdx++}">${inline(line.replace(/^### /,""))}</h3>`;
        } else if (/^## /.test(line)) {
          closeUl(); html += `<h2 id="note-h-${hIdx++}">${inline(line.replace(/^## /,""))}</h2>`;
        } else if (/^# /.test(line)) {
          closeUl(); html += `<h1 id="note-h-${hIdx++}">${inline(line.replace(/^# /,""))}</h1>`;
        // Blockquote
        } else if (/^> /.test(line)) {
          closeUl(); html += `<blockquote>${inline(line.replace(/^> /,""))}</blockquote>`;
        // HR
        } else if (/^---+$/.test(line.trim())) {
          closeUl(); html += "<hr/>";
        // Empty line
        } else if (line.trim() === "") {
          closeUl(); html += "<br/>";
        } else {
          closeUl(); html += `<p style="margin:2px 0">${inline(line)}</p>`;
        }
      }
      closeUl();
      return html;
    }

    function NoteToolbar({ textareaRef, value, onChange }) {
      const [hOpen, setHOpen] = React.useState(false);
      const hRef = React.useRef(null);

      React.useEffect(() => {
        if (!hOpen) return;
        const close = (e) => { if (hRef.current && !hRef.current.contains(e.target)) setHOpen(false); };
        document.addEventListener("mousedown", close);
        return () => document.removeEventListener("mousedown", close);
      }, [hOpen]);

      const insert = (before, after = "", placeholder = "") => {
        const el = textareaRef.current;
        if (!el) return;
        const start = el.selectionStart, end = el.selectionEnd;
        const selected = value.slice(start, end) || placeholder;
        const newVal = value.slice(0, start) + before + selected + after + value.slice(end);
        onChange(newVal);
        setTimeout(() => {
          el.focus();
          el.setSelectionRange(start + before.length, start + before.length + selected.length);
        }, 0);
      };

      const insertLinePrefix = (prefix) => {
        const el = textareaRef.current;
        if (!el) return;
        const start = el.selectionStart;
        const lineStart = value.lastIndexOf("\n", start - 1) + 1;
        const lineEnd = value.indexOf("\n", start);
        const end = lineEnd === -1 ? value.length : lineEnd;
        const line = value.slice(lineStart, end);
        const newLine = line.startsWith(prefix) ? line.slice(prefix.length) : prefix + line;
        const newVal = value.slice(0, lineStart) + newLine + value.slice(end);
        onChange(newVal);
        setTimeout(() => { el.focus(); el.setSelectionRange(lineStart + prefix.length, lineStart + prefix.length); }, 0);
      };

      const headings = [
        { label: "H1", hint: "#",      prefix: "# " },
        { label: "H2", hint: "##",     prefix: "## " },
        { label: "H3", hint: "###",    prefix: "### " },
        { label: "H4", hint: "####",   prefix: "#### " },
        { label: "H5", hint: "#####",  prefix: "##### " },
        { label: "H6", hint: "######", prefix: "###### " },
      ];

      return (
        <div className="note-toolbar">
          {/* Heading dropdown */}
          <div ref={hRef} style={{ position: "relative" }}>
            <button onClick={() => setHOpen(o => !o)} title="Heading" style={{ letterSpacing: 0.5 }}>H ▾</button>
            {hOpen && (
              <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, zIndex: 200, background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 8, boxShadow: "0 6px 20px rgba(0,0,0,0.18)", minWidth: 110, padding: "4px 0" }}>
                {headings.map(h => (
                  <div key={h.prefix}
                    onMouseDown={e => { e.preventDefault(); insertLinePrefix(h.prefix); setHOpen(false); }}
                    style={{ padding: "6px 14px", fontSize: 12, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16 }}
                    onMouseEnter={e => e.currentTarget.style.background = "var(--bg-primary)"}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                    <span style={{ fontWeight: 700, color: "var(--text-primary)" }}>{h.label}</span>
                    <span style={{ fontFamily: "monospace", fontSize: 11, color: "var(--text-light)", opacity: 0.8 }}>{h.hint}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div className="sep"/>
          <button onClick={() => insert("**", "**", "bold")} title="Bold"><b>B</b></button>
          <button onClick={() => insert("*", "*", "italic")} title="Italic"><i>I</i></button>
          <button onClick={() => insert("`", "`", "code")} title="Inline code">{"<>"}</button>
          <div className="sep"/>
          <button onClick={() => insertLinePrefix("- ")} title="Bullet list">• List</button>
          <button onClick={() => insertLinePrefix("- [ ] ")} title="Checklist">☐</button>
          <button onClick={() => insertLinePrefix("> ")} title="Blockquote">❝</button>
          <div className="sep"/>
          <button onClick={() => { const el = textareaRef.current; if (!el) return; const s = el.selectionStart; const newVal = value.slice(0,s) + "\n---\n" + value.slice(s); onChange(newVal); setTimeout(() => { el.focus(); el.setSelectionRange(s+5,s+5); },0); }} title="Horizontal rule">─</button>
        </div>
      );
    }

    function extractHeadings(content) {
      const headings = [];
      let idx = 0;
      for (const line of content.split("\n")) {
        const m = line.match(/^(#{1,6}) (.*)/);
        if (m) {
          if (m[2].trim()) headings.push({ level: m[1].length, text: m[2].trim(), idx: idx++ });
          else idx++; // empty heading: count it to stay in sync with renderMarkdown hIdx
        }
      }
      return headings;
    }

        document.addEventListener("mousedown", close);
        return () => document.removeEventListener("mousedown", close);
      }, [shareOpen]);
      const [noteListId, setNoteListId] = useState(note?.list_id ?? null);
      const handleModalShare = async (listId) => {

      // Wikilink autocomplete

      const [noteTitles, setNoteTitles]     = useState(noteTitlesProp);
      const [backlinks, setBacklinks]       = useState([]);
