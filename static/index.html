    // ── Modal Attachments Section ──────────────────────────────
    function ModalAttachments({ taskId }) {
      const [attachments, setAttachments] = useState([]);
      const [uploading, setUploading] = useState(false);
      const fileInputRef = useRef(null);

      useEffect(() => {
        api.get(`/api/tasks/${taskId}/attachments`)
          .then(data => setAttachments(data))
          .catch(() => {});
      }, [taskId]);

      const handleUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) {
          alert("File terlalu besar. Maks 10MB.");
          return;
        }
        setUploading(true);
        try {
          const formData = new FormData();
          formData.append("file", file);
          const token = __token;
          const res = await fetch(`/api/tasks/${taskId}/attachments`, {
            method: "POST",
            headers: token ? { "Authorization": "Bearer " + token } : {},
            body: formData,
          });
          if (!res.ok) throw new Error("Upload failed");
          const result = await res.json();
          setAttachments(prev => [result, ...prev]);
        } catch (err) { alert("Upload gagal: " + err.message); }
        setUploading(false);
        if (fileInputRef.current) fileInputRef.current.value = "";
      };

      const handleDelete = async (attId) => {
        try {
          await api.del(`/api/attachments/${attId}`);
          setAttachments(prev => prev.filter(a => a.id !== attId));
        } catch (err) { console.error(err); }
      };

      const fmtSize = (b) => {
        if (b < 1024) return b + "B";
        if (b < 1024 * 1024) return Math.round(b / 1024) + "KB";
        return (b / (1024 * 1024)).toFixed(1) + "MB";
      };

      const isImage = (mime) => mime && mime.startsWith("image/");

      return (
        <div style={{ borderTop: "1px solid var(--border)", paddingTop: 14, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>
              📎 Lampiran {attachments.length > 0 && <span style={{ fontWeight: 400, color: "var(--text-light)" }}>({attachments.length})</span>}
            </div>
            <label className="btn btn-sm btn-secondary" style={{ fontSize: 12, cursor: "pointer" }}>
              {uploading ? "Uploading..." : "＋ Upload"}
              <input ref={fileInputRef} type="file" onChange={handleUpload} style={{ display: "none" }} disabled={uploading} />
            </label>
          </div>

          {attachments.map(a => (
            <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #f1f5f9" }}>
              <span style={{ fontSize: 20 }}>{isImage(a.mime_type) ? "🖼️" : "📄"}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <a href={`/api/attachments/${a.id}/download`} target="_blank" rel="noopener"
                  style={{ fontSize: 13, fontWeight: 500, color: "var(--accent)", textDecoration: "none", display: "block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {a.original_name}
                </a>
                <div style={{ fontSize: 11, color: "var(--text-light)" }}>{fmtSize(a.file_size)}</div>
              </div>
              <span onClick={() => handleDelete(a.id)} style={{ cursor: "pointer", fontSize: 14, color: "var(--text-light)" }} title="Hapus">✕</span>
            </div>
          ))}

          {attachments.length === 0 && !uploading && (
            <div style={{ fontSize: 13, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada lampiran</div>
          )}
        </div>
      );
    }

    // ── Modal Notes Section ─────────────────────────────────────
    function ModalNotes({ taskId, collaborators = [] }) {
      const [notes, setNotes] = useState([]);
      const [newNote, setNewNote] = useState("");
      const [expanded, setExpanded] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const noteClientId = useRef(genId());

      useEffect(() => {
        api.get(`/api/tasks/${taskId}/notes`)
          .then(data => setNotes(data))
          .catch(() => {});
      }, [taskId]);

      const handleAdd = async () => {
        if (!newNote.trim() || submitting) return;
        setSubmitting(true);
        try {
          const result = await api.post(`/api/tasks/${taskId}/notes`, { content: newNote.trim(), client_id: noteClientId.current });
          setNotes(prev => [result, ...prev]);
          setNewNote("");
          noteClientId.current = genId(); // reset hanya saat berhasil
        } catch (err) { console.error(err); }
        finally { setSubmitting(false); }
      };

      const handleDelete = async (noteId) => {
        try {
          await api.del(`/api/notes/${noteId}`);
          setNotes(prev => prev.filter(n => n.id !== noteId));
        } catch (err) { console.error(err); }
      };

      const formatTime = (dt) => {
        if (!dt) return "";
        const parts = dt.split("T");
        if (parts.length < 2) return "";
        const d = parts[0].split("-").reverse().join("/");
        const t = parts[1].substring(0, 5);
        return `${d} ${t}`;
      };

      const shown = expanded ? notes : notes.slice(0, 3);

      return (
        <div style={{ borderTop: "1px solid var(--border)", paddingTop: 14, marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10 }}>
            📓 Catatan {notes.length > 0 && <span style={{ fontWeight: 400, color: "var(--text-light)" }}>({notes.length})</span>}
          </div>

          <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
            <MentionInput
              collaborators={collaborators}
              className="input"
              value={newNote}
              onChange={e => setNewNote(e.target.value)}
              placeholder="Tulis catatan..."
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleAdd(); } }}
              style={{ flex: 1, padding: "8px 10px", fontSize: 13 }}
            />
            <button className="btn btn-primary btn-sm" onClick={handleAdd} disabled={!newNote.trim() || submitting}>{submitting ? "..." : "Simpan"}</button>
          </div>

          {shown.map(n => (
            <div key={n.id} style={{ padding: "8px 0", borderBottom: "1px solid #f1f5f9", display: "flex", gap: 8, alignItems: "flex-start" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: "var(--text-light)", marginBottom: 2, display: "flex", gap: 8 }}>
                  <span>{formatTime(n.created_at)}</span>
                  {n.author_name && <span style={{ fontWeight: 600, color: "var(--accent)" }}>@{n.author_name}</span>}
                </div>
                <div style={{ fontSize: 13, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{n.content}</div>
              </div>
              <span onClick={() => handleDelete(n.id)} style={{ cursor: "pointer", fontSize: 14, color: "var(--text-light)", padding: "0 4px" }} title="Hapus">✕</span>
            </div>
          ))}

          {notes.length > 3 && !expanded && (
            <div onClick={() => setExpanded(true)} style={{ fontSize: 13, color: "var(--accent)", cursor: "pointer", marginTop: 6, fontWeight: 500 }}>
              Lihat {notes.length - 3} catatan lagi...
            </div>
          )}
          {expanded && notes.length > 3 && (
            <div onClick={() => setExpanded(false)} style={{ fontSize: 13, color: "var(--accent)", cursor: "pointer", marginTop: 6, fontWeight: 500 }}>
              Sembunyikan
            </div>
          )}

          {notes.length === 0 && (
            <div style={{ fontSize: 13, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada catatan</div>
          )}
        </div>
      );
    }

    // ── Task Detail Modal ───────────────────────────────────────
    function TaskDetailModal({ task, onClose, onEdit, onDone, onDelete, onRefresh, onOfflineEdit, onToggleFocus, onOpenTask, projects = [], contexts = [], collaborators = [] }) {
      if (!task) return null;
      const [isEditing, setIsEditing] = useState(false);
      const [listMembers, setListMembers] = useState([]);
      const [form, setForm] = useState({
        title: task.title || "",
        description: task.description || "",
        priority: task.priority || "P3",
        gtd_status: task.gtd_status || "inbox",
        project: task.project || "",
        context: task.context || "",
        deadline: task.deadline || "",
        waiting_for: task.waiting_for || "",
        assigned_to: task.assigned_to || null,
        progress: task.progress || 0,
      });
      const [saving, setSaving] = useState(false);
      const setF = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const resetForm = () => setForm({ title: task.title || "", description: task.description || "", priority: task.priority || "P3", gtd_status: task.gtd_status || "inbox", project: task.project || "", context: task.context || "", deadline: task.deadline || "", waiting_for: task.waiting_for || "", assigned_to: task.assigned_to || null, progress: task.progress || 0 });
      const [subtasks, setSubtasks] = useState([]);
      const [newSub, setNewSub] = useState("");
      const [adding, setAdding] = useState(false);
      const [addingSub, setAddingSub] = useState(false);
      const [loadingSubs, setLoadingSubs] = useState(true);
      const subClientId = useRef(genId());
      // Child tasks (subtasks as full tasks)
      const [childTasks, setChildTasks] = useState([]);
      const [newChildTitle, setNewChildTitle] = useState("");
      const [newChildGtd, setNewChildGtd] = useState("inbox");
      const [addingChild, setAddingChild] = useState(false);

      // Fetch list members for assignee dropdown when entering edit mode
      useEffect(() => {
        if (isEditing && task?.list_id) {
          api.get(`/api/lists/${task.list_id}/members`)
            .then(setListMembers)
            .catch(() => setListMembers([]));
        }
      }, [isEditing, task?.list_id]);

      // Fetch subtasks (checklist)
      useEffect(() => {
        if (task?.id) {
          setLoadingSubs(true);
          api.get(`/api/tasks/${task.id}/subtasks`)
            .then(data => { setSubtasks(data); setLoadingSubs(false); })
            .catch(() => setLoadingSubs(false));
        }
      }, [task?.id]);

      // Fetch child tasks (full tasks with parent_id)
      const fetchChildTasks = () => {
        if (task?.id) {
          api.get(`/api/tasks/${task.id}/child-tasks`)
            .then(setChildTasks)
            .catch(() => setChildTasks([]));
        }
      };
      useEffect(() => { fetchChildTasks(); }, [task?.id]);

      const handleToggle = async (subId) => {
        try {
          const result = await api.post(`/api/subtasks/${subId}/toggle`);
          setSubtasks(prev => prev.map(s => s.id === subId ? result : s));
        } catch (err) { console.error(err); }
      };

      const handleAddSub = async () => {
        if (!newSub.trim() || addingSub) return;
        setAddingSub(true);
        try {
          const result = await api.post(`/api/tasks/${task.id}/subtasks`, { title: newSub.trim(), client_id: subClientId.current });
          setSubtasks(prev => [...prev, result]);
          setNewSub("");
          setAdding(false);
          subClientId.current = genId();
        } catch (err) { console.error(err); }
        finally { setAddingSub(false); }
      };

      const handleDeleteSub = async (subId) => {
        try {
          await api.del(`/api/subtasks/${subId}`);
          setSubtasks(prev => prev.filter(s => s.id !== subId));
        } catch (err) { console.error(err); }
      };

      const handleAddChildTask = async () => {
        if (!newChildTitle.trim() || addingChild) return;
        setAddingChild(true);
        try {
          await api.post("/api/tasks", { title: newChildTitle.trim(), gtd_status: newChildGtd, parent_id: task.id });
          setNewChildTitle("");
          setNewChildGtd("inbox");
          fetchChildTasks();
        } catch (err) { console.error(err); }
        finally { setAddingChild(false); }
      };

      const handleSave = async () => {
        setSaving(true);
        try {
          await api.put(`/api/tasks/${task.id}`, form);
          onRefresh?.();
          onClose();

            onClose();
          } else {
            alert(err.message);
          }
        }
        setSaving(false);

                    <label className="input-label">GTD Status</label>

                      <option value="waiting">⏳ Waiting</option>

    // ══════════════════════════════════════════════════════════════
    //  POMODORO TIMER COMPONENT
    // ══════════════════════════════════════════════════════════════
    function PomodoroTimer({ focusTask, onComplete, taskPomodoros, setTaskPomodoros }) {
      // Timer states
      const [mode, setMode] = useState("work"); // work, shortBreak, longBreak
      const [timeLeft, setTimeLeft] = useState(25 * 60); // seconds
      const [isRunning, setIsRunning] = useState(false);
      const [sessionCount, setSessionCount] = useState(0);
      const [totalFocusTime, setTotalFocusTime] = useState(0); // in seconds
      const intervalRef = useRef(null);

      // Timer durations
      const DURATIONS = {
        work: 25 * 60,
        shortBreak: 5 * 60,
        longBreak: 15 * 60,
      };

      // Request notification permission on mount
      useEffect(() => {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission();
        }
      }, []);

      // Timer logic
      useEffect(() => {
        if (isRunning && timeLeft > 0) {
          intervalRef.current = setInterval(() => {
            setTimeLeft(t => t - 1);
            if (mode === "work") {
              setTotalFocusTime(t => t + 1);
            }
          }, 1000);
        } else if (timeLeft === 0) {
          handleTimerComplete();
        }
        
        return () => clearInterval(intervalRef.current);
      }, [isRunning, timeLeft]);

      const handleTimerComplete = () => {
        setIsRunning(false);
        clearInterval(intervalRef.current);
        
        if (mode === "work") {
          // Work session completed
          const newSessionCount = sessionCount + 1;
          setSessionCount(newSessionCount);
          
          // Update pomodoro count for the focused task
          if (focusTask) {
            setTaskPomodoros(prev => ({
              ...prev,
              [focusTask.id]: (prev[focusTask.id] || 0) + 1
            }));
          }
          
          playNotificationSound("work");
          sendBrowserNotification("🍅 Pomodoro Selesai!", "Saatnya istirahat sebentar.");
          
          // Determine next break type
          if (newSessionCount % 4 === 0) {
            setMode("longBreak");
            setTimeLeft(DURATIONS.longBreak);
          } else {
            setMode("shortBreak");
            setTimeLeft(DURATIONS.shortBreak);
          }
          
          onComplete?.("work");
        } else {
          // Break completed
          playNotificationSound("break");
          sendBrowserNotification("☕ Istirahat Selesai!", "Siap untuk fokus lagi?");
          setMode("work");
          setTimeLeft(DURATIONS.work);
          onComplete?.("break");
        }
      };

      const startTimer = () => setIsRunning(true);
      const pauseTimer = () => setIsRunning(false);
      const resetTimer = () => {
        setIsRunning(false);
        setTimeLeft(DURATIONS[mode]);
      };
      const skipTimer = () => {
        setIsRunning(false);
        if (mode === "work") {
          // Skip to break
          if ((sessionCount + 1) % 4 === 0) {
            setMode("longBreak");
            setTimeLeft(DURATIONS.longBreak);
          } else {
            setMode("shortBreak");
            setTimeLeft(DURATIONS.shortBreak);
          }
        } else {
          // Skip break, go to work
          setMode("work");
          setTimeLeft(DURATIONS.work);
        }
      };

      // Format time
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      const timeDisplay = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      
      // Progress calculation
      const totalTime = DURATIONS[mode];
      const progress = ((totalTime - timeLeft) / totalTime) * 100;
      const circumference = 2 * Math.PI * 90;
      const strokeDashoffset = circumference - (progress / 100) * circumference;

      // Colors based on mode
      const isBreak = mode !== "work";
      const primaryColor = isBreak ? "#22c55e" : "#ef4444";
      const labelText = mode === "work" ? "FOKUS" : mode === "shortBreak" ? "ISTIRAHAT" : "ISTIRAHAT PANJANG";

      // Format total focus time
      const formatFocusTime = (secs) => {
        const hrs = Math.floor(secs / 3600);
        const mins = Math.floor((secs % 3600) / 60);
        if (hrs > 0) return `${hrs}j ${mins}m`;
        return `${mins}m`;
      };

      return (
        <div className="pomodoro-container scale-in">
          <div className="pomodoro-header" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, position: "relative", zIndex: 1 }}>
            <div>
              <h2 className="pomodoro-header-title" style={{ fontSize: 22, fontWeight: 700 }}>🍅 Pomodoro Timer</h2>
              <p className="pomodoro-header-subtitle" style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", marginTop: 4 }}>
                {isBreak ? "Istirahat sebentar..." : "Fokus pada satu task"}
              </p>
            </div>
            <div className="pomodoro-mode-btns" style={{ display: "flex", gap: 8 }}>
              <span 
                className="pomodoro-mode-btn"
                onClick={() => { setMode("work"); setTimeLeft(DURATIONS.work); setIsRunning(false); }}
                style={{ 
                  padding: "6px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  background: mode === "work" ? "rgba(239,68,68,0.2)" : "rgba(255,255,255,0.1)",
                  color: mode === "work" ? "#fca5a5" : "rgba(255,255,255,0.6)"
                }}
              >Work</span>
              <span 
                className="pomodoro-mode-btn"
                onClick={() => { setMode("shortBreak"); setTimeLeft(DURATIONS.shortBreak); setIsRunning(false); }}
                style={{ 
                  padding: "6px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  background: mode === "shortBreak" ? "rgba(34,197,94,0.2)" : "rgba(255,255,255,0.1)",
                  color: mode === "shortBreak" ? "#86efac" : "rgba(255,255,255,0.6)"
                }}
              >Short</span>
              <span 
                className="pomodoro-mode-btn"
                onClick={() => { setMode("longBreak"); setTimeLeft(DURATIONS.longBreak); setIsRunning(false); }}
                style={{ 
                  padding: "6px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  background: mode === "longBreak" ? "rgba(34,197,94,0.2)" : "rgba(255,255,255,0.1)",
                  color: mode === "longBreak" ? "#86efac" : "rgba(255,255,255,0.6)"
                }}
              >Long</span>
            </div>
          </div>

          <div className="pomodoro-timer" style={isRunning ? { filter: `drop-shadow(0 0 16px ${primaryColor}90)`, transition: "filter 0.5s ease" } : { transition: "filter 0.5s ease" }}>
            <div className="pomodoro-circle">
              <svg viewBox="0 0 200 200" style={{ width: "100%", height: "100%" }}>
                {/* Background circle */}
                <circle
                  cx="100" cy="100" r="90"
                  fill="none"
                  stroke="rgba(255,255,255,0.1)"
                  strokeWidth="8"
                />
                {/* Progress circle */}
                <circle
                  cx="100" cy="100" r="90"
                  fill="none"
                  stroke={primaryColor}
                  strokeWidth="8"
                  strokeLinecap="round"
                  strokeDasharray={circumference}
                  strokeDashoffset={strokeDashoffset}
                  style={{ transition: "stroke-dashoffset 0.5s ease" }}
                />
              </svg>
              <div className="pomodoro-time" style={{ color: primaryColor }}>{timeDisplay}</div>
              <div className="pomodoro-label">{labelText}</div>
            </div>
          </div>

          <div className="pomodoro-controls">
            {!isRunning ? (
              <button className={`pomodoro-btn pomodoro-btn-play ${isBreak ? 'break' : ''}`} onClick={startTimer} title="Start">
                ▶
              </button>
            ) : (
              <button className="pomodoro-btn pomodoro-btn-pause" onClick={pauseTimer} title="Pause">
                ⏸
              </button>
            )}
            <button className="pomodoro-btn pomodoro-btn-reset" onClick={resetTimer} title="Reset">
              ↺
            </button>
            <button className="pomodoro-btn pomodoro-btn-skip" onClick={skipTimer} title="Skip">
              ⏭
            </button>
          </div>

          {/* Focus Task Card */}
          {focusTask && (
            <div className="focus-task-card">
              <span style={{ fontSize: 20 }}>🎯</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.5)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 3 }}>Task Aktif</div>
                <div className="focus-task-title">{focusTask.title}</div>
              </div>
              <div className="focus-task-pomodoros">
                🍅 {taskPomodoros[focusTask.id] || 0}
              </div>
            </div>
          )}

          {/* Daily Stats */}
          <div className="pomodoro-stats">
            <div className="pomodoro-stat">
              <div className="pomodoro-stat-value" style={{ color: "#ef4444" }}>{sessionCount}</div>
              <div className="pomodoro-stat-label">Pomodoro</div>
            </div>
            <div className="pomodoro-stat">
              <div className="pomodoro-stat-value" style={{ color: "#22c55e" }}>{formatFocusTime(totalFocusTime)}</div>
              <div className="pomodoro-stat-label">Waktu Fokus</div>
            </div>
            <div className="pomodoro-stat">
              <div className="pomodoro-stat-value" style={{ color: "#A8C500" }}>{Math.floor(sessionCount / 4)}</div>
              <div className="pomodoro-stat-label">Set Lengkap</div>
            </div>
          </div>
        </div>
      );
    }

    // ── Inline Subtask Checklist (for Focus page) ──────────────
    function FocusSubtasks({ taskId }) {
      const [subtasks, setSubtasks] = useState([]);
      const [newSub, setNewSub] = useState("");
      const [adding, setAdding] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const clientId = useRef(genId());

      const fetchSubs = useCallback(() => {
        api.get(`/api/tasks/${taskId}/subtasks`)
          .then(data => setSubtasks(data))
          .catch(() => {});
      }, [taskId]);

      useEffect(() => { fetchSubs(); }, [fetchSubs]);

      // Auto-refresh every 15 seconds
      useEffect(() => {
        const interval = setInterval(fetchSubs, 15000);
        return () => clearInterval(interval);
      }, [fetchSubs]);

      const handleToggle = async (subId) => {
        try {
          const result = await api.post(`/api/subtasks/${subId}/toggle`);
          setSubtasks(prev => prev.map(s => s.id === subId ? result : s));
        } catch (err) { console.error(err); }
      };

      const handleAdd = async () => {
        if (!newSub.trim() || submitting) return;
        setSubmitting(true);
        try {
          const result = await api.post(`/api/tasks/${taskId}/subtasks`, { title: newSub.trim(), client_id: clientId.current });
          setSubtasks(prev => [...prev, result]);
          setNewSub("");
          clientId.current = genId();
        } catch (err) { console.error(err); }
        finally { setSubmitting(false); }
      };

      const doneCount = subtasks.filter(s => s.is_done).length;
      const total = subtasks.length;

      return (
        <div style={{ padding: "8px 16px 12px 52px", background: "rgba(239,68,68,0.03)", borderBottom: "1px solid var(--border)" }} className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "var(--text-secondary)" }}>
              📝 Subtasks {total > 0 && `${doneCount}/${total}`}
            </span>
            {!adding && (
              <span onClick={() => setAdding(true)} style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>＋ Tambah</span>
            )}
          </div>

          {total > 0 && (
            <div style={{ height: 4, background: "#e2e8f0", borderRadius: 2, marginBottom: 6, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${total > 0 ? doneCount/total*100 : 0}%`, background: doneCount === total ? "var(--success)" : "var(--accent)", borderRadius: 2, transition: "width 0.3s" }} />
            </div>
          )}

          {subtasks.map(s => (
            <div key={s.id} onClick={() => handleToggle(s.id)} style={{
              display: "flex", alignItems: "center", gap: 8, padding: "4px 0", cursor: "pointer",
            }}>
              <div style={{
                width: 16, height: 16, borderRadius: 3, flexShrink: 0,
                border: s.is_done ? "2px solid var(--success)" : "2px solid #d1d5db",
                background: s.is_done ? "var(--success)" : "transparent",
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                {s.is_done && <span style={{ color: "white", fontSize: 10 }}>✓</span>}
              </div>
              <span style={{
                fontSize: 13,
                textDecoration: s.is_done ? "line-through" : "none",
                color: s.is_done ? "var(--text-light)" : "var(--text-primary)",
              }}>{s.title}</span>
            </div>
          ))}

          {adding && (
            <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
              <input
                className="input"
                value={newSub}
                onChange={e => setNewSub(e.target.value)}
                placeholder="Subtask baru..."
                autoFocus
                onKeyDown={e => { if (e.key === "Enter") handleAdd(); if (e.key === "Escape") { setAdding(false); setNewSub(""); } }}
                style={{ flex: 1, padding: "4px 8px", fontSize: 12 }}
              />
              <button className="btn btn-primary btn-sm" onClick={handleAdd} disabled={submitting || !newSub.trim()} style={{ fontSize: 11, padding: "4px 10px" }}>{submitting ? "..." : "OK"}</button>
            </div>
          )}

          {total === 0 && !adding && (
            <div style={{ fontSize: 12, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada subtask — klik + untuk menambah</div>
          )}
        </div>
      );
    }

    // ── Inline Notes (for Focus page and Task Detail) ──────────
    function FocusNotes({ taskId }) {
      const [notes, setNotes] = useState([]);
      const [newNote, setNewNote] = useState("");
      const [expanded, setExpanded] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const clientId = useRef(genId());

      const fetchNotes = useCallback(() => {
        api.get(`/api/tasks/${taskId}/notes`)
          .then(data => setNotes(data))
          .catch(() => {});
      }, [taskId]);

      useEffect(() => { fetchNotes(); }, [fetchNotes]);

      // Auto-refresh every 15 seconds
      useEffect(() => {
        const interval = setInterval(fetchNotes, 15000);
        return () => clearInterval(interval);
      }, [fetchNotes]);

      const handleAdd = async () => {
        if (!newNote.trim() || submitting) return;
        setSubmitting(true);
        try {
          const result = await api.post(`/api/tasks/${taskId}/notes`, { content: newNote.trim(), client_id: clientId.current });
          setNotes(prev => [result, ...prev]);
          setNewNote("");
          clientId.current = genId();
        } catch (err) { console.error(err); }
        finally { setSubmitting(false); }
      };

      const handleDelete = async (noteId) => {
        try {
          await api.del(`/api/notes/${noteId}`);
          setNotes(prev => prev.filter(n => n.id !== noteId));
        } catch (err) { console.error(err); }
      };

      const formatTime = (dt) => {
        if (!dt) return "";
        const parts = dt.split("T");
        if (parts.length < 2) return "";
        const date = parts[0].split("-").reverse().join("-");
        const time = parts[1].substring(0, 5);
        return `${date} ${time}`;
      };

      const shown = expanded ? notes : notes.slice(0, 3);

      return (
        <div style={{ padding: "8px 16px 12px 52px", background: "rgba(59,130,246,0.03)", borderBottom: "1px solid var(--border)" }} className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "var(--text-secondary)" }}>
              📓 Catatan {notes.length > 0 && `(${notes.length})`}
            </span>
          </div>

          {/* Add note input */}
          <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
            <input
              className="input"
              value={newNote}
              onChange={e => setNewNote(e.target.value)}
              placeholder="Tulis catatan..."
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleAdd(); } }}
              style={{ flex: 1, padding: "6px 10px", fontSize: 12 }}
            />
            <button className="btn btn-primary btn-sm" onClick={handleAdd} disabled={!newNote.trim() || submitting} style={{ fontSize: 11, padding: "4px 10px" }}>{submitting ? "..." : "Simpan"}</button>
          </div>

          {/* Notes list */}
          {shown.map(n => (
            <div key={n.id} style={{ padding: "6px 0", borderBottom: "1px solid #f1f5f9", display: "flex", gap: 8, alignItems: "flex-start" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: "var(--text-light)" }}>{formatTime(n.created_at)}</div>
                <div style={{ fontSize: 13, lineHeight: 1.5, color: "var(--text-primary)", whiteSpace: "pre-wrap" }}>{n.content}</div>
              </div>
              <span onClick={() => handleDelete(n.id)} style={{ cursor: "pointer", fontSize: 12, color: "var(--text-light)", padding: "0 2px", flexShrink: 0 }} title="Hapus">✕</span>
            </div>
          ))}

          {notes.length > 3 && !expanded && (
            <div onClick={() => setExpanded(true)} style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", marginTop: 4 }}>
              Lihat {notes.length - 3} catatan lagi...
            </div>
          )}
          {expanded && notes.length > 3 && (
            <div onClick={() => setExpanded(false)} style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", marginTop: 4 }}>
              Sembunyikan
            </div>
          )}

          {notes.length === 0 && (
            <div style={{ fontSize: 12, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada catatan</div>
          )}
        </div>
      );
    }

    // ── Inline Attachments (for Focus page) ────────────────────
    function FocusAttachments({ taskId }) {
      const [attachments, setAttachments] = useState([]);
      const [uploading, setUploading] = useState(false);
      const fileRef = useRef(null);

      const fetchAtts = useCallback(() => {
        api.get(`/api/tasks/${taskId}/attachments`)
          .then(data => setAttachments(data))
          .catch(() => {});
      }, [taskId]);

      useEffect(() => { fetchAtts(); }, [fetchAtts]);
      useEffect(() => {
        const interval = setInterval(fetchAtts, 15000);
        return () => clearInterval(interval);
      }, [fetchAtts]);

      const handleUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) { alert("Maks 10MB"); return; }
        setUploading(true);
        try {
          const formData = new FormData();
          formData.append("file", file);
          const res = await fetch(`/api/tasks/${taskId}/attachments`, {
            method: "POST",
            headers: __token ? { "Authorization": "Bearer " + __token } : {},
            body: formData,
          });
          if (res.ok) {
            const result = await res.json();
            setAttachments(prev => [result, ...prev]);
          }
        } catch (err) { console.error(err); }
        setUploading(false);
        if (fileRef.current) fileRef.current.value = "";
      };

      const fmtSize = (b) => b < 1024 ? b+"B" : b < 1024*1024 ? Math.round(b/1024)+"KB" : (b/(1024*1024)).toFixed(1)+"MB";

      return (
        <div style={{ padding: "6px 16px 10px 52px", background: "rgba(139,92,246,0.03)", borderBottom: "1px solid var(--border)" }} className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "var(--text-secondary)" }}>
              📎 Lampiran {attachments.length > 0 && `(${attachments.length})`}
            </span>
            <label style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>
              {uploading ? "Uploading..." : "＋ Upload"}
              <input ref={fileRef} type="file" onChange={handleUpload} style={{ display: "none" }} disabled={uploading} />
            </label>
          </div>
          {attachments.map(a => (
            <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 6, padding: "3px 0" }}>
              <span style={{ fontSize: 14 }}>{a.mime_type?.startsWith("image/") ? "🖼️" : "📄"}</span>
              <a href={`/api/attachments/${a.id}/download`} target="_blank" rel="noopener"
                style={{ fontSize: 12, color: "var(--accent)", textDecoration: "none", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {a.original_name}
              </a>
              <span style={{ fontSize: 11, color: "var(--text-light)" }}>{fmtSize(a.file_size)}</span>
            </div>
          ))}
          {attachments.length === 0 && !uploading && (
            <div style={{ fontSize: 12, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada lampiran</div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════
    //  TODAY FOCUS VIEW (Overhauled with Pomodoro)
    // ══════════════════════════════════════════════════════════════
    function TodayFocusView({ tasks, onTaskClick, onDone, loading }) {
      const [focusTask, setFocusTask] = useState(null);
      const [taskPomodoros, setTaskPomodoros] = useState({});

      // Filter today's tasks (Q1 or overdue, not done)
      const todayTasks = tasks.filter(t => 
        (t.quadrant === "Q1" || t.is_overdue || t.is_focused) && 
        t.gtd_status !== "done" && 
        t.gtd_status !== "archived"
      );

      // Sort by priority then deadline
      const sortedTasks = [...todayTasks].sort((a, b) => {
        // Overdue first
        if (a.is_overdue && !b.is_overdue) return -1;
        if (!a.is_overdue && b.is_overdue) return 1;
        // Then by priority
        const priOrder = { P1: 1, P2: 2, P3: 3, P4: 4 };
        return priOrder[a.priority] - priOrder[b.priority];
      });

      const handleStartFocus = (task) => {
        setFocusTask(focusTask?.id === task.id ? null : task);
      };

      const handlePomodoroComplete = (type) => {
        // Optional: additional logic when pomodoro completes
      };

      const totalPomodoros = Object.values(taskPomodoros).reduce((a, b) => a + b, 0);

      return (
        <div className="fade-in">
          {/* Header */}
          <div className="focus-page-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div>
              <h1 className="focus-page-title" style={{ fontSize: 24, fontWeight: 700 }}>🍅 Fokus Hari Ini</h1>
              <p className="focus-page-subtitle" style={{ fontSize: 14, color: "var(--text-secondary)", marginTop: 4 }}>
                {sortedTasks.length} task urgent • {totalPomodoros} pomodoro hari ini
              </p>
            </div>
          </div>

          {/* Pomodoro Timer */}
          <PomodoroTimer 
            focusTask={focusTask}
            onComplete={handlePomodoroComplete}
            taskPomodoros={taskPomodoros}
            setTaskPomodoros={setTaskPomodoros}
          />

          {/* Task List */}
          <div style={{ marginBottom: 0 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700 }}>📋 Task List</h3>
              <span style={{ fontSize: 13, color: "var(--text-light)" }}>{sortedTasks.length} task</span>
            </div>

            {loading ? (
              <div className="card" style={{ textAlign: "center", padding: 40, color: "var(--text-light)" }}>Loading...</div>
            ) : sortedTasks.length === 0 ? (
              <div className="card" style={{ textAlign: "center", padding: 48, color: "var(--text-light)" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
                <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 4 }}>Tidak ada task urgent!</div>
                <div style={{ fontSize: 14 }}>Semua Q1 dan overdue task sudah selesai.</div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {sortedTasks.map((task) => {
                  const cardClass = task.is_overdue ? "focus-card-overdue" : task.is_focused ? "focus-card-focused" : "focus-card-normal";
                  const cardStyle = task.is_overdue
                    ? { background: "#FFF5F5", border: "1px solid #FECACA" }
                    : task.is_focused
                    ? { background: "#FFFBEB", border: "1px solid #FDE68A" }
                    : { background: "#FFFFFF", border: "1px solid #CEDE8A" };
                  return (
                  <div key={task.id} className={cardClass} style={{ ...cardStyle, borderRadius: 12, padding: "4px 4px 8px 4px" }}>
                    <FocusTaskRow
                      task={task}
                      onClick={onTaskClick}
                      onDone={onDone}
                      onStartFocus={handleStartFocus}
                      isFocusing={focusTask?.id === task.id}
                      hasFocusTask={!!focusTask}
                      pomodoroCount={taskPomodoros[task.id] || 0}
                    />
                    <FocusSubtasks taskId={task.id} />
                    <FocusNotes taskId={task.id} />
                    <FocusAttachments taskId={task.id} />
                  </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Tips - Hidden on very small screens */}
          <div className="card focus-tips-card" style={{ marginTop: 16, padding: 16, background: "linear-gradient(135deg, #fef3c7 0%, #fef9c3 100%)", border: "1px solid #fde68a" }}>
            <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
              <span style={{ fontSize: 24 }}>💡</span>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 4 }}>Tips Pomodoro</div>
                <ul style={{ fontSize: 13, color: "var(--text-secondary)", margin: 0, paddingLeft: 16 }}>
                  <li>Fokus pada satu task selama 25 menit tanpa gangguan</li>
                  <li>Setelah 4 pomodoro, ambil istirahat panjang 15 menit</li>
                  <li>Klik "▶ Focus" pada task untuk memulai tracking</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Task List view with filters ─────────────────────────────
    function TaskListView({ tasks, allTasks, title, icon, onTaskClick, onDone, onToggleFocus, loading, projects, contexts, showFilters, showQuadrant = true, collaborators = [] }) {
      const [fPriority, setFPriority] = useState("");
      const [fQuadrant, setFQuadrant] = useState("");
      const [fProject, setFProject] = useState("");
      const [fContext, setFContext] = useState("");
      const [fAssignee, setFAssignee] = useState("");
      const [fSearch, setFSearch] = useState("");

      const toggle = (setter, current, val) => setter(current === val ? "" : val);

      const PRI_ORDER = { P1: 0, P2: 1, P3: 2, P4: 3 };
      let filtered = [...tasks].sort((a, b) => (PRI_ORDER[a.priority] ?? 9) - (PRI_ORDER[b.priority] ?? 9));
      if (fPriority) filtered = filtered.filter(t => t.priority === fPriority);
      if (fQuadrant) filtered = filtered.filter(t => t.quadrant === fQuadrant);
      if (fProject) filtered = filtered.filter(t => t.project === fProject);
      if (fContext) filtered = filtered.filter(t => t.context === fContext);
      if (fAssignee) filtered = filtered.filter(t => t.assigned_to === parseInt(fAssignee));
      if (fSearch) {
        const q = fSearch.toLowerCase();
        filtered = filtered.filter(t => t.title.toLowerCase().includes(q) || (t.description || "").toLowerCase().includes(q));
      }

      const hasFilters = fPriority || fQuadrant || fProject || fContext || fAssignee || fSearch;
      const clearAll = () => { setFPriority(""); setFQuadrant(""); setFProject(""); setFContext(""); setFAssignee(""); setFSearch(""); };

      // Derive projects/contexts from allTasks if not provided
      const projList = projects && projects.length > 0 ? projects : [...new Set(allTasks?.filter(t => t.project).map(t => t.project) || [])];
      const ctxList = contexts && contexts.length > 0 ? contexts : [...new Set(allTasks?.filter(t => t.context).map(t => t.context) || [])];

      return (
        <div className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h1 style={{ fontSize: 24, fontWeight: 700 }}>{icon} {title}</h1>
            <span style={{ color: "var(--text-light)", fontSize: 14 }}>{filtered.length}{hasFilters ? `/${tasks.length}` : ""} task(s)</span>
          </div>

          {showFilters !== false && (
            <div className="card" style={{ padding: "14px 16px", marginBottom: 16 }}>
              {/* Search */}
              <input className="input" placeholder="🔍 Cari task..." value={fSearch} onChange={e => setFSearch(e.target.value)}
                style={{ marginBottom: 12, padding: "8px 12px", fontSize: 13 }} />

              {/* Dropdowns */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                <div>
                  <div className="input-label">Priority</div>
                  <select className="input" value={fPriority} onChange={e => setFPriority(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                    <option value="">Semua Priority</option>
                    <option value="P1">🔴 P1 Critical</option>
                    <option value="P2">🟠 P2 High</option>
                    <option value="P3">🟡 P3 Medium</option>
                    <option value="P4">🟢 P4 Low</option>
                  </select>
                </div>
                {showQuadrant && (
                  <div>
                    <div className="input-label">Quadrant</div>
                    <select className="input" value={fQuadrant} onChange={e => setFQuadrant(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                      <option value="">Semua Quadrant</option>
                      <option value="Q1">🔥 Q1 Do</option>
                      <option value="Q2">📅 Q2 Schedule</option>
                      <option value="Q3">👋 Q3 Delegate</option>
                      <option value="Q4">🗑️ Q4 Eliminate</option>
                    </select>
                  </div>
                )}
                {projList.length > 0 && (
                  <div>
                    <div className="input-label">Project</div>
                    <select className="input" value={fProject} onChange={e => setFProject(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                      <option value="">Semua Project</option>
                      {projList.map(p => <option key={p} value={p}>📁 {p}</option>)}
                    </select>
                  </div>
                )}
                {ctxList.length > 0 && (
                  <div>
                    <div className="input-label">Context</div>
                    <select className="input" value={fContext} onChange={e => setFContext(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                      <option value="">Semua Context</option>
                      {ctxList.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                )}
                {collaborators.length > 0 && (
                  <div>
                    <div className="input-label">Assignee</div>
                    <select className="input" value={fAssignee} onChange={e => setFAssignee(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                      <option value="">Semua Member</option>
                      {collaborators.map(u => <option key={u.id} value={u.id}>👤 {u.display_name || u.username}</option>)}
                    </select>
                  </div>
                )}
              </div>

              {hasFilters && (
                <div style={{ marginTop: 8 }}>
                  <span onClick={clearAll} style={{ fontSize: 13, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>✕ Hapus semua filter</span>
                </div>
              )}
            </div>
          )}

          {loading ? (
            <div style={{ textAlign: "center", padding: 40, color: "var(--text-light)" }}>Loading...</div>
          ) : filtered.length === 0 ? (
            <div className="card" style={{ textAlign: "center", padding: 48, color: "var(--text-light)" }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>{hasFilters ? "🔍" : "🎉"}</div>
              <div>{hasFilters ? "Tidak ada task yang cocok dengan filter" : "Tidak ada task"}</div>
            </div>
          ) : (
            <div className="card" style={{ padding: 8 }}>
              {filtered.map(t => <TaskRow key={t.id} task={t} onClick={onTaskClick} onDone={onDone} onToggleFocus={onToggleFocus} />)}
            </div>
          )}
        </div>
      );
    }

    // ── Chart: Productivity Trend (Line) ────────────────────────
    function ProductivityChart({ tasks }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      const weekData = useMemo(() => {
        const result = [];
        for (let w = 3; w >= 0; w--) {
          const end = new Date(); end.setDate(end.getDate() - w * 7);
          const start = new Date(end); start.setDate(start.getDate() - 6);
          const startStr = start.toISOString().split("T")[0];
          const endStr   = end.toISOString().split("T")[0];
          result.push({
            label:   w === 0 ? "Minggu ini" : `${w} mgg lalu`,
            done:    tasks.filter(t => t.completed_at && t.completed_at.slice(0,10) >= startStr && t.completed_at.slice(0,10) <= endStr).length,
            created: tasks.filter(t => t.created_at   && t.created_at.slice(0,10)   >= startStr && t.created_at.slice(0,10)   <= endStr).length,
          });
        }
        return result;
      }, [tasks]);

      const thisWeek = weekData[3]?.done || 0;
      const lastWeek = weekData[2]?.done || 0;
      const growth   = lastWeek > 0 ? Math.round((thisWeek - lastWeek) / lastWeek * 100) : thisWeek > 0 ? 100 : 0;
      const growthPositive = growth >= 0;

      useEffect(() => {
        if (!canvasRef.current) return;

        const days    = weekData.map(w => w.label);
        const counts  = weekData.map(w => w.done);
        const created = weekData.map(w => w.created);

        if (chartRef.current) chartRef.current.destroy();

        const ctx = canvasRef.current.getContext("2d");
        const gradGreen = ctx.createLinearGradient(0, 0, 0, 180);
        gradGreen.addColorStop(0, "rgba(34,197,94,0.28)");
        gradGreen.addColorStop(1, "rgba(34,197,94,0)");
        const gradYellow = ctx.createLinearGradient(0, 0, 0, 180);
        gradYellow.addColorStop(0, "rgba(168,197,0,0.12)");
        gradYellow.addColorStop(1, "rgba(168,197,0,0)");

        chartRef.current = new Chart(canvasRef.current, {
          type: "line",
          data: {
            labels: days,
            datasets: [
              {
                label: "Selesai",
                data: counts,
                borderColor: "#22c55e",
                borderWidth: 2.5,
                backgroundColor: gradGreen,
                fill: true,
                tension: 0.5,
                pointRadius: 4,
                pointBackgroundColor: "#22c55e",
                pointBorderColor: "#fff",
                pointBorderWidth: 1.5,
              },
              {
                label: "Dibuat",
                data: created,
                borderColor: "#A8C500",
                borderWidth: 1.5,
                backgroundColor: gradYellow,
                fill: true,
                tension: 0.5,
                pointRadius: 3,
                pointBackgroundColor: "#A8C500",
                borderDash: [5, 4],
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: "bottom", labels: { boxWidth: 12, padding: 16, font: { size: 11, family: "DM Sans" } } },
            },
            scales: {
              y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } }, grid: { color: "rgba(0,0,0,0.04)" } },
              x: { ticks: { font: { size: 11 } }, grid: { display: false } },
            },
          },
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [weekData]);

      return (
        <div>
          {(lastWeek > 0 || thisWeek > 0) && (
            <div style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: growthPositive ? "#16a34a" : "#dc2626",
                background: growthPositive ? "#f0fdf4" : "#fef2f2",
                padding: "2px 9px", borderRadius: 20 }}>
                {growth > 0 ? "+" : ""}{growth}%
              </span>
              <span style={{ fontSize: 11, color: "var(--text-light)" }}>
                {growthPositive ? "naik" : "turun"} dari minggu lalu
              </span>
            </div>
          )}
          <div style={{ height: 186 }}><canvas ref={canvasRef} /></div>
        </div>
      );
    }

    // ── Chart: Completion Donut ───────────────────────────────────
    function CompletionDonut({ summary }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;

        const done = summary.total_done || 0;
        const active = (summary.total_active || 0) - (summary.overdue || 0);
        const overdue = summary.overdue || 0;

        if (chartRef.current) chartRef.current.destroy();

        chartRef.current = new Chart(canvasRef.current, {
          type: "doughnut",
          data: {
            labels: ["Done", "Active", "Overdue"],
            datasets: [{
              data: [done, Math.max(active, 0), overdue],
              backgroundColor: ["#22c55e", "#A8C500", "#ef4444"],
              borderWidth: 0,
              hoverOffset: 6,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: "65%",
            plugins: {
              legend: {
                position: "bottom",
                labels: {
                  boxWidth: 10, padding: 12, font: { size: 11, family: "DM Sans" },
                  generateLabels: (chart) => {
                    const ds = chart.data.datasets[0];
                    const total = ds.data.reduce((a, b) => a + b, 0);
                    return chart.data.labels.map((label, i) => ({
                      text: `${label} (${total > 0 ? Math.round(ds.data[i] / total * 100) : 0}%)`,
                      fillStyle: ds.backgroundColor[i],
                      strokeStyle: ds.backgroundColor[i],
                      lineWidth: 0, index: i,
                      hidden: !chart.getDataVisibility(i),
                    }));
                  },
                },
              },
            },
          },
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [summary]);

      const total = (summary.total_active || 0) + (summary.total_done || 0);
      const pct = total > 0 ? Math.round((summary.total_done || 0) / total * 100) : 0;

      return (
        <div style={{ position: "relative", height: 200 }}>
          <canvas ref={canvasRef} />
          <div style={{ position: "absolute", top: "42%", left: "50%", transform: "translate(-50%, -50%)", textAlign: "center" }}>
            <div style={{ fontSize: 24, fontWeight: 700, color: "var(--text-primary)" }}>{pct}%</div>
            <div style={{ fontSize: 11, color: "var(--text-light)" }}>selesai</div>
          </div>
        </div>
      );
    }

    // ── Chart: GTD Status Bar ─────────────────────────────────────
    function StatusBarChart({ summary }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;

        const statuses = ["inbox", "next", "waiting", "someday"];
        const labels = ["Inbox", "Next", "Waiting", "Someday"];
        const colors = ["#3b82f6", "#f97316", "#eab308", "#94a3b8"];
        const data = statuses.map(s => summary.by_status?.[s] || 0);

        if (chartRef.current) chartRef.current.destroy();

        chartRef.current = new Chart(canvasRef.current, {
          type: "bar",
          data: {
            labels,
            datasets: [{
              data,
              backgroundColor: colors,
              borderRadius: { topLeft: 8, topRight: 8, bottomLeft: 0, bottomRight: 0 },
              barThickness: 18,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } }, grid: { color: "rgba(0,0,0,0.04)" } },
              x: { ticks: { font: { size: 11 } }, grid: { display: false } },
            },
          },
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [summary]);

      return <div style={{ height: 200 }}><canvas ref={canvasRef} /></div>;
    }

    // ── Calendar View ───────────────────────────────────────────
    function CalendarView({ tasks, onTaskClick }) {
      const today = new Date();
      const [year, setYear] = useState(today.getFullYear());
      const [month, setMonth] = useState(today.getMonth());
      const [selectedDay, setSelectedDay] = useState(null);

      const prevMonth = () => {
        setSelectedDay(null);
        if (month === 0) { setMonth(11); setYear(y => y - 1); } else setMonth(m => m - 1);
      };
      const nextMonth = () => {
        setSelectedDay(null);
        if (month === 11) { setMonth(0); setYear(y => y + 1); } else setMonth(m => m + 1);
      };

      const monthName = new Date(year, month, 1).toLocaleDateString("id-ID", { month: "long", year: "numeric" });
      const parseDeadline = (s) => { const [y, m, d] = s.split("-").map(Number); return { y, m: m - 1, d }; };

      const tasksWithDeadline = tasks.filter(t => {
        if (!t.deadline) return false;
        const { y, m } = parseDeadline(t.deadline);
        return y === year && m === month;
      });

      const byDay = {};
      tasksWithDeadline.forEach(t => {
        const { d } = parseDeadline(t.deadline);
        if (!byDay[d]) byDay[d] = [];
        byDay[d].push(t);
      });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const startOffset = (firstDay + 6) % 7;

      const cells = [];
      for (let i = 0; i < startOffset; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);
      while (cells.length % 7 !== 0) cells.push(null);

      const todayDay = today.getFullYear() === year && today.getMonth() === month ? today.getDate() : -1;
      const dayNames = ["Sen", "Sel", "Rab", "Kam", "Jum", "Sab", "Min"];

      const chipColor = (t) => {
        if (t.gtd_status === "done") return { bg: "#dcfce7", color: "#15803d" };
        if (t.is_overdue) return { bg: "#fee2e2", color: "#b91c1c" };
        const map = { P1: { bg: "#fee2e2", color: "#b91c1c" }, P2: { bg: "#ffedd5", color: "#c2410c" }, P3: { bg: "#fef9c3", color: "#854d0e" }, P4: { bg: "#dcfce7", color: "#15803d" } };
        return map[t.priority] || { bg: "#f1f5f9", color: "#475569" };
      };

      const totalWithDeadline = tasks.filter(t => t.deadline && t.gtd_status !== "done" && t.gtd_status !== "archived").length;
      const selectedTasks = selectedDay ? (byDay[selectedDay] || []) : [];
      const selectedDateLabel = selectedDay
        ? new Date(year, month, selectedDay).toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" })
        : null;

      return (
        <div className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <h1 style={{ fontSize: 24, fontWeight: 700 }}>🗓️ Kalender</h1>
            <span style={{ fontSize: 13, color: "var(--text-light)" }}>{totalWithDeadline} task punya deadline</span>
          </div>

          {/* Month navigation */}
          <div className="card" style={{ padding: "12px 16px", marginBottom: 16, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <button className="btn btn-secondary btn-sm" onClick={prevMonth}>‹ Prev</button>
            <span style={{ fontWeight: 700, fontSize: 16 }}>{monthName}</span>
            <button className="btn btn-secondary btn-sm" onClick={nextMonth}>Next ›</button>
          </div>

          {/* Calendar grid */}
          <div className="card" style={{ padding: 12 }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 4 }}>
              {dayNames.map(d => (
                <div key={d} style={{ textAlign: "center", fontSize: 12, fontWeight: 700, color: "var(--text-light)", padding: "4px 0" }}>{d}</div>
              ))}
            </div>
            {Array.from({ length: cells.length / 7 }, (_, wi) => (
              <div key={wi} style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 4 }}>
                {cells.slice(wi * 7, wi * 7 + 7).map((day, di) => {
                  const isToday = day === todayDay;
                  const isSelected = day === selectedDay;
                  const dayTasks = day ? (byDay[day] || []) : [];
                  const hasMore = dayTasks.length > 2;
                  return (
                    <div key={di}
                      onClick={() => day && setSelectedDay(isSelected ? null : day)}
                      style={{
                        height: 80, overflow: "hidden", borderRadius: 6, padding: "4px 6px",
                        cursor: day ? "pointer" : "default",
                        background: isSelected ? "#dbeafe" : isToday ? "#eff6ff" : day ? "var(--surface)" : "transparent",
                        border: isSelected ? "2px solid #2563eb" : isToday ? "2px solid var(--accent)" : "1px solid var(--border)",
                        borderColor: day ? undefined : "transparent",
                        transition: "background 0.15s",
                      }}>
                      {day && (
                        <>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 3 }}>
                            <span style={{ fontSize: 12, fontWeight: isToday ? 800 : 500, color: isSelected ? "#1d4ed8" : isToday ? "var(--accent)" : "var(--text-secondary)" }}>{day}</span>
                            {dayTasks.length > 0 && (
                              <span style={{ fontSize: 10, fontWeight: 700, background: isSelected ? "#2563eb" : "var(--accent)", color: "white", borderRadius: 8, padding: "1px 5px", minWidth: 16, textAlign: "center" }}>
                                {dayTasks.length}
                              </span>
                            )}
                          </div>
                          {dayTasks.slice(0, 2).map(t => {
                            const c = chipColor(t);
                            return (
                              <div key={t.id}
                                style={{ fontSize: 10, lineHeight: 1.3, padding: "1px 4px", borderRadius: 3, marginBottom: 2,
                                  background: c.bg, color: c.color, fontWeight: 500,
                                  whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                                  textDecoration: t.gtd_status === "done" ? "line-through" : "none" }}
                                title={t.title}>
                                {t.title}
                              </div>
                            );
                          })}
                          {hasMore && (
                            <div style={{ fontSize: 10, color: "var(--accent)", fontWeight: 600, marginTop: 1 }}>
                              +{dayTasks.length - 2} lagi →
                            </div>
                          )}
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>

          {/* Selected day modal popup */}
          {selectedDay && (
            <div className="modal-overlay" onClick={() => setSelectedDay(null)}>
              <div className="modal-content scale-in" style={{ maxWidth: 480, width: "90%", maxHeight: "80vh", overflowY: "hidden", display: "flex", flexDirection: "column" }}
                onClick={e => e.stopPropagation()}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 16 }}>📅 {selectedDateLabel}</div>
                    <div style={{ fontSize: 13, color: "var(--text-light)", marginTop: 2 }}>{selectedTasks.length} task</div>
                  </div>
                  <button className="btn btn-secondary btn-sm" onClick={() => setSelectedDay(null)}>✕</button>
                </div>
                <div style={{ overflowY: "auto", flex: 1 }}>
                  {selectedTasks.map(t => {
                    const c = chipColor(t);
                    return (
                      <div key={t.id} onClick={() => { setSelectedDay(null); onTaskClick(t); }}
                        style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", borderRadius: 8, marginBottom: 6, cursor: "pointer",
                          background: c.bg, border: `1px solid ${c.color}20`, transition: "opacity 0.15s" }}
                        onMouseEnter={e => e.currentTarget.style.opacity = "0.8"}
                        onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
                        <span style={{ fontSize: 13, fontWeight: 600, color: c.color, minWidth: 28 }}>{t.priority}</span>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 14, fontWeight: 500, color: "var(--text-primary)", textDecoration: t.gtd_status === "done" ? "line-through" : "none",
                            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.title}</div>
                          {t.project && <div style={{ fontSize: 12, color: "var(--text-light)", marginTop: 1 }}>📁 {t.project}</div>}
                        </div>
                        <StatusBadge s={t.gtd_status} />
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* Legend */}
          <div style={{ display: "flex", gap: 12, marginTop: 12, flexWrap: "wrap", fontSize: 12, color: "var(--text-light)" }}>
            {[
              { bg: "#fee2e2", color: "#b91c1c", label: "P1 / Overdue" },
              { bg: "#ffedd5", color: "#c2410c", label: "P2" },
              { bg: "#fef9c3", color: "#854d0e", label: "P3" },
              { bg: "#dcfce7", color: "#15803d", label: "P4 / Done" },
            ].map(l => (
              <span key={l.label} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ width: 10, height: 10, borderRadius: 2, background: l.bg, border: `1px solid ${l.color}`, display: "inline-block" }} />
                {l.label}
              </span>
            ))}
          </div>
        </div>
      );
    }

    // ── Dashboard ───────────────────────────────────────────────
    const SORT_PRI = (a, b) => ({ P1:0,P2:1,P3:2,P4:3 }[a.priority]??9) - ({ P1:0,P2:1,P3:2,P4:3 }[b.priority]??9);
    function Dashboard({ summary, tasks, onTaskClick, onDone, onNav }) {
      const q1Tasks = tasks.filter(t => t.quadrant === "Q1" && t.gtd_status !== "done").sort(SORT_PRI);
      const q2Tasks = tasks.filter(t => t.quadrant === "Q2" && t.gtd_status !== "done").sort(SORT_PRI);
      const q3Tasks = tasks.filter(t => t.quadrant === "Q3" && t.gtd_status !== "done").sort(SORT_PRI);
      const q4Tasks = tasks.filter(t => t.quadrant === "Q4" && t.gtd_status !== "done").sort(SORT_PRI);
      const [dashModal, setDashModal] = useState(null); // { title, tasks }

      const openModal = (title, cellTasks) => setDashModal({ title, tasks: cellTasks });

      const eisenTooltip = {
        Lakukan:     "Q1 – Mendesak & Penting. Kerjakan sekarang juga. Deadline ketat, krisis, atau task kritis (P1/P2, deadline ≤ 7 hari).",
        Rencanakan:  "Q2 – Penting tapi belum mendesak. Tentukan kapan akan dikerjakan. Berisi task P1/P2 dengan deadline jauh atau tanpa deadline.",
        Delegasikan: "Q3 – Mendesak tapi tidak terlalu penting. Serahkan ke orang lain jika bisa (P3/P4, deadline dekat).",
        Singkirkan:  "Q4 – Tidak mendesak, tidak penting. Hapus atau abaikan. Jangan habiskan energi di sini.",
      };

      const EisenCell = ({ tasks: cellTasks, label, emoji, cls }) => (
        <div className={`eisenhower-cell ${cls}`}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div title={eisenTooltip[label]} style={{ fontWeight: 700, fontSize: 14, cursor: "help" }}>{emoji} {label} ({cellTasks.length})</div>
            {cellTasks.length > 5 && (
              <span onClick={() => openModal(`${emoji} ${label}`, cellTasks)}
                style={{ fontSize: 11, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>Lihat semua →</span>
            )}
          </div>
          {cellTasks.length === 0 && (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "20px 0", opacity: 0.35 }}>
              <div style={{ fontSize: 22, marginBottom: 6 }}>🎉</div>
              <div style={{ fontSize: 12, color: "var(--text-light)", textAlign: "center" }}>Belum ada task</div>
            </div>
          )}
          {cellTasks.slice(0, 5).map((t, i) => (
            <div key={t.id} onClick={() => onTaskClick(t)} style={{ fontSize: 13, padding: "6px 0", cursor: "pointer", display: "flex", gap: 6, alignItems: "center", minWidth: 0, borderTop: i > 0 ? "1px solid var(--border)" : "none" }}>
              <PriBadge p={t.priority} />
              <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1, minWidth: 0 }}>{t.title}</span>
            </div>
          ))}
          {cellTasks.length > 5 && (
            <div onClick={() => openModal(`${emoji} ${label}`, cellTasks)}
              style={{ fontSize: 12, color: "var(--accent)", marginTop: 6, cursor: "pointer", fontWeight: 600 }}>
              +{cellTasks.length - 5} lagi →
            </div>
          )}
        </div>
      );

      return (
        <div className="fade-in">
          <h1 style={{ fontSize: 24, fontWeight: 700, marginBottom: 20 }}>📊 Dashboard</h1>

          {/* Priority Hari Ini */}
          {(() => {
            const todayStr = new Date().toISOString().split("T")[0];
            const fmtDate = (d) => {
              if (!d) return null;
              const [, m, day] = d.split("-");
              const mn = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"][parseInt(m)-1];
              return `${parseInt(day)} ${mn}`;
            };
            const allToday = tasks.filter(t =>
              (t.quadrant === "Q1" || t.is_overdue || t.is_focused || t.deadline === todayStr) &&
              t.gtd_status !== "archived"
            );
            if (allToday.length === 0) return null;
            const doneToday    = allToday.filter(t => t.gtd_status === "done");
            const pendingToday = allToday.filter(t => t.gtd_status !== "done").sort((a, b) => {
              if (a.is_overdue && !b.is_overdue) return -1;
              if (!a.is_overdue && b.is_overdue) return 1;
              return SORT_PRI(a, b);
            });
            // Show done tasks on top (max 2), then pending (max 5 total visible)
            const visibleDone    = doneToday.slice(0, 2);
            const maxPending     = Math.max(0, 5 - visibleDone.length);
            const visiblePending = pendingToday.slice(0, maxPending);
            const shown          = visibleDone.length + visiblePending.length;
            const total          = allToday.length;
            const doneN          = doneToday.length;
            const pct            = total > 0 ? Math.round(doneN / total * 100) : 0;
            const allDone        = doneN === total;

            const TaskRow = ({ t, isDone }) => (
              <div style={{ display: "flex", alignItems: "center", gap: 9, padding: "7px 0", borderBottom: "1px solid var(--border)" }}>
                {/* Priority badge */}
                <PriBadge p={t.priority} />
                {/* Title */}
                <span onClick={() => onTaskClick(t)}
                  style={{ flex: 1, fontSize: 13, fontWeight: 500, cursor: "pointer",
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                    color: isDone ? "var(--text-light)" : t.is_overdue ? "#dc2626" : "var(--text-primary)",
                    textDecoration: isDone ? "line-through" : "none" }}>
                  {t.title}
                </span>
                {/* Date tag */}
                {t.deadline && !isDone && (
                  <span style={{ fontSize: 11, flexShrink: 0,
                    color: t.is_overdue ? "#dc2626" : "var(--text-light)",
                    background: t.is_overdue ? "#fef2f2" : "#f1f5f9",
                    padding: "2px 6px", borderRadius: 4, fontWeight: t.is_overdue ? 600 : 400 }}>
                    {fmtDate(t.deadline)}
                  </span>
                )}
                {/* Checkbox / done indicator */}
                {isDone ? (
                  <span style={{ width: 20, height: 20, borderRadius: "50%", background: "#22c55e", flexShrink: 0,
                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "white", fontWeight: 700 }}>✓</span>
                ) : (
                  <span
                    onClick={e => { e.stopPropagation(); onDone(t); }}
                    title="Tandai selesai"
                    style={{ width: 20, height: 20, borderRadius: "50%", border: "2px solid #cbd5e1", flexShrink: 0,
                      cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                      background: "var(--bg-card)", transition: "all 0.15s" }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = "#22c55e"; e.currentTarget.style.background = "#f0fdf4"; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = "#cbd5e1"; e.currentTarget.style.background = "var(--bg-card)"; }}
                  />
                )}
              </div>
            );

            return (
              <div className="card" style={{ marginBottom: 28, padding: "18px 22px" }}>
                {/* Header row */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 700, display: "flex", alignItems: "center", gap: 7 }}>
                      🔴 Prioritas Hari Ini
                    </div>
                    <div style={{ fontSize: 12, color: "var(--text-secondary)", marginTop: 2 }}>
                      Fokus selesaikan hal penting terlebih dahulu.
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                    <span style={{ fontSize: 12, color: "var(--text-secondary)" }}>
                      <b style={{ color: allDone ? "#16a34a" : "var(--text-primary)" }}>{doneN} / {total}</b> selesai
                    </span>
                    <span style={{ fontSize: 12, fontWeight: 700, color: allDone ? "#16a34a" : "var(--accent)",
                      background: allDone ? "#f0fdf4" : "#F4FAD6",
                      padding: "2px 8px", borderRadius: 20 }}>{pct}%</span>
                    <span onClick={() => onNav("today")} style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>Lihat semua →</span>
                  </div>
                </div>

                {/* Progress bar — full width */}
                <div style={{ height: 8, borderRadius: 99, background: "var(--border)", overflow: "hidden", marginBottom: 12 }}>
                  <div style={{ height: "100%", borderRadius: 99, background: allDone ? "#22c55e" : "var(--accent)", width: `${pct}%`, transition: "width 0.5s ease" }} />
                </div>

                {/* All done state */}
                {pendingToday.length === 0 && (
                  <div style={{ textAlign: "center", padding: "12px 0", color: "#16a34a", fontSize: 14, fontWeight: 600 }}>
                    🎉 Semua task hari ini sudah selesai!
                  </div>
                )}

                {/* Task rows */}
                {visibleDone.map(t => <TaskRow key={t.id} t={t} isDone={true} />)}
                {visiblePending.map(t => <TaskRow key={t.id} t={t} isDone={false} />)}

                {total > shown && (
                  <div onClick={() => onNav("today")}
                    style={{ fontSize: 12, color: "var(--accent)", marginTop: 8, cursor: "pointer", fontWeight: 600, textAlign: "right" }}>
                    +{total - shown} task lagi →
                  </div>
                )}
              </div>
            );
          })()}

          {/* Stat cards — hitung dari tasks array agar include shared list tasks */}
          {(() => {
            const active = tasks.filter(t => t.gtd_status !== "done" && t.gtd_status !== "archived");
            const inboxCount   = active.filter(t => t.gtd_status === "inbox").length;
            const q1Count      = active.filter(t => t.quadrant === "Q1").length;
            const overdueCount = active.filter(t => t.is_overdue).length;
            const kpis = [
              { value: active.length,              label: "Active",      sub: "Task aktif saat ini",     color: "var(--accent)",  icon: "⚡", bg: null },
              { value: summary.done_last_7_days??0, label: "Done 7 hari", sub: "Selesai dalam 7 hari",    color: "#16a34a",        icon: "✅", bg: null },
              { value: q1Count,                    label: "Q1 Lakukan",  sub: "Mendesak & Penting",      color: "var(--q1)",      icon: "🔥", bg: null },
              { value: overdueCount,               label: "Overdue",     sub: overdueCount > 0 ? `${overdueCount} task terlambat` : "Tidak ada overdue", color: overdueCount > 0 ? "#dc2626" : "var(--text-light)", icon: "⚠️", bg: overdueCount > 0 ? "#fef2f2" : null },
              { value: inboxCount,                 label: "Inbox",       sub: "Task baru masuk",         color: "#2563eb",         icon: "📥", bg: null },
            ];
            return (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12, marginBottom: 32 }}>
                {kpis.map(k => (
                  <div key={k.label} className="stat-card" style={k.bg ? { background: k.bg } : {}}>
                    <div style={{ position: "absolute", right: 14, top: 12, fontSize: 28, opacity: 0.07, lineHeight: 1 }}>{k.icon}</div>
                    <div className="stat-number" style={{ color: k.color }}>{k.value}</div>
                    <div className="stat-label">{k.label}</div>
                    <div style={{ fontSize: 11, color: "var(--text-light)", marginTop: 3 }}>{k.sub}</div>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* Analytics Charts */}
          <h2 className="section-title">📊 Analytics</h2>
          <div className="charts-grid" style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 16, marginBottom: 32 }}>
            {/* A. Productivity Trend - Line Chart */}
            <div className="card card-hover" style={{ padding: 18 }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 14, display: "flex", alignItems: "baseline", gap: 8 }}>📈 Productivity Trend <span style={{ fontWeight: 400, color: "var(--text-light)", fontSize: 11 }}>4 minggu terakhir</span></div>
              <ProductivityChart tasks={tasks} />
            </div>

            {/* B. Completion Ratio - Donut */}
