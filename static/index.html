    // ── Filter Chip ────────────────────────────────────────────
    function FilterChip({ label, active, onClick }) {
      return (
        <span onClick={onClick} style={{
          display: "inline-flex", alignItems: "center", padding: "4px 12px", borderRadius: 20,
          fontSize: 13, fontWeight: 500, cursor: "pointer", transition: "all 0.15s", whiteSpace: "nowrap",
          background: active ? "var(--accent)" : "#f1f5f9",
          color: active ? "white" : "var(--text-secondary)",
          border: active ? "1px solid var(--accent)" : "1px solid var(--border)",
        }}>{label}</span>
      );
    }

    // ══════════════════════════════════════════════════════════════
    //  POMODORO TIMER COMPONENT
    // ══════════════════════════════════════════════════════════════
    function PomodoroTimer({ focusTask, onComplete, taskPomodoros, setTaskPomodoros }) {
      // Timer states
      const [mode, setMode] = useState("work"); // work, shortBreak, longBreak
      const [timeLeft, setTimeLeft] = useState(25 * 60); // seconds
      const [isRunning, setIsRunning] = useState(false);
      const [sessionCount, setSessionCount] = useState(0);
      const [totalFocusTime, setTotalFocusTime] = useState(0); // in seconds
      const intervalRef = useRef(null);

      // Timer durations
      const DURATIONS = {
        work: 25 * 60,
        shortBreak: 5 * 60,
        longBreak: 15 * 60,
      };

      // Request notification permission on mount
      useEffect(() => {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission();
        }
      }, []);

      // Timer logic
      useEffect(() => {
        if (isRunning && timeLeft > 0) {
          intervalRef.current = setInterval(() => {
            setTimeLeft(t => t - 1);
            if (mode === "work") {
              setTotalFocusTime(t => t + 1);
            }
          }, 1000);
        } else if (timeLeft === 0) {
          handleTimerComplete();
        }
        
        return () => clearInterval(intervalRef.current);
      }, [isRunning, timeLeft]);

      const handleTimerComplete = () => {
        setIsRunning(false);
        clearInterval(intervalRef.current);
        
        if (mode === "work") {
          // Work session completed
          const newSessionCount = sessionCount + 1;
          setSessionCount(newSessionCount);
          
          // Update pomodoro count for the focused task
          if (focusTask) {
            setTaskPomodoros(prev => ({
              ...prev,
              [focusTask.id]: (prev[focusTask.id] || 0) + 1
            }));
          }
          
          playNotificationSound("work");
          sendBrowserNotification("🍅 Pomodoro Selesai!", "Saatnya istirahat sebentar.");
          
          // Determine next break type
          if (newSessionCount % 4 === 0) {
            setMode("longBreak");
            setTimeLeft(DURATIONS.longBreak);
          } else {
            setMode("shortBreak");
            setTimeLeft(DURATIONS.shortBreak);
          }
          
          onComplete?.("work");
        } else {
          // Break completed
          playNotificationSound("break");
          sendBrowserNotification("☕ Istirahat Selesai!", "Siap untuk fokus lagi?");
          setMode("work");
          setTimeLeft(DURATIONS.work);
          onComplete?.("break");
        }
      };

      const startTimer = () => setIsRunning(true);
      const pauseTimer = () => setIsRunning(false);
      const resetTimer = () => {
        setIsRunning(false);
        setTimeLeft(DURATIONS[mode]);
      };
      const skipTimer = () => {
        setIsRunning(false);
        if (mode === "work") {
          // Skip to break
          if ((sessionCount + 1) % 4 === 0) {
            setMode("longBreak");
            setTimeLeft(DURATIONS.longBreak);
          } else {
            setMode("shortBreak");
            setTimeLeft(DURATIONS.shortBreak);
          }
        } else {
          // Skip break, go to work
          setMode("work");
          setTimeLeft(DURATIONS.work);
        }
      };

      // Format time
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      const timeDisplay = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      
      // Progress calculation
      const totalTime = DURATIONS[mode];
      const progress = ((totalTime - timeLeft) / totalTime) * 100;
      const circumference = 2 * Math.PI * 90;
      const strokeDashoffset = circumference - (progress / 100) * circumference;

      // Colors based on mode
      const isBreak = mode !== "work";
      const primaryColor = isBreak ? "#22c55e" : "#ef4444";
      const labelText = mode === "work" ? "FOKUS" : mode === "shortBreak" ? "ISTIRAHAT" : "ISTIRAHAT PANJANG";

      // Format total focus time
      const formatFocusTime = (secs) => {
        const hrs = Math.floor(secs / 3600);
        const mins = Math.floor((secs % 3600) / 60);
        if (hrs > 0) return `${hrs}j ${mins}m`;
        return `${mins}m`;
      };

      return (
        <div className="pomodoro-container scale-in">
          <div className="pomodoro-header" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, position: "relative", zIndex: 1 }}>
            <div>
              <h2 className="pomodoro-header-title" style={{ fontSize: 22, fontWeight: 700 }}>🍅 Pomodoro Timer</h2>
              <p className="pomodoro-header-subtitle" style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", marginTop: 4 }}>
                {isBreak ? "Istirahat sebentar..." : "Fokus pada satu task"}
              </p>
            </div>
            <div className="pomodoro-mode-btns" style={{ display: "flex", gap: 8 }}>
              <span 
                className="pomodoro-mode-btn"
                onClick={() => { setMode("work"); setTimeLeft(DURATIONS.work); setIsRunning(false); }}
                style={{ 
                  padding: "6px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  background: mode === "work" ? "rgba(239,68,68,0.2)" : "rgba(255,255,255,0.1)",
                  color: mode === "work" ? "#fca5a5" : "rgba(255,255,255,0.6)"
                }}
              >Work</span>
              <span 
                className="pomodoro-mode-btn"
                onClick={() => { setMode("shortBreak"); setTimeLeft(DURATIONS.shortBreak); setIsRunning(false); }}
                style={{ 
                  padding: "6px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  background: mode === "shortBreak" ? "rgba(34,197,94,0.2)" : "rgba(255,255,255,0.1)",
                  color: mode === "shortBreak" ? "#86efac" : "rgba(255,255,255,0.6)"
                }}
              >Short</span>
              <span 
                className="pomodoro-mode-btn"
                onClick={() => { setMode("longBreak"); setTimeLeft(DURATIONS.longBreak); setIsRunning(false); }}
                style={{ 
                  padding: "6px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  background: mode === "longBreak" ? "rgba(34,197,94,0.2)" : "rgba(255,255,255,0.1)",
                  color: mode === "longBreak" ? "#86efac" : "rgba(255,255,255,0.6)"
                }}
              >Long</span>
            </div>
          </div>

          <div className="pomodoro-timer">
            <div className="pomodoro-circle">
              <svg viewBox="0 0 200 200" style={{ width: "100%", height: "100%" }}>
                {/* Background circle */}
                <circle
                  cx="100" cy="100" r="90"
                  fill="none"
                  stroke="rgba(255,255,255,0.1)"
                  strokeWidth="8"
                />
                {/* Progress circle */}
                <circle
                  cx="100" cy="100" r="90"
                  fill="none"
                  stroke={primaryColor}
                  strokeWidth="8"
                  strokeLinecap="round"
                  strokeDasharray={circumference}
                  strokeDashoffset={strokeDashoffset}
                  style={{ transition: "stroke-dashoffset 0.5s ease" }}
                />
              </svg>
              <div className="pomodoro-time" style={{ color: primaryColor }}>{timeDisplay}</div>
              <div className="pomodoro-label">{labelText}</div>
            </div>
          </div>

          <div className="pomodoro-controls">
            {!isRunning ? (
              <button className={`pomodoro-btn pomodoro-btn-play ${isBreak ? 'break' : ''}`} onClick={startTimer} title="Start">
                ▶
              </button>
            ) : (
              <button className="pomodoro-btn pomodoro-btn-pause" onClick={pauseTimer} title="Pause">
                ⏸
              </button>
            )}
            <button className="pomodoro-btn pomodoro-btn-reset" onClick={resetTimer} title="Reset">
              ↺
            </button>
            <button className="pomodoro-btn pomodoro-btn-skip" onClick={skipTimer} title="Skip">
              ⏭
            </button>
          </div>

          {/* Focus Task Card */}
          {focusTask && (
            <div className="focus-task-card">
              <span style={{ fontSize: 20 }}>🎯</span>
              <div className="focus-task-title">{focusTask.title}</div>
              <div className="focus-task-pomodoros">
                🍅 {taskPomodoros[focusTask.id] || 0}
              </div>
            </div>
          )}

          {/* Daily Stats */}
          <div className="pomodoro-stats">
            <div className="pomodoro-stat">
              <div className="pomodoro-stat-value" style={{ color: "#ef4444" }}>{sessionCount}</div>
              <div className="pomodoro-stat-label">Pomodoro</div>
            </div>
            <div className="pomodoro-stat">
              <div className="pomodoro-stat-value" style={{ color: "#22c55e" }}>{formatFocusTime(totalFocusTime)}</div>
              <div className="pomodoro-stat-label">Waktu Fokus</div>
            </div>
            <div className="pomodoro-stat">
              <div className="pomodoro-stat-value" style={{ color: "#A8C500" }}>{Math.floor(sessionCount / 4)}</div>
              <div className="pomodoro-stat-label">Set Lengkap</div>
            </div>
          </div>
        </div>
      );
    }

    // ── Inline Subtask Checklist (for Focus page) ──────────────
    function FocusSubtasks({ taskId }) {
      const [subtasks, setSubtasks] = useState([]);
      const [newSub, setNewSub] = useState("");
      const [adding, setAdding] = useState(false);

      const fetchSubs = useCallback(() => {
        api.get(`/api/tasks/${taskId}/subtasks`)
          .then(data => setSubtasks(data))
          .catch(() => {});
      }, [taskId]);

      useEffect(() => { fetchSubs(); }, [fetchSubs]);

      // Auto-refresh every 15 seconds
      useEffect(() => {
        const interval = setInterval(fetchSubs, 15000);
        return () => clearInterval(interval);
      }, [fetchSubs]);

      const handleToggle = async (subId) => {
        try {
          const result = await api.post(`/api/subtasks/${subId}/toggle`);
          setSubtasks(prev => prev.map(s => s.id === subId ? result : s));
        } catch (err) { console.error(err); }
      };

      const handleAdd = async () => {
        if (!newSub.trim()) return;
        try {
          const result = await api.post(`/api/tasks/${taskId}/subtasks`, { title: newSub.trim() });
          setSubtasks(prev => [...prev, result]);
          setNewSub("");
        } catch (err) { console.error(err); }
      };

      const doneCount = subtasks.filter(s => s.is_done).length;
      const total = subtasks.length;

      return (
        <div style={{ padding: "8px 16px 12px 52px", background: "rgba(239,68,68,0.03)", borderBottom: "1px solid var(--border)" }} className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "var(--text-secondary)" }}>
              📝 Subtasks {total > 0 && `${doneCount}/${total}`}
            </span>
            {!adding && (
              <span onClick={() => setAdding(true)} style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>＋ Tambah</span>
            )}
          </div>

          {total > 0 && (
            <div style={{ height: 4, background: "#e2e8f0", borderRadius: 2, marginBottom: 6, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${total > 0 ? doneCount/total*100 : 0}%`, background: doneCount === total ? "var(--success)" : "var(--accent)", borderRadius: 2, transition: "width 0.3s" }} />
            </div>
          )}

          {subtasks.map(s => (
            <div key={s.id} onClick={() => handleToggle(s.id)} style={{
              display: "flex", alignItems: "center", gap: 8, padding: "4px 0", cursor: "pointer",
            }}>
              <div style={{
                width: 16, height: 16, borderRadius: 3, flexShrink: 0,
                border: s.is_done ? "2px solid var(--success)" : "2px solid #d1d5db",
                background: s.is_done ? "var(--success)" : "transparent",
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                {s.is_done && <span style={{ color: "white", fontSize: 10 }}>✓</span>}
              </div>
              <span style={{
                fontSize: 13,
                textDecoration: s.is_done ? "line-through" : "none",
                color: s.is_done ? "var(--text-light)" : "var(--text-primary)",
              }}>{s.title}</span>
            </div>
          ))}

          {adding && (
            <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
              <input
                className="input"
                value={newSub}
                onChange={e => setNewSub(e.target.value)}
                placeholder="Subtask baru..."
                autoFocus
                onKeyDown={e => { if (e.key === "Enter") handleAdd(); if (e.key === "Escape") { setAdding(false); setNewSub(""); } }}
                style={{ flex: 1, padding: "4px 8px", fontSize: 12 }}
              />
              <button className="btn btn-primary btn-sm" onClick={handleAdd} style={{ fontSize: 11, padding: "4px 10px" }}>OK</button>
            </div>
          )}

          {total === 0 && !adding && (
            <div style={{ fontSize: 12, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada subtask — klik + untuk menambah</div>
          )}
        </div>
      );
    }

    // ── Inline Notes (for Focus page and Task Detail) ──────────
    function FocusNotes({ taskId }) {
      const [notes, setNotes] = useState([]);
      const [newNote, setNewNote] = useState("");
      const [expanded, setExpanded] = useState(false);

      const fetchNotes = useCallback(() => {
        api.get(`/api/tasks/${taskId}/notes`)
          .then(data => setNotes(data))
          .catch(() => {});
      }, [taskId]);

      useEffect(() => { fetchNotes(); }, [fetchNotes]);

      // Auto-refresh every 15 seconds
      useEffect(() => {
        const interval = setInterval(fetchNotes, 15000);
        return () => clearInterval(interval);
      }, [fetchNotes]);

      const handleAdd = async () => {
        if (!newNote.trim()) return;
        try {
          const result = await api.post(`/api/tasks/${taskId}/notes`, { content: newNote.trim() });
          setNotes(prev => [result, ...prev]);
          setNewNote("");
        } catch (err) { console.error(err); }
      };

      const handleDelete = async (noteId) => {
        try {
          await api.del(`/api/notes/${noteId}`);
          setNotes(prev => prev.filter(n => n.id !== noteId));
        } catch (err) { console.error(err); }
      };

      const formatTime = (dt) => {
        if (!dt) return "";
        const parts = dt.split("T");
        if (parts.length < 2) return "";
        const date = parts[0].split("-").reverse().join("-");
        const time = parts[1].substring(0, 5);
        return `${date} ${time}`;
      };

      const shown = expanded ? notes : notes.slice(0, 3);

      return (
        <div style={{ padding: "8px 16px 12px 52px", background: "rgba(59,130,246,0.03)", borderBottom: "1px solid var(--border)" }} className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "var(--text-secondary)" }}>
              📓 Catatan {notes.length > 0 && `(${notes.length})`}
            </span>
          </div>

          {/* Add note input */}
          <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
            <input
              className="input"
              value={newNote}
              onChange={e => setNewNote(e.target.value)}
              placeholder="Tulis catatan..."
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleAdd(); } }}
              style={{ flex: 1, padding: "6px 10px", fontSize: 12 }}
            />
            <button className="btn btn-primary btn-sm" onClick={handleAdd} disabled={!newNote.trim()} style={{ fontSize: 11, padding: "4px 10px" }}>Simpan</button>
          </div>

          {/* Notes list */}
          {shown.map(n => (
            <div key={n.id} style={{ padding: "6px 0", borderBottom: "1px solid #f1f5f9", display: "flex", gap: 8, alignItems: "flex-start" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: "var(--text-light)" }}>{formatTime(n.created_at)}</div>
                <div style={{ fontSize: 13, lineHeight: 1.5, color: "var(--text-primary)", whiteSpace: "pre-wrap" }}>{n.content}</div>
              </div>
              <span onClick={() => handleDelete(n.id)} style={{ cursor: "pointer", fontSize: 12, color: "var(--text-light)", padding: "0 2px", flexShrink: 0 }} title="Hapus">✕</span>
            </div>
          ))}

          {notes.length > 3 && !expanded && (
            <div onClick={() => setExpanded(true)} style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", marginTop: 4 }}>
              Lihat {notes.length - 3} catatan lagi...
            </div>
          )}
          {expanded && notes.length > 3 && (
            <div onClick={() => setExpanded(false)} style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", marginTop: 4 }}>
              Sembunyikan
            </div>
          )}

          {notes.length === 0 && (
            <div style={{ fontSize: 12, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada catatan</div>
          )}
        </div>
      );
    }

    // ── Inline Attachments (for Focus page) ────────────────────
    function FocusAttachments({ taskId }) {
      const [attachments, setAttachments] = useState([]);
      const [uploading, setUploading] = useState(false);
      const fileRef = useRef(null);

      const fetchAtts = useCallback(() => {
        api.get(`/api/tasks/${taskId}/attachments`)
          .then(data => setAttachments(data))
          .catch(() => {});
      }, [taskId]);

      useEffect(() => { fetchAtts(); }, [fetchAtts]);
      useEffect(() => {
        const interval = setInterval(fetchAtts, 15000);
        return () => clearInterval(interval);
      }, [fetchAtts]);

      const handleUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) { alert("Maks 10MB"); return; }
        setUploading(true);
        try {
          const formData = new FormData();
          formData.append("file", file);
          const res = await fetch(`/api/tasks/${taskId}/attachments`, {
            method: "POST",
            headers: __token ? { "Authorization": "Bearer " + __token } : {},
            body: formData,
          });
          if (res.ok) {
            const result = await res.json();
            setAttachments(prev => [result, ...prev]);
          }
        } catch (err) { console.error(err); }
        setUploading(false);
        if (fileRef.current) fileRef.current.value = "";
      };

      const fmtSize = (b) => b < 1024 ? b+"B" : b < 1024*1024 ? Math.round(b/1024)+"KB" : (b/(1024*1024)).toFixed(1)+"MB";

      return (
        <div style={{ padding: "6px 16px 10px 52px", background: "rgba(139,92,246,0.03)", borderBottom: "1px solid var(--border)" }} className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "var(--text-secondary)" }}>
              📎 Lampiran {attachments.length > 0 && `(${attachments.length})`}
            </span>
            <label style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>
              {uploading ? "Uploading..." : "＋ Upload"}
              <input ref={fileRef} type="file" onChange={handleUpload} style={{ display: "none" }} disabled={uploading} />
            </label>
          </div>
          {attachments.map(a => (
            <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 6, padding: "3px 0" }}>
              <span style={{ fontSize: 14 }}>{a.mime_type?.startsWith("image/") ? "🖼️" : "📄"}</span>
              <a href={`/api/attachments/${a.id}/download`} target="_blank" rel="noopener"
                style={{ fontSize: 12, color: "var(--accent)", textDecoration: "none", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {a.original_name}
              </a>
              <span style={{ fontSize: 11, color: "var(--text-light)" }}>{fmtSize(a.file_size)}</span>
            </div>
          ))}
          {attachments.length === 0 && !uploading && (
            <div style={{ fontSize: 12, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada lampiran</div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════
    //  TODAY FOCUS VIEW (Overhauled with Pomodoro)
    // ══════════════════════════════════════════════════════════════
    function TodayFocusView({ tasks, onTaskClick, onDone, loading }) {
      const [focusTask, setFocusTask] = useState(null);
      const [taskPomodoros, setTaskPomodoros] = useState({});

      // Filter today's tasks (Q1 or overdue, not done)
      const todayTasks = tasks.filter(t => 
        (t.quadrant === "Q1" || t.is_overdue || t.is_focused) && 
        t.gtd_status !== "done" && 
        t.gtd_status !== "archived"
      );

      // Sort by priority then deadline
      const sortedTasks = [...todayTasks].sort((a, b) => {
        // Overdue first
        if (a.is_overdue && !b.is_overdue) return -1;
        if (!a.is_overdue && b.is_overdue) return 1;
        // Then by priority
        const priOrder = { P1: 1, P2: 2, P3: 3, P4: 4 };
        return priOrder[a.priority] - priOrder[b.priority];
      });

      const handleStartFocus = (task) => {
        setFocusTask(focusTask?.id === task.id ? null : task);
      };

      const handlePomodoroComplete = (type) => {
        // Optional: additional logic when pomodoro completes
      };

      const totalPomodoros = Object.values(taskPomodoros).reduce((a, b) => a + b, 0);

      return (
        <div className="fade-in">
          {/* Header */}
          <div className="focus-page-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div>
              <h1 className="focus-page-title" style={{ fontSize: 24, fontWeight: 700 }}>🍅 Fokus Hari Ini</h1>
              <p className="focus-page-subtitle" style={{ fontSize: 14, color: "var(--text-secondary)", marginTop: 4 }}>
                {sortedTasks.length} task urgent • {totalPomodoros} pomodoro hari ini
              </p>
            </div>
          </div>

          {/* Pomodoro Timer */}
          <PomodoroTimer 
            focusTask={focusTask}
            onComplete={handlePomodoroComplete}
            taskPomodoros={taskPomodoros}
            setTaskPomodoros={setTaskPomodoros}
          />

          {/* Task List */}
          <div style={{ marginBottom: 0 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700 }}>📋 Task List</h3>
              <span style={{ fontSize: 13, color: "var(--text-light)" }}>{sortedTasks.length} task</span>
            </div>

            {loading ? (
              <div className="card" style={{ textAlign: "center", padding: 40, color: "var(--text-light)" }}>Loading...</div>
            ) : sortedTasks.length === 0 ? (
              <div className="card" style={{ textAlign: "center", padding: 48, color: "var(--text-light)" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
                <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 4 }}>Tidak ada task urgent!</div>
                <div style={{ fontSize: 14 }}>Semua Q1 dan overdue task sudah selesai.</div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {sortedTasks.map((task) => (
                  <div key={task.id} style={{ background: "#EDEEE8", borderRadius: 12, border: "1px solid #D8D9D0", padding: "4px 4px 8px 4px" }}>
                    <FocusTaskRow
                      task={task}
                      onClick={onTaskClick}
                      onDone={onDone}
                      onStartFocus={handleStartFocus}
                      isFocusing={focusTask?.id === task.id}
                      pomodoroCount={taskPomodoros[task.id] || 0}
                    />
                    <FocusSubtasks taskId={task.id} />
                    <FocusNotes taskId={task.id} />
                    <FocusAttachments taskId={task.id} />
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Tips - Hidden on very small screens */}
          <div className="card focus-tips-card" style={{ marginTop: 16, padding: 16, background: "linear-gradient(135deg, #fef3c7 0%, #fef9c3 100%)", border: "1px solid #fde68a" }}>
            <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
              <span style={{ fontSize: 24 }}>💡</span>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 4 }}>Tips Pomodoro</div>
                <ul style={{ fontSize: 13, color: "var(--text-secondary)", margin: 0, paddingLeft: 16 }}>
                  <li>Fokus pada satu task selama 25 menit tanpa gangguan</li>
                  <li>Setelah 4 pomodoro, ambil istirahat panjang 15 menit</li>
                  <li>Klik "▶ Focus" pada task untuk memulai tracking</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Task List view with filters ─────────────────────────────
    function TaskListView({ tasks, allTasks, title, icon, onTaskClick, onDone, onToggleFocus, loading, projects, contexts, showFilters }) {
      const [fPriority, setFPriority] = useState("");
      const [fQuadrant, setFQuadrant] = useState("");
      const [fProject, setFProject] = useState("");
      const [fContext, setFContext] = useState("");
      const [fSearch, setFSearch] = useState("");

      const toggle = (setter, current, val) => setter(current === val ? "" : val);

      let filtered = tasks;
      if (fPriority) filtered = filtered.filter(t => t.priority === fPriority);
      if (fQuadrant) filtered = filtered.filter(t => t.quadrant === fQuadrant);
      if (fProject) filtered = filtered.filter(t => t.project === fProject);
      if (fContext) filtered = filtered.filter(t => t.context === fContext);
      if (fSearch) {
        const q = fSearch.toLowerCase();
        filtered = filtered.filter(t => t.title.toLowerCase().includes(q) || (t.description || "").toLowerCase().includes(q));
      }

      const hasFilters = fPriority || fQuadrant || fProject || fContext || fSearch;
      const clearAll = () => { setFPriority(""); setFQuadrant(""); setFProject(""); setFContext(""); setFSearch(""); };

      // Derive projects/contexts from allTasks if not provided
      const projList = projects && projects.length > 0 ? projects : [...new Set(allTasks?.filter(t => t.project).map(t => t.project) || [])];
      const ctxList = contexts && contexts.length > 0 ? contexts : [...new Set(allTasks?.filter(t => t.context).map(t => t.context) || [])];

      return (
        <div className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h1 style={{ fontSize: 24, fontWeight: 700 }}>{icon} {title}</h1>
            <span style={{ color: "var(--text-light)", fontSize: 14 }}>{filtered.length}{hasFilters ? `/${tasks.length}` : ""} task(s)</span>
          </div>

          {showFilters !== false && (
            <div className="card" style={{ padding: "14px 16px", marginBottom: 16 }}>
              {/* Search */}
              <input className="input" placeholder="🔍 Cari task..." value={fSearch} onChange={e => setFSearch(e.target.value)}
                style={{ marginBottom: 12, padding: "8px 12px", fontSize: 13 }} />

              {/* Dropdowns */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                <div>
                  <div className="input-label">Priority</div>
                  <select className="input" value={fPriority} onChange={e => setFPriority(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                    <option value="">Semua Priority</option>
                    <option value="P1">🔴 P1 Critical</option>
                    <option value="P2">🟠 P2 High</option>
                    <option value="P3">🟡 P3 Medium</option>
                    <option value="P4">🟢 P4 Low</option>
                  </select>
                </div>
                <div>
                  <div className="input-label">Quadrant</div>
                  <select className="input" value={fQuadrant} onChange={e => setFQuadrant(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                    <option value="">Semua Quadrant</option>
                    <option value="Q1">🔥 Q1 Do</option>
                    <option value="Q2">📅 Q2 Schedule</option>
                    <option value="Q3">👋 Q3 Delegate</option>
                    <option value="Q4">🗑️ Q4 Eliminate</option>
                  </select>
                </div>
                {projList.length > 0 && (
                  <div>
                    <div className="input-label">Project</div>
                    <select className="input" value={fProject} onChange={e => setFProject(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                      <option value="">Semua Project</option>
                      {projList.map(p => <option key={p} value={p}>📁 {p}</option>)}
                    </select>
                  </div>
                )}
                {ctxList.length > 0 && (
                  <div>
                    <div className="input-label">Context</div>
                    <select className="input" value={fContext} onChange={e => setFContext(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                      <option value="">Semua Context</option>
                      {ctxList.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                )}
              </div>

              {hasFilters && (
                <div style={{ marginTop: 8 }}>
                  <span onClick={clearAll} style={{ fontSize: 13, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>✕ Hapus semua filter</span>
                </div>
              )}
            </div>
          )}

          {loading ? (
            <div style={{ textAlign: "center", padding: 40, color: "var(--text-light)" }}>Loading...</div>
          ) : filtered.length === 0 ? (
            <div className="card" style={{ textAlign: "center", padding: 48, color: "var(--text-light)" }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>{hasFilters ? "🔍" : "🎉"}</div>
              <div>{hasFilters ? "Tidak ada task yang cocok dengan filter" : "Tidak ada task"}</div>
            </div>
          ) : (
            <div className="card" style={{ padding: 8 }}>
              {filtered.map(t => <TaskRow key={t.id} task={t} onClick={onTaskClick} onDone={onDone} onToggleFocus={onToggleFocus} />)}
            </div>
          )}
        </div>
      );
    }

    // ── Chart: Productivity Trend (Line) ────────────────────────
    function ProductivityChart({ tasks }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;

        // Calculate completed tasks per day for last 7 days
        const days = [];
        const counts = [];
        const created = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          const ds = d.toISOString().split("T")[0];
          days.push(d.toLocaleDateString("id-ID", { weekday: "short", day: "numeric" }));
          counts.push(tasks.filter(t => t.completed_at && t.completed_at.startsWith(ds)).length);
          created.push(tasks.filter(t => t.created_at && t.created_at.startsWith(ds)).length);
        }

        if (chartRef.current) chartRef.current.destroy();

        chartRef.current = new Chart(canvasRef.current, {
          type: "line",
          data: {
            labels: days,
            datasets: [
              {
                label: "Selesai",
                data: counts,
                borderColor: "#22c55e",
                backgroundColor: "rgba(34,197,94,0.1)",
                fill: true,
                tension: 0.4,
                pointRadius: 4,
                pointBackgroundColor: "#22c55e",
              },
              {
                label: "Dibuat",
                data: created,
                borderColor: "#A8C500",
                backgroundColor: "rgba(168,197,0,0.05)",
                fill: true,
                tension: 0.4,
                pointRadius: 4,
                pointBackgroundColor: "#A8C500",
                borderDash: [4, 4],
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: "bottom", labels: { boxWidth: 12, padding: 16, font: { size: 11, family: "DM Sans" } } },
            },
            scales: {
              y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } }, grid: { color: "rgba(0,0,0,0.04)" } },
              x: { ticks: { font: { size: 11 } }, grid: { display: false } },
            },
          },
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [tasks]);

      return <div style={{ height: 200 }}><canvas ref={canvasRef} /></div>;
    }

    // ── Chart: Completion Donut ───────────────────────────────────
    function CompletionDonut({ summary }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;

        const done = summary.total_done || 0;
        const active = (summary.total_active || 0) - (summary.overdue || 0);
        const overdue = summary.overdue || 0;

        if (chartRef.current) chartRef.current.destroy();

        chartRef.current = new Chart(canvasRef.current, {
          type: "doughnut",
          data: {
            labels: ["Done", "Active", "Overdue"],
            datasets: [{
              data: [done, Math.max(active, 0), overdue],
              backgroundColor: ["#22c55e", "#A8C500", "#ef4444"],
              borderWidth: 0,
              hoverOffset: 6,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: "65%",
            plugins: {
              legend: { position: "bottom", labels: { boxWidth: 10, padding: 12, font: { size: 11, family: "DM Sans" } } },
            },
          },
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [summary]);

      const total = (summary.total_active || 0) + (summary.total_done || 0);
      const pct = total > 0 ? Math.round((summary.total_done || 0) / total * 100) : 0;

      return (
        <div style={{ position: "relative", height: 200 }}>
          <canvas ref={canvasRef} />
          <div style={{ position: "absolute", top: "42%", left: "50%", transform: "translate(-50%, -50%)", textAlign: "center" }}>
            <div style={{ fontSize: 24, fontWeight: 700, color: "var(--text-primary)" }}>{pct}%</div>
            <div style={{ fontSize: 11, color: "var(--text-light)" }}>selesai</div>
          </div>
        </div>
      );
    }

    // ── Chart: GTD Status Bar ─────────────────────────────────────
    function StatusBarChart({ summary }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;

        const statuses = ["inbox", "next", "waiting", "someday", "done"];
        const labels = ["Inbox", "Next", "Wait", "Later", "Done"];
        const colors = ["#94a3b8", "#A8C500", "#eab308", "#a855f7", "#22c55e"];
        const data = statuses.map(s => summary.by_status?.[s] || 0);

        if (chartRef.current) chartRef.current.destroy();

        chartRef.current = new Chart(canvasRef.current, {
          type: "bar",
          data: {
            labels,
            datasets: [{
              data,
              backgroundColor: colors,
              borderRadius: 6,
              barThickness: 24,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } }, grid: { color: "rgba(0,0,0,0.04)" } },
              x: { ticks: { font: { size: 11 } }, grid: { display: false } },
            },
          },
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [summary]);

      return <div style={{ height: 200 }}><canvas ref={canvasRef} /></div>;
    }

    // ── Dashboard ───────────────────────────────────────────────
    function Dashboard({ summary, tasks, onTaskClick, onDone }) {
      const q1Tasks = tasks.filter(t => t.quadrant === "Q1" && t.gtd_status !== "done");
      const q2Tasks = tasks.filter(t => t.quadrant === "Q2" && t.gtd_status !== "done");
      const q3Tasks = tasks.filter(t => t.quadrant === "Q3" && t.gtd_status !== "done");
      const q4Tasks = tasks.filter(t => t.quadrant === "Q4" && t.gtd_status !== "done");

      const EisenCell = ({ tasks: cellTasks, label, emoji, cls }) => (
        <div className={`eisenhower-cell ${cls}`}>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 10 }}>{emoji} {label} ({cellTasks.length})</div>
          {cellTasks.slice(0, 5).map(t => (
            <div key={t.id} onClick={() => onTaskClick(t)} style={{ fontSize: 13, padding: "4px 0", cursor: "pointer", display: "flex", gap: 6, alignItems: "center", minWidth: 0 }}>
              <PriBadge p={t.priority} />
              <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1, minWidth: 0 }}>{t.title}</span>
            </div>
          ))}
          {cellTasks.length > 5 && <div style={{ fontSize: 12, color: "var(--text-light)", marginTop: 4 }}>+{cellTasks.length - 5} more</div>}
        </div>
      );

      return (
        <div className="fade-in">
          <h1 style={{ fontSize: 24, fontWeight: 700, marginBottom: 20 }}>📊 Dashboard</h1>

          {/* Stat cards */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12, marginBottom: 24 }}>
            <div className="stat-card"><div className="stat-number" style={{ color: "var(--accent)" }}>{summary.total_active}</div><div className="stat-label">Active</div></div>
            <div className="stat-card"><div className="stat-number" style={{ color: "var(--success)" }}>{summary.total_done}</div><div className="stat-label">Done</div></div>
            <div className="stat-card"><div className="stat-number" style={{ color: "var(--q1)" }}>{summary.by_quadrant?.Q1 || 0}</div><div className="stat-label">Q1 Do</div></div>
            <div className="stat-card"><div className="stat-number" style={{ color: summary.overdue > 0 ? "#ef4444" : "var(--text-light)" }}>{summary.overdue}</div><div className="stat-label">Overdue</div></div>
            <div className="stat-card"><div className="stat-number">{summary.by_status?.inbox || 0}</div><div className="stat-label">Inbox</div></div>
          </div>

          {/* Analytics Charts */}
          <div className="charts-grid" style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 16, marginBottom: 24 }}>
            {/* A. Productivity Trend - Line Chart */}
            <div className="card" style={{ padding: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>📈 Productivity Trend <span style={{ fontWeight: 400, color: "var(--text-light)", fontSize: 12 }}>7 hari terakhir</span></div>
              <ProductivityChart tasks={tasks} />
            </div>

            {/* B. Completion Ratio - Donut */}
            <div className="card" style={{ padding: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>🎯 Completion</div>
              <CompletionDonut summary={summary} />
            </div>

            {/* C. Task by Status - Bar */}
            <div className="card" style={{ padding: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>📋 GTD Status</div>
              <StatusBarChart summary={summary} />
            </div>
          </div>

          {/* Eisenhower Matrix */}
          <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 12 }}>🎯 Eisenhower Matrix</h2>
          <div className="eisen-header-row" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 4 }}>
            <div style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: "var(--text-secondary)", textTransform: "uppercase" }}>Urgent + Important</div>
            <div style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: "var(--text-secondary)", textTransform: "uppercase" }}>Important</div>
          </div>
          <div className="gtd-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 }}>
            <EisenCell tasks={q1Tasks} label="Do" emoji="🔥" cls="eq1" />
            <EisenCell tasks={q2Tasks} label="Schedule" emoji="📅" cls="eq2" />
            <EisenCell tasks={q3Tasks} label="Delegate" emoji="👋" cls="eq3" />
            <EisenCell tasks={q4Tasks} label="Eliminate" emoji="🗑️" cls="eq4" />
          </div>

          {/* GTD Status breakdown */}
          <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 12 }}>🔄 GTD Status</h2>
          <div className="gtd-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            {[
              { key: "inbox", label: "Inbox", emoji: "📥", bg: "#FAFAF7", border: "#E8E8E0" },
              { key: "next", label: "Next Actions", emoji: "▶️", bg: "#F4FAD6", border: "#CEDE8A" },
              { key: "waiting", label: "Waiting For", emoji: "⏳", bg: "#fefce8", border: "#fde68a" },
              { key: "someday", label: "Someday", emoji: "💭", bg: "#faf5ff", border: "#e9d5ff" },
            ].map(({ key, label, emoji, bg, border }) => {
              const sectionTasks = tasks.filter(t => t.gtd_status === key);
              return (
                <div key={key} style={{ borderRadius: 12, padding: 16, minHeight: 120, minWidth: 0, overflow: "hidden", background: bg, border: `1px solid ${border}` }}>
                  <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 10 }}>{emoji} {label} ({sectionTasks.length})</div>
                  {sectionTasks.length === 0 ? (
                    <div style={{ fontSize: 13, color: "var(--text-light)", fontStyle: "italic" }}>Kosong</div>
                  ) : (
                    sectionTasks.slice(0, 5).map(t => (
                      <div key={t.id} onClick={() => onTaskClick(t)} style={{ fontSize: 13, padding: "4px 0", cursor: "pointer", display: "flex", gap: 6, alignItems: "center", minWidth: 0 }}>
                        <PriBadge p={t.priority} />
                        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1, minWidth: 0 }}>{t.title}</span>
                      </div>
                    ))
                  )}
                  {sectionTasks.length > 5 && <div style={{ fontSize: 12, color: "var(--text-light)", marginTop: 4 }}>+{sectionTasks.length - 5} more</div>}
                </div>
              );
            })}
          </div>

          {/* Active Projects */}
          {(() => {
            const projNames = [...new Set(tasks.filter(t => t.project && t.gtd_status !== "done" && t.gtd_status !== "archived").map(t => t.project))];
            if (projNames.length === 0) return null;
            return (<>
              <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 12, marginTop: 24 }}>📁 Active Projects</h2>
              <div className="gtd-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {projNames.map(proj => {
                  const projTasks = tasks.filter(t => t.project === proj && t.gtd_status !== "done" && t.gtd_status !== "archived");
                  return (
                    <div key={proj} style={{ borderRadius: 12, padding: 16, minHeight: 100, minWidth: 0, overflow: "hidden", background: "#F4FAD6", border: "1px solid #CEDE8A" }}>
                      <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 10 }}>📂 {proj} ({projTasks.length})</div>
                      {projTasks.slice(0, 5).map(t => (
                        <div key={t.id} onClick={() => onTaskClick(t)} style={{ fontSize: 13, padding: "4px 0", cursor: "pointer", display: "flex", gap: 6, alignItems: "center", minWidth: 0 }}>
                          <PriBadge p={t.priority} />
                          <StatusBadge s={t.gtd_status} />
                          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1, minWidth: 0 }}>{t.title}</span>
                        </div>
                      ))}
                      {projTasks.length > 5 && <div style={{ fontSize: 12, color: "var(--text-light)", marginTop: 4 }}>+{projTasks.length - 5} more</div>}
                    </div>
                  );
                })}
              </div>
            </>);
          })()}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════
    //  MAIN APP
    // ══════════════════════════════════════════════════════════════
    function App() {
      const [user, setUser] = useState(null);
      const [authPage, setAuthPage] = useState("login");
      const [page, setPage] = useState("dashboard");
      const [tasks, setTasks] = useState([]);
      const [summary, setSummary] = useState({ by_status: {}, by_quadrant: {}, overdue: 0, total_active: 0, total_done: 0 });
      const [projects, setProjects] = useState([]);
      const [contexts, setContexts] = useState([]);
      const [selectedTask, setSelectedTask] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [editTask, setEditTask] = useState(null);
      const [toast, setToast] = useState(null);
      const [loading, setLoading] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(false);

      const showToast = (message, type = "success") => setToast({ message, type });

      const logout = useCallback(async () => {
        if (!tokenStore.get()) return;
        try { await api.post("/api/auth/logout", {}); } catch (e) {}
        tokenStore.clear();
        setUser(null);
      }, []);

      window.__logout = logout;

      // Check existing session on mount
      const [authChecked, setAuthChecked] = useState(!tokenStore.get());
      useEffect(() => {
        if (tokenStore.get()) {
          api.get("/api/auth/me")
            .then(u => { setUser(u); setAuthChecked(true); })
            .catch(() => { tokenStore.clear(); setAuthChecked(true); });
        }
      }, []);

      // Fetch data
      const initialLoad = useRef(true);
      const fetchAll = useCallback(async () => {
        if (!user) return;
        if (initialLoad.current) setLoading(true);
        try {
          const [tasksData, summaryData, projData, ctxData] = await Promise.all([
            api.get("/api/tasks?include_done=true"),
            api.get("/api/summary"),
            api.get("/api/projects"),
            api.get("/api/contexts"),
          ]);
          setTasks(tasksData);
          setSummary(summaryData);
          setProjects(projData);
          setContexts(ctxData);
        } catch (err) { console.error(err); }
        if (initialLoad.current) { setLoading(false); initialLoad.current = false; }
      }, [user]);

      useEffect(() => { fetchAll(); }, [fetchAll]);

      // Auto-refresh every 30 seconds
      useEffect(() => {
        if (!user) return;
        const interval = setInterval(fetchAll, 30000);
        return () => clearInterval(interval);
      }, [user, fetchAll]);

      // Auth handlers
      const handleLogin = (data) => {
        tokenStore.set(data.token);
        setUser({ id: data.user_id, username: data.username, display_name: data.display_name || data.username });
        setAuthChecked(true);
      };

      if (!authChecked) {
        return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)", color: "white", fontSize: 18 }}>Loading...</div>;
      }

      if (!user) {
        return authPage === "login"
          ? <LoginPage onLogin={handleLogin} onSwitch={() => setAuthPage("register")} />
          : <RegisterPage onLogin={handleLogin} onSwitch={() => setAuthPage("login")} />;
      }

      // Task actions
      const handleDone = async (taskId) => {
        try {
          await api.post(`/api/tasks/${taskId}/done`);
          showToast("Task selesai! ✅");
          fetchAll();
          setSelectedTask(null);
        } catch (err) { showToast(err.message, "error"); }
      };

      const handleDelete = async (taskId) => {
        if (!confirm("Hapus task ini?")) return;
        try {
          await api.del(`/api/tasks/${taskId}`);
          showToast("Task dihapus 🗑️");
          fetchAll();
          setSelectedTask(null);
        } catch (err) { showToast(err.message, "error"); }
      };

      const handleToggleFocus = async (taskId) => {
        try {
          const result = await api.post(`/api/tasks/${taskId}/focus`);
          showToast(result.is_focused ? "⭐ Ditambahkan ke Fokus" : "☆ Dihapus dari Fokus");
          fetchAll();
        } catch (err) { showToast(err.message, "error"); }
      };

      const handleSaved = () => {
        setShowForm(false);
        setEditTask(null);
        showToast(editTask ? "Task diupdate ✅" : "Task ditambahkan ✅");
        fetchAll();
      };

      const handleEdit = (task) => {
        setSelectedTask(null);
        setEditTask(task);
        setShowForm(true);
      };

      // Determine which tasks to show
      const getFilteredTasks = () => {
        if (page.startsWith("proj_")) {
          const projName = page.slice(5);
          return tasks.filter(t => t.project === projName && t.gtd_status !== "done" && t.gtd_status !== "archived");
        }
        switch (page) {
          case "inbox": return tasks.filter(t => t.gtd_status === "inbox");
          case "next": return tasks.filter(t => t.gtd_status === "next");
          case "waiting": return tasks.filter(t => t.gtd_status === "waiting");
          case "someday": return tasks.filter(t => t.gtd_status === "someday");
          case "q1": return tasks.filter(t => t.quadrant === "Q1" && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "q2": return tasks.filter(t => t.quadrant === "Q2" && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "q3": return tasks.filter(t => t.quadrant === "Q3" && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "q4": return tasks.filter(t => t.quadrant === "Q4" && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "overdue": return tasks.filter(t => t.is_overdue);
          case "done": return tasks.filter(t => t.gtd_status === "done");
          case "today": return tasks.filter(t => (t.quadrant === "Q1" || t.is_overdue || t.is_focused) && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "all": return tasks.filter(t => t.gtd_status !== "done" && t.gtd_status !== "archived");
          default: return tasks.filter(t => t.gtd_status !== "done" && t.gtd_status !== "archived");
        }
      };

      const getPageTitle = () => {
        if (page.startsWith("proj_")) return page.slice(5);
        const titles = {
          dashboard: "Dashboard", inbox: "Inbox", next: "Next Actions", waiting: "Waiting For",
          someday: "Someday / Maybe", q1: "Q1 — Do", q2: "Q2 — Schedule", q3: "Q3 — Delegate",
          q4: "Q4 — Eliminate", overdue: "Overdue", done: "Done", today: "Fokus Hari Ini", all: "Semua Task"
        };
        return titles[page] || "Tasks";
      };
      const getPageIcon = () => {
        if (page.startsWith("proj_")) return "📂";
        const icons = {
          dashboard: "📊", inbox: "📥", next: "▶️", waiting: "⏳", someday: "💭",
          q1: "🔥", q2: "📅", q3: "👋", q4: "🗑️", overdue: "⚠️", done: "✅", today: "🍅", all: "📋"
        };
        return icons[page] || "📋";
      };

      // Render content based on page
      const renderContent = () => {
        if (page === "dashboard") {
          return <Dashboard summary={summary} tasks={tasks} onTaskClick={setSelectedTask} onDone={handleDone} />;
        }
        
        if (page === "today") {
          return <TodayFocusView tasks={tasks} onTaskClick={setSelectedTask} onDone={handleDone} loading={loading} />;
        }

        return (
          <TaskListView
            tasks={getFilteredTasks()}
            allTasks={tasks}
            title={getPageTitle()}
            icon={getPageIcon()}
            onTaskClick={setSelectedTask}
            onDone={handleDone}
            onToggleFocus={handleToggleFocus}
            loading={loading}
            projects={projects}
            contexts={contexts}
            showFilters={page === "all" || page === "done" || page === "inbox" || page === "next" || page === "waiting" || page === "someday" || page.startsWith("proj_")}
          />
        );
      };

      return (
        <div>
          <Sidebar page={page} setPage={setPage} summary={summary} user={user} onLogout={logout} isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} projects={projects} tasks={tasks} />

          <div className="main-content">
            {/* Mobile top bar */}
            <div className="mobile-topbar">
              <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", padding: 0, lineHeight: 1 }}>☰</button>
              <div style={{ flex: 1, fontWeight: 700, fontSize: 16 }}>⚡ TaskFlow</div>
              <button className="btn btn-primary btn-sm" onClick={() => { setEditTask(null); setShowForm(true); }}>＋ Tambah</button>
            </div>

            {/* Desktop top bar */}
            <div className="desktop-topbar" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
              <div style={{ fontSize: 13, color: "var(--text-light)" }}>
                {new Date().toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
              </div>
              <button className="btn btn-primary" onClick={() => { setEditTask(null); setShowForm(true); }}>
                ＋ Tambah Task
              </button>
            </div>

            {/* Content */}
            {renderContent()}
          </div>

          {/* Modals */}
          {selectedTask && (
            <TaskDetailModal
              task={selectedTask}
              onClose={() => setSelectedTask(null)}
              onEdit={() => handleEdit(selectedTask)}
              onDone={() => handleDone(selectedTask.id)}
              onDelete={() => handleDelete(selectedTask.id)}
              onToggleFocus={handleToggleFocus}
            />
          )}

          {showForm && (
            <TaskFormModal
              task={editTask}
              onSave={handleSaved}
              onClose={() => { setShowForm(false); setEditTask(null); }}
              projects={projects}
              contexts={contexts}
            />
          )}

          {/* Toast */}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

          {/* Mobile overlay */}
          {sidebarOpen && <div onClick={() => setSidebarOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", zIndex: 30 }} />}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
