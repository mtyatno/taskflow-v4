          setLoadingSubs(true);
          api.get(`/api/tasks/${task.id}/subtasks`)
            .then(data => { setSubtasks(data); setLoadingSubs(false); })
            .catch(() => setLoadingSubs(false));
        }
      }, [task?.id]);

      // Fetch child tasks (full tasks with parent_id)
      const fetchChildTasks = () => {
        if (task?.id) {
          api.get(`/api/tasks/${task.id}/child-tasks`)
            .then(setChildTasks)
            .catch(() => setChildTasks([]));
        }
      };
      useEffect(() => { fetchChildTasks(); }, [task?.id]);

      useEffect(() => {
        if (task?.id) {
          api.get(`/api/tasks/${task.id}/tags`)
            .then(data => setTaskTags(data || []))
            .catch(() => setTaskTags([]));
        }
      }, [task?.id]);

      const removeTag = async (tagName) => {
        try {
          await api.del(`/api/tasks/${task.id}/tags/${encodeURIComponent(tagName)}`);
          setTaskTags(prev => prev.filter(t => t.name !== tagName));
        } catch (err) { console.error(err); }
      };

      const showTagTasks = async (tagName) => {
        try {
          const tasks = await api.get(`/api/tasks?tag=${encodeURIComponent(tagName)}&include_done=false`);
          setTagTasksModal({ tagName, tasks: tasks || [] });
        } catch (err) { console.error(err); }
      };

      const handleToggle = async (subId) => {
        try {
          const result = await api.post(`/api/subtasks/${subId}/toggle`);
          setSubtasks(prev => prev.map(s => s.id === subId ? result : s));
        } catch (err) { console.error(err); }
      };

      const handleAddSub = async () => {
        if (!newSub.trim() || addingSub) return;
        setAddingSub(true);
        try {
          const result = await api.post(`/api/tasks/${task.id}/subtasks`, { title: newSub.trim(), client_id: subClientId.current });
          setSubtasks(prev => [...prev, result]);
          setNewSub("");
          setAdding(false);
          subClientId.current = genId();
        } catch (err) { console.error(err); }
        finally { setAddingSub(false); }
      };

      const handleDeleteSub = async (subId) => {
        try {
          await api.del(`/api/subtasks/${subId}`);
          setSubtasks(prev => prev.filter(s => s.id !== subId));
        } catch (err) { console.error(err); }
      };

      const handleAddChildTask = async () => {
        if (!newChildTitle.trim() || addingChild) return;
        setAddingChild(true);
        try {
          await api.post("/api/tasks", { title: newChildTitle.trim(), gtd_status: newChildGtd, parent_id: task.id });
          setNewChildTitle("");
          setNewChildGtd("inbox");
          fetchChildTasks();
        } catch (err) { console.error(err); }
        finally { setAddingChild(false); }
      };

      const handleSave = async () => {
        setSaving(true);
        try {
          await api.put(`/api/tasks/${task.id}`, form);
          onRefresh?.();
          onClose();
        } catch (err) {
          if (isOfflineErr(err) && onOfflineEdit) {
            await OfflineDB.queueAdd({ method: "PUT", url: `/api/tasks/${task.id}`, body: form });
            onOfflineEdit(task.id, form);
            onClose();
          } else {
            alert(err.message);
          }
        }
        setSaving(false);
      };

      const doneCount = subtasks.filter(s => s.is_done).length;
      const totalSubs = subtasks.length;
      const progress = totalSubs > 0 ? Math.round(doneCount / totalSubs * 100) : 0;

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content scale-in" onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 16 }}>
              <div style={{ flex: 1, minWidth: 0, marginRight: 12 }}>
                <div style={{ fontSize: 12, color: "var(--text-light)", marginBottom: 4 }}>#{task.id}</div>
                {isEditing
                  ? <input className="input" value={form.title} onChange={e => setF("title", e.target.value)} style={{ fontSize: 16, fontWeight: 700, width: "100%" }} />
                  : <h2 style={{ fontSize: 20, fontWeight: 700, lineHeight: 1.3 }}>{task.title}</h2>
                }
              </div>
              <span onClick={onClose} style={{ cursor: "pointer", fontSize: 20, color: "var(--text-light)" }}>✕</span>
            </div>

            {/* Parent task banner */}
            {task.parent_id && (
              <div style={{ background: "#eff6ff", border: "1px solid #bfdbfe", borderRadius: 8, padding: "7px 12px", marginBottom: 14, fontSize: 13, color: "#1d4ed8" }}>
                ↳ Subtask dari: <b>#{task.parent_id}</b> {task.parent_title && `— ${task.parent_title}`}
              </div>
            )}

            {isEditing ? (
              <div style={{ marginBottom: 16 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                  <div>
                    <label className="input-label">Priority</label>
                    <select className="input" value={form.priority} onChange={e => setF("priority", e.target.value)}>
                      <option value="P1">🔴 P1 Critical</option>
                      <option value="P2">🟠 P2 High</option>
                      <option value="P3">🟡 P3 Medium</option>
                      <option value="P4">🟢 P4 Low</option>
                    </select>
                  </div>
                  <div>
                    <label className="input-label">GTD Status</label>
                    <select className="input" value={form.gtd_status} onChange={e => setF("gtd_status", e.target.value)}>
                      <option value="inbox">📥 Inbox</option>
                      <option value="next">▶️ Next</option>
                      <option value="waiting">⏳ Waiting</option>
                      <option value="someday">💭 Someday</option>
                      <option value="done">✅ Done</option>
                    </select>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                  <div>
                    <label className="input-label">Project</label>
                    <ComboSelect value={form.project} onChange={v => setF("project", v)} options={projects} placeholder="— Project —" icon="📁" />
                  </div>
                  <div>
                    <label className="input-label">Context</label>
                    <ComboSelect value={form.context} onChange={v => setF("context", v)} options={contexts} placeholder="— Context —" icon="🏷️" />
                  </div>
                </div>
                <div style={{ marginBottom: 10 }}>
                  <label className="input-label">Deadline</label>
                  <input className="input" type="date" value={form.deadline} onChange={e => setF("deadline", e.target.value)} />
                </div>
                {form.gtd_status === "waiting" && (
                  <div style={{ marginBottom: 10 }}>
                    <label className="input-label">Waiting For</label>
                    <input className="input" value={form.waiting_for} onChange={e => setF("waiting_for", e.target.value)} placeholder="Menunggu siapa/apa" />
                  </div>
                )}
                {task.list_id && (
                  <div style={{ marginBottom: 10 }}>
                    <label className="input-label">Assign ke</label>
                    <select className="input" value={form.assigned_to || ""} onChange={e => setF("assigned_to", e.target.value ? parseInt(e.target.value) : null)}>
                      <option value="">— Tidak ada —</option>
                      {listMembers.map(u => (
                        <option key={u.id} value={u.id}>
                          {u.display_name || u.username} {u.is_self ? "(Saya)" : `(@${u.username})`}
                        </option>
                      ))}
                    </select>
                  </div>
                )}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <label className="input-label" style={{ marginBottom: 0 }}>Progress</label>
                    <span style={{ fontSize: 13, fontWeight: 700, color: form.progress === 100 ? "#22c55e" : "var(--accent)" }}>{form.progress || 0}%</span>
                  </div>
                  <input type="range" min="0" max="100" step="5" value={form.progress || 0}
                    onChange={e => setF("progress", parseInt(e.target.value))}
                    style={{ width: "100%", accentColor: form.progress === 100 ? "#22c55e" : "var(--accent)" }} />
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "var(--text-light)", marginTop: 2 }}>
                    <span>0%</span><span>50%</span><span>100%</span>
                  </div>
                </div>
                <div>
                  <label className="input-label">Deskripsi</label>
                  <MentionInput as="textarea" collaborators={collaborators} className="input" value={form.description} onChange={e => setF("description", e.target.value)} rows={3} style={{ resize: "vertical" }} />
                </div>
              </div>
            ) : (
              <>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
                  <StatusBadge s={task.gtd_status} />
                  <PriBadge p={task.priority} />
                  <QuadBadge q={task.quadrant} />
                </div>

                {taskTags.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12, alignItems: "center" }}>
                    {(tagsExpanded ? taskTags : taskTags.slice(0, 3)).map(tag => (
                      <span
                        key={tag.id}
                        title="Klik untuk lihat semua task dengan tag ini"
                        onClick={() => showTagTasks(tag.name)}
                        style={{
                          display: "inline-flex", alignItems: "center", gap: 4,
                          background: "rgba(168,197,0,0.10)", color: "var(--accent)",
                          border: "1px solid rgba(168,197,0,0.25)", borderRadius: 999,
                          fontSize: 11, fontWeight: 600, padding: "2px 8px 2px 6px",
                          cursor: "pointer", userSelect: "none",
                          transition: "background 0.15s"
                        }}
                        onMouseEnter={e => e.currentTarget.style.background = "rgba(168,197,0,0.22)"}
                        onMouseLeave={e => e.currentTarget.style.background = "rgba(168,197,0,0.10)"}
                      >
                        <span style={{ opacity: 0.7 }}>#</span>{tag.name}
                        <span
                          onClick={e => { e.stopPropagation(); removeTag(tag.name); }}
                          style={{ marginLeft: 2, opacity: 0.5, fontWeight: 400, fontSize: 13, lineHeight: 1, cursor: "pointer" }}
                          onMouseEnter={e => { e.stopPropagation(); e.currentTarget.style.opacity = "1"; }}
                          onMouseLeave={e => { e.stopPropagation(); e.currentTarget.style.opacity = "0.5"; }}
                        >×</span>
                      </span>
                    ))}
                    {taskTags.length > 3 && (
                      <span
                        onClick={() => setTagsExpanded(e => !e)}
                        style={{
                          fontSize: 11, color: "var(--text-light)", cursor: "pointer",
                          padding: "2px 6px", borderRadius: 999,
                          border: "1px solid var(--border)"
                        }}
                      >
                        {tagsExpanded ? "‹ less" : `+${taskTags.length - 3} more`}
                      </span>
                    )}
                  </div>
                )}

                {task.description && <div style={{ padding: 12, background: "var(--bg-primary)", borderRadius: 8, fontSize: 14, marginBottom: 14, lineHeight: 1.6 }}>{task.description}</div>}

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontSize: 14, marginBottom: 16 }}>
                  {task.project && <div><span style={{ color: "var(--text-light)" }}>📁 Project:</span> {task.project}</div>}
                  {task.context && <div><span style={{ color: "var(--text-light)" }}>🏷️ Context:</span> {task.context}</div>}
                  {task.deadline && <div><span style={{ color: "var(--text-light)" }}>📅 Deadline:</span> {formatDate(task.deadline)} {task.is_overdue && <span className="overdue-indicator" />}</div>}
                  {task.waiting_for && <div><span style={{ color: "var(--text-light)" }}>⏳ Waiting:</span> {task.waiting_for}</div>}
                  {task.assigned_to && <div><span style={{ color: "var(--text-light)" }}>👤 Assigned:</span> <b>{task.assigned_to_name || "?"}</b></div>}
                  {task.created_at && <div><span style={{ color: "var(--text-light)" }}>🕐 Created:</span> {task.created_at?.split("T")[0]}</div>}
                </div>
                {/* Progress bar */}
                {task.gtd_status !== "done" && (
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: "var(--text-secondary)" }}>Progress</span>
                      <span style={{ fontSize: 13, fontWeight: 700, color: (task.progress || 0) === 100 ? "#22c55e" : "var(--accent)" }}>{task.progress || 0}%</span>
                    </div>
                    <div style={{ height: 8, background: "#e2e8f0", borderRadius: 4, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${task.progress || 0}%`, background: (task.progress || 0) === 100 ? "#22c55e" : "var(--accent)", borderRadius: 4, transition: "width 0.4s" }} />
                    </div>
                  </div>
                )}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontSize: 14, marginBottom: 16 }}>
                  {task.completed_at && <div><span style={{ color: "var(--text-light)" }}>✅ Done:</span> {task.completed_at?.split("T")[0]}</div>}
                </div>
              </>
            )}

            {/* Child Tasks (Subtask) Section */}
            <div style={{ borderTop: "1px solid var(--border)", paddingTop: 14, marginBottom: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10 }}>📌 Subtask
                {childTasks.length > 0 && <span style={{ fontWeight: 400, color: "var(--text-light)", fontSize: 13 }}> ({childTasks.length})</span>}
              </div>
              {childTasks.map(ct => {
                const priColor = { P1: "#fee2e2", P2: "#ffedd5", P3: "#fef9c3", P4: "#dcfce7" };
                return (
                  <div key={ct.id} onClick={() => { onOpenTask ? onOpenTask(ct) : onClose(); }}
                    style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", borderRadius: 6, marginBottom: 4, cursor: "pointer",
                      background: priColor[ct.priority] || "var(--bg-page)", border: "1px solid var(--border)", transition: "opacity 0.15s" }}
                    onMouseEnter={e => e.currentTarget.style.opacity = "0.75"}
                    onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
                    <PriBadge p={ct.priority} />
                    <span style={{ flex: 1, fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                      textDecoration: ct.gtd_status === "done" ? "line-through" : "none",
                      color: ct.gtd_status === "done" ? "var(--text-light)" : "var(--text-primary)" }}>{ct.title}</span>
                    <StatusBadge s={ct.gtd_status} />
                  </div>
                );
              })}
              {/* Quick-add child task */}
              <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                <input className="input" value={newChildTitle} onChange={e => setNewChildTitle(e.target.value)}
                  placeholder="Judul subtask baru..."
                  onKeyDown={e => { if (e.key === "Enter") handleAddChildTask(); }}
                  style={{ flex: 1, padding: "5px 8px", fontSize: 13 }} />
                <select className="input" value={newChildGtd} onChange={e => setNewChildGtd(e.target.value)}
                  style={{ width: 100, padding: "5px 6px", fontSize: 12 }}>
                  <option value="inbox">📥 Inbox</option>
                  <option value="next">▶️ Next</option>
                  <option value="waiting">⏳ Waiting</option>
                  <option value="someday">💭 Someday</option>
                </select>
                <button className="btn btn-primary btn-sm" onClick={handleAddChildTask} disabled={addingChild || !newChildTitle.trim()}
                  style={{ fontSize: 12, whiteSpace: "nowrap" }}>{addingChild ? "..." : "＋"}</button>
              </div>
            </div>

            {/* Checklist Section (simple is_done items) */}
            <div style={{ borderTop: "1px solid var(--border)", paddingTop: 14, marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <div style={{ fontSize: 14, fontWeight: 700 }}>
                  ✅ Checklist {totalSubs > 0 && <span style={{ fontWeight: 400, color: "var(--text-light)" }}>{doneCount}/{totalSubs}</span>}
                </div>
                {!adding && (
                  <button className="btn btn-sm btn-secondary" onClick={() => setAdding(true)} style={{ fontSize: 12 }}>＋ Tambah</button>
                )}
              </div>

              {/* Progress bar */}
              {totalSubs > 0 && (
                <div style={{ marginBottom: 10 }}>
                  <div style={{ height: 6, background: "#e2e8f0", borderRadius: 3, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${progress}%`, background: progress === 100 ? "var(--success)" : "var(--accent)", borderRadius: 3, transition: "width 0.3s" }} />
                  </div>
                </div>
              )}

              {/* Subtask list */}
              {loadingSubs ? (
                <div style={{ fontSize: 13, color: "var(--text-light)", padding: "8px 0" }}>Loading...</div>
              ) : (
                subtasks.map(s => (
                  <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: "1px solid #f1f5f9" }}>
                    <div
                      onClick={() => handleToggle(s.id)}
                      style={{
                        width: 20, height: 20, borderRadius: 4, flexShrink: 0, cursor: "pointer",
                        border: s.is_done ? "2px solid var(--success)" : "2px solid #d1d5db",
                        background: s.is_done ? "var(--success)" : "transparent",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        transition: "all 0.15s",
                      }}
                    >
                      {s.is_done && <span style={{ color: "white", fontSize: 12, lineHeight: 1 }}>✓</span>}
                    </div>
                    <span style={{
                      flex: 1, fontSize: 14, lineHeight: 1.4,
                      textDecoration: s.is_done ? "line-through" : "none",
                      color: s.is_done ? "var(--text-light)" : "var(--text-primary)",
                    }}>{s.title}</span>
                    <span
                      onClick={() => handleDeleteSub(s.id)}
                      style={{ cursor: "pointer", fontSize: 14, color: "var(--text-light)", padding: "0 4px" }}
                      title="Hapus subtask"
                    >✕</span>
                  </div>
                ))
              )}

              {/* Add subtask input */}
              {adding && (
                <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                  <MentionInput
                    collaborators={collaborators}
                    className="input"
                    value={newSub}
                    onChange={e => setNewSub(e.target.value)}
                    placeholder="Judul subtask..."
                    autoFocus
                    onKeyDown={e => { if (e.key === "Enter") handleAddSub(); if (e.key === "Escape") { setAdding(false); setNewSub(""); } }}
                    style={{ flex: 1, padding: "6px 10px", fontSize: 13 }}
                  />
                  <button className="btn btn-primary btn-sm" onClick={handleAddSub} disabled={addingSub || !newSub.trim()} style={{ fontSize: 12 }}>{addingSub ? "..." : "Tambah"}</button>
                  <button className="btn btn-secondary btn-sm" onClick={() => { setAdding(false); setNewSub(""); }} disabled={addingSub} style={{ fontSize: 12 }}>Batal</button>
                </div>
              )}

              {!loadingSubs && totalSubs === 0 && !adding && (
                <div style={{ fontSize: 13, color: "var(--text-light)", fontStyle: "italic", padding: "4px 0" }}>Belum ada checklist</div>
              )}
            </div>

            {/* Notes Section */}
            <ModalNotes taskId={task.id} collaborators={collaborators} />
            <ModalAttachments taskId={task.id} />

            {isEditing ? (
              <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", flexWrap: "wrap" }}>
                <button className="btn btn-secondary btn-sm" onClick={() => { setIsEditing(false); resetForm(); }}>Batal</button>
                <button className="btn btn-primary btn-sm" onClick={handleSave} disabled={saving}>{saving ? "Menyimpan..." : "💾 Simpan"}</button>
              </div>
            ) : (
              <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", flexWrap: "wrap" }}>
                <button className="btn btn-danger btn-sm" onClick={onDelete}>🗑️ Hapus</button>
                {task.gtd_status !== "done" && onToggleFocus && (
                  <button className="btn btn-sm" onClick={() => { onToggleFocus(task.id); onClose(); }}
                    style={{ background: task.is_focused ? "#fef3c7" : "#f8fafc", color: task.is_focused ? "#b45309" : "var(--text-secondary)", border: task.is_focused ? "1px solid #fde68a" : "1px solid var(--border)" }}>
                    {task.is_focused ? "⭐ Fokus" : "☆ Fokus"}
                  </button>
                )}
                <button className="btn btn-secondary btn-sm" onClick={() => setIsEditing(true)}>✏️ Edit</button>
                {task.gtd_status !== "done" && <button className="btn btn-success btn-sm" onClick={onDone}>✅ Done</button>}
              </div>
            )}
            {tagTasksModal && (
              <div style={{
                position: "absolute", inset: 0, background: "rgba(0,0,0,0.6)",
                borderRadius: "inherit", zIndex: 10, display: "flex", flexDirection: "column",
                padding: 20, overflow: "hidden"
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <span style={{ fontWeight: 700, fontSize: 15 }}>
                    Task dengan tag <span style={{ color: "var(--accent)" }}>#{tagTasksModal.tagName}</span>
                    <span style={{ fontWeight: 400, color: "var(--text-light)", fontSize: 13, marginLeft: 8 }}>({tagTasksModal.tasks.length})</span>
                  </span>
                  <button onClick={() => setTagTasksModal(null)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "var(--text-light)", lineHeight: 1 }}>×</button>
                </div>
                <div style={{ overflowY: "auto", flex: 1, display: "flex", flexDirection: "column", gap: 8 }}>
                  {tagTasksModal.tasks.length === 0
                    ? <div style={{ color: "var(--text-light)", fontSize: 13 }}>Tidak ada task lain dengan tag ini.</div>
                    : tagTasksModal.tasks.map(t => (
                      <div key={t.id} style={{
                        background: "var(--bg-card)", borderRadius: 8, padding: "10px 12px",
                        border: "1px solid var(--border)", fontSize: 13
                      }}>
                        <div style={{ fontWeight: 600, marginBottom: 2 }}>{t.title}</div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          <StatusBadge s={t.gtd_status} />
                          <PriBadge p={t.priority} />
                          {t.project && <span style={{ fontSize: 11, color: "var(--text-light)" }}>📁 {t.project}</span>}
                        </div>
                      </div>
                    ))
                  }
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Task Row ────────────────────────────────────────────────
    function TaskRow({ task, onClick, onDone, onToggleFocus }) {
      return (
        <div className="task-row fade-in" onClick={() => onClick(task)}>
          <div className="check-btn" onClick={e => { e.stopPropagation(); onDone(task.id); }} title="Tandai selesai">
            {task.gtd_status === "done" && <span className="check-icon" style={{ color: "var(--success)", fontSize: 14 }}>✓</span>}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="task-row-header">
              <div style={{ display: "flex", gap: 6, alignItems: "center", flex: 1, minWidth: 0 }}>
                {task.is_focused && <span style={{ fontSize: 14 }} title="Fokus Hari Ini">⭐</span>}
                <div style={{ fontSize: 14, fontWeight: 500, lineHeight: 1.5, textDecoration: task.gtd_status === "done" ? "line-through" : "none", color: task.gtd_status === "done" ? "var(--text-light)" : "var(--text-primary)" }}>
                  {task.title}
                </div>
              </div>
              <div className="task-row-badges">
                {onToggleFocus && task.gtd_status !== "done" && (
                  <span
                    onClick={e => { e.stopPropagation(); onToggleFocus(task.id); }}
                    style={{ cursor: "pointer", fontSize: 16, opacity: task.is_focused ? 1 : 0.3, transition: "opacity 0.15s" }}
                    title={task.is_focused ? "Hapus dari Fokus" : "Tambah ke Fokus Hari Ini"}
                  >{task.is_focused ? "⭐" : "☆"}</span>
                )}
                <PriBadge p={task.priority} />
                <QuadBadge q={task.quadrant} />
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 4, flexWrap: "wrap", alignItems: "center" }}>
              {task._pending && <span style={{ fontSize: 10, background: "#fef3c7", color: "#d97706", padding: "1px 5px", borderRadius: 3, fontWeight: 600 }}>⏳ pending</span>}
              {task.parent_id && <span style={{ fontSize: 11, color: "var(--text-light)" }}>↳ sub #{task.parent_id}</span>}
              {task.list_id && <span style={{ fontSize: 11, background: "var(--accent)", color: "white", padding: "1px 5px", borderRadius: 3 }}>👥 shared</span>}
              {task.assigned_to && <span style={{ fontSize: 11, background: "#dbeafe", color: "#1d4ed8", padding: "1px 6px", borderRadius: 3, fontWeight: 600 }}>👤 {task.assigned_to_name || "?"}</span>}
              {task.project && <span style={{ fontSize: 12, color: "var(--text-light)" }}>📁 {task.project}</span>}
              {task.context && <span style={{ fontSize: 12, color: "var(--text-light)" }}>{task.context}</span>}
              {task.deadline && <span style={{ fontSize: 12, color: task.is_overdue ? "#ef4444" : "var(--text-light)" }}>
                📅 {formatDate(task.deadline)} {task.is_overdue && <span className="overdue-indicator" />}
              </span>}
            </div>
            {task.gtd_status !== "done" && (
              <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ flex: 1, height: 4, background: "#e2e8f0", borderRadius: 2, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${task.progress || 0}%`, background: (task.progress || 0) === 100 ? "#22c55e" : "var(--accent)", borderRadius: 2, transition: "width 0.3s" }} />
                </div>
                <span style={{ fontSize: 11, color: "var(--text-light)", minWidth: 28, textAlign: "right" }}>{task.progress || 0}%</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Task Row with Focus Button (for Today page) ─────────────
    function FocusTaskRow({ task, onClick, onDone, onStartFocus, isFocusing, hasFocusTask, pomodoroCount }) {
      const isOtherFocused = hasFocusTask && !isFocusing;
      return (
        <div className={`task-row fade-in ${isFocusing ? 'focusing' : ''}`} onClick={() => onClick(task)}>
          <div className="check-btn" onClick={e => { e.stopPropagation(); onDone(task.id); }} title="Tandai selesai">
            {task.gtd_status === "done" && <span className="check-icon" style={{ color: "var(--success)", fontSize: 14 }}>✓</span>}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
              <div style={{ fontSize: 14, fontWeight: 500, lineHeight: 1.5 }}>
                {task.title}
              </div>
              <div style={{ display: "flex", gap: 4, flexShrink: 0, alignItems: "center" }}>
                {pomodoroCount > 0 && (
                  <span style={{ fontSize: 12, marginRight: 4 }}>
                    {'🍅'.repeat(Math.min(pomodoroCount, 5))}
                    {pomodoroCount > 5 && <span style={{ color: 'var(--text-light)', fontSize: 11 }}>+{pomodoroCount - 5}</span>}
                  </span>
                )}
                <PriBadge p={task.priority} />
                <QuadBadge q={task.quadrant} />
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 4, flexWrap: "wrap", alignItems: "center" }}>
              {task.project && <span style={{ fontSize: 12, color: "var(--text-light)" }}>📁 {task.project}</span>}
              {task.context && <span style={{ fontSize: 12, color: "var(--text-light)" }}>{task.context}</span>}
              {task.deadline && <span style={{ fontSize: 12, color: task.is_overdue ? "#ef4444" : "var(--text-light)" }}>
                📅 {formatDate(task.deadline)} {task.is_overdue && <span className="overdue-indicator" />}
              </span>}
            </div>
          </div>
          <button
            className={`task-focus-btn ${isFocusing ? 'active' : isOtherFocused ? 'disabled' : 'start'}`}
            onClick={e => { e.stopPropagation(); if (!isOtherFocused) onStartFocus(task); }}
            disabled={isOtherFocused}
            title={isOtherFocused ? "Selesaikan task aktif dulu" : isFocusing ? "Klik untuk berhenti fokus" : "Mulai fokus task ini"}
          >
            {isFocusing ? '🎯 Sedang Dikerjakan' : '▶ Focus'}
          </button>
        </div>
      );
    }

    // ── Filter Chip ────────────────────────────────────────────
    function FilterChip({ label, active, onClick }) {
      return (
        <span onClick={onClick} style={{
          display: "inline-flex", alignItems: "center", padding: "4px 12px", borderRadius: 20,
          fontSize: 13, fontWeight: 500, cursor: "pointer", transition: "all 0.15s", whiteSpace: "nowrap",
          background: active ? "var(--accent)" : "#f1f5f9",
          color: active ? "white" : "var(--text-secondary)",
          border: active ? "1px solid var(--accent)" : "1px solid var(--border)",
        }}>{label}</span>
      );
    }

    // ══════════════════════════════════════════════════════════════
    //  POMODORO TIMER COMPONENT
    // ══════════════════════════════════════════════════════════════
    function PomodoroTimer({ focusTask, onComplete, taskPomodoros, setTaskPomodoros }) {
      // Timer states
      const [mode, setMode] = useState("work"); // work, shortBreak, longBreak
      const [timeLeft, setTimeLeft] = useState(25 * 60); // seconds
      const [isRunning, setIsRunning] = useState(false);
      const [sessionCount, setSessionCount] = useState(0);
      const [totalFocusTime, setTotalFocusTime] = useState(0); // in seconds
      const intervalRef = useRef(null);

      // Timer durations
      const DURATIONS = {
        work: 25 * 60,
        shortBreak: 5 * 60,
        longBreak: 15 * 60,
      };

      // Request notification permission on mount
      useEffect(() => {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission();
        }
      }, []);

      // Timer logic
      useEffect(() => {
        if (isRunning && timeLeft > 0) {
          intervalRef.current = setInterval(() => {
            setTimeLeft(t => t - 1);
            if (mode === "work") {
              setTotalFocusTime(t => t + 1);
            }
          }, 1000);
        } else if (timeLeft === 0) {
          handleTimerComplete();
        }
        
        return () => clearInterval(intervalRef.current);
      }, [isRunning, timeLeft]);

      const handleTimerComplete = () => {
        setIsRunning(false);
        clearInterval(intervalRef.current);
        
        if (mode === "work") {
          // Work session completed
          const newSessionCount = sessionCount + 1;
          setSessionCount(newSessionCount);
          
          // Update pomodoro count for the focused task
          if (focusTask) {
            setTaskPomodoros(prev => ({
              ...prev,
              [focusTask.id]: (prev[focusTask.id] || 0) + 1
            }));
          }
          
          playNotificationSound("work");
          sendBrowserNotification("🍅 Pomodoro Selesai!", "Saatnya istirahat sebentar.");
          
          // Determine next break type
          if (newSessionCount % 4 === 0) {
            setMode("longBreak");
            setTimeLeft(DURATIONS.longBreak);
          } else {
            setMode("shortBreak");
            setTimeLeft(DURATIONS.shortBreak);
          }
          
          onComplete?.("work");
        } else {
          // Break completed
          playNotificationSound("break");
          sendBrowserNotification("☕ Istirahat Selesai!", "Siap untuk fokus lagi?");
          setMode("work");
          setTimeLeft(DURATIONS.work);
          onComplete?.("break");
        }
      };

      const startTimer = () => setIsRunning(true);
      const pauseTimer = () => setIsRunning(false);
      const resetTimer = () => {
        setIsRunning(false);
        setTimeLeft(DURATIONS[mode]);
      };
      const skipTimer = () => {
        setIsRunning(false);
        if (mode === "work") {
          // Skip to break
          if ((sessionCount + 1) % 4 === 0) {
            setMode("longBreak");
            setTimeLeft(DURATIONS.longBreak);
          } else {
            setMode("shortBreak");
            setTimeLeft(DURATIONS.shortBreak);
          }
        } else {
          // Skip break, go to work
          setMode("work");
          setTimeLeft(DURATIONS.work);
        }
      };

      // Format time
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      const timeDisplay = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      
      // Progress calculation
      const totalTime = DURATIONS[mode];
      const progress = ((totalTime - timeLeft) / totalTime) * 100;
      const circumference = 2 * Math.PI * 90;
      const strokeDashoffset = circumference - (progress / 100) * circumference;

      // Colors based on mode
      const isBreak = mode !== "work";
      const primaryColor = isBreak ? "#22c55e" : "#ef4444";
      const labelText = mode === "work" ? "FOKUS" : mode === "shortBreak" ? "ISTIRAHAT" : "ISTIRAHAT PANJANG";

      // Format total focus time
      const formatFocusTime = (secs) => {
        const hrs = Math.floor(secs / 3600);
        const mins = Math.floor((secs % 3600) / 60);
        if (hrs > 0) return `${hrs}j ${mins}m`;
        return `${mins}m`;
      };

      return (
        <div className="pomodoro-container scale-in">
          <div className="pomodoro-header" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, position: "relative", zIndex: 1 }}>
            <div>
              <h2 className="pomodoro-header-title" style={{ fontSize: 22, fontWeight: 700 }}>🍅 Pomodoro Timer</h2>
              <p className="pomodoro-header-subtitle" style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", marginTop: 4 }}>
                {isBreak ? "Istirahat sebentar..." : "Fokus pada satu task"}
              </p>
            </div>
            <div className="pomodoro-mode-btns" style={{ display: "flex", gap: 8 }}>
              <span 
                className="pomodoro-mode-btn"
                onClick={() => { setMode("work"); setTimeLeft(DURATIONS.work); setIsRunning(false); }}
                style={{ 
                  padding: "6px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  background: mode === "work" ? "rgba(239,68,68,0.2)" : "rgba(255,255,255,0.1)",
                  color: mode === "work" ? "#fca5a5" : "rgba(255,255,255,0.6)"
                }}
              >Work</span>
              <span 
                className="pomodoro-mode-btn"
                onClick={() => { setMode("shortBreak"); setTimeLeft(DURATIONS.shortBreak); setIsRunning(false); }}
                style={{ 
                  padding: "6px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  background: mode === "shortBreak" ? "rgba(34,197,94,0.2)" : "rgba(255,255,255,0.1)",
                  color: mode === "shortBreak" ? "#86efac" : "rgba(255,255,255,0.6)"
                }}
              >Short</span>
              <span 
                className="pomodoro-mode-btn"
                onClick={() => { setMode("longBreak"); setTimeLeft(DURATIONS.longBreak); setIsRunning(false); }}
                style={{ 
                  padding: "6px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  background: mode === "longBreak" ? "rgba(34,197,94,0.2)" : "rgba(255,255,255,0.1)",
                  color: mode === "longBreak" ? "#86efac" : "rgba(255,255,255,0.6)"
                }}
              >Long</span>
            </div>
          </div>

          <div className="pomodoro-timer" style={isRunning ? { filter: `drop-shadow(0 0 16px ${primaryColor}90)`, transition: "filter 0.5s ease" } : { transition: "filter 0.5s ease" }}>
            <div className="pomodoro-circle">
              <svg viewBox="0 0 200 200" style={{ width: "100%", height: "100%" }}>
                {/* Background circle */}
                <circle
                  cx="100" cy="100" r="90"
                  fill="none"
                  stroke="rgba(255,255,255,0.1)"
                  strokeWidth="8"
                />
                {/* Progress circle */}
                <circle
                  cx="100" cy="100" r="90"
                  fill="none"
                  stroke={primaryColor}
                  strokeWidth="8"
                  strokeLinecap="round"
                  strokeDasharray={circumference}
                  strokeDashoffset={strokeDashoffset}
                  style={{ transition: "stroke-dashoffset 0.5s ease" }}
                />
              </svg>
              <div className="pomodoro-time" style={{ color: primaryColor }}>{timeDisplay}</div>
              <div className="pomodoro-label">{labelText}</div>
            </div>
          </div>

          <div className="pomodoro-controls">
            {!isRunning ? (
              <button className={`pomodoro-btn pomodoro-btn-play ${isBreak ? 'break' : ''}`} onClick={startTimer} title="Start">
                ▶
              </button>
            ) : (
              <button className="pomodoro-btn pomodoro-btn-pause" onClick={pauseTimer} title="Pause">
                ⏸
              </button>
            )}
            <button className="pomodoro-btn pomodoro-btn-reset" onClick={resetTimer} title="Reset">
              ↺
            </button>
            <button className="pomodoro-btn pomodoro-btn-skip" onClick={skipTimer} title="Skip">
              ⏭
            </button>
          </div>

          {/* Focus Task Card */}
          {focusTask && (
            <div className="focus-task-card">
              <span style={{ fontSize: 20 }}>🎯</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.5)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 3 }}>Task Aktif</div>
                <div className="focus-task-title">{focusTask.title}</div>
              </div>
              <div className="focus-task-pomodoros">
                🍅 {taskPomodoros[focusTask.id] || 0}
              </div>
            </div>
          )}

          {/* Daily Stats */}
          <div className="pomodoro-stats">
            <div className="pomodoro-stat">
              <div className="pomodoro-stat-value" style={{ color: "#ef4444" }}>{sessionCount}</div>
              <div className="pomodoro-stat-label">Pomodoro</div>
            </div>
            <div className="pomodoro-stat">
              <div className="pomodoro-stat-value" style={{ color: "#22c55e" }}>{formatFocusTime(totalFocusTime)}</div>
              <div className="pomodoro-stat-label">Waktu Fokus</div>
            </div>
            <div className="pomodoro-stat">
              <div className="pomodoro-stat-value" style={{ color: "#A8C500" }}>{Math.floor(sessionCount / 4)}</div>
              <div className="pomodoro-stat-label">Set Lengkap</div>
            </div>
          </div>
        </div>
      );
    }

    // ── Inline Subtask Checklist (for Focus page) ──────────────
    function FocusSubtasks({ taskId }) {
      const [subtasks, setSubtasks] = useState([]);
      const [newSub, setNewSub] = useState("");
      const [adding, setAdding] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const clientId = useRef(genId());

      const fetchSubs = useCallback(() => {
        api.get(`/api/tasks/${taskId}/subtasks`)
          .then(data => setSubtasks(data))
          .catch(() => {});
      }, [taskId]);

      useEffect(() => { fetchSubs(); }, [fetchSubs]);

      // Auto-refresh every 15 seconds
      useEffect(() => {
        const interval = setInterval(fetchSubs, 15000);
        return () => clearInterval(interval);
      }, [fetchSubs]);

      const handleToggle = async (subId) => {
        try {
          const result = await api.post(`/api/subtasks/${subId}/toggle`);
          setSubtasks(prev => prev.map(s => s.id === subId ? result : s));
        } catch (err) { console.error(err); }
      };

      const handleAdd = async () => {
        if (!newSub.trim() || submitting) return;
        setSubmitting(true);
        try {
          const result = await api.post(`/api/tasks/${taskId}/subtasks`, { title: newSub.trim(), client_id: clientId.current });
          setSubtasks(prev => [...prev, result]);
          setNewSub("");
          clientId.current = genId();
        } catch (err) { console.error(err); }
        finally { setSubmitting(false); }
      };

      const doneCount = subtasks.filter(s => s.is_done).length;
      const total = subtasks.length;

      return (
        <div style={{ padding: "8px 16px 12px 52px", background: "rgba(239,68,68,0.03)", borderBottom: "1px solid var(--border)" }} className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "var(--text-secondary)" }}>
              📝 Subtasks {total > 0 && `${doneCount}/${total}`}
            </span>
            {!adding && (
              <span onClick={() => setAdding(true)} style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>＋ Tambah</span>
            )}
          </div>

          {total > 0 && (
            <div style={{ height: 4, background: "#e2e8f0", borderRadius: 2, marginBottom: 6, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${total > 0 ? doneCount/total*100 : 0}%`, background: doneCount === total ? "var(--success)" : "var(--accent)", borderRadius: 2, transition: "width 0.3s" }} />
            </div>
          )}

          {subtasks.map(s => (
            <div key={s.id} onClick={() => handleToggle(s.id)} style={{
              display: "flex", alignItems: "center", gap: 8, padding: "4px 0", cursor: "pointer",
            }}>
              <div style={{
                width: 16, height: 16, borderRadius: 3, flexShrink: 0,
                border: s.is_done ? "2px solid var(--success)" : "2px solid #d1d5db",
                background: s.is_done ? "var(--success)" : "transparent",
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                {s.is_done && <span style={{ color: "white", fontSize: 10 }}>✓</span>}
              </div>
              <span style={{
                fontSize: 13,
                textDecoration: s.is_done ? "line-through" : "none",
                color: s.is_done ? "var(--text-light)" : "var(--text-primary)",
              }}>{s.title}</span>
            </div>
          ))}

          {adding && (
            <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
              <input
                className="input"
                value={newSub}
                onChange={e => setNewSub(e.target.value)}
                placeholder="Subtask baru..."
                autoFocus
                onKeyDown={e => { if (e.key === "Enter") handleAdd(); if (e.key === "Escape") { setAdding(false); setNewSub(""); } }}
                style={{ flex: 1, padding: "4px 8px", fontSize: 12 }}
              />
              <button className="btn btn-primary btn-sm" onClick={handleAdd} disabled={submitting || !newSub.trim()} style={{ fontSize: 11, padding: "4px 10px" }}>{submitting ? "..." : "OK"}</button>
            </div>
          )}

          {total === 0 && !adding && (
            <div style={{ fontSize: 12, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada subtask — klik + untuk menambah</div>
          )}
        </div>
      );
    }

    // ── Inline Notes (for Focus page and Task Detail) ──────────
    function FocusNotes({ taskId }) {
      const [notes, setNotes] = useState([]);
      const [newNote, setNewNote] = useState("");
      const [expanded, setExpanded] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const clientId = useRef(genId());

      const fetchNotes = useCallback(() => {
        api.get(`/api/tasks/${taskId}/notes`)
          .then(data => setNotes(data))
          .catch(() => {});
      }, [taskId]);

      useEffect(() => { fetchNotes(); }, [fetchNotes]);

      // Auto-refresh every 15 seconds
      useEffect(() => {
        const interval = setInterval(fetchNotes, 15000);
        return () => clearInterval(interval);
      }, [fetchNotes]);

      const handleAdd = async () => {
        if (!newNote.trim() || submitting) return;
        setSubmitting(true);
        try {
          const result = await api.post(`/api/tasks/${taskId}/notes`, { content: newNote.trim(), client_id: clientId.current });
          setNotes(prev => [result, ...prev]);
          setNewNote("");
          clientId.current = genId();
        } catch (err) { console.error(err); }
        finally { setSubmitting(false); }
      };

      const handleDelete = async (noteId) => {
        try {
          await api.del(`/api/notes/${noteId}`);
          setNotes(prev => prev.filter(n => n.id !== noteId));
        } catch (err) { console.error(err); }
      };

      const formatTime = (dt) => {
        if (!dt) return "";
        const parts = dt.split("T");
        if (parts.length < 2) return "";
        const date = parts[0].split("-").reverse().join("-");
        const time = parts[1].substring(0, 5);
        return `${date} ${time}`;
      };

      const shown = expanded ? notes : notes.slice(0, 3);

      return (
        <div style={{ padding: "8px 16px 12px 52px", background: "rgba(59,130,246,0.03)", borderBottom: "1px solid var(--border)" }} className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "var(--text-secondary)" }}>
              📓 Catatan {notes.length > 0 && `(${notes.length})`}
            </span>
          </div>

          {/* Add note input */}
          <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
            <input
              className="input"
              value={newNote}
              onChange={e => setNewNote(e.target.value)}
              placeholder="Tulis catatan..."
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleAdd(); } }}
              style={{ flex: 1, padding: "6px 10px", fontSize: 12 }}
            />
            <button className="btn btn-primary btn-sm" onClick={handleAdd} disabled={!newNote.trim() || submitting} style={{ fontSize: 11, padding: "4px 10px" }}>{submitting ? "..." : "Simpan"}</button>
          </div>

          {/* Notes list */}
          {shown.map(n => (
            <div key={n.id} style={{ padding: "6px 0", borderBottom: "1px solid #f1f5f9", display: "flex", gap: 8, alignItems: "flex-start" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: "var(--text-light)" }}>{formatTime(n.created_at)}</div>
                <div style={{ fontSize: 13, lineHeight: 1.5, color: "var(--text-primary)", whiteSpace: "pre-wrap" }}>{n.content}</div>
              </div>
              <span onClick={() => handleDelete(n.id)} style={{ cursor: "pointer", fontSize: 12, color: "var(--text-light)", padding: "0 2px", flexShrink: 0 }} title="Hapus">✕</span>
            </div>
          ))}

          {notes.length > 3 && !expanded && (
            <div onClick={() => setExpanded(true)} style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", marginTop: 4 }}>
              Lihat {notes.length - 3} catatan lagi...
            </div>
          )}
          {expanded && notes.length > 3 && (
            <div onClick={() => setExpanded(false)} style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", marginTop: 4 }}>
              Sembunyikan
            </div>
          )}

          {notes.length === 0 && (
            <div style={{ fontSize: 12, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada catatan</div>
          )}
        </div>
      );
    }

    // ── Inline Attachments (for Focus page) ────────────────────
    function FocusAttachments({ taskId }) {
      const [attachments, setAttachments] = useState([]);
      const [uploading, setUploading] = useState(false);
      const fileRef = useRef(null);

      const fetchAtts = useCallback(() => {
        api.get(`/api/tasks/${taskId}/attachments`)
          .then(data => setAttachments(data))
          .catch(() => {});
      }, [taskId]);

      useEffect(() => { fetchAtts(); }, [fetchAtts]);
      useEffect(() => {
        const interval = setInterval(fetchAtts, 15000);
        return () => clearInterval(interval);
      }, [fetchAtts]);

      const handleUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) { alert("Maks 10MB"); return; }
        setUploading(true);
        try {
          const formData = new FormData();
          formData.append("file", file);
          const res = await fetch(`/api/tasks/${taskId}/attachments`, {
            method: "POST",
            headers: __token ? { "Authorization": "Bearer " + __token } : {},
            body: formData,
          });
          if (res.ok) {
            const result = await res.json();
            setAttachments(prev => [result, ...prev]);
          }
        } catch (err) { console.error(err); }
        setUploading(false);
        if (fileRef.current) fileRef.current.value = "";
      };

      const fmtSize = (b) => b < 1024 ? b+"B" : b < 1024*1024 ? Math.round(b/1024)+"KB" : (b/(1024*1024)).toFixed(1)+"MB";

      return (
        <div style={{ padding: "6px 16px 10px 52px", background: "rgba(139,92,246,0.03)", borderBottom: "1px solid var(--border)" }} className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "var(--text-secondary)" }}>
              📎 Lampiran {attachments.length > 0 && `(${attachments.length})`}
            </span>
            <label style={{ fontSize: 12, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>
              {uploading ? "Uploading..." : "＋ Upload"}
              <input ref={fileRef} type="file" onChange={handleUpload} style={{ display: "none" }} disabled={uploading} />
            </label>
          </div>
          {attachments.map(a => (
            <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 6, padding: "3px 0" }}>
              <span style={{ fontSize: 14 }}>{a.mime_type?.startsWith("image/") ? "🖼️" : "📄"}</span>
              <a href={`/api/attachments/${a.id}/download`} target="_blank" rel="noopener"
                style={{ fontSize: 12, color: "var(--accent)", textDecoration: "none", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {a.original_name}
              </a>
              <span style={{ fontSize: 11, color: "var(--text-light)" }}>{fmtSize(a.file_size)}</span>
            </div>
          ))}
          {attachments.length === 0 && !uploading && (
            <div style={{ fontSize: 12, color: "var(--text-light)", fontStyle: "italic" }}>Belum ada lampiran</div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════
    //  TODAY FOCUS VIEW (Overhauled with Pomodoro)
    // ══════════════════════════════════════════════════════════════
    function TodayFocusView({ tasks, onTaskClick, onDone, loading }) {
      const [focusTask, setFocusTask] = useState(null);
      const [taskPomodoros, setTaskPomodoros] = useState({});

      const todayTasks = tasks.filter(t =>
        (t.quadrant === "Q1" || t.is_overdue || t.is_focused) &&
        t.gtd_status !== "done" && t.gtd_status !== "archived"
      );
      const sortedTasks = [...todayTasks].sort((a, b) => {
        if (a.is_overdue && !b.is_overdue) return -1;
        if (!a.is_overdue && b.is_overdue) return 1;
        const priOrder = { P1: 1, P2: 2, P3: 3, P4: 4 };
        return priOrder[a.priority] - priOrder[b.priority];
      });

      const handleStartFocus = (task) => setFocusTask(focusTask?.id === task.id ? null : task);
      const totalPomodoros = Object.values(taskPomodoros).reduce((a, b) => a + b, 0);

      const borderColor = { overdue: "#ef4444", focused: "#f59e0b", normal: "var(--accent)" };
      const cardBorder = (t) => t.is_overdue ? borderColor.overdue : t.is_focused ? borderColor.focused : borderColor.normal;

      return (
        <div className="fade-in" style={{ maxWidth: 900, margin: "0 auto", padding: "24px 16px" }}>
          {/* Header */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 13, color: "var(--text-secondary)", marginBottom: 4 }}>
              {new Date().toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <h1 style={{ fontSize: 24, fontWeight: 700 }}>🍅 Fokus Hari Ini</h1>
              <span style={{ fontSize: 13, color: "var(--text-secondary)" }}>
                {sortedTasks.length} tugas • {totalPomodoros} 🍅 hari ini
              </span>
            </div>
          </div>

          {/* Pomodoro Timer */}
          <PomodoroTimer
            focusTask={focusTask}
            onComplete={() => {}}
            taskPomodoros={taskPomodoros}
            setTaskPomodoros={setTaskPomodoros}
          />

          {/* Task List */}
          <div style={{ marginBottom: 20 }}>
            {/* Section header — habit-style */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: "var(--accent)", letterSpacing: "0.5px" }}>📋 TASK LIST</span>
              <div style={{ flex: 1, height: 1, background: "rgba(168,197,0,0.3)" }} />
              <span style={{ fontSize: 12, color: "var(--text-light)" }}>{sortedTasks.length} task</span>
            </div>

            {loading ? (
              <div style={{ textAlign: "center", padding: 40, color: "var(--text-light)" }}>Loading...</div>
            ) : sortedTasks.length === 0 ? (
              <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 14, textAlign: "center", padding: 48, color: "var(--text-light)" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
                <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 4 }}>Tidak ada task urgent!</div>
                <div style={{ fontSize: 14 }}>Semua Q1 dan overdue task sudah selesai.</div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {sortedTasks.map((task) => (
                  <div key={task.id} style={{
                    background: "var(--bg-card)", borderRadius: 14,
                    border: "1px solid var(--border)", borderLeft: `3px solid ${cardBorder(task)}`,
                    overflow: "hidden"
                  }}>
                    <FocusTaskRow
                      task={task} onClick={onTaskClick} onDone={onDone}
                      onStartFocus={handleStartFocus}
                      isFocusing={focusTask?.id === task.id}
                      hasFocusTask={!!focusTask}
                      pomodoroCount={taskPomodoros[task.id] || 0}
                    />
                    <FocusSubtasks taskId={task.id} />
                    <FocusNotes taskId={task.id} />
                    <FocusAttachments taskId={task.id} />
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Tips Pomodoro */}
          <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 14, padding: "16px 20px" }}>
            <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
              <span style={{ fontSize: 22 }}>💡</span>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 6, color: "var(--text-primary)" }}>Tips Pomodoro</div>
                <ul style={{ fontSize: 13, color: "var(--text-secondary)", margin: 0, paddingLeft: 16, lineHeight: 1.8 }}>
                  <li>Fokus pada satu task selama 25 menit tanpa gangguan</li>
                  <li>Setelah 4 pomodoro, ambil istirahat panjang 15 menit</li>
                  <li>Klik "▶ Focus" pada task untuk memulai tracking</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Task List view with filters ─────────────────────────────
    function TaskListView({ tasks, allTasks, title, icon, onTaskClick, onDone, onToggleFocus, loading, projects, contexts, showFilters, showQuadrant = true, collaborators = [] }) {
      const [fPriority, setFPriority] = useState("");
      const [fQuadrant, setFQuadrant] = useState("");
      const [fProject, setFProject] = useState("");
      const [fContext, setFContext] = useState("");
      const [fAssignee, setFAssignee] = useState("");
      const [fSearch, setFSearch] = useState("");

      const toggle = (setter, current, val) => setter(current === val ? "" : val);

      const PRI_ORDER = { P1: 0, P2: 1, P3: 2, P4: 3 };
      let filtered = [...tasks].sort((a, b) => (PRI_ORDER[a.priority] ?? 9) - (PRI_ORDER[b.priority] ?? 9));
      if (fPriority) filtered = filtered.filter(t => t.priority === fPriority);
      if (fQuadrant) filtered = filtered.filter(t => t.quadrant === fQuadrant);
      if (fProject) filtered = filtered.filter(t => t.project === fProject);
      if (fContext) filtered = filtered.filter(t => t.context === fContext);
      if (fAssignee) filtered = filtered.filter(t => t.assigned_to === parseInt(fAssignee));
      if (fSearch) {
        const q = fSearch.toLowerCase();
        filtered = filtered.filter(t => t.title.toLowerCase().includes(q) || (t.description || "").toLowerCase().includes(q));
      }

      const hasFilters = fPriority || fQuadrant || fProject || fContext || fAssignee || fSearch;
      const clearAll = () => { setFPriority(""); setFQuadrant(""); setFProject(""); setFContext(""); setFAssignee(""); setFSearch(""); };

      // Derive projects/contexts from allTasks if not provided
      const projList = projects && projects.length > 0 ? projects : [...new Set(allTasks?.filter(t => t.project).map(t => t.project) || [])];
      const ctxList = contexts && contexts.length > 0 ? contexts : [...new Set(allTasks?.filter(t => t.context).map(t => t.context) || [])];

      return (
        <div className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h1 style={{ fontSize: 24, fontWeight: 700 }}>{icon} {title}</h1>
            <span style={{ color: "var(--text-light)", fontSize: 14 }}>{filtered.length}{hasFilters ? `/${tasks.length}` : ""} task(s)</span>
          </div>

          {showFilters !== false && (
            <div className="card" style={{ padding: "14px 16px", marginBottom: 16 }}>
              {/* Search */}
              <input className="input" placeholder="🔍 Cari task..." value={fSearch} onChange={e => setFSearch(e.target.value)}
                style={{ marginBottom: 12, padding: "8px 12px", fontSize: 13 }} />

              {/* Dropdowns */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                <div>
                  <div className="input-label">Priority</div>
                  <select className="input" value={fPriority} onChange={e => setFPriority(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                    <option value="">Semua Priority</option>
                    <option value="P1">🔴 P1 Critical</option>
                    <option value="P2">🟠 P2 High</option>
                    <option value="P3">🟡 P3 Medium</option>
                    <option value="P4">🟢 P4 Low</option>
                  </select>
                </div>
                {showQuadrant && (
                  <div>
                    <div className="input-label">Quadrant</div>
                    <select className="input" value={fQuadrant} onChange={e => setFQuadrant(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                      <option value="">Semua Quadrant</option>
                      <option value="Q1">🔥 Q1 Do</option>
                      <option value="Q2">📅 Q2 Schedule</option>
                      <option value="Q3">👋 Q3 Delegate</option>
                      <option value="Q4">🗑️ Q4 Eliminate</option>
                    </select>
                  </div>
                )}
                {projList.length > 0 && (
                  <div>
                    <div className="input-label">Project</div>
                    <select className="input" value={fProject} onChange={e => setFProject(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                      <option value="">Semua Project</option>
                      {projList.map(p => <option key={p} value={p}>📁 {p}</option>)}
                    </select>
                  </div>
                )}
                {ctxList.length > 0 && (
                  <div>
                    <div className="input-label">Context</div>
                    <select className="input" value={fContext} onChange={e => setFContext(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                      <option value="">Semua Context</option>
                      {ctxList.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                )}
                {collaborators.length > 0 && (
                  <div>
                    <div className="input-label">Assignee</div>
                    <select className="input" value={fAssignee} onChange={e => setFAssignee(e.target.value)} style={{ padding: "8px 12px", fontSize: 13 }}>
                      <option value="">Semua Member</option>
                      {collaborators.map(u => <option key={u.id} value={u.id}>👤 {u.display_name || u.username}</option>)}
                    </select>
                  </div>
                )}
              </div>

              {hasFilters && (
                <div style={{ marginTop: 8 }}>
                  <span onClick={clearAll} style={{ fontSize: 13, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>✕ Hapus semua filter</span>
                </div>
              )}
            </div>
          )}

          {loading ? (
            <div style={{ textAlign: "center", padding: 40, color: "var(--text-light)" }}>Loading...</div>
          ) : filtered.length === 0 ? (
            <div className="card" style={{ textAlign: "center", padding: 48, color: "var(--text-light)" }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>{hasFilters ? "🔍" : "🎉"}</div>
              <div>{hasFilters ? "Tidak ada task yang cocok dengan filter" : "Tidak ada task"}</div>
            </div>
          ) : (
            <div className="card" style={{ padding: 8 }}>
              {filtered.map(t => <TaskRow key={t.id} task={t} onClick={onTaskClick} onDone={onDone} onToggleFocus={onToggleFocus} />)}
            </div>
          )}
        </div>
      );
    }

    // ── Chart: Productivity Trend (Line) ────────────────────────
    function ProductivityChart({ tasks }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      const weekData = useMemo(() => {
        const result = [];
        for (let w = 3; w >= 0; w--) {
          const end = new Date(); end.setDate(end.getDate() - w * 7);
          const start = new Date(end); start.setDate(start.getDate() - 6);
          const startStr = start.toISOString().split("T")[0];
          const endStr   = end.toISOString().split("T")[0];
          result.push({
            label:   w === 0 ? "Minggu ini" : `${w} mgg lalu`,
            done:    tasks.filter(t => t.completed_at && t.completed_at.slice(0,10) >= startStr && t.completed_at.slice(0,10) <= endStr).length,
            created: tasks.filter(t => t.created_at   && t.created_at.slice(0,10)   >= startStr && t.created_at.slice(0,10)   <= endStr).length,
          });
        }
        return result;
      }, [tasks]);

      const thisWeek = weekData[3]?.done || 0;
      const lastWeek = weekData[2]?.done || 0;
      const growth   = lastWeek > 0 ? Math.round((thisWeek - lastWeek) / lastWeek * 100) : thisWeek > 0 ? 100 : 0;
      const growthPositive = growth >= 0;

      useEffect(() => {
        if (!canvasRef.current) return;

        const days    = weekData.map(w => w.label);
        const counts  = weekData.map(w => w.done);
        const created = weekData.map(w => w.created);

        if (chartRef.current) chartRef.current.destroy();

        const ctx = canvasRef.current.getContext("2d");
        const gradGreen = ctx.createLinearGradient(0, 0, 0, 180);
        gradGreen.addColorStop(0, "rgba(34,197,94,0.28)");
        gradGreen.addColorStop(1, "rgba(34,197,94,0)");
        const gradYellow = ctx.createLinearGradient(0, 0, 0, 180);
        gradYellow.addColorStop(0, "rgba(168,197,0,0.12)");
        gradYellow.addColorStop(1, "rgba(168,197,0,0)");

        chartRef.current = new Chart(canvasRef.current, {
          type: "line",
          data: {
            labels: days,
            datasets: [
              {
                label: "Selesai",
                data: counts,
                borderColor: "#22c55e",
                borderWidth: 2.5,
                backgroundColor: gradGreen,
                fill: true,
                tension: 0.5,
                pointRadius: 4,
                pointBackgroundColor: "#22c55e",
                pointBorderColor: "#fff",
                pointBorderWidth: 1.5,
              },
              {
                label: "Dibuat",
                data: created,
                borderColor: "#A8C500",
                borderWidth: 1.5,
                backgroundColor: gradYellow,
                fill: true,
                tension: 0.5,
                pointRadius: 3,
                pointBackgroundColor: "#A8C500",
                borderDash: [5, 4],
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: "bottom", labels: { boxWidth: 12, padding: 16, font: { size: 11, family: "DM Sans" } } },
            },
            scales: {
              y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } }, grid: { color: "rgba(0,0,0,0.04)" } },
              x: { ticks: { font: { size: 11 } }, grid: { display: false } },
            },
          },
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [weekData]);

      return (
        <div>
          {(lastWeek > 0 || thisWeek > 0) && (
            <div style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: growthPositive ? "#16a34a" : "#dc2626",
                background: growthPositive ? "#f0fdf4" : "#fef2f2",
                padding: "2px 9px", borderRadius: 20 }}>
                {growth > 0 ? "+" : ""}{growth}%
              </span>
              <span style={{ fontSize: 11, color: "var(--text-light)" }}>
                {growthPositive ? "naik" : "turun"} dari minggu lalu
              </span>
            </div>
          )}
          <div style={{ height: 186 }}><canvas ref={canvasRef} /></div>
        </div>
      );
    }

    // ── Chart: Completion Donut ───────────────────────────────────
    function CompletionDonut({ summary }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;

        const done = summary.total_done || 0;
        const active = (summary.total_active || 0) - (summary.overdue || 0);
        const overdue = summary.overdue || 0;

        if (chartRef.current) chartRef.current.destroy();

        chartRef.current = new Chart(canvasRef.current, {
          type: "doughnut",
          data: {
            labels: ["Done", "Active", "Overdue"],
            datasets: [{
              data: [done, Math.max(active, 0), overdue],
              backgroundColor: ["#22c55e", "#A8C500", "#ef4444"],
              borderWidth: 0,
              hoverOffset: 6,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: "65%",
            plugins: {
              legend: {
                position: "bottom",
                labels: {
                  boxWidth: 10, padding: 12, font: { size: 11, family: "DM Sans" },
                  generateLabels: (chart) => {
                    const ds = chart.data.datasets[0];
                    const total = ds.data.reduce((a, b) => a + b, 0);
                    return chart.data.labels.map((label, i) => ({
                      text: `${label} (${total > 0 ? Math.round(ds.data[i] / total * 100) : 0}%)`,
                      fillStyle: ds.backgroundColor[i],
                      strokeStyle: ds.backgroundColor[i],
                      lineWidth: 0, index: i,
                      hidden: !chart.getDataVisibility(i),
                    }));
                  },
                },
              },
            },
          },
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [summary]);

      const total = (summary.total_active || 0) + (summary.total_done || 0);
      const pct = total > 0 ? Math.round((summary.total_done || 0) / total * 100) : 0;

      return (
        <div style={{ position: "relative", height: 200 }}>
          <canvas ref={canvasRef} />
          <div style={{ position: "absolute", top: "42%", left: "50%", transform: "translate(-50%, -50%)", textAlign: "center" }}>
            <div style={{ fontSize: 24, fontWeight: 700, color: "var(--text-primary)" }}>{pct}%</div>
            <div style={{ fontSize: 11, color: "var(--text-light)" }}>selesai</div>
          </div>
        </div>
      );
    }

    // ── Chart: GTD Status Bar ─────────────────────────────────────
    function StatusBarChart({ summary }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;

        const statuses = ["inbox", "next", "waiting", "someday"];
        const labels = ["Inbox", "Next", "Waiting", "Someday"];
        const colors = ["#3b82f6", "#f97316", "#eab308", "#94a3b8"];
        const data = statuses.map(s => summary.by_status?.[s] || 0);

        if (chartRef.current) chartRef.current.destroy();

        chartRef.current = new Chart(canvasRef.current, {
          type: "bar",
          data: {
            labels,
            datasets: [{
              data,
              backgroundColor: colors,
              borderRadius: { topLeft: 8, topRight: 8, bottomLeft: 0, bottomRight: 0 },
              barThickness: 18,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } }, grid: { color: "rgba(0,0,0,0.04)" } },
              x: { ticks: { font: { size: 11 } }, grid: { display: false } },
            },
          },
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [summary]);

      return <div style={{ height: 200 }}><canvas ref={canvasRef} /></div>;
    }

    // ── Calendar View ───────────────────────────────────────────
    function CalendarView({ tasks, onTaskClick }) {
      const today = new Date();
      const [year, setYear] = useState(today.getFullYear());
      const [month, setMonth] = useState(today.getMonth());
      const [selectedDay, setSelectedDay] = useState(null);
      const [holidays, setHolidays] = useState({});  // { "YYYY-MM-DD": "Nama Libur" }
      const isMobile = window.innerWidth < 640;

      useEffect(() => {
        const cacheKey = `hl2_${year}`;
        try {
          const cached = localStorage.getItem(cacheKey);
          if (cached) { setHolidays(prev => ({ ...prev, ...JSON.parse(cached) })); return; }
        } catch {}
        api.get(`/api/holidays?year=${year}`)
          .then(res => {
            const map = {};
            (res.data || []).forEach(h => {
              map[h.date] = h.name + (h.is_joint && !map[h.date] ? " (Cuti Bersama)" : "");
            });
            try { localStorage.setItem(`hl2_${year}`, JSON.stringify(map)); } catch {}
            setHolidays(prev => ({ ...prev, ...map }));
          })
          .catch(() => {});
      }, [year]);

      const prevMonth = () => {
        setSelectedDay(null);
        if (month === 0) { setMonth(11); setYear(y => y - 1); } else setMonth(m => m - 1);
      };
      const nextMonth = () => {
        setSelectedDay(null);
        if (month === 11) { setMonth(0); setYear(y => y + 1); } else setMonth(m => m + 1);
      };

      const monthName = new Date(year, month, 1).toLocaleDateString("id-ID", { month: "long", year: "numeric" });
      const parseDeadline = (s) => { const [y, m, d] = s.split("-").map(Number); return { y, m: m - 1, d }; };

      const tasksWithDeadline = tasks.filter(t => {
        if (!t.deadline) return false;
        const { y, m } = parseDeadline(t.deadline);
        return y === year && m === month;
      });

      const byDay = {};
      tasksWithDeadline.forEach(t => {
        const { d } = parseDeadline(t.deadline);
        if (!byDay[d]) byDay[d] = [];
        byDay[d].push(t);
      });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const startOffset = (firstDay + 6) % 7;

      const cells = [];
      for (let i = 0; i < startOffset; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);
      while (cells.length % 7 !== 0) cells.push(null);

      const todayDay = today.getFullYear() === year && today.getMonth() === month ? today.getDate() : -1;
      const dayNames = ["Sen", "Sel", "Rab", "Kam", "Jum", "Sab", "Min"];

      const chipColor = (t) => {
        if (t.gtd_status === "done") return { bg: "#dcfce7", color: "#15803d", dot: "#22c55e" };
        if (t.is_overdue) return { bg: "#fee2e2", color: "#b91c1c", dot: "#ef4444" };
        const map = {
          P1: { bg: "#fee2e2", color: "#b91c1c", dot: "#ef4444" },
          P2: { bg: "#ffedd5", color: "#c2410c", dot: "#f97316" },
          P3: { bg: "#fef9c3", color: "#854d0e", dot: "#eab308" },
          P4: { bg: "#dcfce7", color: "#15803d", dot: "#22c55e" },
        };
        return map[t.priority] || { bg: "#f1f5f9", color: "#475569", dot: "#94a3b8" };
      };

      const totalWithDeadline = tasks.filter(t => t.deadline && t.gtd_status !== "done" && t.gtd_status !== "archived").length;
      const selectedTasks = selectedDay ? (byDay[selectedDay] || []) : [];
      const selectedDateLabel = selectedDay
        ? new Date(year, month, selectedDay).toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" })
        : null;
      const selectedDateStr = selectedDay ? `${year}-${String(month+1).padStart(2,"0")}-${String(selectedDay).padStart(2,"0")}` : null;
      const selectedHoliday = selectedDateStr ? holidays[selectedDateStr] : null;

      // Shared task list renderer (used both in inline panel and desktop modal)
      const TaskListItems = ({ items, onSelect }) => items.map(t => {
        const c = chipColor(t);
        return (
