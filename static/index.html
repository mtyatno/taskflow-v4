            <div className="card card-hover" style={{ padding: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>🎯 Completion</div>
              <CompletionDonut summary={summary} />
            </div>

            {/* C. Task by Status - Bar */}
            <div className="card card-hover" style={{ padding: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>📋 GTD Status</div>
              <StatusBarChart summary={summary} />
            </div>
          </div>

          {/* Eisenhower Matrix */}
          <h2 className="section-title" style={{ marginTop: 8 }}>🎯 Eisenhower Matrix</h2>
          <div className="eisen-header-row" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 6 }}>
            <div style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: "var(--text-secondary)", textTransform: "uppercase", letterSpacing: "0.8px" }}>Mendesak + Penting</div>
            <div style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: "var(--text-secondary)", textTransform: "uppercase", letterSpacing: "0.8px" }}>Penting</div>
          </div>
          <div className="eisenhower-grid" style={{ gap: 16, marginBottom: 32 }}>
            <EisenCell tasks={q1Tasks} label="Lakukan" emoji="🔥" cls="eq1" />
            <EisenCell tasks={q2Tasks} label="Rencanakan" emoji="📅" cls="eq2" />
            <EisenCell tasks={q3Tasks} label="Delegasikan" emoji="👋" cls="eq3" />
            <EisenCell tasks={q4Tasks} label="Singkirkan" emoji="🗑️" cls="eq4" />
          </div>

          {/* GTD Status breakdown */}
          <h2 className="section-title">🔄 GTD Status</h2>
          <div className="gtd-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            {[
              { key: "inbox",   label: "Inbox",        emoji: "📥", accent: "#3b82f6", fullWidth: false, tip: "Semua task baru masuk ke sini. Belum diputuskan mau diapakan." },
              { key: "next",    label: "Next Actions", emoji: "▶️", accent: "#f97316", fullWidth: false, tip: "Task yang sudah siap dikerjakan. Lakukan satu per satu saat ada waktu." },
              { key: "waiting", label: "Waiting For",  emoji: "⏳", accent: "#eab308", fullWidth: false, tip: "Menunggu orang lain atau sesuatu sebelum bisa dilanjutkan." },
              { key: "someday", label: "Someday",      emoji: "💭", accent: "#94a3b8", fullWidth: false, tip: "Ide atau rencana yang menarik tapi belum waktunya dikerjakan sekarang." },
            ].map(({ key, label, emoji, accent, fullWidth, tip }) => {
              const sectionTasks = tasks.filter(t => t.gtd_status === key).sort(SORT_PRI);
              const shadow = fullWidth && sectionTasks.length > 0
                ? "0 2px 8px rgba(249,115,22,0.12), 0 8px 24px rgba(0,0,0,0.07)"
                : "0 1px 4px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.04)";
              return (
                <div key={key} style={{ borderRadius: 12, padding: fullWidth ? "16px 20px" : "16px 20px", minHeight: 120, minWidth: 0, overflow: "hidden", background: "var(--bg-card)", border: "1px solid var(--border)", borderTop: `3px solid ${accent}`, boxShadow: shadow, gridColumn: fullWidth ? "1 / -1" : undefined, transition: "transform 0.18s, box-shadow 0.18s" }}
                  onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 4px 16px rgba(0,0,0,0.09)"; }}
                  onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = shadow; }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <div title={tip} style={{ fontWeight: 700, fontSize: 14, cursor: "help" }}>{emoji} {label} ({sectionTasks.length})</div>
                    {sectionTasks.length > 5 && (
                      <span onClick={() => openModal(`${emoji} ${label}`, sectionTasks)}
                        style={{ fontSize: 11, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>Lihat semua →</span>
                    )}
                  </div>
                  {sectionTasks.length === 0 ? (
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "14px 0", opacity: 0.35 }}>
                      <div style={{ fontSize: 20, marginBottom: 4 }}>🎉</div>
                      <div style={{ fontSize: 12, color: "var(--text-light)" }}>Belum ada task</div>
                    </div>
                  ) : (
                    sectionTasks.slice(0, 5).map((t, i) => (
                      <div key={t.id} onClick={() => onTaskClick(t)} style={{ fontSize: 13, padding: "6px 0", cursor: "pointer", display: "flex", gap: 6, alignItems: "center", minWidth: 0, borderTop: i > 0 ? "1px solid var(--border)" : "none" }}>
                        <PriBadge p={t.priority} />
                        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1, minWidth: 0 }}>{t.title}</span>
                      </div>
                    ))
                  )}
                  {sectionTasks.length > 5 && (
                    <div onClick={() => openModal(`${emoji} ${label}`, sectionTasks)}
                      style={{ fontSize: 12, color: "var(--accent)", marginTop: 6, cursor: "pointer", fontWeight: 600 }}>
                      +{sectionTasks.length - 5} lagi →
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Dashboard cell modal */}
          {dashModal && (
            <div className="modal-overlay" onClick={() => setDashModal(null)}>
              <div className="modal-content scale-in" style={{ maxWidth: 480, width: "90%", maxHeight: "80vh", overflowY: "hidden", display: "flex", flexDirection: "column" }}
                onClick={e => e.stopPropagation()}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 16 }}>{dashModal.title}</div>
                    <div style={{ fontSize: 13, color: "var(--text-light)", marginTop: 2 }}>{dashModal.tasks.length} task</div>
                  </div>
                  <button className="btn btn-secondary btn-sm" onClick={() => setDashModal(null)}>✕</button>
                </div>
                <div style={{ overflowY: "auto", flex: 1 }}>
                  {dashModal.tasks.map(t => (
                    <div key={t.id} onClick={() => { setDashModal(null); onTaskClick(t); }}
                      style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", borderRadius: 8, marginBottom: 6, cursor: "pointer",
                        background: "var(--surface)", border: "1px solid var(--border)", transition: "opacity 0.15s" }}
                      onMouseEnter={e => e.currentTarget.style.opacity = "0.75"}
                      onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
                      <PriBadge p={t.priority} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 14, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.title}</div>
                        {t.project && <div style={{ fontSize: 12, color: "var(--text-light)", marginTop: 1 }}>📁 {t.project}</div>}
                      </div>
                      <StatusBadge s={t.gtd_status} />
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Active Projects */}
          {(() => {
            const projNames = [...new Set(tasks.filter(t => t.project && t.gtd_status !== "done" && t.gtd_status !== "archived").map(t => t.project))];
            if (projNames.length === 0) return null;
            return (<>
              <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 12, marginTop: 24 }}>📁 Active Projects</h2>
              <div className="gtd-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {projNames.map(proj => {
                  const projTasks = tasks.filter(t => t.project === proj && t.gtd_status !== "done" && t.gtd_status !== "archived");
                  return (
                    <div key={proj} style={{ borderRadius: 12, padding: 16, minHeight: 100, minWidth: 0, overflow: "hidden", background: "#F4FAD6", border: "1px solid #CEDE8A" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <div style={{ fontWeight: 700, fontSize: 14 }}>📂 {proj} ({projTasks.length})</div>
                        {projTasks.length > 5 && (
                          <span onClick={() => openModal(`📂 ${proj}`, projTasks)}
                            style={{ fontSize: 11, color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>Lihat semua →</span>
                        )}
                      </div>
                      {projTasks.slice(0, 5).map(t => (
                        <div key={t.id} onClick={() => onTaskClick(t)} style={{ fontSize: 13, padding: "4px 0", cursor: "pointer", display: "flex", gap: 6, alignItems: "center", minWidth: 0 }}>
                          <PriBadge p={t.priority} />
                          <StatusBadge s={t.gtd_status} />
                          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1, minWidth: 0 }}>{t.title}</span>
                        </div>
                      ))}
                      {projTasks.length > 5 && (
                        <div onClick={() => openModal(`📂 ${proj}`, projTasks)}
                          style={{ fontSize: 12, color: "var(--accent)", marginTop: 6, cursor: "pointer", fontWeight: 600 }}>
                          +{projTasks.length - 5} lagi →
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </>);
          })()}
        </div>
      );
    }

    // ── Chat Page ────────────────────────────────────────────────
    function ChatListPanel({ lists, selectedId, onSelect }) {
      if (lists.length === 0) {
        return (
          <div style={{ padding: 20, color: "var(--text-light)", fontSize: 13, textAlign: "center" }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>📋</div>
            Belum ada shared list.<br />Buat atau bergabung dulu.
          </div>
        );
      }
      return (
        <div>
          <div style={{ padding: "12px 14px", fontSize: 11, fontWeight: 700, color: "var(--text-light)", letterSpacing: "0.05em", textTransform: "uppercase" }}>
            Shared Lists
          </div>
          {lists.map(l => (
            <div key={l.id}
              className={`chat-list-item${selectedId === l.id ? " active" : ""}`}
              onClick={() => onSelect(l)}
            >
              <div style={{ fontWeight: 600, fontSize: 14, color: "var(--text-primary)", marginBottom: 2 }}>
                {l.role === "owner" ? "📋" : "👥"} {l.name}
              </div>
              <div style={{ fontSize: 11, color: "var(--text-light)" }}>
                {l.role === "owner" ? "Owner" : "Member"}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function ChatPage({ user, sharedLists, onTaskClick, showToast }) {
      const [selectedList, setSelectedList] = useState(sharedLists[0] || null);

      return (
        <div className="chat-layout">
          <div className="chat-list-panel">
            <ChatListPanel lists={sharedLists} selectedId={selectedList?.id} onSelect={setSelectedList} />
          </div>
          <div className="chat-room">
            {selectedList ? (
              <ChatRoom key={selectedList.id} list={selectedList} user={user} onTaskClick={onTaskClick} showToast={showToast} />
            ) : (
              <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "var(--text-light)", flexDirection: "column", gap: 8 }}>
                <div style={{ fontSize: 40 }}>💬</div>
                <div>Pilih list untuk mulai berdiskusi</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function renderMessageContent(content, currentUsername) {
      const parts = content.split(/(@\w+)/g);
      return parts.map((part, i) => {
        if (/^@\w+$/.test(part)) {
          const isMe = part === `@${currentUsername}`;
          return (
            <span key={i} style={{
              color: "var(--accent)", fontWeight: 600,
              background: isMe ? "rgba(168,197,0,0.2)" : "transparent",
              borderRadius: 3, padding: isMe ? "0 2px" : 0,
            }}>{part}</span>
          );
        }
        return <span key={i}>{part}</span>;
      });
    }

    function TaskMiniCard({ task, onClick }) {
      if (!task?.task_title) return null;
      return (
        <div className="chat-task-card" onClick={() => onClick && onClick(task)}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "var(--accent)", marginBottom: 3 }}>📌 TASK</div>
          <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text-primary)", marginBottom: 4 }}>{task.task_title}</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {task.task_priority && <span style={{ fontSize: 11, background: "var(--bg-primary)", color: "var(--text-secondary)", padding: "1px 6px", borderRadius: 4, fontWeight: 600 }}>{task.task_priority}</span>}
            {task.task_quadrant && <span style={{ fontSize: 11, color: "var(--text-light)" }}>{task.task_quadrant}</span>}
            {task.task_deadline && <span style={{ fontSize: 11, color: "var(--text-light)" }}>📅 {task.task_deadline}</span>}
          </div>
        </div>
      );
    }

    function ChatRoom({ list, user, onTaskClick, showToast }) {
      const [messages, setMessages] = useState([]);
      const [loading, setLoading] = useState(true);
      const [hasMore, setHasMore] = useState(false);
      const [loadingMore, setLoadingMore] = useState(false);
      const messagesEndRef = useRef(null);
      const esRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      };

      // Load initial messages
      useEffect(() => {
        setLoading(true);
        setMessages([]);
        api.get(`/api/lists/${list.id}/messages?limit=50`)
          .then(msgs => {
            setMessages(msgs);
            setHasMore(msgs.length === 50);
            setLoading(false);
            setTimeout(scrollToBottom, 50);
          })
          .catch(err => { showToast(err.message, "error"); setLoading(false); });
      }, [list.id]);

      // SSE subscription
      useEffect(() => {
        const es = new EventSource(`/api/lists/${list.id}/messages/stream`);
        esRef.current = es;
        es.onmessage = (e) => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.type === "ping") return;
            setMessages(prev => prev.some(m => m.id === msg.id) ? prev : [...prev, msg]);
            setTimeout(scrollToBottom, 30);
          } catch (_) {}
        };
        es.onerror = () => {};
        return () => { es.close(); };
      }, [list.id]);

      // Load older messages
      const loadMore = async () => {
        if (!messages.length || loadingMore) return;
        setLoadingMore(true);
        try {
          const older = await api.get(`/api/lists/${list.id}/messages?limit=50&before_id=${messages[0].id}`);
          setMessages(prev => [...older, ...prev]);
          setHasMore(older.length === 50);
        } catch (err) { showToast(err.message, "error"); }
        finally { setLoadingMore(false); }
      };

      const formatTime = (iso) => {
        const d = new Date(iso);
        return d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
      };
      const formatDate = (iso) => {
        const d = new Date(iso);
        return d.toLocaleDateString("id-ID", { day: "numeric", month: "short" });
      };

      // Group messages by date
      let lastDate = null;

      return (
        <div className="chat-room" style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          {/* Header */}
          <div style={{ padding: "12px 16px", borderBottom: "1px solid var(--border)", fontWeight: 600, fontSize: 15, color: "var(--text-primary)", flexShrink: 0 }}>
            💬 {list.name}
            <span style={{ fontSize: 12, fontWeight: 400, color: "var(--text-light)", marginLeft: 8 }}>{list.role === "owner" ? "Owner" : "Member"}</span>
          </div>

          {/* Messages */}
          <div className="chat-messages">
            {hasMore && (
              <div style={{ textAlign: "center", marginBottom: 8 }}>
                <button className="btn btn-secondary btn-sm" onClick={loadMore} disabled={loadingMore}>
                  {loadingMore ? "Memuat..." : "⬆ Load lebih lama"}
                </button>
              </div>
            )}
            {loading && <div style={{ textAlign: "center", color: "var(--text-light)", padding: 20 }}>Memuat pesan...</div>}
            {!loading && messages.length === 0 && (
              <div style={{ textAlign: "center", color: "var(--text-light)", padding: 40 }}>
                <div style={{ fontSize: 36, marginBottom: 8 }}>💬</div>
                Belum ada pesan. Mulai diskusi!
              </div>
            )}
            {messages.map((msg) => {
              const isSelf = msg.user_id === user.id;
              const msgDate = msg.created_at?.split("T")[0];
              const showDate = msgDate !== lastDate;
              lastDate = msgDate;
              const isMentioned = msg.content?.includes(`@${user.username}`);
              return (
                <React.Fragment key={msg.id}>
                  {showDate && (
                    <div style={{ textAlign: "center", fontSize: 11, color: "var(--text-light)", margin: "8px 0" }}>
                      {formatDate(msg.created_at)}
                    </div>
                  )}
                  <div className={`chat-bubble-wrap${isSelf ? " self" : ""}`}>
                    {!isSelf && (
                      <div className="chat-avatar">
                        {(msg.display_name || msg.username || "?")[0].toUpperCase()}
                      </div>
                    )}
                    <div>
                      {!isSelf && <div className="chat-sender">{msg.display_name || msg.username}</div>}
                      <div className={`chat-bubble${isSelf ? " self" : ""}${isMentioned && !isSelf ? " mentioned" : ""}`}>
                        {renderMessageContent(msg.content, user.username)}
                        {msg.task_id && (
                          <TaskMiniCard task={msg} onClick={() => onTaskClick && onTaskClick({ id: msg.task_id, title: msg.task_title, priority: msg.task_priority, deadline: msg.task_deadline, quadrant: msg.task_quadrant })} />
                        )}
                      </div>
                      <div className="chat-time" style={{ textAlign: isSelf ? "right" : "left" }}>
                        {formatTime(msg.created_at)}
                      </div>
                    </div>
                  </div>
                </React.Fragment>
              );
            })}
            <div ref={messagesEndRef} />
          </div>

          {/* Input bar — Task 9 will replace this stub */}
          <ChatInputBar list={list} user={user} onSent={(msg) => { setMessages(prev => [...prev, msg]); setTimeout(scrollToBottom, 30); }} showToast={showToast} onTaskClick={onTaskClick} />
        </div>
      );
    }

    function TaskAttachPopup({ list, onSelect, onCreateNew, onClose }) {
      const [listTasks, setListTasks] = useState([]);
      const [query, setQuery] = useState("");
      const [loading, setLoading] = useState(true);

        <div className="chat-attach-popup">

              placeholder="Cari task..." value={query} onChange={e => setQuery(e.target.value)} autoFocus />

            </div>

            {filtered.map(t => (

    function ChatInputBar({ list, user, onSent, showToast, onTaskClick }) {
      const [text, setText] = useState("");
      const [sending, setSending] = useState(false);
      const [showAttach, setShowAttach] = useState(false);
      const [attachedTask, setAttachedTask] = useState(null);
      const [showTaskForm, setShowTaskForm] = useState(false);
      const [members, setMembers] = useState([]);
      const [mentionQuery, setMentionQuery] = useState(null); // null = off, string = query
      const textareaRef = useRef(null);

      // Load members for @mention autocomplete once
      useEffect(() => {
        api.get(`/api/lists/${list.id}/members/usernames`)
          .then(setMembers)
          .catch(() => {});
      }, [list.id]);

      const mentionSuggestions = mentionQuery !== null
        ? members.filter(m =>
            m.username !== user.username &&
            m.username.toLowerCase().startsWith(mentionQuery.toLowerCase())
          )
        : [];

      const handleTextChange = (e) => {
        const val = e.target.value;
        setText(val);
        // Detect @mention trigger
        const match = val.match(/@(\w*)$/);
        if (match) {
          setMentionQuery(match[1]);
        } else {
          setMentionQuery(null);
        }
      };

      const insertMention = (username) => {
        const newVal = text.replace(/@(\w*)$/, `@${username} `);
        setText(newVal);
        setMentionQuery(null);
        textareaRef.current?.focus();
      };

      const handleSend = async () => {
        if (!text.trim() && !attachedTask) return;
        setSending(true);
        try {
          const payload = {
            content: text.trim() || (attachedTask ? `📌 ${attachedTask.title}` : ""),
            task_id: attachedTask?.id || null,
            msg_type: attachedTask ? "task_attach" : "text",
          };
          const msg = await api.post(`/api/lists/${list.id}/messages`, payload);
          setText("");
          setAttachedTask(null);
          setMentionQuery(null);
          onSent(msg);
        } catch (err) { showToast(err.message, "error"); }
        finally { setSending(false); }
      };

      const handleKeyDown = (e) => {
        if (mentionSuggestions.length > 0 && e.key === "Escape") {
          setMentionQuery(null);
          return;
        }
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      };

      return (
        <div className="chat-input-bar">
          {/* @mention dropdown */}
          {mentionSuggestions.length > 0 && (
            <div className="chat-mention-dropdown">
              {mentionSuggestions.map(m => (
                <div key={m.username} className="chat-mention-item" onClick={() => insertMention(m.username)}>
                  <span style={{ fontWeight: 600 }}>@{m.username}</span>
                  {m.display_name && m.display_name !== m.username && (
                    <span style={{ color: "var(--text-light)", marginLeft: 6, fontSize: 12 }}>{m.display_name}</span>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* Task attach popup */}
          {showAttach && (
            <TaskAttachPopup
              list={list}
              onSelect={(task) => { setAttachedTask(task); setShowAttach(false); }}
              onCreateNew={() => { setShowAttach(false); setShowTaskForm(true); }}
              onClose={() => setShowAttach(false)}
            />
          )}

          {/* Task form modal for creating new task */}
          {showTaskForm && (
            <TaskFormModal
              task={null}
              onSave={async (form) => {
                try {
                  const newTask = await api.post("/api/tasks", { ...form, list_id: list.id });
                  setAttachedTask(newTask);
                  setShowTaskForm(false);
                } catch (err) { showToast(err.message, "error"); }
              }}
              onOfflineSave={() => setShowTaskForm(false)}
              onClose={() => setShowTaskForm(false)}
              sharedLists={[list]}
              collaborators={[]}
              projects={[]}
              contexts={[]}
            />
          )}

          {/* Attached task preview */}
          {attachedTask && (
            <div style={{ position: "absolute", bottom: 64, left: 12, background: "var(--bg-card)", border: "1px solid var(--accent)", borderRadius: 8, padding: "6px 10px", display: "flex", alignItems: "center", gap: 8, fontSize: 13 }}>
              <span style={{ color: "var(--accent)" }}>📌</span>
              <span style={{ fontWeight: 600, color: "var(--text-primary)" }}>{attachedTask.title}</span>
              <button onClick={() => setAttachedTask(null)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-light)", fontSize: 14, padding: "0 2px" }}>✕</button>
            </div>
          )}

          <textarea
            ref={textareaRef}
            className="chat-input"
            rows={1}
            placeholder="Ketik pesan... (Shift+Enter untuk baris baru, @ untuk mention)"
            value={text}
            onChange={handleTextChange}
            onKeyDown={handleKeyDown}
            style={{ marginBottom: attachedTask ? 36 : 0 }}
          />
          <button
            title="Attach atau buat task"
            onClick={() => setShowAttach(v => !v)}
            style={{ background: showAttach ? "var(--accent)" : "var(--bg-primary)", color: showAttach ? "white" : "var(--text-secondary)", border: "1px solid var(--border)", borderRadius: 8, padding: "8px 10px", cursor: "pointer", fontSize: 16, flexShrink: 0 }}>
            📌
          </button>
          <button className="btn btn-primary btn-sm" onClick={handleSend} disabled={sending || (!text.trim() && !attachedTask)} style={{ flexShrink: 0 }}>
            {sending ? "..." : "Kirim"}
          </button>
        </div>
      );
    }

    // ── Settings Page ───────────────────────────────────────────
    function SettingsPage({ user, onUsernameChange, showToast }) {
      const [unForm, setUnForm] = useState({ new_username: "", current_password: "" });
      const [pwForm, setPwForm] = useState({ old_password: "", new_password: "", confirm: "" });
      const [emForm, setEmForm] = useState({ email: user?.email || "" });
      const [loading, setLoading] = useState({ username: false, password: false, email: false });

      const setL = (k, v) => setLoading(l => ({ ...l, [k]: v }));

      const handleUsername = async (e) => {
        e.preventDefault();
        setL("username", true);
        try {
          const data = await api.patch("/api/auth/profile/username", unForm);
          onUsernameChange({ ...user, username: data.username, display_name: data.username });
          showToast("Username berhasil diubah ✅");
          setUnForm({ new_username: "", current_password: "" });
        } catch (err) { showToast(err.message, "error"); }
        setL("username", false);
      };

      const handlePassword = async (e) => {
        e.preventDefault();
        if (pwForm.new_password !== pwForm.confirm) {
          showToast("Password baru tidak cocok", "error"); return;
        }
        setL("password", true);
        try {
          await api.patch("/api/auth/profile/password", { old_password: pwForm.old_password, new_password: pwForm.new_password });
          showToast("Password berhasil diubah ✅");
          setPwForm({ old_password: "", new_password: "", confirm: "" });
        } catch (err) { showToast(err.message, "error"); }
        setL("password", false);
      };

      const handleEmail = async (e) => {
        e.preventDefault();
        setL("email", true);
        try {
          await api.patch("/api/auth/profile/email", { email: emForm.email });
          showToast("Email berhasil disimpan ✅");
        } catch (err) { showToast(err.message, "error"); }
        setL("email", false);
      };

      const Field = ({ label, type = "text", value, onChange, placeholder }) => (
        <div style={{ marginBottom: 16 }}>
          <label className="input-label">{label}</label>
          <input className="input" type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder || ""} />
        </div>
      );

      return (
        <div className="fade-in" style={{ maxWidth: 520 }}>
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontSize: 13, color: "var(--text-secondary)" }}>Login sebagai <strong>{user?.username}</strong>{user?.email ? ` · ${user.email}` : ""}</div>
          </div>

          <div className="card" style={{ marginBottom: 20 }}>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 16 }}>Ganti Username</div>
            <form onSubmit={handleUsername}>
              <Field label="Username Baru" value={unForm.new_username} onChange={v => setUnForm(f => ({ ...f, new_username: v }))} placeholder="min. 3 karakter" />
              <Field label="Password Saat Ini" type="password" value={unForm.current_password} onChange={v => setUnForm(f => ({ ...f, current_password: v }))} placeholder="Konfirmasi password" />
              <button className="btn btn-primary" type="submit" disabled={loading.username}>
                {loading.username ? "Menyimpan..." : "Simpan Username"}
              </button>
            </form>
          </div>

          <div className="card" style={{ marginBottom: 20 }}>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 16 }}>Ganti Password</div>
            <form onSubmit={handlePassword}>
              <Field label="Password Lama" type="password" value={pwForm.old_password} onChange={v => setPwForm(f => ({ ...f, old_password: v }))} />
              <Field label="Password Baru" type="password" value={pwForm.new_password} onChange={v => setPwForm(f => ({ ...f, new_password: v }))} placeholder="min. 4 karakter" />
              <Field label="Konfirmasi Password Baru" type="password" value={pwForm.confirm} onChange={v => setPwForm(f => ({ ...f, confirm: v }))} />
              <button className="btn btn-primary" type="submit" disabled={loading.password}>
                {loading.password ? "Menyimpan..." : "Simpan Password"}
              </button>
            </form>
          </div>

          <div className="card">
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 16 }}>Email</div>
            <form onSubmit={handleEmail}>
              <Field label="Alamat Email" type="email" value={emForm.email} onChange={v => setEmForm({ email: v })} placeholder="contoh@email.com" />
              <button className="btn btn-primary" type="submit" disabled={loading.email}>
                {loading.email ? "Menyimpan..." : "Simpan Email"}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [theme, setTheme] = useState(
        () => localStorage.getItem('tf_theme') || 'light'
      );
      const toggleTheme = useCallback(() => {
        setTheme(prev => {
          const next = prev === 'light' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('tf_theme', next);
          return next;
        });
      }, []);
      const [authPage, setAuthPage] = useState("login");
      const [page, setPage] = useState("dashboard");
      const [tasks, setTasks] = useState([]);
      const [summary, setSummary] = useState({ by_status: {}, by_quadrant: {}, overdue: 0, total_active: 0, total_done: 0 });
      const [projects, setProjects] = useState([]);
      const [contexts, setContexts] = useState([]);
      const [sharedLists, setSharedLists] = useState([]);
      const [collaborators, setCollaborators] = useState([]);
      const [selectedTask, setSelectedTask] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [editTask, setEditTask] = useState(null);
      const [toast, setToast] = useState(null);
      const [loading, setLoading] = useState(false);
      const [doneConfirm, setDoneConfirm] = useState(null); // { taskId, count, children }
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [queueSize, setQueueSize] = useState(0);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      const [unreadCount, setUnreadCount] = useState(0);
      const [notifications, setNotifications] = useState([]);
      const [showNotifPanel, setShowNotifPanel] = useState(false);

      const showToast = (message, type = "success") => setToast({ message, type });

      const logout = useCallback(async () => {
        if (!tokenStore.get()) return;
        try { await api.post("/api/auth/logout", {}); } catch (e) {}
        tokenStore.clear();
        setUser(null);
        setTasks([]);
        setSharedLists([]);
        setProjects([]);
        setContexts([]);
        setCollaborators([]);
        setNotifications([]);
        setUnreadCount(0);
        setSummary({ by_status: {}, by_quadrant: {}, overdue: 0, total_active: 0, total_done: 0 });
        setPage("dashboard");
      }, []);

      window.__logout = logout;

      // Check existing session on mount
      const [authChecked, setAuthChecked] = useState(!tokenStore.get());
      useEffect(() => {
        if (tokenStore.get()) {
          api.get("/api/auth/me")
            .then(u => { setUser(u); setAuthChecked(true); })
            .catch(err => {
              // Offline: jangan hapus token, pakai username dari token payload
              if (isOfflineErr(err) || err?.message === "OFFLINE") {
                try {
                  const payload = JSON.parse(atob(tokenStore.get().split(".")[1]));
                  setUser({ id: payload.sub, username: payload.username || payload.sub, display_name: payload.display_name || payload.username || payload.sub });
                } catch (_) {}
                setAuthChecked(true);
              } else {
                tokenStore.clear();
                setAuthChecked(true);
              }
            });
        }
      }, []);

      // Handle ?join=<code> invite link from URL
      const [pendingJoinCode, setPendingJoinCode] = useState(() => {
        const params = new URLSearchParams(window.location.search);
        return params.get("join") || "";
      });
      const [joinModal, setJoinModal] = useState(false);

      useEffect(() => {
        if (user && pendingJoinCode) {
          setJoinModal(true);
          // Clean URL
          window.history.replaceState({}, "", "/");
        }
      }, [user, pendingJoinCode]);

      // Fetch data
      const initialLoad = useRef(true);
      const isSyncing = useRef(false);
      const fetchAll = useCallback(async () => {
        if (!user) return;
        if (initialLoad.current) setLoading(true);
        const calls = [
          ["/api/tasks?include_done=true", setTasks,        "tasks"],
          ["/api/summary",                 setSummary,       "summary"],
          ["/api/projects",                setProjects,      "projects"],
          ["/api/contexts",                setContexts,      "contexts"],
          ["/api/lists",                   setSharedLists,   "lists"],
          ["/api/collaborators",           setCollaborators, null],
        ];
        const results = await Promise.allSettled(calls.map(([url]) => api.get(url)));
        for (let i = 0; i < calls.length; i++) {
          const [, setter, cacheKey] = calls[i];
          const r = results[i];
          if (r.status === "fulfilled") {
            setter(r.value);
            if (cacheKey) OfflineDB.cacheSet(cacheKey, r.value);
          } else if (cacheKey) {
            const cached = await OfflineDB.cacheGet(cacheKey);
            if (cached) setter(cached);
          }
        }
        // Detect offline: jika semua call gagal, set isOnline = false
        const allFailed = results.every(r => r.status === "rejected");
        if (allFailed) setIsOnline(false);
        else if (results.some(r => r.status === "fulfilled")) setIsOnline(true);

        // Saat offline: apply pending queue mutations di atas data cache
        if (results[0].status !== "fulfilled") {
          const q = await OfflineDB.queueGetAll();
          if (q.length) {
            setTasks(prev => {
              let tasks = [...prev];
              for (const item of q) {
                // PUT /api/tasks/:id — edit task
                const putMatch = item.method === "PUT" && item.url.match(/^\/api\/tasks\/(\d+)$/);
                if (putMatch) {
                  const id = parseInt(putMatch[1]);
                  tasks = tasks.map(t => t.id === id ? { ...t, ...item.body, _pending: true } : t);
                }
                // POST /api/tasks/:id/done
                const doneMatch = item.method === "POST" && item.url.match(/^\/api\/tasks\/(\d+)\/done$/);
                if (doneMatch) {
                  const id = parseInt(doneMatch[1]);
                  tasks = tasks.map(t => t.id === id ? { ...t, gtd_status: "done", _pending: true } : t);
                }
                // POST /api/tasks (new task)
                if (item.method === "POST" && item.url === "/api/tasks" && item.tempId) {
                  const exists = tasks.some(t => String(t.id) === item.tempId);
                  if (!exists) tasks.push({
                    ...item.body, id: item.tempId, _pending: true, quadrant: "Q4",
                    is_overdue: false, is_focused: false, days_until_deadline: null,
                    assigned_to_name: null, parent_title: null,
                    created_at: new Date(item.createdAt || Date.now()).toISOString(),
                  });
                }
              }
              return tasks;
            });
          }
        }
        if (initialLoad.current) { setLoading(false); initialLoad.current = false; }
      }, [user]);

      useEffect(() => { fetchAll(); }, [fetchAll]);

      // Auto-refresh every 30 seconds (skip saat sedang sync queue)
      useEffect(() => {
        if (!user) return;
        const interval = setInterval(() => {
          if (!isSyncing.current) fetchAll();
        }, 30000);
        return () => clearInterval(interval);
      }, [user, fetchAll]);

      // ── Offline helpers ───────────────────────────────────────────
      const updateQueueSize = useCallback(async () => {
        const q = await OfflineDB.queueGetAll();
        setQueueSize(q.length);
      }, []);

      const processQueue = useCallback(async () => {
        if (!navigator.onLine || isSyncing.current) return;
        const q = await OfflineDB.queueGetAll();
        if (!q.length) return;
        isSyncing.current = true;
        const tempIdMap = {};
        for (const item of q) {
          try {
            let url = item.url;
            let body = item.body ? { ...item.body } : undefined;
            if (body?.parent_id && tempIdMap[String(body.parent_id)]) {
              body.parent_id = tempIdMap[String(body.parent_id)];
            }
            let result;
            if (item.method === "POST")   result = await api.post(url, body);
            else if (item.method === "PUT")    result = await api.put(url, body);
            else if (item.method === "DELETE") result = await api.del(url);
            if (item.tempId && result?.id) tempIdMap[item.tempId] = result.id;
            await OfflineDB.queueDel(item.qid);
          } catch (err) {
            break; // stop on error, retry next online event
          }
        }
        isSyncing.current = false;
        setQueueSize(0);
        fetchAll();
      }, [fetchAll]);

      const handleOfflineSave = useCallback(async (tempTask) => {
        const isEdit = !String(tempTask.id).startsWith("tmp_");
        setTasks(prev => isEdit
          ? prev.map(t => t.id === tempTask.id ? tempTask : t)
          : [...prev, tempTask]
        );
        await updateQueueSize();
        showToast("Tersimpan offline, akan sync saat online 📶");
        setShowForm(false);
        setEditTask(null);
      }, [updateQueueSize]);

      const handleOfflineEdit = useCallback(async (taskId, updatedFields) => {
        setTasks(prev => prev.map(t => t.id === taskId ? { ...t, ...updatedFields, _pending: true } : t));
        await updateQueueSize();
        showToast("Edit tersimpan offline, akan sync saat online 📶");
      }, [updateQueueSize]);

      // Online / offline events
      useEffect(() => {
        const onOnline  = () => { setIsOnline(true);  processQueue(); };
        const onOffline = () => setIsOnline(false);
        window.addEventListener("online",  onOnline);
        window.addEventListener("offline", onOffline);
        updateQueueSize();
        if (navigator.onLine) processQueue();
        return () => {
          window.removeEventListener("online",  onOnline);
          window.removeEventListener("offline", onOffline);
        };
      }, [processQueue, updateQueueSize]);

      // Trigger processQueue saat isOnline berubah false → true
      // (cover kasus DNS putus: window.online tidak fire, tapi fetchAll mendeteksi kembali online)
      const prevIsOnline = useRef(isOnline);
      useEffect(() => {
        if (!prevIsOnline.current && isOnline) {
          processQueue();
        }
        prevIsOnline.current = isOnline;
      }, [isOnline, processQueue]);

      // Notification polling every 15 seconds
      const fetchUnread = useCallback(async () => {
        if (!user) return;
        try {
          const data = await api.get("/api/notifications/count");
          setUnreadCount(data.unread || 0);
        } catch (e) {}
      }, [user]);

      useEffect(() => {
        if (!user) return;
        fetchUnread();
        const interval = setInterval(fetchUnread, 15000);
        return () => clearInterval(interval);
      }, [user, fetchUnread]);

      const handleOpenNotif = async () => {
        const willOpen = !showNotifPanel;
        setShowNotifPanel(willOpen);
        if (willOpen) {
          try {
            const data = await api.get("/api/notifications");
            setNotifications(data);
            await api.post("/api/notifications/read", {});
            setUnreadCount(0);
          } catch (e) {}
        }
      };

      const openTaskById = async (taskId) => {
        setShowNotifPanel(false);
        try {
          const task = await api.get(`/api/tasks/${taskId}`);
          setSelectedTask(task);
        } catch (e) { showToast("Task tidak ditemukan", "error"); }
      };

      // Close notif panel on outside click
      useEffect(() => {
        if (!showNotifPanel) return;
        const handler = (e) => {
          if (!e.target.closest("[data-notif-panel]")) setShowNotifPanel(false);
        };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, [showNotifPanel]);

      // Auth handlers
      const handleLogin = (data) => {
        tokenStore.set(data.token);
        setUser({ id: data.user_id, username: data.username, display_name: data.display_name || data.username });
        setAuthChecked(true);
      };

      if (!authChecked) {
        return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)", color: "white", fontSize: 18 }}>Loading...</div>;
      }

      if (!user) {
        return authPage === "login"
          ? <LoginPage onLogin={handleLogin} onSwitch={() => setAuthPage("register")} />
          : <RegisterPage onLogin={handleLogin} onSwitch={() => setAuthPage("login")} />;
      }

      // Task actions
      const handleDone = async (taskId) => {
        try {
          // Check for pending child tasks
          let children = [];
          try { children = await api.get(`/api/tasks/${taskId}/child-tasks`); } catch (_) {}
          const pending = children.filter(c => c.gtd_status !== "done" && c.gtd_status !== "archived");
          if (pending.length > 0) {
            setDoneConfirm({ taskId, count: pending.length, children: pending });
            return;
          }
          await api.post(`/api/tasks/${taskId}/done`);
          showToast("Task selesai! ✅");
          fetchAll();
          setSelectedTask(null);
        } catch (err) {
          if (isOfflineErr(err)) {
            await OfflineDB.queueAdd({ method: "POST", url: `/api/tasks/${taskId}/done`, body: {} });
            setTasks(prev => prev.map(t => t.id === taskId ? { ...t, gtd_status: "done", _pending: true } : t));
            await updateQueueSize();
            showToast("Offline — akan sync saat online 📶");
            setSelectedTask(null);
          } else { showToast(err.message, "error"); }
        }
      };

      const handleDoneAll = async ({ taskId, children }) => {
        setDoneConfirm(null);
        try {
          for (const c of children) { await api.post(`/api/tasks/${c.id}/done`); }
          await api.post(`/api/tasks/${taskId}/done`);
          showToast("Task & semua subtask selesai! ✅");
          fetchAll();
          setSelectedTask(null);
        } catch (err) {
          if (isOfflineErr(err)) {
            const allIds = [...children.map(c => c.id), taskId];
            for (const id of allIds) await OfflineDB.queueAdd({ method: "POST", url: `/api/tasks/${id}/done`, body: {} });
            setTasks(prev => prev.map(t => allIds.includes(t.id) ? { ...t, gtd_status: "done", _pending: true } : t));
            await updateQueueSize();
            showToast("Offline — akan sync saat online 📶");
            setSelectedTask(null);
          } else { showToast(err.message, "error"); }
        }
      };

      const handleDoneParentOnly = async (taskId) => {
        setDoneConfirm(null);
        try {
          await api.post(`/api/tasks/${taskId}/done`);
          showToast("Task selesai! ✅");
          fetchAll();
          setSelectedTask(null);
        } catch (err) {
          if (isOfflineErr(err)) {
            await OfflineDB.queueAdd({ method: "POST", url: `/api/tasks/${taskId}/done`, body: {} });
            setTasks(prev => prev.map(t => t.id === taskId ? { ...t, gtd_status: "done", _pending: true } : t));
            await updateQueueSize();
            showToast("Offline — akan sync saat online 📶");
            setSelectedTask(null);
          } else { showToast(err.message, "error"); }
        }
      };

      const handleDelete = async (taskId) => {
        if (!confirm("Hapus task ini?")) return;
        try {
          await api.del(`/api/tasks/${taskId}`);
          showToast("Task dihapus 🗑️");
          fetchAll();
          setSelectedTask(null);
        } catch (err) { showToast(err.message, "error"); }
      };

      const handleToggleFocus = async (taskId) => {
        try {
          const result = await api.post(`/api/tasks/${taskId}/focus`);
          showToast(result.is_focused ? "⭐ Ditambahkan ke Fokus" : "☆ Dihapus dari Fokus");
          fetchAll();
        } catch (err) { showToast(err.message, "error"); }
      };

      const handleSaved = () => {
        setShowForm(false);
        setEditTask(null);
        showToast(editTask ? "Task diupdate ✅" : "Task ditambahkan ✅");
        fetchAll();
      };

      const handleEdit = (task) => {
        setSelectedTask(null);
        setEditTask(task);
        setShowForm(true);
      };

      // Determine which tasks to show
      const getFilteredTasks = () => {
        if (page.startsWith("proj_")) {
          const projName = page.slice(5);
          return tasks.filter(t => t.project === projName && t.gtd_status !== "done" && t.gtd_status !== "archived");
        }
        if (page.startsWith("slist_")) {
          const listId = parseInt(page.slice(6));
          return tasks.filter(t => t.list_id === listId && t.gtd_status !== "done" && t.gtd_status !== "archived");
        }
        switch (page) {
          case "inbox": return tasks.filter(t => t.gtd_status === "inbox");
          case "next": return tasks.filter(t => t.gtd_status === "next");
          case "waiting": return tasks.filter(t => t.gtd_status === "waiting");
          case "someday": return tasks.filter(t => t.gtd_status === "someday");
          case "q1": return tasks.filter(t => t.quadrant === "Q1" && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "q2": return tasks.filter(t => t.quadrant === "Q2" && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "q3": return tasks.filter(t => t.quadrant === "Q3" && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "q4": return tasks.filter(t => t.quadrant === "Q4" && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "overdue": return tasks.filter(t => t.is_overdue);
          case "done": return tasks.filter(t => t.gtd_status === "done");
          case "today": return tasks.filter(t => (t.quadrant === "Q1" || t.is_overdue || t.is_focused) && t.gtd_status !== "done" && t.gtd_status !== "archived");
          case "all": return tasks.filter(t => t.gtd_status !== "done" && t.gtd_status !== "archived");
          default: return tasks.filter(t => t.gtd_status !== "done" && t.gtd_status !== "archived");
        }
      };

      const getPageTitle = () => {
        if (page.startsWith("proj_")) return page.slice(5);
        if (page.startsWith("slist_")) {
          const listId = parseInt(page.slice(6));
          const lst = sharedLists.find(l => l.id === listId);
          return lst ? `${lst.role === "owner" ? "📋" : "👥"} ${lst.name}` : "Shared List";
        }
        const titles = {
          dashboard: "Dashboard", inbox: "Inbox", next: "Next Actions", waiting: "Waiting For",
          someday: "Someday / Maybe", q1: "Q1 — Do", q2: "Q2 — Schedule", q3: "Q3 — Delegate",
          q4: "Q4 — Eliminate", overdue: "Overdue", done: "Done", today: "Fokus Hari Ini", all: "Semua Task",
          settings: "Pengaturan"
        };
        return titles[page] || "Tasks";
      };
      const getPageIcon = () => {
        if (page.startsWith("proj_")) return "📂";
        if (page.startsWith("slist_")) return "👥";
        const icons = {
          dashboard: "📊", inbox: "📥", next: "▶️", waiting: "⏳", someday: "💭",
          q1: "🔥", q2: "📅", q3: "👋", q4: "🗑️", overdue: "⚠️", done: "✅", today: "🍅", all: "📋",
          settings: "⚙️"
        };
        return icons[page] || "📋";
      };

      // Render content based on page
      const renderContent = () => {
        if (page === "settings") {
          return <SettingsPage user={user} onUsernameChange={(u) => setUser(u)} showToast={showToast} />;
        }

        if (page === "dashboard") {
          return <Dashboard summary={summary} tasks={tasks} onTaskClick={setSelectedTask} onDone={handleDone} onNav={setPage} />;
        }
        
        if (page === "today") {
          return <TodayFocusView tasks={tasks} onTaskClick={setSelectedTask} onDone={handleDone} loading={loading} />;
        }
        if (page === "chat") {
          return <ChatPage user={user} sharedLists={sharedLists} onTaskClick={setSelectedTask} showToast={showToast} />;
        }

        if (page === "manage_lists") {
          return <SharedListsManager sharedLists={sharedLists} onRefresh={fetchAll} showToast={showToast} />;
        }

        if (page === "calendar") {
          return <CalendarView tasks={tasks} onTaskClick={setSelectedTask} />;
        }

        return (
          <TaskListView
            tasks={getFilteredTasks()}
            allTasks={tasks}
            title={getPageTitle()}
            icon={getPageIcon()}
            onTaskClick={setSelectedTask}
            onDone={handleDone}
            onToggleFocus={handleToggleFocus}
            loading={loading}
            projects={projects}
            contexts={contexts}
            showFilters={page !== "dashboard" && page !== "today"}
            showQuadrant={!["q1","q2","q3","q4"].includes(page)}
            collaborators={page.startsWith("slist_") ? collaborators : []}
          />
        );
      };

      return (
        <div>
          <Sidebar page={page} setPage={setPage} summary={summary} user={user} onLogout={logout} isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} projects={projects} tasks={tasks} collapsed={sidebarCollapsed} onToggleCollapse={() => setSidebarCollapsed(!sidebarCollapsed)} sharedLists={sharedLists} />

          <div className={`main-content ${sidebarCollapsed ? "" : "sidebar-visible"}`}>
            {/* Offline banner */}
            {!isOnline && (
              <div style={{ background: "#fef3c7", borderBottom: "1px solid #fcd34d", padding: "6px 16px", fontSize: 13, color: "#92400e", display: "flex", alignItems: "center", gap: 8 }}>
                <span>📡</span>
                <span style={{ flex: 1 }}>Mode offline — data dari cache. {queueSize > 0 ? `${queueSize} perubahan menunggu sync.` : ""}</span>
              </div>
            )}
            {isOnline && queueSize > 0 && (
              <div style={{ background: "#ecfdf5", borderBottom: "1px solid #6ee7b7", padding: "6px 16px", fontSize: 13, color: "#065f46", display: "flex", alignItems: "center", gap: 8 }}>
                <span>🔄</span>
                <span>Menyinkronkan {queueSize} perubahan...</span>
              </div>
            )}

            {/* Mobile top bar */}
            <div className="mobile-topbar">
              <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", padding: 0, lineHeight: 1 }}>☰</button>
              <div style={{ flex: 1, fontWeight: 700, fontSize: 16 }}>⚡ TaskFlow</div>
              <button onClick={handleOpenNotif} style={{ position: "relative", background: "none", border: "none", fontSize: 20, cursor: "pointer", padding: "0 8px 0 0", lineHeight: 1 }}>
                🔔
                {unreadCount > 0 && <span style={{ position: "absolute", top: -2, right: 4, background: "#ef4444", color: "white", borderRadius: "50%", fontSize: 9, fontWeight: 700, minWidth: 14, height: 14, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 2px" }}>{unreadCount > 9 ? "9+" : unreadCount}</span>}
              </button>
              <ThemeToggle theme={theme} onToggle={toggleTheme} />
              <button className="btn btn-primary btn-sm" onClick={() => { setEditTask(null); setShowForm(true); }}>＋ Tambah</button>
            </div>

            {/* Desktop top bar */}
            <div className="desktop-topbar" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <button onClick={() => setSidebarCollapsed(!sidebarCollapsed)} title="Toggle menu" style={{ background: "none", border: "1px solid var(--border)", borderRadius: 8, cursor: "pointer", fontSize: 16, padding: "6px 10px", color: "var(--text-secondary)", lineHeight: 1 }}>☰</button>
                <div style={{ fontSize: 13, color: "var(--text-light)" }}>
                  {new Date().toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
                </div>
              </div>
              <div data-notif-panel style={{ display: "flex", alignItems: "center", gap: 10, position: "relative" }}>
                {/* Notification Bell */}
                <button onClick={handleOpenNotif} title="Notifikasi" data-notif-panel style={{ position: "relative", background: "none", border: "1px solid var(--border)", borderRadius: 8, cursor: "pointer", fontSize: 18, padding: "5px 10px", color: "var(--text-secondary)", lineHeight: 1 }}>
                  🔔
                  {unreadCount > 0 && (
                    <span style={{ position: "absolute", top: -4, right: -4, background: "#ef4444", color: "white", borderRadius: "50%", fontSize: 10, fontWeight: 700, minWidth: 16, height: 16, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 3px" }}>
                      {unreadCount > 9 ? "9+" : unreadCount}
                    </span>
                  )}
                </button>

                {/* Notification Panel */}
                {showNotifPanel && (
                  <div data-notif-panel style={{ position: "absolute", top: 44, right: 0, width: 340, background: "var(--bg-card)", borderRadius: 12, boxShadow: "0 8px 32px rgba(0,0,0,0.15)", border: "1px solid var(--border)", zIndex: 200, overflow: "hidden" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 16px", borderBottom: "1px solid var(--border)" }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>🔔 Notifikasi</div>
                      <span onClick={() => setShowNotifPanel(false)} style={{ cursor: "pointer", color: "var(--text-light)", fontSize: 16 }}>✕</span>
                    </div>
                    <div style={{ maxHeight: 360, overflowY: "auto" }}>
                      {notifications.length === 0 ? (
                        <div style={{ padding: 20, textAlign: "center", color: "var(--text-light)", fontSize: 13 }}>Belum ada notifikasi</div>
                      ) : notifications.map(n => (
                        <div key={n.id}
                          onClick={n.task_id ? () => openTaskById(n.task_id) : undefined}
                          style={{
                            padding: "10px 16px", borderBottom: "1px solid #f1f5f9",
                            background: n.is_read ? "var(--bg-card)" : "#f0fdf4",
                            cursor: n.task_id ? "pointer" : "default",
                          }}
                          onMouseEnter={n.task_id ? e => e.currentTarget.style.background = "#e0f2fe" : undefined}
                          onMouseLeave={n.task_id ? e => e.currentTarget.style.background = n.is_read ? "var(--bg-card)" : "#f0fdf4" : undefined}
                        >
                          <div style={{ fontSize: 13, lineHeight: 1.5 }} dangerouslySetInnerHTML={{ __html: n.message }} />
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 3 }}>
                            <span style={{ fontSize: 11, color: "var(--text-light)" }}>
                              {new Date(n.created_at).toLocaleString("id-ID", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })}
                            </span>
                            {n.task_id && <span style={{ fontSize: 10, color: "#3b82f6", fontWeight: 600 }}>Buka task →</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <ThemeToggle theme={theme} onToggle={toggleTheme} />
                <button className="btn btn-primary" onClick={() => { setEditTask(null); setShowForm(true); }}>
                  ＋ Tambah Task
                </button>
              </div>
            </div>

            {/* Content */}
            {renderContent()}
          </div>

          {/* Modals */}
          {selectedTask && (
            <TaskDetailModal
              task={selectedTask}
              onClose={() => setSelectedTask(null)}
              onEdit={() => handleEdit(selectedTask)}
              onOpenTask={(t) => { setSelectedTask(null); setTimeout(() => setSelectedTask(t), 20); }}
              onDone={() => handleDone(selectedTask.id)}
              onDelete={() => handleDelete(selectedTask.id)}
              onToggleFocus={handleToggleFocus}
              projects={projects}
              contexts={contexts}
              onRefresh={fetchAll}
              onOfflineEdit={handleOfflineEdit}
              collaborators={collaborators}
            />
          )}

          {showForm && (
            <TaskFormModal
              task={editTask}
              onSave={handleSaved}
              onOfflineSave={handleOfflineSave}
              onClose={() => { setShowForm(false); setEditTask(null); }}
              projects={projects}
              contexts={contexts}
              sharedLists={sharedLists}
              collaborators={collaborators}
            />
          )}

          {/* Done confirm dialog */}
          {doneConfirm && (
            <div className="modal-overlay" onClick={() => setDoneConfirm(null)}>
              <div className="modal-content scale-in" style={{ maxWidth: 360 }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 10 }}>⚠️ Ada subtask belum selesai</div>
                <div style={{ fontSize: 14, color: "var(--text-secondary)", marginBottom: 16 }}>
                  Ada <b>{doneConfirm.count}</b> subtask yang belum done. Tandai semua subtask sekaligus?
                </div>
                <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                  <button className="btn btn-secondary btn-sm" onClick={() => setDoneConfirm(null)}>Batal</button>
                  <button className="btn btn-secondary btn-sm" onClick={() => handleDoneParentOnly(doneConfirm.taskId)}>Parent saja</button>
                  <button className="btn btn-success btn-sm" onClick={() => handleDoneAll(doneConfirm)}>✅ Done semua</button>
                </div>
              </div>
            </div>
          )}

          {/* Toast */}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

          {/* Join invite modal */}
          {joinModal && (
            <JoinListModal
              code={pendingJoinCode}
              onClose={() => { setJoinModal(false); setPendingJoinCode(""); }}
              onJoined={(listName) => {
                setJoinModal(false);
                setPendingJoinCode("");
                showToast(`Berhasil bergabung ke "${listName}" ✅`);
                fetchAll();
                setPage("manage_lists");
              }}
            />
          )}

          {/* FAB — mobile floating add button (hidden on chat page) */}
          {page !== "chat" && (
            <button className="fab" onClick={() => { setEditTask(null); setShowForm(true); }} title="Tambah Task Baru">＋</button>
          )}

          {/* Mobile overlay */}
          {sidebarOpen && <div onClick={() => setSidebarOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", zIndex: 30 }} />}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
  <script>
    // Service Worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js", { scope: "/" })
          .catch(err => console.warn("SW register failed:", err));
      });
    }

    // PWA Install Prompt
    let _deferredPrompt = null;
    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      _deferredPrompt = e;
      const banner = document.getElementById("pwa-install-banner");
      if (banner) banner.style.display = "flex";
    });
    window.addEventListener("appinstalled", () => {
      _deferredPrompt = null;
      const banner = document.getElementById("pwa-install-banner");
      if (banner) banner.style.display = "none";
    });
    function pwaInstall() {
      if (!_deferredPrompt) return;
      _deferredPrompt.prompt();
      _deferredPrompt.userChoice.then(() => {
        _deferredPrompt = null;
        const banner = document.getElementById("pwa-install-banner");
        if (banner) banner.style.display = "none";
      });
    }
    function pwaDismiss() {
      const banner = document.getElementById("pwa-install-banner");
      if (banner) banner.style.display = "none";
    }
  </script>

  <!-- PWA Install Banner -->
  <div id="pwa-install-banner" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;background:#0f172a;color:white;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.35);padding:14px 18px;gap:14px;align-items:center;min-width:280px;max-width:360px;width:calc(100vw - 48px);">
    <div style="font-size:26px;line-height:1;">📲</div>
    <div style="flex:1;">
      <div style="font-weight:700;font-size:14px;margin-bottom:2px;">Install TaskFlow</div>
      <div style="font-size:12px;opacity:0.7;">Akses offline, lebih cepat dari browser</div>
    </div>
    <button onclick="pwaInstall()" style="background:#22c55e;color:white;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;">Install</button>
    <button onclick="pwaDismiss()" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;">✕</button>
  </div>
</body>
</html>
