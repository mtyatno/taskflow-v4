      const tocItems = React.useMemo(() => extractHeadings(content), [content]);
      const [tagDropdown, setTagDropdown] = useState(null);
      const [existingTags, setExistingTags] = useState([]);

      // Autosave: debounced 2.5s setelah perubahan, hanya untuk note yang sudah ada
      useEffect(() => {
        if (!note?.id) return;
        isDirtyRef.current = true;
        clearTimeout(autosaveTimerRef.current);
        autosaveTimerRef.current = setTimeout(async () => {
          if (!navigator.onLine) return;
          try {
            await api.put(`/api/scratchpad/${note.id}`, {
              title, content, tags,
              linked_task_ids: linkedTaskIds,
              linked_task_id: linkedTaskIds[0] || null,
            });
            isDirtyRef.current = false;
          } catch (e) {
            if (!isOfflineErr(e)) console.warn("Autosave failed:", e.message);
          }
        }, 2500);
        return () => clearTimeout(autosaveTimerRef.current);
      }, [title, content, tags, linkedTaskIds]);

      // Polling: setiap 5 detik untuk shared notes saja
      useEffect(() => {
        if (!note?.id || !note?.list_id) return;
        const interval = setInterval(async () => {
          if (!navigator.onLine) return;
          try {
            const fresh = await api.get(`/api/scratchpad/${note.id}`);
            if (!fresh?.updated_at) return;
            const serverTime = new Date(fresh.updated_at).getTime();
            const localTime  = new Date(lastKnownAtRef.current || note?.updated_at).getTime();
            if (serverTime <= localTime) return;
            // Ada versi lebih baru dari server
            if (!isDirtyRef.current) {
              // User tidak sedang mengetik — update silent
              setContent(fresh.content || "");
              setTitle(fresh.title || "");
              lastKnownAtRef.current = fresh.updated_at;
              setConflictBanner(null);
            } else {
              // User sedang mengetik — tampilkan banner
              const editorName = fresh.last_editor_display_name || fresh.last_editor_username || "Pengguna lain";
              setConflictBanner({ editor: editorName, content: fresh.content, title: fresh.title, tags: fresh.tags || [], linked_task_ids: fresh.linked_task_ids || [], updated_at: fresh.updated_at });
            }
          } catch (_) { /* ignore poll errors */ }
        }, 5000);
        return () => clearInterval(interval);
      }, [note?.id, note?.list_id]);

      useEffect(() => {
        if (noteTitlesProp.length === 0) {
          api.get("/api/scratchpad/titles").then(setNoteTitles).catch(() => {});
        }
        if (note?.id) {
          api.get(`/api/scratchpad/${note.id}/backlinks`).then(setBacklinks).catch(() => {});
        }
      }, []);

      useEffect(() => {
        api.get("/api/tags?entity_type=note").then(data => setExistingTags(data || [])).catch(() => {});
        return () => setTagDropdown(null);
      }, []);

      // Handle [[  autocomplete in textarea
      const handleContentKeyDown = (e) => {
        // Tag dropdown navigation
        if (tagDropdown) {
          if (e.key === "Escape") { setTagDropdown(null); return; }
          if (e.key === "Enter" || e.key === "Tab") {
            e.preventDefault();
            if (tagDropdown.items[0]) insertTag(tagDropdown.items[0].name);
            return;
          }
        }
        // Wikilink dropdown navigation
        if (wikiDropdown) {
          const totalItems = wikiDropdown.items.length + (wikiDropdown.canCreate ? 1 : 0);
          if (e.key === "ArrowDown") { e.preventDefault(); setWikiDropdown(d => ({ ...d, activeIdx: Math.min(d.activeIdx + 1, totalItems - 1) })); return; }
          if (e.key === "ArrowUp")   { e.preventDefault(); setWikiDropdown(d => ({ ...d, activeIdx: Math.max(d.activeIdx - 1, 0) })); return; }
          if (e.key === "Enter" || e.key === "Tab") {
            e.preventDefault();
            if (wikiDropdown.activeIdx < wikiDropdown.items.length) {
              insertWikilink(wikiDropdown.items[wikiDropdown.activeIdx].title);
            } else if (wikiDropdown.canCreate) {
              createNewNote(wikiDropdown.query.trim());
            }
            return;
          }
          if (e.key === "Escape") { setWikiDropdown(null); return; }
        }

        // Auto-continue list on Enter
        if (e.key === "Enter") {
          const el = textareaRef.current;
          if (!el) return;
          const pos = el.selectionStart;
          const val = el.value;
          const lineStart = val.lastIndexOf("\n", pos - 1) + 1;
          const line = val.slice(lineStart, pos);

          // Detect prefix: checklist done, checklist empty, checklist, bullet
          let prefix = null;
          if (/^- \[x\] /i.test(line)) prefix = "- [ ] ";       // after done item → new empty check
          else if (/^- \[ \] $/.test(line)) prefix = null;       // empty checklist → exit (handled below)
          else if (/^- \[ \] /.test(line)) prefix = "- [ ] ";
          else if (/^- $/.test(line)) prefix = null;              // empty bullet → exit
          else if (/^- /.test(line)) prefix = "- ";

          if (prefix !== null) {
            e.preventDefault();
            const newVal = val.slice(0, pos) + "\n" + prefix + val.slice(pos);
            setContent(newVal);
            const newPos = pos + 1 + prefix.length;
            setTimeout(() => { el.focus(); el.setSelectionRange(newPos, newPos); }, 0);
          } else if (/^- (\[ \] )?$/.test(line)) {
            // Empty list item → remove prefix, exit list mode
            e.preventDefault();
            const newVal = val.slice(0, lineStart) + "\n" + val.slice(pos);
            setContent(newVal);
            const newPos = lineStart + 1;
            setTimeout(() => { el.focus(); el.setSelectionRange(newPos, newPos); }, 0);
          }
        }
      };

      const handleContentChange = (val) => {
        setContent(val);
        
        // Auto-extract tags: find words starting with #
        const extracted = [...new Set((val.match(/#([a-zA-Z0-9_À-ɏ]+)/g) || []).map(t => t.slice(1).toLowerCase().trim()))].filter(Boolean);
        if (JSON.stringify(extracted) !== JSON.stringify(tags)) {
          setTags(extracted);
        }

        const el = textareaRef.current;
        if (!el) return;
        const pos = el.selectionStart;
        const before = val.slice(0, pos);
        const tagMatch = before.match(/#([a-zA-Z0-9_À-ɏ]*)$/);
        if (tagMatch) {
          const query = tagMatch[1].toLowerCase();
          const items = existingTags.filter(t => t.name.startsWith(query) && !extracted.includes(t.name)).slice(0, 6);
          if (items.length > 0 && el) {
            const rect = el.getBoundingClientRect();
            setTagDropdown({ query, items, top: rect.top + 20, left: rect.left + 8 });
          } else {
            setTagDropdown(null);
          }
        } else {
          setTagDropdown(null);
        }

        const match = before.match(/\[\[([^\]]*)$/);
        if (!match) { setWikiDropdown(null); return; }
        const query = match[1];
        const queryTrimmed = query.trim();
        const queryLow = queryTrimmed.toLowerCase();
        const items = noteTitles.filter(n => n.title.toLowerCase().includes(queryLow) && n.title !== title).slice(0, 6);
        const exactMatch = noteTitles.some(n => n.title.toLowerCase() === queryLow);
        const canCreate = queryTrimmed.length > 0 && !exactMatch;
        // Use fixed positioning relative to viewport so modal overflow-y doesn't clip
        const rect = el.getBoundingClientRect();
        const lh = parseFloat(getComputedStyle(el).lineHeight) || 22;
        const linesBefore = before.split("\n").length;
        const rawTop = rect.top + linesBefore * lh;
        const top = rawTop + 260 > window.innerHeight ? rect.top - 4 : rawTop + 4;
        setWikiDropdown({ top, left: rect.left + 8, query, items, activeIdx: 0, canCreate });
      };

      const insertWikilink = (t) => {
        const el = textareaRef.current;
        if (!el) return;
        const pos = el.selectionStart;
        const before = content.slice(0, pos);
        const after  = content.slice(pos);
        const replaced = before.replace(/\[\[([^\]]*)$/, `[[${t}]]`);
        setContent(replaced + after);
        setWikiDropdown(null);
        setTimeout(() => { el.focus(); el.setSelectionRange(replaced.length, replaced.length); }, 0);
      };

      const createNewNote = async (newTitle) => {
        setWikiDropdown(null);
        const body = { title: newTitle, content: "", tags: [], linked_task_ids: [], linked_task_id: null };
        try {
          const created = await api.post("/api/scratchpad", body);
          setNoteTitles(prev => [{ id: created.id, title: created.title }, ...prev]);
          window.dispatchEvent(new CustomEvent("noteSaved"));
          insertWikilink(newTitle);
        } catch (err) {
          if (isOfflineErr(err)) {
            const tempId = `tmp_note_${Date.now()}`;
            const now = new Date().toISOString();
            const cached = await OfflineDB.cacheGet("scratchpad_notes") || [];
            await OfflineDB.cacheSet("scratchpad_notes", [{ id: tempId, ...body, created_at: now, updated_at: now, _pending: true }, ...cached]);
            await OfflineDB.queueAdd({ method: "POST", url: "/api/scratchpad", body, tempId });
            setNoteTitles(prev => [{ id: tempId, title: newTitle }, ...prev]);
            window.dispatchEvent(new CustomEvent("noteSaved"));
            insertWikilink(newTitle);
          } else {
            showToast(err.message || "Gagal membuat catatan", "error");
          }
        }
      };

      const insertTag = (tagName) => {
        const el = textareaRef.current;
        if (!el) return;
        const pos = el.selectionStart;
        const before = content.slice(0, pos);
        const after = content.slice(pos);
        const newBefore = before.replace(/#([a-zA-Z0-9_À-ɏ]*)$/, `#${tagName} `);
        const newVal = newBefore + after;
        handleContentChange(newVal);
        setTagDropdown(null);
        setTimeout(() => { el.selectionStart = el.selectionEnd = newBefore.length; el.focus(); }, 0);
      };

      // Click wikilink in preview
      const handlePreviewClick = (e) => {
        const el = e.target.closest("[data-wiki-title]");
        if (el) {
          const t = el.getAttribute("data-wiki-title");
          const found = noteTitles.find(n => n.title.toLowerCase() === t.toLowerCase());
          if (found) { /* parent NotesPage doesn't exist here — we dispatch event */ window.dispatchEvent(new CustomEvent("openNote", { detail: found.id })); }
        } else { setPreview(false); }
      };

      const allKnownTasks = [...tasks, ...localNewTasks.filter(t => !tasks.find(x => x.id === t.id))];
      const linkedTasks   = allKnownTasks.filter(t => linkedTaskIds.includes(t.id));
      const filteredTasks = allKnownTasks.filter(t =>
        t.gtd_status !== "done" && t.gtd_status !== "archived" &&
        t.title.toLowerCase().includes(taskSearch.toLowerCase())
      ).slice(0, 8);

      const saveOnly = async () => {
        setSaving(true);
        clearTimeout(autosaveTimerRef.current);
        await onSave({ title, content, tags, linked_task_ids: linkedTaskIds, linked_task_id: linkedTaskIds[0] || null });
        isDirtyRef.current = false;
        setSaving(false);
      };

      const handleSave = async () => { await saveOnly(); onClose(); };

      const createAndLinkTask = async () => {
        const newTitle = taskSearch.trim() || "Task baru";
        setCreatingTask(true);
        try {
          const created = await api.post("/api/tasks", { title: newTitle });
          setLocalNewTasks(prev => [...prev, created]);
          setLinkedTaskIds(ids => [...ids, created.id]);
          setShowTaskSearch(false);
          setTaskSearch("");
        } catch (e) {
          // silent — user can retry
        } finally {
          setCreatingTask(false);
        }
      };

      // ── Shared inner content ──────────────────────────────────────
      const inner = (
        <>
          {/* Title */}
          <input
            className="note-modal-title-input"
            placeholder="Judul catatan..."
            value={title}
            onChange={e => setTitle(e.target.value)}
            autoFocus={!expanded}
            style={{ fontSize: expanded ? 22 : undefined }}
          />

          {/* Conflict banner */}
          {conflictBanner && (
            <div style={{ background: "#fef3c7", border: "1px solid #fde68a", borderRadius: 8, padding: "8px 12px", marginBottom: 8, display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
              <span style={{ flex: 1, color: "#92400e" }}>
                ✏️ <b>{conflictBanner.editor}</b> baru saja menyimpan perubahan.
              </span>
              <button
                onClick={() => {
                  setContent(conflictBanner.content || "");
                  setTitle(conflictBanner.title || "");
                  setTags(conflictBanner.tags || []);
                  setLinkedTaskIds(conflictBanner.linked_task_ids || []);
                  lastKnownAtRef.current = conflictBanner.updated_at || lastKnownAtRef.current;
                  isDirtyRef.current = false;
                  setConflictBanner(null);
                }}
                style={{ background: "#f59e0b", border: "none", borderRadius: 5, fontSize: 11, fontWeight: 700, color: "#fff", cursor: "pointer", padding: "3px 8px", flexShrink: 0 }}>
                Muat perubahan
              </button>
              <button
                onClick={() => setConflictBanner(null)}
                style={{ background: "none", border: "none", fontSize: 14, cursor: "pointer", color: "#92400e", padding: "0 2px" }}>
                ✕
              </button>
            </div>
          )}

          {/* Content + ToC */}
          <div style={{ display: "flex", gap: 0, alignItems: "flex-start", marginTop: 12 }}>
          <div style={{ position: "relative", flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
              <NoteToolbar textareaRef={textareaRef} value={content} onChange={handleContentChange} />
              <div style={{ display: "flex", border: "1px solid var(--border)", borderRadius: 6, overflow: "hidden", flexShrink: 0, marginLeft: 8 }}>
                <button onClick={() => setPreview(false)}
                  style={{ background: !preview ? "var(--accent)" : "none", border: "none", borderRadius: 0, fontSize: 11, fontWeight: 700, color: !preview ? "#111" : "var(--text-secondary)", cursor: "pointer", padding: "3px 10px", transition: "all 0.15s" }}>
                  Tulis
                </button>
                <button onClick={() => setPreview(true)}
                  style={{ background: preview ? "var(--accent)" : "none", border: "none", borderRadius: 0, fontSize: 11, fontWeight: 700, color: preview ? "#111" : "var(--text-secondary)", cursor: "pointer", padding: "3px 10px", transition: "all 0.15s" }}>
                  Lihat
                </button>
              </div>
            </div>
            {preview ? (
              <div className="note-rendered note-modal-content-input"
                style={{ minHeight: expanded ? (focus ? "calc(100vh - 180px)" : "calc(100vh - 320px)") : 120, cursor: "text", overflowY: "auto" }}
                onClick={handlePreviewClick}
                dangerouslySetInnerHTML={{ __html: renderMarkdown(content, noteTitles.map(n => n.title)) || '<span style="color:var(--text-light)">Klik untuk edit...</span>' }}
              />
            ) : (
              <textarea
                ref={textareaRef}
                className="note-modal-content-input"
                placeholder={"Tulis isi catatan...\n# H1  ## H2  - bullet  - [ ] checklist  [[Link Note]]"}
                value={content}
                onChange={e => handleContentChange(e.target.value)}
                onKeyDown={handleContentKeyDown}
                style={{ minHeight: expanded ? (focus ? "calc(100vh - 180px)" : "calc(100vh - 320px)") : 120, fontSize: expanded ? 16 : 14, resize: expanded ? "none" : "vertical" }}
              />
            )}
            {/* Wikilink autocomplete dropdown */}
            {wikiDropdown && (
              <div ref={wikiDropdownRef} className="wiki-autocomplete"
                style={{ position: "fixed", top: wikiDropdown.top, left: wikiDropdown.left }}>
                {wikiDropdown.items.map((n, i) => (
                  <div key={n.id} className={`wiki-autocomplete-item${i === wikiDropdown.activeIdx ? " active" : ""}`}
                    onMouseDown={e => { e.preventDefault(); insertWikilink(n.title); }}>
                    [[{n.title}]]
                  </div>
                ))}
                {wikiDropdown.canCreate && (
                  <div
                    className={`wiki-autocomplete-item${wikiDropdown.activeIdx === wikiDropdown.items.length ? " active" : ""}`}
                    style={{ borderTop: wikiDropdown.items.length > 0 ? "1px solid var(--border)" : undefined, color: "var(--accent)", fontWeight: 600 }}
                    onMouseDown={e => { e.preventDefault(); createNewNote(wikiDropdown.query.trim()); }}>
                    ✨ Buat note "{wikiDropdown.query.trim()}"
                  </div>
                )}
                {!wikiDropdown.canCreate && wikiDropdown.items.length === 0 && (
                  <div className="wiki-autocomplete-item" style={{ color: "var(--text-light)", cursor: "default", fontStyle: "italic" }}>
                    {noteTitles.length === 0 ? "Belum ada catatan bertajuk" : "Tidak ditemukan"}
                  </div>
                )}
              </div>
            )}
            {/* Tag autocomplete dropdown */}
            {tagDropdown && tagDropdown.items.length > 0 && (
              <div className="wiki-autocomplete" style={{ position: "fixed", top: tagDropdown.top, left: tagDropdown.left, zIndex: 1050 }}>
                {tagDropdown.items.map((t, i) => (
                  <div key={t.id} className={`wiki-autocomplete-item${i === 0 ? " active" : ""}`}
                    onMouseDown={e => { e.preventDefault(); insertTag(t.name); }}>
                    <span style={{ color: "var(--accent)", fontWeight: 700 }}>#</span>{t.name}
                    <span style={{ fontSize: 10, color: "var(--text-light)", marginLeft: 6 }}>{t.count}×</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          {preview && tocItems.length >= 2 && <NoteToc items={tocItems} />}
          </div>

          {/* Tags — auto-extracted from content */}
          {!focus && tags.length > 0 && (
            <div style={{ marginBottom: 4 }}>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {tags.map(t => (
                  <span key={t} className="note-tag" style={{ cursor: "default", opacity: 0.8, fontSize: 11 }}>
                    #{t}
                  </span>
                ))}
              </div>
            </div>
          )}

          {/* Link ke Task — hidden in focus mode */}
          {!focus && (
            <div>
              <div className="note-modal-section-label">Di-link ke Task ({linkedTaskIds.length})</div>

              {/* List linked tasks */}
              {linkedTasks.map(t => (
                <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 8, background: "var(--bg-primary)", borderRadius: 8, padding: "8px 12px", marginBottom: 6 }}>
                  <PriBadge p={t.priority} />
                  <span style={{ flex: 1, fontSize: 13, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.title}</span>
                  <button
                    onClick={() => { onClose(); setTimeout(() => onTaskClick && onTaskClick(t), 60); }}
                    style={{ background: "none", border: "1px solid var(--border)", borderRadius: 6, fontSize: 11, fontWeight: 600, color: "var(--accent)", cursor: "pointer", padding: "2px 8px", flexShrink: 0 }}>
                    Buka
                  </button>
                  <button onClick={() => setLinkedTaskIds(ids => ids.filter(id => id !== t.id))}
                    style={{ background: "none", border: "none", color: "var(--text-secondary)", cursor: "pointer", fontSize: 16, flexShrink: 0 }}>✕</button>
                </div>
              ))}

              {/* Add link search */}
              <button className="btn btn-secondary btn-sm" onClick={() => setShowTaskSearch(s => !s)}>
                + Tambah Link Task
              </button>
              {showTaskSearch && (
                <div style={{ marginTop: 8 }}>
                  <input
                    className="input" style={{ width: "100%", padding: "7px 10px", fontSize: 13, marginBottom: 6 }}
                    placeholder="Cari task..."
                    value={taskSearch}
                    onChange={e => setTaskSearch(e.target.value)}
                    autoFocus
                  />
                  {filteredTasks.filter(t => !linkedTaskIds.includes(t.id)).map(t => (
                    <div key={t.id}
                      onClick={() => { setLinkedTaskIds(ids => [...ids, t.id]); setShowTaskSearch(false); setTaskSearch(""); }}
                      style={{ padding: "8px 10px", borderRadius: 8, cursor: "pointer", fontSize: 13,
                        background: "var(--bg-primary)", marginBottom: 4, display: "flex", alignItems: "center", gap: 8 }}
                      onMouseEnter={e => e.currentTarget.style.opacity = "0.75"}
                      onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
                      <PriBadge p={t.priority} />
                      {t.title}
                    </div>
                  ))}
                  {filteredTasks.filter(t => !linkedTaskIds.includes(t.id)).length === 0 && !taskSearch.trim() && (
                    <div style={{ fontSize: 12, color: "var(--text-light)", padding: "6px 10px" }}>Tidak ada task ditemukan</div>
                  )}
                  {taskSearch.trim() && (
                    <div
                      onClick={creatingTask ? undefined : createAndLinkTask}
                      style={{ padding: "8px 10px", borderRadius: 8, cursor: creatingTask ? "default" : "pointer", fontSize: 13,
                        background: "var(--bg-primary)", marginTop: 4, display: "flex", alignItems: "center", gap: 8,
                        opacity: creatingTask ? 0.6 : 1, borderTop: "1px solid var(--border)" }}
                      onMouseEnter={e => { if (!creatingTask) e.currentTarget.style.opacity = "0.75"; }}
                      onMouseLeave={e => e.currentTarget.style.opacity = creatingTask ? "0.6" : "1"}>
                      <span style={{ fontSize: 15 }}>＋</span>
                      <span>{creatingTask ? "Membuat..." : `Buat task baru: "${taskSearch.trim()}"`}</span>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* Backlinks — hidden in focus mode */}
          {!focus && backlinks.length > 0 && (
            <div>
              <div className="note-modal-section-label">🔗 Disebutkan di ({backlinks.length})</div>
              {backlinks.map(bl => (
                <div key={bl.id} className="backlink-item"
                  onClick={() => window.dispatchEvent(new CustomEvent("openNote", { detail: bl.id }))}>
                  <span style={{ fontSize: 15 }}>📝</span>
                  <span style={{ flex: 1, fontWeight: 600 }}>{bl.title || "(tanpa judul)"}</span>
                  <span style={{ fontSize: 11, color: "var(--text-light)" }}>{bl.updated_at?.slice(0,10)}</span>
                </div>
              ))}
            </div>
          )}

          {/* Actions — hidden in focus mode */}
          {!focus && (
            <div className="note-mobile-footer" style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 4 }}>
              <button className="btn btn-secondary btn-sm" onClick={onClose}>Batal</button>
              <button className="btn btn-sm" style={{ background: "var(--accent)", color: "#111", fontWeight: 700 }}
                onClick={handleSave} disabled={saving}>
                {saving ? "Menyimpan..." : "Simpan"}
              </button>
            </div>
          )}
        </>
      );

      // ── Header (shared) ───────────────────────────────────────────
      const btnStyle = { background: "none", border: "1px solid var(--border)", borderRadius: 6, fontSize: 12, cursor: "pointer", padding: "3px 8px", lineHeight: 1.4, transition: "all 0.15s" };

      const header = (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: focus ? 10 : 14, flexShrink: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "var(--accent)" }}>⚡ Catatan (v5.1)</div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            {!focus && note?.id && (
              <button onClick={() => { onDelete(note.id); onClose(); }}
                style={{ background: "none", border: "none", color: "#ef4444", fontSize: 13, cursor: "pointer", padding: "2px 6px" }}>
                🗑 Hapus
              </button>
            )}
            <button onClick={() => { if (focus) saveOnly(); setFocus(f => !f); }} title={focus ? "Keluar Focus" : "Focus Mode"}
              style={{ ...btnStyle, color: focus ? "#111" : "var(--text-secondary)", background: focus ? "var(--accent)" : "none", borderColor: focus ? "var(--accent)" : "var(--border)" }}>
              {focus ? "✦ Focus" : "✦ Focus"}
            </button>
            {!focus && (
              <button onClick={() => setExpanded(e => !e)} title={expanded ? "Compact" : "Expand"}
                style={{ ...btnStyle, color: "var(--text-secondary)" }}>
                {expanded ? "⊡ Compact" : "⤢ Expand"}
              </button>
            )}
            {note?.id && note.user_id === currentUserId && sharedLists.length > 0 && (
              <div ref={shareRef} style={{ position: "relative", flexShrink: 0 }}>
                <button onClick={() => setShareOpen(o => !o)}
                  title={noteListId ? "Atur berbagi" : "Bagikan ke list"}
                  style={{ background: noteListId ? "rgba(168,197,0,0.12)" : "none", border: "1px solid var(--border)", borderRadius: 7, fontSize: 12, fontWeight: 600, color: noteListId ? "var(--accent)" : "var(--text-light)", cursor: "pointer", padding: "4px 8px" }}>
                  👥
                </button>
                {shareOpen && (
                  <div style={{ position: "absolute", top: "calc(100% + 4px)", right: 0, zIndex: 300, background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 10, boxShadow: "0 6px 20px rgba(0,0,0,0.18)", minWidth: 180, padding: "4px 0" }}>

    function NotePanel({ note, allNotes, noteTitles, backlinks, outlinks, navTrail, onEdit, onClose, onDelete, onPin, onNavigate, onNavigateFrom, onTrailClick, sharedLists = [], currentUserId, onTaskClick }) {

    function NotesPage({ tasks, showToast, onTaskClick, user, sharedLists = [] }) {
      const [notes, setNotes]         = useState([]);
      const [allNotes, setAllNotes]   = useState([]);
      const [loading, setLoading]     = useState(true);
      const [q, setQ]                 = useState("");
      const [activeTags, setActiveTags] = useState([]);
      const [tagList, setTagList] = useState([]);
      const [selected, setSelected]   = useState(null);
      const [showModal, setShowModal] = useState(false);
      const [panelNote, setPanelNote]           = useState(null);
      const [panelBacklinks, setPanelBacklinks] = useState([]);
      const [panelOutlinks, setPanelOutlinks]   = useState([]);
      const [navTrail, setNavTrail]             = useState([]);
      const [noteTitles, setNoteTitles]         = useState([]);
      const [tagsOpen, setTagsOpen]             = useState(true);
      const [sortBy, setSortBy]                 = useState("updated");
      const [pinnedExpanded, setPinnedExpanded] = useState(false);

      useEffect(() => {
        api.get("/api/tags?entity_type=note").then(data => setTagList(data || [])).catch(() => {});
      }, []);

      useEffect(() => {
        const handler = () => api.get("/api/tags?entity_type=note").then(data => setTagList(data || [])).catch(() => {});
        window.addEventListener("noteSaved", handler);
        return () => window.removeEventListener("noteSaved", handler);
      }, []);

      // Static version (no closure dep) used inside async fetchNotes
      const applyFiltersStatic = (query, tags, base) => {
        const syntaxTags = [...query.matchAll(/\btag:(\S+)/gi)].map(m => m[1].toLowerCase());
        const cleanQuery = query.replace(/\btag:\S+/gi, "").trim();
        const allTags = [...new Set([...tags, ...syntaxTags])];
        let result = base;
        for (const tag of allTags) result = result.filter(n => (n.tags || []).map(t => t.toLowerCase()).includes(tag));
        if (cleanQuery) result = result.filter(n =>
          n.title?.toLowerCase().includes(cleanQuery.toLowerCase()) ||
          n.content?.toLowerCase().includes(cleanQuery.toLowerCase())
        );
        return result;
      };

      const fetchNotes = async (filterQ = "", filterTags = []) => {
        try {
          const data = await api.get("/api/scratchpad");
          await OfflineDB.cacheSet("scratchpad_notes", data);
          setAllNotes(data);
          setNotes(filterQ || filterTags.length ? applyFiltersStatic(filterQ, filterTags, data) : data);
        } catch (e) {
          const cached = await OfflineDB.cacheGet("scratchpad_notes") || [];
          setAllNotes(cached);
          setNotes(filterQ || filterTags.length ? applyFiltersStatic(filterQ, filterTags, cached) : cached);
        }
        setLoading(false);
      };

      useEffect(() => { fetchNotes(); }, []);

      useEffect(() => {
        api.get("/api/scratchpad/titles").then(setNoteTitles).catch(() => {});
      }, []);

      useEffect(() => {
        setPanelNote(prev => {
          if (!prev?.id) return prev;
          const fresh = allNotes.find(n => n.id === prev.id);
          return fresh || prev;
        });
      }, [allNotes]);

      useEffect(() => {
        if (!panelNote?.id) { setPanelBacklinks([]); setPanelOutlinks([]); return; }
        api.get(`/api/scratchpad/${panelNote.id}/backlinks`).then(setPanelBacklinks).catch(() => {});
        const wikiTitles = [...new Set((panelNote.content || "").match(/\[\[([^\[\]]+)\]\]/g) || [])]
          .map(s => s.slice(2, -2).trim().toLowerCase());
        const outs = allNotes.filter(n => n.id !== panelNote.id && wikiTitles.includes((n.title || "").toLowerCase()));
        setPanelOutlinks(outs);
      }, [panelNote?.id, allNotes]);

      useEffect(() => {
        const handler = () => fetchNotes(q, activeTags);
        window.addEventListener("noteSaved", handler);
        return () => window.removeEventListener("noteSaved", handler);
      }, [q, activeTags]);

      useEffect(() => {
        const handler = async () => {
          if (!panelNote?.id) return;
          try {
            const updated = await api.get(`/api/scratchpad/${panelNote.id}`);
            setPanelNote(updated);
          } catch {}
        };
        window.addEventListener("taskUpdated", handler);
        return () => window.removeEventListener("taskUpdated", handler);
      }, [panelNote?.id]);

      // Open a specific note by ID (from wikilink / backlink click)
      useEffect(() => {
        const handler = async (e) => {
          const id = e.detail;
          let note = allNotes.find(n => n.id === id);
          if (!note) {
            try {
              const all = await api.get("/api/scratchpad");
              setAllNotes(all); setNotes(all);
              note = all.find(n => n.id === id);
            } catch {}
          }
          if (note) {
            setPanelNote(note);
            setNavTrail(t => [...t.slice(-7), note]);
          }
        };
        window.addEventListener("openNote", handler);
        return () => window.removeEventListener("openNote", handler);
      }, [allNotes]);

      // Parse tag: syntax from query, return { cleanQuery, syntaxTags }
      const parseQuery = (query) => {
        const syntaxTags = [...query.matchAll(/\btag:(\S+)/gi)].map(m => m[1].toLowerCase());
        const cleanQuery = query.replace(/\btag:\S+/gi, "").trim();
        return { cleanQuery, syntaxTags };
      };

      const applyFilters = (query, tags, base) => {
        const { cleanQuery, syntaxTags } = parseQuery(query);
        const allActiveTags = [...new Set([...tags, ...syntaxTags])];
        let result = base;
        for (const tag of allActiveTags) {
          result = result.filter(n => (n.tags || []).map(t => t.toLowerCase()).includes(tag));
        }
        if (cleanQuery) result = result.filter(n =>
          n.title?.toLowerCase().includes(cleanQuery.toLowerCase()) ||
          n.content?.toLowerCase().includes(cleanQuery.toLowerCase())
        );
        return result;
      };

      const handleSearch = (val) => {
        setQ(val);
        setNotes(applyFilters(val, activeTags, allNotes));
      };

      const handleTagFilter = (tag) => {
        const next = activeTags.includes(tag)
          ? activeTags.filter(t => t !== tag)
          : [...activeTags, tag];
        setActiveTags(next);
        setNotes(applyFilters(q, next, allNotes));
      };

      const allTags = tagList.map(t => t.name);

      const openNew = () => { setSelected({}); setShowModal(true); };
      const openEdit = (n) => { setSelected(n); setShowModal(true); };

      const handleSave = async (data) => {
        const now = new Date().toISOString();
        try {
          if (selected?.id) {
            await api.put(`/api/scratchpad/${selected.id}`, data);
            showToast("✅ Catatan disimpan");
          } else {
            await api.post("/api/scratchpad", data);
            showToast("✅ Catatan dibuat");
          }
          await fetchNotes(q, activeTags);
          window.dispatchEvent(new CustomEvent("noteSaved"));
        } catch (e) {
          if (isOfflineErr(e)) {
            // update cache optimistically
            const cached = await OfflineDB.cacheGet("scratchpad_notes") || [];
            let updated;
            if (selected?.id) {
              updated = cached.map(n => n.id === selected.id ? { ...n, ...data, tags: data.tags||[], updated_at: now } : n);
              await OfflineDB.queueAdd({ method: "PUT", url: `/api/scratchpad/${selected.id}`, body: data });
            } else {
              const tempId = `tmp_note_${Date.now()}`;
              const newNote = { id: tempId, ...data, tags: data.tags||[], created_at: now, updated_at: now, _pending: true };
              updated = [newNote, ...cached];
              await OfflineDB.queueAdd({ method: "POST", url: "/api/scratchpad", body: data, tempId });
            }
            await OfflineDB.cacheSet("scratchpad_notes", updated);
            setAllNotes(updated);
            setNotes(updated);
            showToast("📶 Tersimpan offline, akan sync saat online");
          } else { showToast(e.message, "error"); }
        }
      };

      const handleDelete = async (id) => {
        try {
          await api.del(`/api/scratchpad/${id}`);
          showToast("🗑 Catatan dihapus");
          fetchNotes(q, activeTags);
          setActiveTags([]);
        } catch (e) {
          if (isOfflineErr(e)) {
            // remove from cache optimistically
            const cached = await OfflineDB.cacheGet("scratchpad_notes") || [];
            const updated = cached.filter(n => n.id !== id);
            await OfflineDB.cacheSet("scratchpad_notes", updated);
            setAllNotes(updated); setNotes(updated);
            if (!String(id).startsWith("tmp_")) {
              await OfflineDB.queueAdd({ method: "DELETE", url: `/api/scratchpad/${id}`, body: {} });
            }
            showToast("📶 Dihapus offline, akan sync saat online");
          } else { showToast(e.message, "error"); }
        }
      };

      const fmtDate = (s) => {
        if (!s) return "";
        const d = new Date(s);
        return d.toLocaleString("id-ID", { day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
      };

      const handlePin = async (id) => {
        try {
          const updated = await api.patch(`/api/scratchpad/${id}/pin`, {});
          const refresh = allNotes.map(n => n.id === id ? updated : n);
          setAllNotes(refresh);
          setNotes(applyFilters(q, activeTags, refresh));
        } catch (e) { showToast(e.message, "error"); }
      };

      const sortedNotes = [...notes].sort((a, b) => {
        if (sortBy === "alpha") return (a.title || "").localeCompare(b.title || "");
        if (sortBy === "created") return new Date(a.created_at) - new Date(b.created_at);
        if (sortBy === "links") return ((b.linked_to || []).length) - ((a.linked_to || []).length);
        return new Date(b.updated_at) - new Date(a.updated_at);
      });

      const inCountMap = {};
      allNotes.forEach(m => {
        (m.linked_to || []).forEach(id => {
          inCountMap[id] = (inCountMap[id] || 0) + 1;
        });
      });

      return (
        <div className="fade-in">

          {/* ── FULL-WIDTH SEARCH BAR ── */}
          <div className="scratchpad-bar" style={{ marginBottom: 8, marginTop: 20 }}>
            <span style={{ fontSize: 15, color: "var(--text-secondary)" }}>🔍</span>
            <input
              value={q}
              onChange={e => handleSearch(e.target.value)}
              placeholder="Cari catatan... atau ketik tag:nama"
            />
            {q && <button onClick={() => { setQ(""); setNotes(applyFilters("", activeTags, allNotes)); }}
              style={{ background: "none", border: "none", color: "var(--text-secondary)", cursor: "pointer", fontSize: 16 }}>✕</button>}
          </div>

          {/* ── FULL-WIDTH TAGS ── */}
          {allTags.length > 0 && (
            <div style={{ marginBottom: 6 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: "var(--text-light)", textTransform: "uppercase", letterSpacing: "0.8px" }}>Tags</span>
                <button onClick={() => setTagsOpen(o => !o)}
                  style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11, color: "var(--text-light)", padding: 0, lineHeight: 1 }}>
                  {tagsOpen ? "▲" : "▼"}
                </button>
                {activeTags.length > 0 && (
                  <span onClick={() => { setActiveTags([]); setNotes(applyFilters(q, [], allNotes)); }}
                    style={{ fontSize: 11, color: "var(--text-secondary)", cursor: "pointer", padding: "1px 5px", marginLeft: "auto" }}>
                    ✕ reset
                  </span>
                )}
              </div>
              {tagsOpen && (
                <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                  {allTags.map(tag => {
                    const isActive = activeTags.includes(tag) || parseQuery(q).syntaxTags.includes(tag);
                    return (
                      <span key={tag} onClick={() => handleTagFilter(tag)} className="note-tag"
                        style={{ cursor: "pointer", fontSize: 11, background: isActive ? "var(--accent)" : "rgba(168,197,0,0.12)", color: isActive ? "#111" : "var(--accent)", fontWeight: isActive ? 700 : 600, transition: "all 0.15s" }}>
                        #{tag}
                      </span>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          <div className={`notes-layout${panelNote ? " note-open" : ""}`}>

            {/* ── LEFT PANEL ── */}
            <div className="notes-left">
              {/* Pinned notes */}
              {(() => {
                const pinned = allNotes.filter(n => n.pinned);
                if (pinned.length === 0) return null;
                const visible = pinnedExpanded ? pinned : pinned.slice(0, 3);
                const hasMore = pinned.length > 3;
                return (
                  <div style={{ flexShrink: 0, paddingRight: 16, marginBottom: 10, borderBottom: "1px solid var(--border)", paddingBottom: 8 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: "var(--text-light)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>📌 Disematkan</div>
                    <div className={pinnedExpanded ? "pinned-list-expanded" : ""}>
                      {visible.map(n => (
                        <span key={n.id}
                          className={`pinned-note-item${panelNote?.id === n.id ? " active" : ""}`}
                          onClick={() => { setPanelNote(n); setNavTrail([n]); }}
                          title={n.title || "(tanpa judul)"}>
                          {n.title || n.content.slice(0, 50) || "(tanpa judul)"}
                        </span>
                      ))}
                    </div>
                    {hasMore && (
                      <span onClick={() => setPinnedExpanded(e => !e)}
                        style={{ fontSize: 11, color: "var(--accent)", cursor: "pointer", marginTop: 2, display: "inline-block" }}>
                        {pinnedExpanded ? "Sembunyikan ▲" : `+${pinned.length - 3} lainnya ▼`}
                      </span>
                    )}
                  </div>
                );
              })()}

              {/* Sort dropdown */}
              <div style={{ marginBottom: 8, flexShrink: 0, paddingRight: 16 }}>
                <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                  style={{ fontSize: 11, border: "1px solid var(--border)", borderRadius: 6, padding: "4px 8px", background: "var(--bg-primary)", color: "var(--text-secondary)", cursor: "pointer", width: "100%" }}>
                  <option value="updated">Terbaru</option>
                  <option value="created">Terlama</option>
                  <option value="alpha">A–Z</option>
                  <option value="links">Terbanyak link</option>
                </select>
              </div>

              {/* Note list */}
              <div className="notes-left-inner">
                {loading ? (
                  <div style={{ color: "var(--text-secondary)", textAlign: "center", padding: 40 }}>Memuat...</div>
                ) : sortedNotes.length === 0 ? (
                  <div style={{ color: "var(--text-secondary)", textAlign: "center", padding: 40, fontSize: 13 }}>
                    {activeTags.length > 0
                      ? `Tidak ada catatan dengan tag ${activeTags.map(t => "#" + t).join(" + ")}`
                      : q ? "Tidak ada catatan yang cocok."
                      : "Belum ada catatan. Tulis sesuatu!"}
                  </div>
                ) : (
                  sortedNotes.map(n => {
                    const outCount = (n.linked_to || []).length;
                    const inCount = inCountMap[n.id] || 0;
                    const isSelected = panelNote?.id === n.id;
                    return (
                      <div key={n.id} className="note-card"
                        onClick={() => { setPanelNote(n); setNavTrail([n]); }}
                        style={{ borderColor: isSelected ? "var(--accent)" : undefined, background: isSelected ? "rgba(168,197,0,0.06)" : undefined }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                          <div className="note-card-title">
                            {n.pinned && <span style={{ fontSize: 11, marginRight: 4, opacity: 0.8 }}>📌</span>}
                            {n.list_id && <span className="note-shared-badge" style={{ marginRight: 4 }}>👥</span>}
                            {n.title || n.content.slice(0, 60)}
                          </div>
                          <span style={{ fontSize: 11, color: "var(--text-light)", flexShrink: 0 }}>{fmtDate(n.updated_at)}</span>
                        </div>
                        {n.title && <div className="note-card-preview" dangerouslySetInnerHTML={{ __html: n.content.slice(0, 200) }} />}
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 6, alignItems: "center" }}>
                          {(n.tags || []).map(tag => (
                            <span key={tag} className="note-tag"
                              style={{ cursor: "pointer", fontSize: 11, background: activeTags.includes(tag) ? "var(--accent)" : undefined, color: activeTags.includes(tag) ? "#111" : undefined }}
                              onClick={e => { e.stopPropagation(); handleTagFilter(tag); }}>
                              #{tag}
                            </span>
                          ))}
                          {(n.linked_tasks || []).map(t => (
                            <span key={t.id} style={{ fontSize: 11, color: "var(--text-secondary)", background: "var(--bg-primary)", borderRadius: 6, padding: "2px 8px" }}>
                              📌 {t.title}
                            </span>
                          ))}
                          {(outCount > 0 || inCount > 0) && (
                            <span className="note-conn">
                              {outCount > 0 && `🔗${outCount}`}{outCount > 0 && inCount > 0 && " "}{inCount > 0 && `←${inCount}`}
                            </span>
                          )}
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>

            {/* ── RIGHT PANEL ── */}
            <div className="notes-right">
              {!panelNote ? (
                <div className="notes-panel-empty">
                  <span style={{ fontSize: 40, opacity: 0.3 }}>📝</span>
                  <span style={{ fontSize: 13 }}>Pilih catatan untuk membaca</span>
                  <button onClick={openNew} className="btn btn-secondary btn-sm">＋ Catatan Baru</button>
                </div>
              ) : (
                <NotePanel
                  note={panelNote}
                  allNotes={allNotes}
                  noteTitles={noteTitles}
                  sharedLists={sharedLists}
                  currentUserId={user?.id}
                  backlinks={panelBacklinks}
                  outlinks={panelOutlinks}
                  navTrail={navTrail}
                  onTaskClick={onTaskClick}
                  onEdit={() => openEdit(panelNote)}
                  onClose={() => { setPanelNote(null); setNavTrail([]); }}
                  onDelete={(id) => { handleDelete(id); setPanelNote(null); setNavTrail([]); }}
                  onPin={(id) => handlePin(id)}
                  onNavigate={async (n) => {
                    const full = allNotes.find(x => x.id === n.id) || await api.get(`/api/scratchpad/${n.id}`).catch(() => n);
                    setPanelNote(full);
                    setNavTrail(t => [...t.slice(-7), full]);
                  }}
                  onTrailClick={(n) => {
                    const idx = navTrail.findIndex(x => x.id === n.id);
                    const full = allNotes.find(x => x.id === n.id) || n;
                    setPanelNote(full);
                    setNavTrail(idx >= 0 ? navTrail.slice(0, idx + 1) : navTrail);
                  }}
                  onNavigateFrom={(child, parentIdx) => {
                    const full = allNotes.find(x => x.id === child.id) || child;
                    setPanelNote(full);
                    setNavTrail(t => t.slice(0, parentIdx + 1).concat([full]));
                  }}
                />
              )}
            </div>

          </div>

          {/* Modal — edit only */}
          {showModal && (
            <NoteModal
              key={selected?.id}
              note={selected}
              tasks={tasks}
              onClose={() => { setShowModal(false); setSelected(null); }}
              onSave={handleSave}
              onDelete={handleDelete}
              onTaskClick={onTaskClick}
              showToast={showToast}
              sharedLists={sharedLists}
              currentUserId={user?.id}
              noteTitles={noteTitles}
            />
          )}
        </div>
      );
    }

    function HabitCheckinModal({ habit, onClose, onCheckin }) {
      const [skipReason, setSkipReason] = useState("");
      const [showSkipInput, setShowSkipInput] = useState(false);
      const [loading, setLoading] = useState(false);

      const submit = async (status) => {
        setLoading(true);
        await onCheckin(habit.id, status, status === "skipped" ? skipReason : "");
        setLoading(false);
        onClose();
      };

      const dateStr = new Date().toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long" });

      return (
        <div className="habit-checkin-modal" onClick={onClose}>
          <div className="habit-checkin-box" onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 700, fontSize: 17, marginBottom: habit.micro_target ? 4 : 2 }}>{habit.title}</div>
            {habit.micro_target && (
              <div style={{ fontSize: 13, color: "var(--accent)", marginBottom: 4 }}>🎯 {habit.micro_target}</div>
            )}
            <div style={{ fontSize: 12, color: "var(--text-light)", marginBottom: 20 }}>{dateStr}</div>

            {habit.today_status ? (
              <div>
                <div style={{ padding: "12px 14px", borderRadius: 10, background: "var(--bg-primary)", marginBottom: 14, fontSize: 13, color: "var(--text-secondary)" }}>
                  {habit.today_status === "done"
                    ? <span>✅ Selesai hari ini</span>
                    : <span>⏭️ Di-skip hari ini{habit.skip_reason ? ` — "${habit.skip_reason}"` : ""}</span>}
                </div>
                <button className="habit-done-btn" style={{ background: "var(--bg-primary)", color: "var(--text-primary)", fontWeight: 600 }} onClick={onClose}>Tutup</button>
              </div>
            ) : showSkipInput ? (
              <div>
                <input className="input" value={skipReason} onChange={e => setSkipReason(e.target.value)}
                  placeholder="Alasan skip (opsional)..." style={{ marginBottom: 12 }} autoFocus />
                <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                  <button className="habit-skip-btn" onClick={() => setShowSkipInput(false)}>← Kembali</button>
                  <button className="habit-done-btn" style={{ background: "#facc15", color: "#000", flex: 1 }} disabled={loading}
                    onClick={() => submit("skipped")}>
                    ↷ Konfirmasi Skip
                  </button>
                </div>
              </div>
            ) : (
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <button className="habit-done-btn" style={{ flex: 1 }} disabled={loading} onClick={() => submit("done")}>
                  ✓ Done
                </button>
                <button className="habit-skip-btn" disabled={loading} onClick={() => setShowSkipInput(true)}>
                  ↷ Skip
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function HabitCard({ h, DAY_LABELS, todayDow, onCheckin, onEdit, onDelete, onTagClick, onTagRemove }) {

      const closeMenu = () => setMenuOpen(false);
      const [habitTags, setHabitTags] = useState([]);
      const [tagsExpanded, setTagsExpanded] = useState(false);

      useEffect(() => {
        if (h?.id && !String(h.id).startsWith("tmp_")) {
          api.get(`/api/habits/${h.id}/tags`).then(data => setHabitTags(data || [])).catch(() => {});
        }
      }, [h?.id]);

      return (
        <div className="habit-card fade-in" style={{ position: "relative", zIndex: menuOpen ? 10 : "auto" }}
          onClick={() => { if (!menuOpen) onCheckin(h); }}>
          {/* Backdrop untuk tutup menu saat klik di luar */}
          {menuOpen && (
            <div style={{ position: "fixed", inset: 0, zIndex: 9 }} onClick={e => { e.stopPropagation(); closeMenu(); }} />
          )}
          <div className="habit-card-inner">
            {/* Info */}
            <div className="habit-card-info">
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: h.micro_target ? 3 : 0 }}>
                {h.title}
                {h._pending && <span style={{ fontSize: 10, color: "var(--text-light)", marginLeft: 6 }}>⏳</span>}
              </div>
              {h.micro_target && (
                <div style={{ fontSize: 12, color: "var(--text-secondary)" }}>🎯 {h.micro_target}</div>
