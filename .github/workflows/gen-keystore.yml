name: (one-time) Generate Android Keystore

# Throwaway helper: generates a self-signed release keystore + random passwords
# and prints the 4 values you must paste into repo Secrets. DELETE the run
# afterwards (it prints the base64 keystore + passwords to the log).
#
# Usage: Actions -> "(one-time) Generate Android Keystore" -> Run workflow.
# Then Settings -> Secrets and variables -> Actions -> add:
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#   ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
# Keep the keystore base64 safe: the SAME key must sign all future updates.

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Generate keystore + random passwords
        run: |
          set -euo pipefail
          ALIAS="taskflow"
          # PKCS12 (.jks default) forces key password == store password, so use one.
          STOREPASS="$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)"
          keytool -genkeypair -v \
            -keystore taskflow.jks \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STOREPASS" -keypass "$STOREPASS" \
            -dname "CN=TaskFlow, OU=Dev, O=TaskFlow, L=Jakarta, ST=Jakarta, C=ID"
          B64="$(base64 -w0 taskflow.jks)"
          echo "::group::COPY THESE INTO REPO SECRETS (then delete this run)"
          echo "------------------------------------------------------------"
          echo "ANDROID_KEY_ALIAS = $ALIAS"
          echo "ANDROID_KEYSTORE_PASSWORD = $STOREPASS"
          echo "ANDROID_KEY_PASSWORD = $STOREPASS   (same as store password)"
          echo "------------------------------------------------------------"
          echo "ANDROID_KEYSTORE_BASE64 (one long line below):"
          echo "$B64"
          echo "------------------------------------------------------------"
          echo "::endgroup::"
          rm -f taskflow.jks
